  ## Core Idea


  Electrocardiography (ECG) is a cost-effective and widely accessible tool for eval-
  uating cardiac health. While numerous machine learning methods have been de- veloped
  to assist cardiologists in diagnosis, many suffer from lacking explain- ability,
  making it difficult to understand why a particular disease is classified. To address
  this limitation, we introduceX-ECG, an explainable ECG foundation model. To train
  this model, we first curate wave-level anomalies annotations on public datasets,
  using a rule-based algorithm that finds abnormal waves, intervals or segments in
  ECG signal according to established clinical knowledge. To help models learn where
  to focus, we propose an attention-guid


  ## Method Notes


  - To address this limitation, we introduceX-ECG, an explainable ECG foundation model.

  - To train this model, we first curate wave-level anomalies annotations on public
  datasets, using a rule-based algorithm that finds abnormal waves, intervals or segments
  in ECG signal according to established clinical knowledge.

  - To help models learn where to focus, we propose an attention-guided training approach
  that enables the model to highlight relevant regions.

  - To the best of our knowledge, X-ECGis the first ECG foundation model with built-in
  explainability.

  - Our exper- iments show that using our dataset to guide the model not only adds
  explainability but also improves performance in arrhythmia classification and report
  generation tasks.

  - Criteria Left Bundle Branch Block (LBBB): QRS duration > 120ms Dominant S wave
  in V1 Broad monophasic R wave and absence of Q waves in I, aVL, V5-6 Prolong R wave
  peak time (> 60ms) in V5-6 LLM I aVL V5 V6 Attention Score Figure 1:X-ECGis capable
  of identifying abnormal regions that contribute to its output, thereby enhancing
  model interpretability.


