translations:
  abstract: 电心学(ECG)是评价心脏健康的一个成本效益高且可广泛使用的工具. 虽然已经开发了许多机器学习方法来帮助心脏病学家进行诊断,但许多人都缺乏解释性,因此难以理解为什么对某一疾病进行分类.
    为解决这一局限性,我们采用了X-ECG,一种解释性的ECG基础模型. 为了训练这个模型,我们首先对公共数据集的波级异常说明进行校验,使用一种基于规则的算法,根据既定的临床知识在ECG信号中发现异常波,间隔或段.
    为了帮助模型了解重点,我们建议一种以注意力指导的培训方法,使模型能够突出相关区域。 据我们所知,X-ECG是第一个具有内置解释性的ECG基础模型. 我们的实验表明,使用我们的数据集来指导模型不仅增加了解释性,而且改善了节奏失调分类和报告生成任务的性能.
  one_sentence: X-ECG是一个可解释的ECG基础模型,它利用对被曲解的波级异常说明的注意力引导培训,以加强解释性,改善对心律失常分类,报告生成,异常局部化的性能.
  problem: 虽然已经开发了许多机器学习方法来帮助心脏病学家进行诊断,但许多人都缺乏解释性,因此难以理解为什么对某一疾病进行分类.
  contributions:
  - 建造MIMIC-IV-ECG+X和PTB-XL+X数据集,并附有细纹波级异常说明.
  - 建议建立一个以注意力为引导的培训机制,利用所编集数据集的热图,加强模型解释性。
  - 示范说明注意引导模型在心律失常分类,报告生成,异常本地化任务上提高性能.
  method:
  - 使用基于规则的算法对MIMIC-IV-ECG和PTB-XL进行解析的波级异常说明,分两个阶段:异常寻觅和标准寻觅(CFR).
  - 拟议以注意力指导培训机制,使模型注意力与异常热图一致。
  - 以CoCa框架为基础构建了X-ECG模型,其空间-时态嵌入用于ECG信号.
  - 以分类模块和LLM增强X-ECG,用于生成报告.
  experiments:
  - 使用PTB-XL和MIMIC-IV-ECG数据集对心律失常分类进行评估.
  - 使用LLM评价报告生成.
  - 利用全方位热图对异常地方化进行评估.
  limitations:
  - 为了克服这一局限性,我们采用了X-ECG,一种解释性的ECG基础模型。
  - (2025)通过应对解释腐败的ECG信号方面的挑战来扩展这一进展.
