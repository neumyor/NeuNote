contributions:
- Construction of MIMIC-IV-ECG+X and PTB-XL+X datasets with fine-grained wave-level
  anomaly annotations.
- Proposal of an attention-guided training mechanism that leverages heatmaps from
  the curated dataset to enhance model explainability.
- Demonstration that the attention-guided model improves performance on arrhythmia
  classification, report generation, and anomaly localization tasks.
method:
- To address this limitation, we introduceX-ECG, an explainable ECG foundation model.
- To train this model, we first curate wave-level anomalies annotations on public
  datasets, using a rule-based algorithm that finds abnormal waves, intervals or segments
  in ECG signal according to established clinical knowledge.
- To help models learn where to focus, we propose an attention-guided training approach
  that enables the model to highlight relevant regions.
- To the best of our knowledge, X-ECGis the first ECG foundation model with built-in
  explainability.
- Our exper- iments show that using our dataset to guide the model not only adds explainability
  but also improves performance in arrhythmia classification and report generation
  tasks.
- 'Criteria Left Bundle Branch Block (LBBB): QRS duration > 120ms Dominant S wave
  in V1 Broad monophasic R wave and absence of Q waves in I, aVL, V5-6 Prolong R wave
  peak time (> 60ms) in V5-6 LLM I aVL V5 V6 Attention Score Figure 1:X-ECGis capable
  of identifying abnormal regions that contribute to its output, thereby enhancing
  model interpretability.'
experiments:
- To train this model, we first curate wave-level anomalies annotations on public
  datasets, using a rule-based algorithm that finds abnormal waves, intervals or segments
  in ECG signal according to established clinical knowledge.
- Our exper- iments show that using our dataset to guide the model not only adds explainability
  but also improves performance in arrhythmia classification and report generation
  tasks.
- Many groups have proposed classification models with excellent performance across
  dif- ferent benchmarks Strodthoff et al.
- Existing ECG datasets, most notably MIMIC-IV-ECG and PTB-XL, typically have the
  waveform and metadata containing the disease class(es) associated with each waveform.
- These datasets how- ever do not have locations of the anomalies on the waveforms.
limitations:
- To address this limitation, we introduceX-ECG, an explainable ECG foundation model.
- (2025) extend this progress by addressing challenges in interpreting corrupted ECG
  signals.
