abstract: Electrocardiography (ECG) is a cost-effective and widely accessible tool
  for evaluating cardiac health. While numerous machine learning methods have been
  developed to assist cardiologists in diagnosis, many suffer from lacking explainability,
  making it difficult to understand why a particular disease is classified. To address
  this limitation, we introduce X-ECG, an explainable ECG foundation model. To train
  this model, we first curate wave-level anomalies annotations on public datasets,
  using a rule-based algorithm that finds abnormal waves, intervals or segments in
  ECG signal according to established clinical knowledge. To help models learn where
  to focus, we propose an attention-guided training approach that enables the model
  to highlight relevant regions. To the best of our knowledge, X-ECG is the first
  ECG foundation model with built-in explainability. Our experiments show that using
  our dataset to guide the model not only adds explainability but also improves performance
  in arrhythmia classification and report generation tasks.
one_sentence: X-ECG is an explainable ECG foundation model that uses attention-guided
  training on curated wave-level anomaly annotations to enhance interpretability and
  improve performance on arrhythmia classification, report generation, and anomaly
  localization.
problem: While numerous machine learning methods have been developed to assist cardiologists
  in diagnosis, many suffer from lacking explainability, making it difficult to understand
  why a particular disease is classified.
contributions:
- Construction of MIMIC-IV-ECG+X and PTB-XL+X datasets with fine-grained wave-level
  anomaly annotations.
- Proposal of an attention-guided training mechanism that leverages heatmaps from
  the curated dataset to enhance model explainability.
- Demonstration that the attention-guided model improves performance on arrhythmia
  classification, report generation, and anomaly localization tasks.
method:
- 'Curated wave-level anomaly annotations on MIMIC-IV-ECG and PTB-XL using a rule-based
  algorithm with two stages: abnormal seeking and criteria seeking (CFR).'
- Proposed attention-guided training mechanism to align model attention with anomaly
  heatmaps.
- Built X-ECG model based on CoCa framework with spatial-temporal embeddings for ECG
  signals.
- Augmented X-ECG with a classification module and an LLM for report generation.
experiments:
- Evaluation on arrhythmia classification using PTB-XL and MIMIC-IV-ECG datasets.
- Evaluation on report generation using LLM.
- Evaluation on anomaly localization using curated heatmaps.
limitations:
- To address this limitation, we introduceX-ECG, an explainable ECG foundation model.
- (2025) extend this progress by addressing challenges in interpreting corrupted ECG
  signals.
