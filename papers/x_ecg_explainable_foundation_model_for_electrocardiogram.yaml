abstract: Electrocardiography (ECG) is a cost-effective and widely accessible tool
  for eval- uating cardiac health. While numerous machine learning methods have been
  de- veloped to assist cardiologists in diagnosis, many suffer from lacking explain-
  ability, making it difficult to understand why a particular disease is classified.
  To address this limitation, we introduceX-ECG, an explainable ECG foundation model.
  To train this model, we first curate wave-level anomalies annotations on public
  datasets, using a rule-based algorithm that finds abnormal waves, intervals or segments
  in ECG signal according to established clinical knowledge. To help models learn
  where to focus, we propose an attention-guid
