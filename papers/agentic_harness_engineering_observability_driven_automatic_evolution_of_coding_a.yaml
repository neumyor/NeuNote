  experiments:
  - 在终端-Bench 2升降机上进行10次AHE迭代,从69.7%升至77.0%,超过了人类设计的代码(71.9%)和自转基线ACE(68.9%)和无培训GRPO(72.3%)。
  - 冷冻带向SWE-bench-验证机的转移,取得了最高的总成功,比种子少12%的代币.
  - 跨家庭增益+5.1至+10.1 pp 3个备用基模家庭在终点-奔驰2号.
  - 组件扩展显示对工具、中间软件和长期内存进行本地化的增益;单是系统即时递减。
  limitations:
