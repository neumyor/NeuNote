abstract: 'Harnesses are now central to agent performance, mediating how models interact
  with tools and execution environments. Yet harness engineering remains a manual
  craft, because automating it faces a heterogeneous action space across editable
  components, voluminous trajectories that bury actionable signal, and edits whose
  effect is hard to attribute. We introduce AgenticHarnessEngineering (AHE), a closed
  loop that addresses these challenges through three matched observability pillars:
  ❶ component observability gives every editable harness component a file-level representation
  so the action space is explicit and revertible; ❷ experience observability distills
  millions of raw trajectory tokens into a layered, drill-down evidence corpus that
  an evolving agent can actually consume; and ❸ decision observability pairs every
  edit with a self-declared prediction, later verified against the next round''s task-level
  outcomes. Together, these pillars turn every edit into a falsifiable contract, so
  harness evolution proceeds autonomously without collapsing into trial-and-error.
  Empirically, ten AHE iterations lift pass@1 on Terminal-Bench 2 from 69.7% to 77.0%,
  surpassing the human-designed harness Codex (71.9%) and the self-evolving baselines
  ACE and Training-Free GRPO. The frozen harness transfers without re-evolution: on
  SWE-bench-verified it achieves the highest aggregate success while using 12% fewer
  tokens than the seed, and on Terminal-Bench 2 it yields +5.1 to +10.1 pp cross-family
  gains across three alternate model families, indicating the evolved components encode
  general engineering experience rather than benchmark-specific tuning. Ablations
  further localize the gain to tools, middleware, and long-term memory rather than
  the system prompt. These results position observability-driven evolution as a practical
  pathway to keep coding-agent harnesses continually improving alongside their base
  models.'
one_sentence: We introduce Agentic Harness Engineering (AHE), an observability-driven
  closed loop that automatically evolves coding-agent harnesses, demonstrating significant
  improvements on Terminal-Bench 2 and transfer across benchmarks and model families.
problem: Automating the full harness engineering loop for coding agents is challenging
  because of heterogeneous editable components, massive trajectory data that hides
  actionable signals, and hard-to-attribute edits, and existing approaches only evolve
  single components.
contributions:
- 'We formulate agent-driven harness evolution for coding agents and propose AHE,
  which identifies observability across components, trajectories, and decisions as
  the design pivot and turns every harness edit into a falsifiable, file-level contract
  through three observability pillars: a decoupled component substrate, a layered
  trajectory-distillation pipeline, and a change manifest whose self-declared predictions
  are verified by next-round task deltas.'
- We empirically show that AHE lifts pass@1 on Terminal-Bench 2 from 69.7% to 77.0%,
  surpasses human-designed and automated baselines, and produces a frozen harness
  that transfers across benchmarks and base-model families.
- 'Our analysis reveals two limits of agent-driven evolution: harness components interact
  non-additively, so stacking effective edits caps the aggregate gain; and the loop''s
  self-attribution is reliable for fixes but blind to regressions, pinpointing regression
  foresight as the clearest direction for future self-evolution loops.'
method:
- Uses NexAU decoupled harness with seven file-level editable components (system prompt,
  tools, middleware, skills, etc.) to map failure patterns to single component classes.
- Agent Debugger distills raw trajectories into a layered evidence corpus (per-task
  analyses, benchmark overview) for experience observability.
- Evolve Agent applies edits based on evidence, recording each edit with a self-declared
  prediction verified by next-round outcomes (decision observability).
- Seed harness is deliberately minimal (single shell tool) to ensure each addition
  is justified.
experiments:
- Ten AHE iterations on Terminal-Bench 2 lift pass@1 from 69.7% to 77.0%, surpassing
  human-designed Codex (71.9%) and self-evolving baselines ACE (68.9%) and Training-Free
  GRPO (72.3%).
- Frozen harness transfers to SWE-bench-verified achieving highest aggregate success
  with 12% fewer tokens than seed.
- Cross-family gains of +5.1 to +10.1 pp on three alternate base-model families on
  Terminal-Bench 2.
- Component ablation shows gains localized to tools, middleware, and long-term memory;
  system prompt alone regresses.
limitations:
- Harness components interact non-additively, so stacking effective edits caps aggregate
  gain.
- The loop's self-attribution is reliable for fixes but blind to regressions, indicating
  need for regression foresight in future loops.
- Manual loop struggles to keep pace with rapid base model advances.
