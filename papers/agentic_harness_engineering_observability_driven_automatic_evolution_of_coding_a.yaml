translations:
  abstract: 利用手段现在是代理性能的核心,调解模型如何与工具和执行环境互动. 然而,驾驭工程仍然是手动的工艺,因为它在可编辑组件、埋藏可操作信号的大量轨迹以及其效果难以描述的编辑方面,自动化面临着一个千差万别的行动空间。
    我们引入了AgenticHarnessEngineering(AHE),这是一个通过三个匹配的可观察性支柱来应对这些挑战的闭环:QQ组件可观察性使每个可编辑的杠杆组件都有一个文件级的表示,所以动作空间是清晰的和可回转的;XQ体验可观察性将数百万个原始的轨迹符号蒸馏成一个层化的钻探性证据,一个演化的代理人可以实际消耗;以及XQQ决定可观察性将每个编辑配以一个自我宣布的预测,后来根据下一轮的任务级结果进行核实.
    这些支柱共同将每个编辑变成一个可伪造的合同,所以利用进化过程可以自主地进行,而不会崩溃为试探和错误。 从经验上看,10个AHE迭代升降机从69.7%升至77.0%,超过了人机设计的吊带Codex(71.9%)和自转基线ACE和Train-Free
    GRPO。 在SWE-bench-验证上,它取得了最高的总成功,同时使用比种子少12%的代号,在Terminal-Bench 2上,它产生+5.1至+10.1pp的跨家庭收益,跨越三个备选模型家庭,表明进化的组件编码一般工程经验,而不是特定基准的调值。
    将收益进一步本地化为工具,中间软件,以及长期内存而不是系统即时. 这些成果将可观察性驱动的演化定位为一条实用途径,使编码剂与基础模型一起不断改进。
  one_sentence: 我们引入了Agentic Harness Engineering(AHE),这是一个可观察性驱动的闭环,它自动演化出编码剂的拉带,展示了终端-奔驰2和跨基准和模型家族的转移的重大改进.
  problem: 编码代理的全吊带工程循环自动化具有挑战性,因为可以编辑的组件各异,隐藏可操作信号的大量轨迹数据,以及难以属性的编辑,现有方法只能演化单个组件.
  contributions:
  - 我们为编码剂制定由代理驱动的绳索进化法,并提议AHE,它确定各组件、轨迹和决定之间的可观察性,作为设计支点,并通过三个可观察性支柱将每个绳索编辑变成可伪造的、文件级的契约:一个脱钩元件基质,一个分层的轨迹消化管道,以及一个变化表,其自我宣布的预测由下一轮任务三角洲验证。
  - 我们的经验表明,AHE升降机在Bench 2号航站楼从69.7%升至77.0%,超过了人造和自动化基线,并产生了一种跨越基准和基模家庭的冷冻带。
  - '我们的分析揭示了代理驱动演化的两个局限: 牵引组件非辅助性地相互作用,所以堆叠有效的编辑可以封顶总收益; 循环的自我归属对于修正是可靠的,但对回归是盲目的,将回归展望确定为未来自我演化循环的最明确方向.'
  method:
  - 使用 NexAU 脱钩的带7个文件级可编辑组件(系统即时,工具,中间软件,技能等)的拉带,将故障模式映射到单个组件类.
  - 代理Debugger将原始的轨迹蒸馏成一个分层的证据体(每个任务分析,基准概览),用于体验可观察性.
  - Evolution Agent应用基于证据的编辑,记录每次编辑时都使用由下一轮结果(决定可观察性)核实的自我宣布的预测.
