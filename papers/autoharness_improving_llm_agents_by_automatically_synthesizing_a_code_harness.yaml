translations:
  abstract: 尽管语言模型在过去几年中取得了长足的进步,但当作为代理使用时,这类模型往往试图进行不仅对特定状态来说不尽人意,而且受到外部环境的严格禁止的行动.
    例如,在近期的卡格格GameArena围棋比赛中,双子座2.5-Flash损失的78%被归咎于非法移动. 人们常常在LLMs周围手动写作"harneses",以防止这种失败.
    在本文中,我们表明双子座-2.5-Flash可以自动合成这样的代码带,利用少数回合的迭代代码精炼,从(游戏)环境中得到反馈. 由此产生的套带在145个不同的TextArena游戏中(包括1-玩家和2-玩家)防止了所有非法移动,使得较小的双子座2.5-Flash模型能够超越更大的模型,如双子座2.5-Pro.
    把技术推到极限,我们可以让双子座2.5-Flash在代码中生成整个政策,从而消除在决策时间使用LLM的必要性. 由此产生的代码政策在16个TextArena
    1-player游戏上得到比双子座2.5-Pro和GPT-5.2-High更高的平均奖励. 我们的结果表明,使用一个较小的模型来合成一个自定义的代码(或整个政策),可以比一个更大的模型更好,同时也更具成本效益。
  one_sentence: AutoHarness使用环境反馈的迭代代码改进,自动合成LLM代理的代码控制器,通过防止非法行动,使较小的模型能够超过较大的模型。
  problem: 在受限环境中行事的LLM代理人经常试图采取非法行动,因为他们没有遵守环境规则,手动写作验证工具是劳动密集型和简陋的。
  contributions:
  - 提出“ 代码” 框架, 以通过迭代代码的完善, 自动合成 LLM 代理的代码 。
  - 利用Thompson采样的树搜索来有效探索利用程序的空间.
  - 在145个TextArena游戏中实现100%的诉讼成功率.
  - 在2个玩家游戏中,允许较小的双子座2.5-Flash超越较大的双子座2.5-Pro(56.3%对38.2%的胜率).
  - 延伸至整个政策作为代码生成的"harness-as-policy",在16个1玩家游戏中实现比GPT-5.2-High更高的平均奖励.
  - 以几乎零的试验时间推论成本证明只限代码政策的成本效率。
  method:
  - 维持一棵代码假说树;每个节点都是候选带.
  - 使用Thompson采样来选择哪个节点来根据热度值(平均合法移动精度)来精炼下一个节点.
  - LLM作为变异操作者,根据环境评论家的反馈(合法/非法动作和奖励)完善代码.
  - '两个主要的变体: " 即行动即行动 " 核查器(LLM提出行动、守则核查合法性)和 " 即行动即行动 " 政策(守则中的实体政策)。'
  experiments:
  - 在145个TextArena游戏(不包括对话框游戏)上测试过;训练使用10个平行的envs,每次推出最多1000步.
  - 平均训练在14.5次迭代后结束;19/32游戏在10次迭代以下完成.
  - 在所有145场比赛中实现100%的法律诉讼成功率.
  - 对16个1P和16个2P游戏的评价:比较双子座2.5-Flash,双子座2.5-Pro和双子座2.5-Flash+. 调和。
  - 对于2P游戏:Flash+Harness赢得9/16游戏(56.3%的胜率)对双子座2.5-Pro(38.2%).
  - 对于1P游戏:Flash+Harness实现0.745平均奖励对双子座-2.5-Pro 0.707和Flash 0.673.
  - Harness-as-policy在16个1P游戏中平均获得0.870的奖励,表现优于GPT-5.2-High(0.844)等,测试成本接近零.
  limitations:
  - 目前为每个环境/游戏生成一个单独的带.
  - Harness-as-policy仅限于1个玩家游戏;2个玩家游戏需要对手模特,更具挑战性.
  - 以基 LLM(Gemini-2.5-Flash)为代码合成,需要环境反馈信号.
  - 这种方法可能不会很好地扩展至带有自由格式文本动作的游戏(如黑手党,代码).
