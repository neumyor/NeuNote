abstract: Despite significant strides in language models in the last few years, when
  used as agents, such models often try to perform actions that are not just suboptimal
  for a given state, but are strictly prohibited by the external environment. For
  example, in the recent Kaggle GameArena chess competition, 78% of Gemini-2.5-Flash
  losses were attributed to illegal moves. Often people manually write "harnesses"
  around LLMs to prevent such failures. In this paper, we demonstrate that Gemini-2.5-Flash
  can automatically synthesize such a code harness, using a small number of rounds
  of iterative code refinement given feedback from the (game) environment. The resulting
  harness prevents all illegal moves in 145 different TextArena games (both 1-player
  and 2-player), enabling the smaller Gemini-2.5-Flash model to outperform larger
  models, such as Gemini-2.5-Pro. Pushing our technique to the limit, we can get Gemini-2.5-Flash
  to generate the entire policy in code, thus eliminating the need to use the LLM
  at decision making time. The resulting code-policy receives a higher average reward
  than Gemini-2.5-Pro and GPT-5.2-High on 16 TextArena 1-player games. Our results
  show that using a smaller model to synthesize a custom code harness (or entire policy)
  can outperform a much larger model, while also being more cost effective.
one_sentence: AutoHarness automatically synthesizes a code harness for LLM agents
  using iterative code refinement with environment feedback, enabling smaller models
  to outperform larger ones by preventing illegal actions.
problem: LLM agents acting in constrained environments frequently attempt illegal
  actions because they fail to follow environment rules, and manually writing validation
  harnesses is labor-intensive and brittle.
contributions:
- Proposes 'code as harness' framework to automatically synthesize a code harness
  for LLM agents via iterative code refinement.
- Uses tree search with Thompson sampling to efficiently explore the space of harness
  programs.
- Achieves 100% legal action success rate on 145 TextArena games.
- Enables smaller Gemini-2.5-Flash to outperform larger Gemini-2.5-Pro in 2-player
  games (56.3% vs 38.2% win rate).
- Extends to 'harness-as-policy' where entire policy is generated as code, achieving
  higher average reward than GPT-5.2-High on 16 1-player games.
- Demonstrates cost-effectiveness with nearly zero test-time inference cost for code-only
  policies.
method:
- Maintains a tree of code hypotheses; each node is a candidate harness.
- Uses Thompson sampling to select which node to refine next based on heuristic value
  (average legal move accuracy).
- LLM acts as a mutation operator to refine code based on feedback from environment
  critic (legal/illegal moves and rewards).
- 'Two main variants: harness-as-action-verifier (LLM proposes actions, code verifies
  legality) and harness-as-policy (entire policy in code).'
experiments:
- Tested on 145 TextArena games (excluding dialog games); training uses 10 parallel
  envs, up to 1000 steps per rollout.
- Average training ends after 14.5 iterations; 19/32 games finish in under 10 iterations.
- Achieves 100% legal action success rate on all 145 games.
- 'Evaluation on 16 1P and 16 2P games: compares Gemini-2.5-Flash, Gemini-2.5-Pro,
  and Gemini-2.5-Flash+Harness.'
- 'For 2P games: Flash+Harness wins 9/16 games (56.3% win rate) vs Gemini-2.5-Pro
  (38.2%).'
- 'For 1P games: Flash+Harness achieves 0.745 average reward vs Gemini-2.5-Pro 0.707
  and Flash 0.673.'
- Harness-as-policy achieves 0.870 average reward on 16 1P games, outperforming GPT-5.2-High
  (0.844) and others, with nearly zero test cost.
limitations:
- Currently generates a separate harness for each environment/game.
- Harness-as-policy is limited to 1-player games; 2-player games require opponent
  modeling and are more challenging.
- Relies on base LLM (Gemini-2.5-Flash) for code synthesis and requires environment
  feedback signals.
- The method may not extend well to games with free-form text actions (like Mafia,
  Codenames).
