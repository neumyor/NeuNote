abstract: 'The performance of LLM-based agents is jointly shaped by their base models
  and the harnesses that mediate their interaction with the environment. Because different
  models exhibit distinct behaviors, effective harness design is inherently model-specific.
  Yet agent harnesses are still largely engineered by human experts, a paradigm that
  scales poorly as modern LLMs become increasingly diverse and rapidly evolving. In
  this paper, we introduce Self-Harness, a new paradigm in which an LLM-based agent
  improves its own operating harness, without relying on human engineers or stronger
  external agents. We operationalize Self-Harness as an iterative loop with three
  stages: Weakness Mining, which identifies model-specific failure patterns from execution
  traces; Harness Proposal, which generates diverse yet minimal harness modifications
  tied to these failures; and Proposal Validation, which accepts candidate edits only
  after regression testing. We instantiate Self-Harness on Terminal-Bench-2.0 using
  a minimal initial harness and three base models from diverse families: MiniMax M2.5,
  Qwen3.5-35B-A3B, and GLM-5. Across all three models, Self-Harness consistently improves
  performance, with held-out pass rates increasing from 40.5% to 61.9%, 23.8% to 38.1%,
  and 42.9% to 57.1%, respectively. Qualitative analyses further show that Self-Harness
  does not simply add generic instructions, but effectively turns model-specific weaknesses
  into concrete, executable harness changes. These results suggest a path toward LLM-based
  agents that are not merely shaped by their harnesses, but can also participate in
  reshaping them.'
one_sentence: We introduce Self-Harness, a paradigm in which an LLM-based agent iteratively
  improves its own operating harness by mining weakness patterns from execution traces,
  proposing targeted harness modifications, and validating them via regression testing.
problem: Agent harnesses are still largely engineered by human experts, a paradigm
  that scales poorly as modern LLMs become increasingly diverse and rapidly evolving.
contributions:
- We propose Self-Harness, a novel paradigm for harness improvement that enables an
  LLM-based agent to design and refine the harness through which it operates, tailoring
  it to its own base model without human engineering effort or guidance from a stronger
  external agent.
- 'We operationalize Self-Harness as an iterative loop that turns each model''s behavioral
  evidence into model-specific harness updates: it evaluates execution traces to identify
  recurring failure patterns, generates diverse yet minimal candidate edits, and promotes
  only those that pass regression tests.'
- Experiments on Terminal-Bench-2.0 show that Self-Harness improves performance across
  3 models from diverse families, with absolute gains of up to 21.4 percentage points
  and relative improvements of up to 138%; qualitative analyses further confirm that
  different models benefit from distinct harness changes, suggesting that Self-Harness
  can turn model-specific weaknesses into concrete harness changes.
method:
- 'Weakness Mining: Run fixed model under current harness on tasks, collect execution
  traces, cluster failed traces to identify model-specific failure patterns.'
- 'Harness Proposal: Based on failure patterns, generate diverse yet minimal harness
  modifications tied to specific failure mechanisms.'
- 'Proposal Validation: Evaluate candidate modifications via regression tests on held-out
  tasks; accept edits that improve performance without degradation.'
experiments:
- 'Instantiated Self-Harness on Terminal-Bench-2.0 with a minimal initial harness
  and three base models: MiniMax M2.5, Qwen3.5-35B-A3B, GLM-5.'
- 'Held-in pass rates improved: MiniMax M2.5 from 43.0% to 50.0%; Qwen3.5-35B-A3B
  from 15.1% to 36.0%; GLM-5 from 47.7% to 57.0%.'
- 'Held-out pass rates improved: MiniMax M2.5 from 40.5% to 61.9%; Qwen3.5-35B-A3B
  from 23.8% to 38.1%; GLM-5 from 42.9% to 57.1%.'
- Qualitative analyses show harness modifications are model-specific and targeted,
  not generic instructions.
- Self-Harness discovers broadly useful modifications that generalize to unseen tasks.
limitations:
- We operationalize Self-Harness as an iterative loop with three stages:Weakness Mining,
  which identifies model-specific failure patterns from execution traces;Harness Proposal,
  which generates diverse yet minimal harness modifications tied to these failures;
  andProposal V alidation, which accepts candidate edits only after regression testing.
- Although there is no universally accepted definition, a harness may include system
  prompts, tools, runtime mechanisms, verification rules, orchestration logic, and
  failure-recovery procedures.
- This paradigm reduces dependence on external guidance that may be costly, unavailable
  for frontier models, or mismatched to the target model’s failure modes.
- The agent then clusters failed traces, allowing it to reason about model-specific
  failure patterns rather than isolated mistakes.Harness Proposal:Based on these failure
  patterns, the agent generates a small set of diverse yet minimal harness modifications,
  each tied to a specific failure mechanism.
