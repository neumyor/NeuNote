translations:
  abstract: 以LLM为基础的物剂的性能由它们的基础模型和调解它们与环境相互作用的利用手段共同决定. 由于不同的模型表现出不同的行为,有效的拉带设计本质上是模型特有的.
    然而,物剂的利用在很大程度上仍然由人类专家设计,随着现代有限责任公司日益多样化和迅速发展,这种模式的规模也非常小。 在本文中,我们引入了"自我和谐"(Self-Harness),这是一种基于LLM的代理改进自身操作操纵的新范式,不依赖人类工程师或更强大的外部代理.
    我们将“自我和谐”作为具有三个阶段的迭代循环加以运作:“弱点采矿”,从执行痕迹中找出具体模式的失败模式; 利用性建议,它产生与这些失败相关的多种但最小的利用性修改;
    以及 提议验证,它只接受在回归测试后才进行候选编辑. 我们在Bench-2.0终端上用最小的初始牵引装置和来自不同家庭的三种基本模型:MiniMax M2.5、Quen3.5-35B-A3B和GLM-5。
    在所有三种模式中, " 自我和谐 " 的成绩持续改善,停学率分别从40.5%增至61.9%、23.8%增至38.1%和42.9%增至57.1%。 定性分析进一步表明,自我和谐并不简单地添加通用指令,而是有效地将模型特有的弱点转化为具体,可执行的拉带变化.
    这些结果表明,采用基于LLM的药剂的途径不仅是由它们的药具塑造的,而且还可以参与重塑这些药剂。
  one_sentence: 我们引入了自我和谐(Self-Harness),一个基于LLM的代理商在其中通过从执行痕迹中挖掘弱点模式来反复改进自己的操作控制,提出有针对性的控制控制改变,并通过回归测试加以验证.
  problem: 随着现代法学硕士课程的日益多样化和迅速发展,这一模式的尺度也很差。
  contributions:
  - 我们提出自我和谐(Self-Harness),这是改进利用的一个新范式,它使基于LLM的代理人能够设计和完善其运作所借助的利用,使其适应自己的基础模型,而无需人力工程努力或更强大的外部代理人的指导。
  - 我们将“自我和谐”作为一个迭代循环来操作,将每个模型的行为证据转化为模型特异性带更新:它评价执行痕迹,以识别重复的失败模式,生成多样但最小的候选编辑,并且只推广那些通过回归测试的编辑。
  - 对终端-Bench-2.0的实验显示,自律能改善来自不同家庭的3个模型的性能,绝对收益高达21.4个百分点,相对改善高达138%;定性分析进一步证实不同模型得益于不同的牵引变化,表明自律能将模型特有的弱点转化为具体的牵引变化.
  method:
  - 弱点采矿:在目前操纵下运行固定模式的任务,收集执行痕迹,集群失败痕迹以识别模型特定故障模式.
  - 利用性建议:基于故障模式,产生与特定故障机制挂钩的多样但最小的利用性改造.
  - 建议验证:通过对被搁置任务的回归测试来评价候选修改;接受可以改善性能而不退化的编辑.
  experiments:
  - 在Bench-2.0号终端上有确凿的自我harness,其初始牵引力最小,并有三种基本型号:MiniMax M2.5,Qune3.5-35B-A3B,GLM-5.
  - 持有率提高:MiniMax M2.5从43.0%增至50.0%;Quen3.5-35B-A3B从15.1%增至36.0%;GLM-5从47.7%增至57.0%。
  - 被淘汰的通过率有所改善:Minimax M2.5从40.5%增至61.9%;Quen3.5-35B-A3B从23.8%增至38.1%;GLM-5从42.9%增至57.1%。
  - 定性分析显示,对利用率的修改是针对模型的、有针对性的,而不是通用的指令。
  - 自我和谐发现广泛有用的修改,这些修改概括到隐蔽的任务.
  limitations:
  - 我们操作了“自我和谐”作为三个阶段的迭代循环:“微弱采矿”,它从执行痕迹中识别出具体模式的失败模式;“和谐提议”,它产生与这些失败挂钩的多样但最小的调整;以及“建议V滑坡”,它只接受在回归测试后进行候选编辑。
  - 虽然没有普遍接受的定义,但利用手段可能包括系统提示、工具、运行时间机制、核查规则、协调逻辑和故障回收程序。
  - 这种模式减少了对外部指导的依赖,外部指导可能代价高昂,无法用于前沿模型,或与目标模型的失败模式不匹配。
  - 然后代理集群失败的痕迹,使得它能够对模型特定的失败模式进行推理,而不是孤立的错误. 利用性建议:基于这些失败模式,该剂产生一套小的多样但最小的利用性修改,每套都与特定的失败机制挂钩.
