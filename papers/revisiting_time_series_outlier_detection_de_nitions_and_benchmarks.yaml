abstract: Time series outlier detection has been extensively studied with many advanced
  algorithms proposed in the past decade. Despite these efforts, very few studies
  have investigated how we should benchmark the existing algorithms. In particular,
  using synthetic datasets for evaluation has become a common
one_sentence: We propose a behavior-driven taxonomy for time series outliers and categorize
  outliers into point- and pattern-wise outliers with clear context definitions.
problem: However, it is non-trivial to properly generate synthetic datasets for time
  series data due to the ambiguity of outlier definitions.
contributions:
- Propose a behavior-driven taxonomy for time series outliers, categorizing them into
  point- and pattern-wise outliers with clear context definitions.
- Present a general synthetic criterion and generate 35 synthetic datasets for benchmarking.
- Identify four multivariate real-world datasets covering both point- and pattern-wise
  outliers from different application domains.
- Benchmark 9 algorithms, finding that classical algorithms can outperform recent
  deep learning approaches.
method:
- Proposed a behavior-driven taxonomy that models time series using empirical observation
  and spectral analysis.
- Categorized outliers into point-wise (global and contextual) and pattern-wise (shapelet,
  seasonal, trend) with clear definitions.
- Developed a general synthetic criterion based on the taxonomy to generate 35 synthetic
  datasets.
- Identified 4 multivariate real-world datasets and benchmarked 9 algorithms.
experiments:
- Generated 35 synthetic datasets based on the proposed taxonomy and synthetic criterion.
- Used 4 multivariate real-world datasets from different domains.
- Benchmarked 9 algorithms including prediction-based, majority modeling, and discords
  analysis methods.
- Evaluated algorithms on point-wise and pattern-wise outliers separately.
- Observed that classical algorithms (e.g., Isolation Forest, Matrix Profile) outperform
  recent deep learning approaches in many cases.
limitations:
- However, it is non-trivial to properly generate synthetic datasets for time series
  data due to the ambiguity of outlier deﬁnitions.
- However, these three outliers will be all regarded as collective outlier under the
  existing taxonomy.
- For example, researchers have synthesized time series data with anomalous individual
  points to simulate the failures or intrusions in domains such as electricity load
  monitoring [ 14], edge device faults [2] and server intrusion monitoring [15].
- With the hope that these insights could motivate future works, we have open-sourced
  all the datasets, the pre-processing and synthetic scripts, and the algorithm implementation
  in TODS [30].
