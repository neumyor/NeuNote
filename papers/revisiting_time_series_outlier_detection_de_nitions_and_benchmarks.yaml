translations:
  abstract: 过去十年中,通过提出许多先进的算法,对时间序列外部探测进行了广泛的研究。 尽管做出了这些努力,但很少有研究调查我们应如何衡量现有算法。 特别是,使用合成数据集进行评价已经成为文献中常见的做法,因此,有一个通用的合成标准来基准算法是至关重要的.
    这是一项非三角任务,因为现有的合成方法在不同应用中差异很大,而外部定义往往模棱两可. 为了弥补这一差距,我们提出一个行为驱动的分类法,用于时间序列外标,并将外标分为有明确上下文定义的点和图案外标。
    继新的分类法之后,我们提出一个一般的合成标准,并相应生成35个合成数据集。 我们进一步确定了来自不同域的4个多变量现实世界数据集,以及合成数据集和现实世界数据集上的基准9算法.
    令人惊讶的是,我们发现,一些古典算法可能比最近许多深入学习的方法要好。 数据集,预处理和合成脚本,以及算法执行等内容在https://github.com/datamllab/tods/tree/benchmark上公开.
  one_sentence: 我们提出一个行为驱动的分类法,用于时间序列外标,并将外标分类为有明确上下文定义的点和图案外标.
  problem: 然而,由于外部定义模糊不清,正确生成时间序列数据的合成数据集是非三角的.
  contributions:
  - 为时间序列外标提出行为驱动分类法,将其分为点和图案型外标,并有明确的上下文定义.
  - 提出一般合成标准并生成35个用于基准的合成数据集。
  - 确定四个多变量的实时数据集,涵盖不同应用域的点和图案偏差。
  - 基准9算法,发现古典算法可以超越最近的深层学习方法.
  method:
  - 提出了一个行为驱动的分类学,利用经验观测和光谱分析来模拟时间序列.
  - 在有明确定义的情况下,将输出国分为点(全球和背景)和模式(形状、季节、趋势)。
  - 基于分类学开发了一般合成标准,生成35个合成数据集.
  - 识别出4个多变的真世界数据集和基准9个算法.
  experiments:
  - 根据提议的分类学和合成标准生成了35个合成数据集.
  - 使用来自不同域的4个多变现实世界数据集.
  - 基准9个算法,包括基于预测、多数模型和不协调分析方法。
  - 分别对点和图案外置器进行算法评价.
  - 观察到古典算法(如孤立森林,矩阵简介)在很多情况下都优于近代的深层学习方法.
  limitations:
  - 然而,由于外部定义模糊不清,正确生成时间序列数据的合成数据集是非三角的.
  - 然而,在现有的分类法下,这三种外部因素都将被视为集体外部因素。
  - 例如,研究人员用异常点合成了时间序列数据,以模拟电力负荷监测[14],边缘设备断层[2]和服务器入侵监测[15]等领域的故障或入侵.
  - 希望这些见解能激发未来的作品,我们已经开源了所有的数据集,预处理和合成脚本,以及TODS[30]中的算法执行.
