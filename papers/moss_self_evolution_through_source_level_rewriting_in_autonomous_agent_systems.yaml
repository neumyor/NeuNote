abstract: 'Autonomous agentic systems are largely static after deployment: they do
  not learn from user interactions, and recurring failures persist until the next
  human-driven update ships a fix. Self-evolving agents have emerged in response,
  but all confine evolution to text-mutable artifacts—skill files, prompt configurations,
  memory schemas, workflow graphs—and leave the agent harness untouched. Since routing,
  hook ordering, state invariants, and dispatch live in code rather than in any text
  artifact, an entire class of structural failure is physically unreachable from the
  text layer. We argue that source-level adaptation is a fundamentally more general
  medium: it is Turing-complete, a strict superset of every text-mutable scope, takes
  effect deterministically rather than through base-model compliance, and does not
  erode under long-context drift. We present MOSS, a system that performs self-rewriting
  at the source level on production agentic substrates. Each evolution is anchored
  to an automatically curated batch of production-failure evidence and proceeds through
  a deterministic multi-stage pipeline; code modification is delegated to a pluggable
  external coding-agent CLI while MOSS retains stage ordering and verdicts. Candidates
  are verified by replaying the batch against the candidate image in ephemeral trial
  workers, then promoted via user-consent-gated, in-place container swap with health-probe-gated
  rollback. On OpenClaw, MOSS lifts a four-task mean grader score from 0.25 to 0.61
  in a single cycle without human intervention.'
one_sentence: MOSS is a system that enables production autonomous agent systems to
  self-evolve by performing source-level rewriting, fixing structural failures in
  the agent harness that are unreachable through text-mutable artifact updates alone.
problem: Autonomous agent systems are static after deployment and cannot learn from
  user interactions, and existing self-evolving approaches only modify text-mutable
  artifacts (skills, prompts, memory) but cannot reach structural failures in the
  agent harness code.
contributions:
- Articulates that source-level adaptation is a more general medium than text-mutable
  evolution for agentic systems.
- Presents MOSS, a system for source-level self-rewriting on production agentic substrates.
- Introduces a design with deterministic multi-stage pipeline, pluggable coding-agent
  CLI, and user-consent-gated container swap.
- Demonstrates on OpenClaw with a lift from 0.25 to 0.61 mean grader score in one
  cycle without human intervention.
method:
- 'Collects failure evidence from two channels: periodic background scan of user sessions
  and user-flagged turns.'
- 'Uses a deterministic multi-stage pipeline for evolution: localization, planning,
  code editing, verification, and deployment.'
- Delegates code modification to a pluggable external coding-agent CLI (e.g., Claude
  Code, OpenAI Codex).
- Verifies candidate modifications by replaying the evidence batch on ephemeral trial
  workers in production-equivalent containers.
- Deploys verified changes via user-consent-gated in-place container swap with health-probe-gated
  rollback.
- Exposes evolution lifecycle through a moss evo CLI and webhook events for user interaction.
experiments:
- Evaluated on OpenClaw, a production-grade agentic system, across four tasks.
- Measures performance using a grader score, achieving improvement from 0.25 to 0.61
  in a single evolution cycle.
limitations:
- 'Requires the agentic substrate to provide five primitives: shell tool, filesystem
  read, periodic scheduling, webhook-to-agent delivery, and system-prompt injection.'
- Code modification delegation to external coding-agent CLI introduces dependency
  on that CLI's capabilities and reliability.
- Container swap requires user consent, which may delay deployment.
