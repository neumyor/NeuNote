translations:
  abstract: 自主代理系统在部署后基本上是静态的:它们不会从用户互动中吸取教训,并且反复发生的故障一直持续到下一个人类驱动的更新船一个固定. 自我进化的代理已经出现,但所有进化都局限于文本可变的文物——技能文件、即时配置、内存计划、工作流程图——并让代理工具不受干扰。
    由于路由,钩子订购,状态变异,以及发送以代码而不是任何文本文物进行直播,整个一类的结构故障从文本层中实际上是无法到达的. 我们争辩说,源一级适应基本上是一种更为一般的媒介:它是图灵-完成的,是每个文本可变范围的严格的超级组合,通过确定而不是通过基准模型的遵守来产生效果,不会在长文本漂移下削弱。
    我们提出最低业务安全标准,这是一种在源一级对生产剂底物进行自我改写的系统。 每次演化都以自动整理的一批生产失败证据为基础,并通过确定性的多阶段管道进行;代码修改被授权给可插接的外部编码代理CLI,而最低业务安全标准则保留阶段订购和判决。
    候选人通过在电子试验工作人员中对照候选人形象重新播放批次进行核查,然后通过用户同意的、在位的集装箱交换与健康检测回滚进行升级。 在OpenClaw上,MOSS将一个单循环的四任务平均分分从0.25分提升到0.61分,没有人类干预.
  one_sentence: MOSS是一种系统,它通过进行源级重写,修复仅通过文本可移动的文物更新无法达到的代理带的结构故障,使生产自主代理系统能够自我移动.
  problem: 自主代理系统在部署后是静态的,无法从用户的交互中学习,现有的自演方法只修改了文本可变的文物(技能,提示,内存),但无法在代理机牵引码中达到结构故障.
  contributions:
  - 说明源层次的适应对于代理系统而言是一种比文本可变演化的更一般的介质.
  - 呈现MOSS,一种生产剂底物的源层自写系统.
  - 采用确定式多阶段管道、可插接编码剂CLI和用户同意的集装箱互换的设计。
  - 在OpenClaw上展示,在一个周期里,在没有人干预的情况下,从0.25升到0.61的中分分.
  method:
  - 从两个渠道收集故障证据:定期对用户会话的背景扫描和用户标记的转弯.
  - 采用确定性的多阶段进化管道:本地化、规划、代码编辑、核查和部署。
  - 代表代码修改为可插件的外部编码代理CLI(如克劳德代码,OpenAI代码).
  - 通过在生产等同容器中重新播放电子试验工作人员的证据批次,验证候选修改。
  - 通过经用户同意的就地集装箱交换与经健康检验的回滚进行可核实的更改。
  - 通过苔藓 evo CLI 和 webhook 事件来展示进化生命周期,用于用户互动.
  experiments:
  - 对OpenClaw这个生产级代理系统进行评价,涉及四项任务。
  - 用一个分数来衡量性能,在一个单一演化周期中从0.25提高到0.61.
  limitations:
  - '要求代理底物提供五个原始物: shell工具,文件系统读取,定期调度,webhook-to-agent送出,以及系统即时注射.'
  - 代码修改授权给外部编码代理人CLI,引入了对CLI能力和可靠性的依赖.
  - 集装箱互换需要用户同意,这可能延误部署。
