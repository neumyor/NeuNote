translations:
  abstract: 时间系列异常检测(AD)对网络系统起着关键作用. 各种网络系统依靠时间序列数据实时监测和识别异常,以及启动诊断和补救程序. 变形自动编码器(VAEs)近几十年来因其超强的调音能力而获得了人们的欢迎,这些调音能力对异常探测很有用.
    然而,我们的研究显示,基于VAE的方法在同时捕捉长期不同模式和详细短期趋势方面面临挑战。 为了应对这些挑战,我们提议采用频率增强条件变异自动编码器(FCVAE),这是一种新颖的无监督AD方法,用于统一时间序列.
    为确保准确的AD,FCVAE利用一种创新的方法,同时将全球和本地频率特征纳入有条件的变异自动编码器(CVAE)的条件,以大大提高重建正常数据的准确性. 加上精心设计的"目标关注"机制,我们的方法使得模型能够从频率域中选择最有用的信息,以便更好的短期趋势构建.
    我们的FCVAE在公共数据集和大规模云系统上得到了评价,结果显示它的表现超过了最先进的方法. 这证实了我们的办法在解决目前基于VAE的异常探测模型的局限性方面的实际适用性。
  one_sentence: FCVAE是一种频率增强的有条件变异自编码器,它利用具有目标注意机制的全球和局部频率特征来捕捉长周期的多样模式和无监督的时间序列异常检测的详细短周期趋势.
  problem: 由于缺少频率域信息,基于VAE的方法未能同时捕捉到不同的周期模式和详细趋势模式。
  contributions:
  - 分析VAE的局限性:现有的基于VAE的模型无法捕捉到不同的周期规律和详细的趋势规律,这归因于缺少频率域信息.
  - 建议的FCVAE,是一种频率增强的CVAE,包含全球和地方频率信息以及目标关注机制.
  - 评价显示,公共数据集的FCVAE比最新方法高出40%,在现实世界的网络系统中,F1的得分高出10%。
  method:
  - 全球频率模块(GFM)使用FFT提取全球频率信息.
  - 本地频率模块(LFM)从子窗口提取本地频率信息.
  - 目标注意机制选择最有用的子窗口频率.
  - FCVAE将GFM和LFM作为CVAE框架中的条件与M-ELBO损失相结合,用于无监督的异常检测.
  experiments:
  - 对公共数据集和大规模云系进行评估.
  - 在公共数据集上以~40%的F1,在现实世界系统中以~10%的成绩超越了最先进的方法.
  - 校对研究分析了GFM,LFM的贡献,并有针对性地关注.
  limitations:
  - 我们的研究如何表明,基于VAE的方法在同时捕捉长期不同模式和详细短期趋势方面面临挑战。
  - 为了应对这些挑战,我们提出频率增强条件变异自动编码器(FCVAE),这是一种新颖的无监督AD方法,用于单维时序.
  - 这种矛盾使得我们的做法在解决目前基于VAE的异常探测模型的局限性方面具有实际的适用性。
  - 然而,这些方法可能过于适合异常模式和表现不佳。
