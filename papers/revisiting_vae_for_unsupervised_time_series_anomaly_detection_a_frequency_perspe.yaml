abstract: Time series Anomaly Detection (AD) plays a crucial role for web systems.
  Various web systems rely on time series data to monitor and identify anomalies in
  real time, as well as to initiate diagnosis and remediation procedures. Variational
  Autoencoders (VAEs) have gained popularity in recent decades due to their superior
  denoising capabilities, which are useful for anomaly detection. However, our study
  reveals that VAE-based methods face challenges in capturing long-periodic heterogeneous
  patterns and detailed short-periodic trends simultaneously. To address these challenges,
  we propose Frequency-enhanced Conditional Variational Autoencoder (FCVAE), a novel
  unsupervised AD method for univariate time series. To ensure an accurate AD, FCVAE
  exploits an innovative approach to concurrently integrate both the global and local
  frequency features into the condition of Conditional Variational Autoencoder (CVAE)
  to significantly increase the accuracy of reconstructing the normal data. Together
  with a carefully designed “target attention” mechanism, our approach allows the
  model to pick the most useful information from the frequency domain for better short-periodic
  trend construction. Our FCVAE has been evaluated on public datasets and a large-scale
  cloud system, and the results demonstrate that it outperforms state-of-the-art methods.
  This confirms the practical applicability of our approach in addressing the limitations
  of current VAE-based anomaly detection models.
one_sentence: FCVAE is a frequency-enhanced conditional variational autoencoder that
  uses global and local frequency features with a target attention mechanism to capture
  both long-periodic heterogeneous patterns and detailed short-periodic trends for
  unsupervised time series anomaly detection.
problem: VAE-based methods fail to capture both heterogeneous periodic patterns and
  detailed trend patterns simultaneously due to missing frequency-domain information.
contributions:
- 'Analysis of VAE limitations: existing VAE-based models fail to capture heterogeneous
  periodic patterns and detailed trend patterns, attributed to missing frequency-domain
  information.'
- Proposed FCVAE, a frequency-enhanced CVAE that incorporates global and local frequency
  information and a target attention mechanism.
- Evaluation demonstrates FCVAE surpasses state-of-the-art methods by ~40% on public
  datasets and 10% in a real-world web system in terms of F1 score.
method:
- Global Frequency Module (GFM) extracts global frequency information using FFT.
- Local Frequency Module (LFM) extracts local frequency information from sub-windows.
- Target attention mechanism selects the most useful sub-window frequencies.
- FCVAE combines GFM and LFM as conditions in a CVAE framework with M-ELBO loss for
  unsupervised anomaly detection.
experiments:
- Evaluated on public datasets and a large-scale cloud system.
- Outperforms state-of-the-art methods by ~40% F1 on public datasets and 10% in real-world
  system.
- Ablation studies analyze contributions of GFM, LFM, and target attention.
limitations:
- How- ever, our study reveals that VAE-based methods face challenges in capturing
  long-periodic heterogeneous patterns and detailed short-periodic trends simultaneously.
- To address these challenges, we propose Frequency-enhanced Conditional Variational
  Autoen- coder (FCVAE), a novel unsupervised AD method for univariate time series.
- This con- firms the practical applicability of our approach in addressing the limitations
  of current VAE-based anomaly detection models.
- However, these methods may overfit to anomalous patterns and underperform.
