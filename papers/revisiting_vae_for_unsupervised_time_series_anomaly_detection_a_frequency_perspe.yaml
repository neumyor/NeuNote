contributions:
- To address these challenges, we propose Frequency-enhanced Conditional Variational
  Autoen- coder (FCVAE), a novel unsupervised AD method for univariate time series.
- In this paper, we introduce a novel unsupervised anomaly detec- tion algorithm,
  named FCVAE (Frequency-enhanced Conditional Variational AutoEncoder).
- 'Our paper’s contributions can be sum- marized as follows: • Our analysis of the
  widely-used VAE model for anomaly detection reveals that existing VAE-based models
  fail to cap- ture both heterogeneous periodic patterns and detailed trend patterns.'
- However, for our method, we train the model by incorporating all the time series
  from the dataset together, which provides sufficient pattern diversity.
- Therefore, we propose the LFM that incorporates the target attention.
method:
- Together with a carefully designed “target attention” mechanism, our approach allows
  the model to pick the most useful information from the frequency domain for better
  short-periodic trend construction.
- This con- firms the practical applicability of our approach in addressing the limitations
  of current VAE-based anomaly detection models.
- Anomalies are rare in real-world time series data [41], making it difficult to label
  them and train a supervised model for anomaly de- tection [50].
- VAEs are well-suited for detecting anomalies, but existing VAE-based anom- aly detection
  models have not yet reached theoretically optimal performance.
- In this paper, we aim to re-examine the VAE model and improve its effectiveness
  in anomaly detection.
