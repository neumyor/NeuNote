  ## Core Idea


  Time series Anomaly Detection (AD) plays a crucial role for web systems. Various
  web systems rely on time series data to monitor and identify anomalies in real time,
  as well as to initiate diagno- sis and remediation procedures. Variational Autoencoders
  (VAEs) have gained popularity in recent decades due to their superior de- noising
  capabilities, which are useful for anomaly detection. How- ever, our study reveals
  that VAE-based methods face challenges in capturing long-periodic heterogeneous
  patterns and detailed short-periodic trends simultaneously. To address these challenges,
  we propose Frequency-enhanced Conditional Variational Autoen- coder (FCVAE), a novel
  unsupervised AD method for


  ## Method Notes


  - Together with a carefully designed “target attention” mechanism, our approach
  allows the model to pick the most useful information from the frequency domain for
  better short-periodic trend construction.

  - This con- firms the practical applicability of our approach in addressing the
  limitations of current VAE-based anomaly detection models.

  - Anomalies are rare in real-world time series data [41], making it difficult to
  label them and train a supervised model for anomaly de- tection [50].

  - VAEs are well-suited for detecting anomalies, but existing VAE-based anom- aly
  detection models have not yet reached theoretically optimal performance.

  - In this paper, we aim to re-examine the VAE model and improve its effectiveness
  in anomaly detection.

  - Although CNN attempts to model point-to-point dependencies within the window,
  it still produces coarse-grained fluctuations (visible in the third sub-figure in
  Figure 1).


  ## Evidence To Verify


  - Exact contributions, datasets, metrics, and baselines.

  - Quantitative results and claims from figures or tables.


  ## Limitations


  - How- ever, our study reveals that VAE-based methods face challenges in capturing
  long-periodic heterogeneous patterns and detailed short-periodic trends simultaneously.

  - To address these challenges, we propose Frequency-enhanced Conditional Variational
  Autoen- coder (FCVAE), a novel unsupervised AD method for univariate time series.

  - This con- firms the practical applicability of our approach in addressing the
  limitations of current VAE-based anomaly detection models.

  - However, these methods may overfit to anomalous patterns and underperform.


