contributions:
- In this paper, we propose DCdetector, a multi-scale dual attention contrastive representation
  learning model.
- In this paper, we propose a Dual attention Contrastive representa- tion learning
  anomaly detector called DCdetector to handle the challenges in time series anomaly
  detection.
- Specifically, we propose a contrastive structure with two branches and a dual attention
  module, and two branches share network weights.
- 'The main contributions of our DCdetector are summarized as follows: • Architecture:
  A contrastive learning-based dual-branch at- tention structure is designed to learn
  a permutation invariant representation that enlarges the representation differences
  between normal points and anomalies.'
- In contrast, we proposed DCdetec- tor, which achieves a similar goal in a much more
  general and concise way with a dual-attention self-supervised contrastive-type structure.
method:
- In this paper, we propose DCdetector, a multi-scale dual attention contrastive representation
  learning model.
- Extensive experiments show that DCdetector achieves state-of-the-art results on
  multiple time series anomaly detection benchmark datasets.
- Third, anomaly detection models should consider temporal, multidimensional, and
  non-stationary features for time series data [78].
- Reconstruction-based methods learn a model to reconstruct nor- mal samples, and
  thereby the instances failing be reconstructed by the learned model are anomalies.
- Such an approach is developing rapidly due to its power in handling complex data
  by combining it with different machine learning models and its interpretability
  that the instances behave unusually abnormally.
- However, it is usually challenging to learn a well-reconstructed model for normal
  data without being obstructed by anomalies.
experiments:
- DCde- tector utilizes a novel dual attention asymmetric design to create the permutated
  environment and pure contrastive loss to guide the learning process, thus learning
  a permutation invariant representa- tion with superior discrimination abilities.
- Extensive experiments show that DCdetector achieves state-of-the-art results on
  multiple time series anomaly detection benchmark datasets.
- '• Performance & Justification: DCdetector achieves perfor- mance comparable or
  superior to state-of-the-art methods on seven multivariate and one univariate time
  series anomaly detection benchmark datasets.'
- More implementation details are left in the experiment section.
- A possible explanation is that our two branches are totally asym- metric.
limitations:
- The most fundamental challenge for this task is to learn a representation map that
  enables effective discrimination of anomalies.
- For example, in the energy industry, detecting anom- alies in wind turbine sensors
  in time helps to avoid catastrophic failure.
- However, it is challenging to discover abnormal patterns from a mass of complex
  time series.
- Most supervised or semi-supervised meth- ods fail to work given limited labeled
  training data.
