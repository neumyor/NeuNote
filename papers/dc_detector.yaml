translations:
  abstract: 时间序列异常检测对广泛的应用至关重要. 它旨在识别时间序列中正常样本分布的异常样本. 这项任务最根本的挑战是学习一个能够有效区分异常现象的代表图。
    以重建为基础的方法仍然占主导地位,但以异常方式学习代表性可能因其巨大的异常损失而损害业绩。 另一方面,对比性学习旨在寻找一种能明确区分任何实例和其他实例的表述,这可以为时间序列异常检测带来更自然和更有希望的表述.
    在本文中,我们提出DCdector,一种多尺度的双重关注对比性代表学习模式. DCdector利用一种新颖的双重注意力不对称设计,来创造透视环境和纯粹的对比性损失来指导学习过程,从而学习一种具有优越的歧视能力的透视无常代表.
    广泛的实验显示,DC检测器在多个时序异常探测基准数据集上实现了最先进的结果. 代码在此 URL1 上公开提供.
  one_sentence: DC检测器是用于时间序列异常检测的多尺度双关注对比性表达式学习模型,该模型学习穿透性无变异表达式,以有效区分异常.
  problem: 这项任务最根本的挑战是学习一个能够有效区分异常现象的代表图。
  contributions:
  - 结构:一种对比性的基于学习的双分支注意力结构,旨在学习一种常态的不常态代表,扩大正常点和异常点之间的代表差异.
  - '优化 : 基于两个分支相似性的有效和有力的损失功能,经过训练的纯粹是相对的,没有重建损失。'
  - 性能:在7个多变量和1个单变量时间序列异常检测基准数据集上实现性能与最先进的方法相当或优越.
  method:
  - 具有共享网络权重的矛盾学习双分支关注结构.
  - 基于多尺度补丁的注意模块,以捕捉时间依赖性,减少补丁过程中的信息损失.
  - 频道独立设计,用于高效的多变时间序列代表.
  - 纯对比性损失,没有负样品或重建目标.
  experiments:
  - 对7个多变量和1个单一时间序列异常探测基准数据集进行了评估。
  - 与重建和其他异常检测方法相比,取得最新成果。
  limitations:
  - 这项任务最根本的挑战是学习一个能够有效区分异常现象的代表图。
  - 例如,在能源工业中,及时在风力涡轮传感器中检测阳离子有助于避免灾难性故障。
  - 然而,从复杂时间序列的质量中发现异常模式是具有挑战性的。
  - 大多数受监督或半受监督的冰毒 -- -- 由于贴有标签的培训数据有限而未能奏效。
