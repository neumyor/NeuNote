abstract: Time series anomaly detection is critical for a wide range of applications.
  It aims to identify deviant samples from the normal sample distribution in time
  series. The most fundamental challenge for this task is to learn a representation
  map that enables effective discrimination of anomalies. Reconstruction-based methods
  still dominate, but the representation learning with anomalies might hurt the performance
  with its large abnormal loss. On the other hand, contrastive learning aims to find
  a representation that can clearly distinguish any instance from the others, which
  can bring a more natural and promising representation for time series anomaly detection.
  In this paper, we propose DCdetector, a multi-scale dual attention contrastive representation
  learning model. DCdetector utilizes a novel dual attention asymmetric design to
  create the permutated environment and pure contrastive loss to guide the learning
  process, thus learning a permutation invariant representation with superior discrimination
  abilities. Extensive experiments show that DCdetector achieves state-of-the-art
  results on multiple time series anomaly detection benchmark datasets. Code is publicly
  available at this URL.
one_sentence: DCdetector is a multi-scale dual attention contrastive representation
  learning model for time series anomaly detection that learns permutation invariant
  representations to effectively discriminate anomalies.
problem: The most fundamental challenge for this task is to learn a representation
  map that enables effective discrimination of anomalies.
contributions:
- 'Architecture: A contrastive learning-based dual-branch attention structure designed
  to learn a permutation invariant representation that enlarges the representation
  differences between normal points and anomalies.'
- 'Optimization: An effective and robust loss function based on the similarity of
  two branches, trained purely contrastively without reconstruction loss.'
- 'Performance: Achieves performance comparable or superior to state-of-the-art methods
  on seven multivariate and one univariate time series anomaly detection benchmark
  datasets.'
method:
- Contrastive learning-based dual-branch attention structure with shared network weights.
- Multi-scale patching-based attention module to capture temporal dependencies and
  reduce information loss during patching.
- Channel independence design for efficient multivariate time series representation.
- Purely contrastive loss without negative samples or reconstruction objective.
experiments:
- Evaluated on seven multivariate and one univariate time series anomaly detection
  benchmark datasets.
- Achieves state-of-the-art results compared to reconstruction-based and other anomaly
  detection methods.
limitations:
- The most fundamental challenge for this task is to learn a representation map that
  enables effective discrimination of anomalies.
- For example, in the energy industry, detecting anom- alies in wind turbine sensors
  in time helps to avoid catastrophic failure.
- However, it is challenging to discover abnormal patterns from a mass of complex
  time series.
- Most supervised or semi-supervised meth- ods fail to work given limited labeled
  training data.
