abstract: Time series forecasting has advanced rapidly, especially with the emergence
  of foundation models that show strong zero-shot performance on numerical extrapolation.
  However, in real-world forecasting settings, a statistically plausible baseline
  is rarely the final forecast used in practice. Before a forecast becomes decision-ready,
  it often needs to be revised using weakly structured business context such as holiday
  effects, campaign plans, external events, historical analogs, and expert feedback.
  This practical stage remains underexplored in the forecasting literature. In this
  paper, we formulate this stage as the last-mile forecasting problem and present
  an LLM-agent framework that sits on top of a forecasting backbone. Our system maintains
  a unified forecast workspace, invokes tools to retrieve contextual evidence, and
  converts reasoning trajectories into explicit forecast revision actions under structural
  safety constraints. It also supports long-horizon forecasting through map-reduce-style
  decomposition and post-hoc reflection through a memory bank. The resulting system
  is designed to be controllable and auditable. Through real-world case studies, we
  show how LLM agents can bridge the gap between statistical prediction and business-ready
  forecasting.
one_sentence: We formulate last-mile forecasting as the problem of transforming a
  statistically plausible baseline into a decision-ready forecast using an LLM-agent
  framework that performs context-aware revision through constrained actions on a
  unified forecast workspace.
problem: A statistically plausible baseline is rarely the final forecast in practice;
  it needs to be revised using weakly structured business context such as holiday
  effects, campaign plans, external events, historical analogs, and expert feedback.
contributions:
- Formulate last-mile forecasting as a distinct systems problem between baseline generation
  and business-ready forecast consumption.
- Propose an action-centric LLM-agent framework that converts contextual reasoning
  into constrained actions on a shared forecast workspace.
- Demonstrate through real-world case studies that the framework improves forecasting
  accuracy while enabling controllable, auditable, and iterative refinement.
method:
- Formulate last-mile forecasting as constrained forecast revision over a workspace
  with immutable baseline and editable forecast.
- Maintain a unified forecast workspace as a tabular state with dstamp, historical
  actual, baseline forecast, and editable revised forecast fields.
- Use an LLM agent with tool-augmented evidence acquisition to retrieve contextual
  evidence (calendar, events, memories).
- 'Apply four types of constrained revision actions: initialize, range transform,
  point override, and revisions merge.'
- Support long-horizon forecasting through map-reduce-style decomposition and post-hoc
  reflection via a memory bank.
experiments:
- These advances have made it increasingly practical to obtain strong numerical baselines
  from historical observations alone (Rasul et al., 2023; Das et al., 2023; Ansari
  et al., 2024; Liang et al., 2024).
- However, in many operational settings, a statistically plausible baseline is not
  1Trip.com Group, Shanghai, China.
- Post-baseline forecast adjustment has long been studied in judgmental forecasting.
- These directions can all improve forecast quality, but they typically focus on how
  forecasts are generated or refined, rather than on how an already-generated baseline
  should be contextually revised, justified, and tracked under operational constraints.
- This post-baseline setting matters because a useful revision process must support
  more than numerical accuracy.
limitations:
- However, in real-world forecasting settings, a statistically plausible base- line
  is rarely the final forecast used in practice.
- However, in many operational settings, a statistically plausible baseline is not
  1Trip.com Group, Shanghai, China.
- However, it is usually treated as a human or organizational process, rather than
  as a structured revision problem that can be executed and audited by an agent.
- The key challenge is not to replace the forecasting back- bone, but to build a reasoning
  framework that can interpret heterogeneous evidence and convert contextual judgments
  into explicit forecast-editing actions.
