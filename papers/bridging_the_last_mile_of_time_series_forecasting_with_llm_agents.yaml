translations:
  abstract: 时间序列预测已取得快速发展，尤其是基础模型的出现，在数值外推上展现出强大的零样本性能。然而，在实际预测场景中，统计上合理的基线很少是实践中使用的最终预测。在预测成为决策就绪状态之前，通常需要利用弱结构化业务背景（如节假日效应、活动计划、外部事件、历史类比和专家反馈）进行修订。这一实践阶段在预测文献中仍未被充分探索。本文将该阶段定义为最后一英里预测问题，并提出一个基于大语言模型智能体（LLM-agent）的框架，该框架位于预测骨干模型之上。我们的系统维护统一的预测工作空间，调用工具检索上下文证据，并在结构安全约束下将推理轨迹转化为明确的预测修订行动。它还能通过Map-Reduce式分解支持长周期预测，以及通过记忆库进行事后反思。由此产生的系统设计为可控且可审计。通过实际案例研究，我们展示了LLM智能体如何弥合统计预测与业务就绪预测之间的差距。
  one_sentence: 我们将最后一英里预测定义为通过一个LLM智能体框架，将统计上合理的基线转化为决策就绪预测的问题，该框架在统一的预测工作空间上通过约束行动进行上下文感知修订。
  problem: 统计上合理的基线在实践中很少是最终预测；需要利用弱结构化业务背景（如节假日效应、活动计划、外部事件、历史类比和专家反馈）进行修订。
  contributions:
  - 将最后一英里预测定义为一个介于基线生成与业务就绪预测消费之间的独特系统问题。
  - 提出一个以行动为中心的LLM智能体框架，将上下文推理转化为共享预测工作空间上的约束行动。
  - 通过实际案例研究证明，该框架在提高预测精度的同时，实现了可控、可审计和迭代式的优化。
  method:
  - 将最后一英里预测建模为在工作空间上的约束预测修订，其中基线不可变，预测可编辑。
  - 维护一个统一的预测工作空间，作为包含时间戳、历史实际值、基线预测和可编辑修订预测字段的表格状态。
  - 使用配备工具增强证据获取的LLM智能体，检索上下文证据（日历、事件、记忆）。
  - 应用四种类型的约束修订行动：初始化、区间变换、点覆盖和修订合并。
  - 通过Map-Reduce式分解支持长周期预测，以及通过记忆库进行事后反思。
  experiments:
  - 这些进展使得仅从历史观测中获得强数值基线变得越来越实用（Rasul et al., 2023; Das et al., 2023; Ansari et al.,
    2024; Liang et al., 2024）。
  - 然而，在许多运营场景中，统计上合理的基线并非1携程集团，上海，中国。
  - 基线后预测调整长期以来在判断性预测中得到研究。
  - 这些方向都能改善预测质量，但它们通常关注预测如何生成或优化，而不是如何在运营约束下对已生成的基线进行上下文修订、论证和跟踪。
  - 这种基线后场景之所以重要，是因为有用的修订过程必须支持超越数值精度。
  limitations:
  - 然而，在实际预测场景中，统计上合理的基线很少是实践中使用的最终预测。
  - 然而，在许多运营场景中，统计上合理的基线并非1携程集团，上海，中国。
  - 然而，它通常被视为一个人工或组织过程，而非一个可由智能体执行和审计的结构化修订问题。
  - 关键挑战不是替代预测骨干模型，而是构建一个能够解释异构证据并将上下文判断转化为明确的预测编辑行动的推理框架。
