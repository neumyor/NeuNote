abstract: Time series are often embedded in rich contexts that are essential for holistic
  modeling. Moreover, real-world practitioners often require end-to-end workflows
  for analyzing temporal dynamics, where widely studied tasks such as forecasting
  are only one step in a broader solution loop. While generalist AI agents offer a
  promising interface for such workflows under complex contexts, they still operate
  primarily in textual spaces that are not fully aligned with structured temporal
  signals. In this work, we introduce TIMECLAW, an agentic harness framework for time
  series that equips generalist LLM agents with the time-series-native runtime support
  needed for contextualized temporal reasoning. TIMECLAW integrates executable temporal
  tools for grounded and auditable analysis, experience-driven capability evolution
  for creating reusable analytical routines, and episodic multimodal memory for retrieving
  relevant reasoning traces. Together, these components unlock harnessed open-ended
  temporal reasoning with contextual information. Extensive evaluation on multiple
  benchmarks covering diverse tasks across energy, finance, weather, traffic, and
  other real-world domains demonstrates improved performance of TIMECLAW. Code is
  available at this repository hyperlink.
one_sentence: We introduce TIMECLAW, an agentic harness framework for time series
  that equips generalist LLM agents with the time-series-native runtime support needed
  for contextualized temporal reasoning.
problem: However, the generality of LLMs alone does not provide the scaffold needed
  for reliable time- series reasoning (Tan et al., 2024; Merrill et al., 2024).
contributions:
- We identify the limitations of directly using LLMs for time-series reasoning, showing
  that textualizing temporal signals induces data-type and agentic-process misalignments.
- We introduce TIMECLAW, a time-series-native agentic harness that integrates executable
  tools, experience-driven capability evolution, and episodic multimodal memory.
- We conduct extensive experiments across diverse real-world domains, demonstrating
  the effectiveness of TIMECLAW for end-to-end reasoning over contextualized time
  series.
method:
- 'TIMECLAW instantiates a harness through three coordinated components: executable
  temporal tools, experience-driven capability evolution, and episodic multimodal
  memory.'
- Executable temporal tools provide typed interfaces for accessing and analyzing time-series
  objects, producing grounded and auditable analytical evidence.
- Experience-driven capability evolution abstracts recurring procedures as reusable
  temporal routines.
- Episodic multimodal memory stores past reasoning traces and retrieves relevant experience
  through complementary textual and temporal modalities.
experiments:
- Extensive evaluation on multiple benchmarks covering diverse tasks across energy,
  finance, weather, traffic, and other real-world domains demonstrates improved performance
  of TIMECLAW.
- Extensive experiments across diverse benchmarks and real-world domains show that
  TIMECLAW consistently improves end-to-end performance while maintaining token efficiency.
limitations:
- However, the generality of LLMs alone does not provide the scaffold needed for reliable
  time- series reasoning (Tan et al., 2024; Merrill et al., 2024).
- 'Our contributions are summarized as follows: • We identify the limitations of directly
  using LLMs for time-series reasoning, showing that textualizing temporal signals
  induces data- type and agentic-process misalignments.'
- The LLM then tokenizes the instruction and serialized input as z1:L = Tokenize([q;s
  X ]),(6) Limitations.This text-centric workflow introduces two forms of misalignment.
- Due to page limitations, we provide a more detailed anal- ysis of these limitations
  in Appendix A, including numerical-token distance mismatch, decimal place- value
  distortion, next-token versus next-value ob- jective mismatch, and long-context
  temporal infor- mation dilution.
