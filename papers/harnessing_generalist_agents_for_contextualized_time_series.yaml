  ## Problem


  However, the generality of LLMs alone does not provide the scaffold needed for reliable
  time- series reasoning (Tan et al., 2024; Merrill et al., 2024).


  ## Core Idea


  Time series are often embedded in rich contexts that are essential for holistic
  modeling. More- over, real-world practitioners often require end- to-end workflows
  for analyzing temporal dy- namics, where widely studied tasks such as forecasting
  are only one step in a broader so- lution loop. While generalist AI agents offer
  a promising interface for such workflows un- der complex contexts, they still operate
  primar- ily in textual spaces that are not fully aligned with structured temporal
  signals. In this work, we introduce TIMECLAW, an agentic harness framework for time
  series that equips generalist LLM agents with the time-series-native runtime support
  needed for contextualized temporal r


  ## Method Notes


  - While generalist AI agents offer a promising interface for such workflows un-
  der complex contexts, they still operate primar- ily in textual spaces that are
  not fully aligned with structured temporal signals.

  - In this work, we introduce TIMECLAW, an agentic harness framework for time series
  that equips generalist LLM agents with the time-series-native runtime support needed
  for contextualized temporal rea- soning.

  - TIMECLAWintegrates executable tem- poral tools for grounded and auditable analysis,
  experience-driven capability evolution for cre- ating reusable analytical routines,
  and episodic multimodal memory for retrieving relevant rea- soning traces.

  - Extensive evalua- tion on multiple benchmarks covering diverse tasks across energy,
  finance, weather, traffic, and other real-world domains demonstrates im- proved
  performance of TIMECLAW.

  - TIMECLAWprovides a time-series-native agent harness that leverages context to
  support holistic modeling.

  - (LLMs) and agentic AI offers new opportunities to move beyond conventional time-series
  modeling to- ward more holistic temporal understanding and rea- soning (Chang et
  al., 2025b; Li et al., 2026a).


