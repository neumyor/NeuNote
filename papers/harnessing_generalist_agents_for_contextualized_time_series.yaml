contributions:
- In this work, we introduce TIMECLAW, an agentic harness framework for time series
  that equips generalist LLM agents with the time-series-native runtime support needed
  for contextualized temporal rea- soning.
- To answer this question, we introduce TIME- CLAW, an agentic harness framework for
  con- textualized time-series understanding, reasoning, and decision-making.
- 'Our contributions are summarized as follows: • We identify the limitations of directly
  using LLMs for time-series reasoning, showing that textualizing temporal signals
  induces data- type and agentic-process misalignments.'
- • We introduce TIMECLAW, a time-series- native agentic harness that integrates exe-
  cutable tools, experience-driven capability evolution, and episodic multimodal memory.
- (b)Backbone model ablation shows that TIMECLAWconsistently benefits from stronger
  LLM backbones.(c) Component ablation verifies the contributions of the tool harness,
  capability evolution, and memory.
