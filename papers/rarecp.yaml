abstract: 'Recent advances in uncertainty quantification for time series forecasting
  show that conformal prediction can provide reliable prediction intervals, yet standard
  conformal methods are often inefficient under temporal dependence, drift, and heterogeneous
  error behavior. Existing methods typically either update miscover- age rates over
  time or learn unconstrained calibration weights, without explicitly separating two
  central sources of nonstationarity: smoothly drifting error distribu- tions and
  co-existing distinct error regimes. We introduceRareCP, a regime-aware retrieval
  method for adaptive conformal time series prediction. RareCP learns local calibration
  representations through a mixture'
