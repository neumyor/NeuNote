abstract: 'Recent advances in uncertainty quantification for time series forecasting
  show that conformal prediction can provide reliable prediction intervals, yet standard
  conformal methods are often inefficient under temporal dependence, drift, and heterogeneous
  error behavior. Existing methods typically either update miscoverage rates over
  time or learn unconstrained calibration weights, without explicitly separating two
  central sources of nonstationarity: smoothly drifting error distributions and co-existing
  distinct error regimes. We introduce RareCP, a regime-aware retrieval method for
  adaptive conformal time series prediction. RareCP learns local calibration representations
  through a mixture of cosine-attention experts that each capture distinct error regimes,
  while a compact hypernetwork adapts the kernel parameters to track temporal drift.
  Given a new forecasting context, RareCP retrieves the top-k most relevant calibration
  examples, assigns similarity weights, and forms a weighted conformal quantile over
  their signed residuals, yielding asymmetric prediction intervals. The adaptive kernel
  is trained using a smooth interval score objective, with a parameter-space anchor
  to a lightweight teacher kernel to preserve stable local representations. On the
  GIFT-Eval benchmark, RareCP improves interval efficiency over recent conformal baselines
  and foundation model uncertainty estimates while maintaining empirical coverage.
  Ablations confirm that regime-specific experts, drift-adaptive kernels, sparse retrieval,
  and teacher anchoring each contribute to the final performance.'
one_sentence: RareCP is a regime-aware retrieval adapter for conformal time series
  prediction that calibrates prediction intervals by retrieving residuals from locally
  relevant error regimes.
problem: However, the sequential structure of time series data fundamentally violates
  exchangeability, introducing substantial challenges for CP in forecasting [3, 4].
contributions:
- Conformal prediction is competitive with state-of-the-art quantile forecasters.
  In the single-step-horizon quantile prediction setting, we show that conformal prediction
  equipped with RareCP is competitive with the native quantile-based prediction intervals
  of state-of-the-art time series forecasting models, while remaining backbone-agnostic
  and applicable to forecasters that only provide point predictions.
- 'Retrieval conformal prediction with an explicit efficiency-coverage trade-off.
  We introduce sparse residual retrieval for conformal calibration and analyze its
  effect through a local-CDF framework. The trade-off is controlled by Kn, the number
  of retrieved calibration residuals from a calibration set of size n: smaller Kn
  can improve efficiency by focusing on local residual behavior, whereas increasing
  Kn improves effective sample size and supports asymptotic local quantile and coverage
  consistency under stated assumptions.'
- 'An architecture matched to time series residual structure. We build a linear cosine-attention
  retrieval architecture designed for two structural biases of forecasting residuals:
  time-drifting similarities and clustered error regimes. This allows RareCP to adapt
  conformal intervals locally without relying on unconstrained calibration weights.'
method:
- RareCP is a retrieval-based conformal adapter for a fixed forecasting backbone,
  retrieving past calibration residuals from similar forecasting contexts based on
  learned linear cosine-attention similarity.
- Several low-capacity retrieval experts (conditioned on query and dataset descriptor
  via a hypernetwork) each produce a local residual CDF from top-k retrieved residuals,
  weighted by temperature-softmax similarity.
- A lightweight gate mixes the expert residual CDFs in residual-weight space, producing
  a final weighted quantile for asymmetric prediction intervals.
- The adaptive kernel (hypernetwork) is trained using a smooth interval score objective
  with a parameter-space anchor to a lightweight teacher kernel to preserve stable
  local representations.
experiments:
- On the GIFT-Eval benchmark, RareCP improves interval efficiency over recent conformal
  baselines and foundation model uncertainty estimates while maintaining empirical
  coverage.
- Ablations confirm that regime-specific experts, drift-adaptive kernels, sparse retrieval,
  and teacher anchoring each contribute to the final performance.
- RareCP is evaluated under a data-efficient protocol (detailed split-ablation left
  to future work).
limitations:
- We leave a detailed split-ablation to future work and evaluate RareCP under the
  data-efficient protocol in Section 4.2.
