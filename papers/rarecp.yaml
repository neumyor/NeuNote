  ## Core Idea


  Recent advances in uncertainty quantification for time series forecasting show that
  conformal prediction can provide reliable prediction intervals, yet standard conformal
  methods are often inefficient under temporal dependence, drift, and heterogeneous
  error behavior. Existing methods typically either update miscover- age rates over
  time or learn unconstrained calibration weights, without explicitly separating two
  central sources of nonstationarity: smoothly drifting error distribu- tions and
  co-existing distinct error regimes. We introduceRareCP, a regime-aware retrieval
  method for adaptive conformal time series prediction. RareCP learns local calibration
  representations through a mixture


  ## Method Notes


  - We introduceRareCP, a regime-aware retrieval method for adaptive conformal time
  series prediction.

  - On the GIFT-Eval benchmark, RareCP improves interval efficiency over recent conformal
  baselines and foundation model uncertainty estimates while maintaining empirical
  coverage.

  - Ablations confirm that regime-specific experts, drift-adaptive kernels, sparse
  retrieval, and teacher anchoring each contribute to the final performance.

  - Conformal Prediction (CP) offers a powerful, model-agnostic UQ framework that
  provides finite- sample coverage guarantees without distributional requirements,
  under the exchangeability assump- tion that the joint distribution of samples is
  invariant under reordering [2].

  - These properties have led to widespread adoption across diverse domains, including
  image classification, graph-based modeling, and natural language processing.

  - We address these limitations withRareCP, a regime-aware retrieval adapter for
  conformal time series prediction.


