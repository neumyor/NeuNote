translations:
  abstract: 在时间序列预测的不确定性量化方面最近的进展表明,一致性预测能够提供可靠的预测间隔,但在时间依赖、漂移和各种错误行为下,标准一致性方法往往效率低下。
    现有方法通常要么随时间推移更新误掩率,要么学习不受约束的校准权重,而未明确区分两个非操纵性的中心来源:平稳漂移误差分布和共同存在的明显误差制度. 我们引入了RareCP,一种系统意识检索方法,用于适应性一致的时间序列预测。
    稀有CP通过余弦视差专家的混合来学习局部校准表示,每种均能捕捉不同的误差系统,而紧凑的超网络则会调整内核参数以跟踪时间漂移. 鉴于新的预测背景,RareCP检索了最直接相关的校准实例,分配了相似度加权数,并在它们所签名的残余物上形成一个加权的整数,从而产生不对称的预测间隔。
    适应内核使用平滑间隔计分目标进行训练,参数空间锚到轻量级教师内核,以保持稳定的局部表现. 就全球打击人口贩运举措-Eval基准而言,稀有污染物排放方案在保持经验覆盖的同时,比近期的合规基线和基础模型不确定性估计提高了间隔效率。
    滥用情况证实,针对特定制度的专家、漂移适应性内核、稀少的检索和教师主锚都有助于最终业绩。
  one_sentence: RareCP是一种具有系统意识的检索适配器,用于通过从当地相关误差系统中检索剩余物来校准预测间隔的符合时间序列预测。
  problem: 然而,时间序列数据的顺序结构从根本上违反了可交换性,给CP在预测[3,4]方面带来了巨大的挑战.
  contributions:
  - 形式化预测与最先进的量子预测有竞争力:在单步-视差的量子预测设定中,配有RareCP的符合态预测与本土的量子预测间隔,即最先进的时序预测模型具有竞争力,而骨干-不可知性仍然适用于只提供点子预测的预测器.
  - 具有明确效率覆盖平衡的检索一致性预测:我们采用零散的剩余检索以进行校准,并通过一个由Kn(回收校准残留数量)控制的本地CDF框架分析其效果,其中较小的Kn提高了效率,较大的Kn提高了有效的样本规模和覆盖面一致性。
  - 与时间序列剩余结构相匹配的架构:为预测剩余部分的两种结构偏差设计的线性余心检索架构:时间偏差相似度和集群误差制度,使RareCP可以在当地调整符合间隔,而不依赖不受约束的校准权重.
  method:
  - 稀有CP是固定预测主干线的基于检索的向导适配器,根据所学到的线性同位素视距相似性,从类似的预测背景中检索过去的校准残留.
  - 几位低功率检索专家(以查询和数据集描述器为条件,通过超网络)各自从顶级检索的残基中产生一个局部残余的CDF,按温度-软度相似度加权.
  - 轻量级门将专家残留的CDF混合到剩余重量空间,产生一个不对称预测间隔的最终加权数。
  - 适应内核(hypernetwork)是使用一个平滑间隔分数目标进行训练的,参数空间主锚为轻量级教师内核,以保持稳定的局部表现.
  experiments:
  - 就全球打击人口贩运举措-Eval基准而言,稀有污染物排放方案在保持经验覆盖的同时,比近期的合规基线和基础模型不确定性估计提高了间隔效率。
  - 滥用情况证实,针对特定制度的专家、漂移适应性内核、稀少的检索和教师主锚都有助于最终业绩。
  - 稀有CP通过数据效率协议(详细分解留待未来工作)进行评估.
  limitations:
  - 我们为今后的工作留下一个详细的分解,并根据第4.2节中的数据效率协议评估稀有污染物。
