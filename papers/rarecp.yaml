contributions:
- We introduceRareCP, a regime-aware retrieval method for adaptive conformal time
  series prediction.
- • Retrieval conformal prediction with an explicit efficiency-coverage trade-off.We
  introduce sparse residual retrieval for conformal calibration and analyze its effect
  through a local-CDF framework.
- The solution, we propose, is to scale the parameters in the time dimension by allowing
  the current test target more control over the retrieved similarites while preventing
  similarity collapse.
- 5 Conclusion We introducedRareCP, a backbone-agnostic conformal adapter for time
  series forecasting that calibrates prediction intervals by retrieving residuals
  from locally relevant error regimes.
- 'Its main contribution is a learned local retrieval mechanism: sparse top-k retrieval
  selects relevant calibration contexts produced by time-conditioned local experts
  that are build for the structural bias of the residual distributions of time series
  forecasting models.'
method:
- We introduceRareCP, a regime-aware retrieval method for adaptive conformal time
  series prediction.
- On the GIFT-Eval benchmark, RareCP improves interval efficiency over recent conformal
  baselines and foundation model uncertainty estimates while maintaining empirical
  coverage.
- Ablations confirm that regime-specific experts, drift-adaptive kernels, sparse retrieval,
  and teacher anchoring each contribute to the final performance.
- Conformal Prediction (CP) offers a powerful, model-agnostic UQ framework that provides
  finite- sample coverage guarantees without distributional requirements, under the
  exchangeability assump- tion that the joint distribution of samples is invariant
  under reordering [2].
- These properties have led to widespread adoption across diverse domains, including
  image classification, graph-based modeling, and natural language processing.
- We address these limitations withRareCP, a regime-aware retrieval adapter for conformal
  time series prediction.
experiments:
- Given a new forecasting context, RareCP re- trieves the top-k most relevant calibration
  examples, assigns similarity weights, and forms a weighted conformal quantile over
  their signed residuals, yielding asym- metric prediction intervals.
- On the GIFT-Eval benchmark, RareCP improves interval efficiency over recent conformal
  baselines and foundation model uncertainty estimates while maintaining empirical
  coverage.
- The retrieved residuals define local lower and upper conformal quantiles, yielding
  asymmetric prediction intervals that adapt to temporal drift and recurring error
  regimes (see Figure 1).
- Given a point forecast and its recent history, RareCP retrieves past calibration
  residuals from similar forecasting contexts, forms a local signed-residual distribution,
  and converts its lower and upper quantiles into an asymmetric prediction interval.
- Dataset-conditioned retrieval experts produce normalized query and calibration keys,
  retrieve a sparse top k support by cosine similarity, and assign temperature-softmax
  weights over the retrieved residuals.
limitations:
- However, the sequential structure of time series data fundamentally violates exchangeability,
  introducing substantial challenges for CP in forecasting [3, 4].
- However, adaptive methods typically react through changes in the target miscoverage
  level, while weighted approaches often rely on fixed or non adaptive similarity
  weighting schemes.
- We address these limitations withRareCP, a regime-aware retrieval adapter for conformal
  time series prediction.
- We leave a detailed split-ablation to future work and evaluate RareCP under the
  data-efficient protocol in Section 4.2.
