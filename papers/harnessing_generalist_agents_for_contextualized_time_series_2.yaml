abstract: Time series are often embedded in rich contexts that are essential for holistic
  modeling. Moreover, real-world practitioners often require end-to-end workflows
  for analyzing temporal dynamics, where widely studied tasks such as forecasting
  are only one step in a broader solution loop. While generalist AI agents offer a
  promising interface for such workflows under complex contexts, they still operate
  primarily in textual spaces that are not fully aligned with structured temporal
  signals. In this work, we introduce TIMECLAW, an agentic harness framework for time
  series that equips generalist LLM agents with the time-series-native runtime support
  needed for contextualized temporal reasoning. TIMECLAW integrates executable temporal
  tools for grounded and auditable analysis, experience-driven capability evolution
  for creating reusable analytical routines, and episodic multimodal memory for retrieving
  relevant reasoning traces. Together, these components unlock harnessed open-ended
  temporal reasoning with contextual information. Extensive evaluation on multiple
  benchmarks covering diverse tasks across energy, finance, weather, traffic, and
  other real-world domains demonstrates improved performance of TIMECLAW. Code is
  available at this repository hyperlink.
one_sentence: This paper introduces TIMECLAW, an agentic harness framework that equips
  generalist LLM agents with time-series-native runtime support for contextualized
  temporal reasoning.
problem: Directly using LLMs for time-series reasoning suffers from datatype misalignment
  (numerical temporal signals are distorted when serialized into text tokens) and
  agentic-process misalignment (workflows are designed for text-centric information
  processing, not for native temporal operations).
contributions:
- Identify the limitations of directly using LLMs for time-series reasoning, showing
  that textualizing temporal signals induces datatype and agentic-process misalignments.
- Introduce TIMECLAW, a time-series-native agentic harness that integrates executable
  tools, experience-driven capability evolution, and episodic multimodal memory.
- Conduct extensive experiments across diverse real-world domains, demonstrating the
  effectiveness of TIMECLAW for end-to-end reasoning over contextualized time series.
method:
- 'Executable temporal tools: provide typed interfaces for accessing and analyzing
  time-series objects at numerical precision, producing grounded and auditable analytical
  evidence.'
- 'Experience-driven capability evolution: abstracts recurring analytical sub-procedures
  into self-contained executable tools that are added to the tool set if they exceed
  a held-out success rate threshold.'
- 'Episodic multimodal memory: stores past reasoning traces and retrieves relevant
  experience through complementary textual and temporal modalities (multimodal fingerprints).'
experiments:
- Extensive evaluation on multiple benchmarks covering diverse tasks across energy,
  finance, weather, traffic, and other real-world domains.
- Comparison with baselines showing TIMECLAW consistently improves end-to-end performance
  while maintaining token efficiency.
- Ablation studies validating the contribution of each harness component (executable
  tools, capability evolution, multimodal memory).
limitations:
- 'Datatype misalignment: numerical temporal signals are distorted when serialized
  into text tokens, leading to numerical-token distance mismatch, decimal place-value
  distortion, and long-context temporal information dilution.'
- 'Agentic-process misalignment: workflows are designed for text-centric processing,
  not for native temporal operations; next-token objective mismatch with next-value
  prediction.'
- Additional limitations detailed in Appendix A include next-token versus next-value
  objective mismatch and the burden of long numerical sequences on context windows.
