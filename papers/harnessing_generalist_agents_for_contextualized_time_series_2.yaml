translations:
  abstract: 时间序列往往嵌入对整体建模至关重要的丰富背景. 此外,现实世界的从业者往往需要端到端的工作流程来分析时间动态,在时间动态中,广泛研究的任务如预测只是更广泛的解决方案循环中的一个步骤.
    虽然通论AI代理为复杂环境下的此类工作流程提供了一个很有希望的界面,但它们仍然主要在文本空间运行,与结构化的时间信号不完全一致. 在这部作品中,我们引入了TIMECLAW,这是一个时间序列的代理拉带框架,它为通论者LLM代理提供了时间序列-本土运行时间支持,以进行背景化的时间推理.
    TimeCLAW整合了可执行的时间工具,用于基础分析与可审计分析,经验驱动的能力演化,用于创建可重复使用的分析常规,以及用于检索相关推理痕迹的偶联式多式联运内存.
    这些组件一起解锁了无限制时间推理,并提供了背景资料。 对涉及能源、金融、天气、交通和其他现实世界领域不同任务的多种基准的广泛评价表明,国际劳工和劳工局的业绩有所改善。
    此寄存器超链接提供代码 。
  one_sentence: 本文介绍了TIMECLAW,这是一个代理化的拉带框架,它为通论者LLM代理提供了时间序列-内在运行时间支持,用于背景化的时间推理.
  problem: 直接使用LLMS来进行时间序列推理有数据类型错配(序列化成文本符号时数字时间信号被扭曲)和代理程序错配(工作流程是为文本中心信息处理设计,而不是为本土时间操作设计).
  contributions:
  - 识别直接使用LLMS进行时间序列推理的局限性,显示文本化的时间信号诱导数据类型和代理进程错配.
  - 引入TIMECLAW,是一种时间序列-内在的代理化拉带,融合了可执行工具,经验驱动的能力演化,以及典型的多式联运记忆.
  - 在不同的现实世界领域进行广泛的实验,展示ICALAW对端到端推理的有效性,而不是背景化的时间序列.
  method:
  - 可执行时间工具:提供按数字精度访问和分析时间序列对象的打字界面,生成有根据且可审计的分析证据.
  - 经验驱动能力演化:将经常性分析子程序归纳为自成一体的可执行工具,如果这些工具超过被搁置的成功率阈值,则将其添加到设定的工具中.
  - Episodic多式联运存储器:存储过去的推理痕迹,并通过互补的文字和时间模式(多式联运指纹)检索相关经验.
  experiments:
  - 广泛评价涵盖能源、金融、天气、交通和其他现实世界领域不同任务的多种基准。
  - 与基线的比较表明,ICALAW在保持象征性效率的同时,不断提高端对端性能.
  - 校验每个牵引组件的贡献的研究(可执行工具、能力演变、多式联运内存)。
  limitations:
  - 数据类型错位:数字时间信号在序列化成文本符时被扭曲,导致数字-托肯距离不匹配,小数位值扭曲,以及长文本时间信息稀释.
  - 代理进程错配:工作流程是为文字中心处理而设计,而不是为本土时间操作而设计的;下位目标与下位值预测不匹配.
  - 附录A中详述的其他限制包括下切位与下切值客观不匹配以及上下文窗口上长数字序列的负担.
