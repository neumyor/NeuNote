abstract: 'Recent advances in large language models (LLMs) have sparked growing interest
  in AI agents capable of solving complex, real-world tasks. However, most existing
  agent systems rely on manually crafted configurations that remain static after deployment,
  limiting their ability to adapt to dynamic and evolving environments. To address
  this limitation, recent research has explored agent evolution techniques that aim
  to automatically enhance agent systems based on interaction data and environmental
  feedback. This emerging direction lays the foundation for self-evolving AI agents,
  which bridge the static capabilities of foundation models with the continuous adaptability
  required by lifelong agentic systems. In this survey, we provide a comprehensive
  review of existing techniques for self-evolving agentic systems. Specifically, we
  first introduce a unified conceptual framework that abstracts the feedback loop
  underlying the design of self-evolving agentic systems. The framework highlights
  four key components: System inputs, Agent System, Environment, and Optimisers, serving
  as a foundation for understanding and comparing different strategies. Based on this
  framework, we systematically review a wide range of self-evolving techniques that
  target different components of the agent system, including foundation models, agent
  prompts, memory, tools, workflows, and communication mechanisms across agents. We
  also investigate domain-specific evolution strategies developed for specialised
  fields such as biomedicine, programming, and finance, where agent behaviour and
  optimisation objectives are tightly coupled with domain constraints. In addition,
  we provide a dedicated discussion on the evaluation, safety, and ethical considerations
  for self-evolving agentic systems, which are critical to ensuring their effectiveness
  and reliability. This survey aims to provide researchers and practitioners with
  a systematic understanding of self-evolving AI agents, laying the foundation for
  the development of more adaptive, autonomous, and lifelong agentic systems.'
one_sentence: A comprehensive survey of self-evolving AI agents that bridges foundation
  models and lifelong agentic systems through a unified conceptual framework and systematic
  review of evolution techniques.
problem: However, most existing agent systems rely on manually crafted configurations
  that remain static after deployment, limiting their ability to adapt to dynamic
  and evolving environments.
contributions:
- 'Proposes a unified conceptual framework for self-evolving agentic systems with
  four core components: System inputs, Agent System, Environment, and Optimisers.'
- 'Defines three guiding principles for safe and effective self-evolution: Endure
  (safety), Excel (performance preservation), and Evolve (autonomous evolution).'
- Provides a systematic taxonomy of self-evolving techniques covering foundation models,
  prompts, memory, tools, workflows, and communication mechanisms.
- Covers domain-specific evolution strategies for biomedicine, programming, and finance.
- Discusses evaluation, safety, and ethical considerations for self-evolving agentic
  systems.
method:
- 'Unified conceptual framework with feedback loop: System inputs → Agent System →
  Environment → Optimisers.'
- Systematic review of techniques for evolving each agent component (LLM, prompts,
  memory, tools, workflows, communication).
- Discussion of domain-specific evolution strategies (biomedicine, programming, finance).
- Analysis of evaluation methodologies and benchmarks for self-evolving agents.
- Examination of safety and ethical considerations.
experiments:
- Evaluation of domain-specific agent optimisation techniques and their applications
  (Section 6).
- Discussion of evaluation methodologies and benchmarks for assessing agent systems
  (Section 7).
- Collaborative mechanisms like debate and iterative refinement for multi-agent systems.
- Safety and ethical considerations for self-evolving agentic systems.
limitations:
- Current systems are still far from exhibiting full capabilities for safe, robust,
  and open-ended self-evolution.
- Real-world environments are dynamic and continuously evolving, requiring adaptation
  that manually reconfiguring agent systems is time-consuming and difficult to scale.
- Existing agent systems rely heavily on manually crafted static configurations after
  deployment.
