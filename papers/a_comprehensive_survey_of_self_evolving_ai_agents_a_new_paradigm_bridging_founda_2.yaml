translations:
  abstract: 近期在大语言模型(LLMs)方面的进步,引起了对能够解决复杂,现实世界任务的AI代理越来越多的兴趣. 然而,大多数现有代理系统都依赖于部署后保持静态的手动设计配置,限制了其适应动态和不断变化的环境的能力.
    为了消除这一局限性,最近的研究探索了代理人演化技术,其目的是根据相互作用的数据和环境反馈自动加强代理人系统。 这一新兴方向为自我演化的AI代理奠定了基础,它将基础模型的静态能力与终身代理系统所要求的持续适应性相衔接.
    在这项调查中,我们全面审查了现有自演代理系统技术。 具体地说,我们首先引入了一个统一的概念框架,它总结了自我演化代理系统设计背后的反馈循环. 该框架突出了四个关键组成部分:系统投入、代理系统、环境和优化者,作为理解和比较不同战略的基础。
    基于这一框架,我们系统地审查各种针对代理系统不同组成部分的自演技术,包括基础模型、代理提示、内存、工具、工作流程和跨代理通信机制。 我们还调查为生物医学、方案编制和金融等专门领域制定的针对具体领域的演变战略,在这些领域,代理人行为和优化目标与领域限制紧密结合。
    此外,我们还专门讨论了自我发展代理系统的评价、安全和道德考虑,这对于确保其有效性和可靠性至关重要。 这项调查旨在使研究人员和从业人员系统地了解自演的人工智能代理人,为发展更适应性强,自主性和终身性的代理人系统奠定基础.
  one_sentence: 通过统一的概念框架和对演化技术的系统审查,对连接模型和终身代理体系的自我演化的AI代理人进行全面调查.
  problem: 然而,大多数现有代理系统都依赖于部署后保持静态的手动设计配置,限制了其适应动态和不断变化的环境的能力.
  contributions:
  - '提出自演代理系统的统一概念框架,包括四个核心组成部分: 系统输入、代理系统、环境和优化器。'
  - 定义了安全有效的自我演化的三项指导原则:持久(安全)、Excel(绩效保护)和Evolve(自主演化)。
  - 提供系统化的自演技术分类学,涵盖基础模型,提示,内存,工具,工作流程和通信机制.
  - 涵盖生物医学、方案编制和资金领域特有的演变战略。
  - 讨论自我发展代理系统的评价、安全和道德考虑。
  method:
  - 具有反馈循环的统一概念框架:系统输入 代理系统 环境 优化者.
  - 系统审查每个代理部件(LLM、提示、内存、工具、工作流程、通信)的演化技术。
  - 讨论具体领域的演变战略(生物医学、方案编制、财务)。
  - 分析评价方法和自演剂基准。
  - 审查安全和道德考虑。
  experiments:
  - 评价特定域的代理人优化技术及其应用(第6节)。
  - 讨论评估代理系统的评价方法和基准(第7节)。
  - 为多代理系统开展辩论和迭代完善等协作机制.
  - 自演化剂系统的安全性和伦理考虑.
  limitations:
  - 目前的系统还远远没有展现出安全、有力和无限制的自我演变的充分能力。
  - 现实世界的环境是动态的和不断演变的,需要调整,人工重新配置代理系统是耗时的,难以扩展。
  - 现有代理系统在部署后严重依赖人工设计的静态配置.
