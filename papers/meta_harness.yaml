  ## Core Idea


  The performance of large language model (LLM) systems depends not only on model
  weights, but also on theirharness: the code that determines what information to
  store, retrieve, and present to the model. Yet harnesses are still designed largely
  by hand, and existing text optimizers are poorly matched to this setting because
  they compress feedback too aggressively: they are memoryless, condition only on
  scalar scores, or restrict feedback to short templates or summaries. We introduceMeta-Harness,
  an outer-loop system that searches over harness code for LLM applications. It uses
  an agentic proposer that accesses the source code, scores, and execution traces
  of all prior candidates through a fi


  ## Method Notes


  - Abstract The performance of large language model (LLM) systems depends not only
  on model weights, but also on theirharness: the code that determines what information
  to store, retrieve, and present to the model.

  - It uses an agentic proposer that accesses the source code, scores, and execution
  traces of all prior candidates through a filesystem.

  - On retrieval-augmented math reasoning, a single discovered harness improves accuracy
  on 200 IMO-level problems by 4.7 points on average across five held-out models.

  - On agentic coding, discovered harnesses surpass the best hand-engineered baselines
  on TerminalBench-2.

  - 1 Introduction Changing the harness around a fixed large language model (LLM)
  can produce a 6 × performance gap on the same benchmark [47].

  - Theharness—the code that determines what to store, retrieve, and show to the model—often
  matters as much as the model itself.


  ## Evidence To Verify


  - Exact contributions, datasets, metrics, and baselines.

  - Quantitative results and claims from figures or tables.


  ## Limitations


  - However, these methods are poorly matched to harness engineering because they
  typically operate with short-horizon or heavily compressed feedback: some condition
  only on the current candidate [31; 51; 53], others rely primarily on scalar scores
  [35; 12], and others restrict feedback to short templates or LLM-generated summaries
  [1; 26].

  - Compressed feedback often removes the information needed to trace downstream failures
  to earlier harness decisions.

  - We address this limitation withMeta-Harness, an agentic harness for optimizing
  harnesses via end-to-end search (Figure 2).

  - Rather than updating model weights, the system assigns credit at the harness level:
  it uses experience from past rollouts to deliberately reason about which steps and
  components are responsible for failures, then rewrites the external code that governs
  future behavior.


