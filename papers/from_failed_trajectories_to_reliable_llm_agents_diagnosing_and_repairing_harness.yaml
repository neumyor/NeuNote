  contributions:
  - 我们介绍HARNESSFIX,这是一个基于追踪和诊断的框架,用于修复剂管。 与结果驱动的即时演化或自由形式自编自导不同,HARNSSFIX明确连接故障证据,以利用-意识诊断和范围化的牵引变化.
  - 我们引入了HTIR, 一种有领悟的痕量表示, 将不同的物剂轨迹正常化为阶梯级的证据结构, 为阶梯级的归属, 利用诊断, 和范围化的修复规划提供基础。
  - 我们通过四种流行的基准和代理人来评估HARNESSFIX, 显示微量基系绳修补比最初的绳索提高了15.2% + 50.0 % 的测试性能, 同时也超过了人类设计的绳索和自我进化基线。
  - 我们系统地分析各种大众代理基准中公认的使用装置修理情况,揭示不同任务环境所强调反复出现的使用装置法模式和ETCLOVG层。
  method:
  - HARNESSFIX使用微量抽象剂将原始执行痕迹编译,并将代码调用为具有阶梯级出处和控制流关系的Harness-aware Trace中间代表(HTIR).
  - 诊断剂将失败归因于负责任的轨迹步骤和操纵层,将反复出现的诊断整合到缺陷记录中.
  - 修理代理地图将记录缺陷为范围化的修理操作员,并在缺陷特定的修理规格下产生候选补丁.
  - 一种验证代理检查补丁,用于范围合规和避免回归,仅接受那些减少目标缺陷而不发生不可接受的回归的补丁.
  experiments:
  - 对SWE-Bench Verife、Terminal-Bench 2.0 Verife、GAIA和AppWorld进行了评估。
  - 提高15.2%/50.0%的测试性能,超过人类设计和自我进化基线。
  - 校正实验证实,基于痕量的诊断、范围修复操作员和回归意识验证都有助于最终改进。
  limitations:
