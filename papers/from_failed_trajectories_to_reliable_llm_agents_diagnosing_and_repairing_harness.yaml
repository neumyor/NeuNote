abstract: Abstract—LLM-based agents increasingly rely on harnesses that provide execution
  environments, tool interfaces, context, life- cycle orchestration, observability,
  verification, and governance. Existing self-improving agents and automatic harness
  evolution methods mainly improve agents through runtime supervision, prompt optimization,
  workflow search, or harness modification based on final outcomes. However, they
  often fail to diagnose where the responsible evidence lies in failed trajectories
  and which harness layer causes the unreliable behavior, resulting in broad, indirect,
  or poorly scoped changes. This paper proposes HARNESSFIX, a trace-guided framework
  for diagnosing agent failures and repairing agent harnesses. HARNESSFIX compiles
  raw execution traces and harness code into a Harness-aware Trace Intermediate Representation
  (HTIR), which normalizes fragmented trajectory evidence and captures step-level
  prove- nance and control-flow relations. It then attributes failures to responsible
  trajectory steps and harness layers, consolidates recurring diagnoses into actionable
  flaw records, and maps them to scoped repair operators. Finally, HARNESSFIX generates
  and validates harness patches under flaw-specific repair specifica- tions to reduce
  target flaws without introducing unacceptable regressions. We evaluate HARNESSFIX
  on SWE-Bench Verified, Terminal-Bench 2.0 Verified, GAIA and AppWorld. Across these
  benchmarks, HARNESSFIX improves held-out test performance over the initial harnesses
  by 15.2%–50.0%, outperforms human- designed and self-evolution baselines, and reveals
  recurring harness-flaw patterns across ETCLOVG layers.
one_sentence: This paper proposes HARNESSFIX, a trace-guided framework for diagnosing
  agent failures and repairing agent harnesses.
problem: However, they often fail to diagnose where the responsible evidence lies
  in failed trajectories and which harness layer causes the unreliable behavior, resulting
  in broad, indirect, or poorly scoped changes.
contributions:
- We present HARNESSFIX, a trace-grounded and diagnosis-driven framework for repairing
  agent harnesses. Unlike outcome-driven prompt evolution or free-form self-editing,
  HARNESSFIX explicitly connects failure evidence to harness-aware diagnosis and scoped
  harness changes.
- We introduce HTIR, a harness-aware trace representation that normalizes heterogeneous
  agent trajectories into step-level evidence structures, providing a basis for step-level
  attribution, harness diagnosis, and scoped repair planning.
- We evaluate HARNESSFIX across four popular benchmarks and agents, showing that trace-grounded
  harness repair improves held-out test performance over initial harnesses by 15.2%–50.0%,
  while also outperforming human-designed harnesses and self-evolution baselines.
- We provide a systematic analysis of accepted harness repairs across popular agent
  benchmarks, revealing recurring harness-flaw patterns and the ETCLOVG layers stressed
  by different task settings.
method:
- HARNESSFIX uses a trace abstraction agent to compile raw execution traces and harness
  code into a Harness-aware Trace Intermediate Representation (HTIR) with step-level
  provenance and control-flow relations.
- A diagnosis agent attributes failures to responsible trajectory steps and harness
  layers, consolidating recurring diagnoses into flaw records.
- A repair agent maps flaw records to scoped repair operators and generates candidate
  patches under flaw-specific repair specifications.
- A validation agent checks patches for scope compliance and regression avoidance,
  accepting only those that reduce target flaws without unacceptable regressions.
experiments:
- Evaluated on SWE-Bench Verified, Terminal-Bench 2.0 Verified, GAIA, and AppWorld.
- Improves held-out test performance by 15.2%–50.0% over initial harnesses, outperforming
  human-designed and self-evolution baselines.
- Ablation experiments confirm that trace-grounded diagnosis, scoped repair operators,
  and regression-aware validation each contribute to the final improvement.
limitations:
- However, they often fail to diagnose where the responsible evidence lies in failed
  trajectories and which harness layer causes the unreliable behavior, resulting in
  broad, indirect, or poorly scoped changes.
- This paper proposes HARNESSFIX, a trace-guided framework for diagnosing agent failures
  and repairing agent harnesses.
- It then attributes failures to responsible trajectory steps and harness layers,
  consolidates recurring diagnoses into actionable flaw records, and maps them to
  scoped repair operators.
- Index Terms—LLM agents, harness engineering, trace analysis, failure attribution,
  software engineering agents, regression-aware improvement I.
