translations:
  abstract: 基于LLM的代理人越来越依赖提供执行环境、工具界面、背景、生命周期的管弦乐、可观察性、核查和治理的装置。 现有的自我改进剂和自动利用演化方法主要通过运行时间监督,即时优化,工作流程搜索,或根据最终结果利用修改改进剂.
    然而,他们往往无法判断负责任的证据位于哪些轨道失灵,而利用层则造成不可靠行为,导致广泛、间接或范围差的变化。 本文提出HARNESSFIX,这是诊断剂故障和修复剂带的跟踪指导框架.
    HARNESSFIX将原始执行痕迹和密码整理成一个Harness-aware Trace 中间代表(HTIR),使分散的轨迹证据正常化,并捕捉阶梯级的证明-nance和控制-流关系.
    然后,它把故障归结为负责任的轨迹步骤和操纵层,将反复出现的诊断整合为可操作的瑕疵记录,并将其映射到范围修正操作员. 最后,HARNESSFIX在针对缺陷的修补特异性下生成并验证了绑带补丁,以减少目标缺陷,同时不引入不可接受的回归.
    我们通过SWE-Bench验证、Terminal-Bench 2.0验证、GAIA和AppWorld评估HARNSSFIX。 通过这些基准,HARNESSFIX将所持有的试验性能比最初的装置提高了15.2%/50.0%,超过了人类设计的和自演的基线,并揭示了ETCLOVG各层反复出现的利用法模式。
  one_sentence: 本文提出HARNESSFIX,这是诊断剂故障和修复剂带的跟踪指导框架.
