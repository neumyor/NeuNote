abstract: 'Recent large language models (LLMs) have demonstrated strong capabilities
  in understanding and generating code, from competitive programming to repository-level
  software engineering. In emerging agentic systems, code is no longer only a target
  output. It increasingly serves as an operational substrate for agent reasoning,
  acting, environment modeling, and execution-based verification. We frame this shift
  through the lens of agent harnesses and introduce code as agent harness: a unified
  view that centers code as the basis for agent infrastructure. To systematically
  study this perspective, we organize the survey around three connected layers. First,
  we study the harness interface, where code connects agents to reasoning, action,
  and environment modeling. Second, we examine harness mechanisms: planning, memory,
  and tool use for long-horizon execution, together with feedback-driven control and
  optimization that make harness reliable and adaptive. Third, we discuss scaling
  the harness from single-agent systems to multi-agent settings, where shared code
  artifacts support multi-agent coordination, review, and verification. Across these
  layers, we summarize representative methods and practical applications of code as
  agent harness, spanning coding assistants, GUI/OS automation, embodied agents, scientific
  discovery, personalization and recommendation, DevOps, and enterprise workflows.
  We further outline open challenges for harness engineering, including evaluation
  beyond final task success, verification under incomplete feedback, regression-free
  harness improvement, consistent shared state across multiple agents, human oversight
  for safety-critical actions, and extensions to multimodal environments. By centering
  code as the harness of agentic AI, this survey provides a unified roadmap toward
  executable, verifiable, and stateful AI agent systems.'
one_sentence: We frame the shift of code from target output to operational substrate
  through the lens of agent harnesses and introduce 'code as agent harness' as a unified
  view that centers code as the basis for agent infrastructure.
problem: Existing surveys typically treat code as the end product of LLMs, overlooking
  its role as an operational substrate for agent reasoning, acting, and environment
  modeling.
contributions:
- 'Conceptual framing: We formalize code as agent harness, reframing code from a generated
  artifact into the operational substrate of executable, verifiable, and stateful
  AI agent systems.'
- 'Taxonomy and synthesis: We organize code as agent harness into three connected
  layers: harness interfaces, harness mechanisms, and scaling harness, and synthesize
  representative methods.'
- 'Applications and future agenda: We connect the taxonomy to real-world applications
  and outline key challenges in evaluation, verification, safety, and coordination.'
