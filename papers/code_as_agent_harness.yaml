translations:
  abstract: '近期的大型语言模型(LLMs)在从竞争性编程到存储器级软件工程的理解和生成代码方面表现出了强大的能力. 在新兴的代理系统中,代码不再只是目标输出.
    它日益成为代理人推理、行为、环境建模和基于执行的核查的操作基底。 我们通过代理机的镜像来设定这一转变, 并引入代号作为代理机的代号: 一个统一的观点,即中心代码是代理机基础设施的基础。
    为了系统地研究这一视角,我们围绕三个相连的层次组织调查。 首先,我们研究了绳索接口,其中代码连接了代理商与推理,动作,以及环境建模. 第二,我们审查利用机制:规划、记忆和长期执行的工具使用,以及反馈驱动的控制和优化,使利用具有可靠性和适应性。
    第三,我们讨论从单一代理系统向多代理设置推广,共享代码文物支持多代理协调、审查和核实。 在这些层次上,我们总结了代号作为代理控制、涵盖编码助理、GUI/OS自动化、包含代理、科学发现、个性化和建议、DevOps和企业工作流程的代表性方法和实际应用。
    我们进一步概述了在利用工程方面的公开挑战,包括超越最后任务成功的评价、不完全反馈的核查、无倒退的利用改进、多种行为者之间一致的共享状态、对安全关键行动的人类监督以及向多式联运环境的延伸。
    通过将代码作为代理AI的利用中心,本次调查为可执行,可核查,且状态良好的AI代理系统提供了统一的路线图.'
  one_sentence: 我们把代码从目标输出转向操作底盘 通过代理设备的透镜 将“代码作为代理设备”引入到一个统一的观点中 中心代码作为代理基础设施的基础
  problem: 现有的调查通常将代码视为有限责任公司的最终产品,忽略了它作为代理推理、行为和环境模型的操作底物的作用。
  contributions:
  - 概念框架:我们把代码正式化,作为代理工具,将生成的文物中的代码重塑成可执行、可核查和状态良好的人工智能代理系统。
  - '分类学和合成:我们把代码组织成代理控制层, 分为三个连接层: 控制界面、控制机制、 控制手段, 以及综合代表性方法。'
  - '申请和今后议程: 我们把分类学与现实世界的应用联系起来,概述评价、核查、安全和协调方面的主要挑战。'
  method:
