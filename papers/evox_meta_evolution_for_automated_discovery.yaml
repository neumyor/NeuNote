translations:
  abstract: 近期如AlphaEvolve等工作表明，将LLM驱动的优化与进化搜索相结合，能够有效改进跨领域的程序、提示词和算法。在这一范式中，先前评估过的解被重新利用，以引导模型生成新的候选解。关键的是，这种进化过程的有效性取决于搜索策略：如何选择和变异先前的解以生成新候选。然而，大多数现有方法依赖于固定的搜索策略，这些策略带有预定义的参数（例如探索-利用比率），并在整个执行过程中保持不变。虽然在某些场景下有效，但这些方法往往无法适应不同任务，甚至在同一任务中随着搜索空间随时间变化也难以适应。我们引入了EvoX，一种自适应进化方法，它优化自身的进化过程。EvoX联合进化候选解以及用于生成候选解的搜索策略，根据进展持续更新如何选择和变异先前解。这使得系统能够在优化过程中动态切换不同搜索策略。在近200个真实世界优化任务中，EvoX在大多数任务上优于现有AI驱动的进化方法，包括AlphaEvolve、OpenEvolve、GEPA和ShinkaEvolve。
  one_sentence: EvoX是一种自适应进化方法，它联合进化候选解以及用于生成候选解的搜索策略，从而优化自身的进化过程。
  problem: 然而，大多数现有方法依赖于固定的搜索策略，这些策略带有预定义的参数（例如探索-利用比率），并在整个执行过程中保持不变。
  contributions:
  - 我们将LLM驱动的优化形式化为一个双层过程，将解进化与搜索策略进化分离。
  - 我们引入了EvoX，一种根据优化目标改进动态进化搜索策略的方法。
  - 我们在近200个问题上展示了相对于先前方法的一致改进，并描述了搜索策略进化的成本、缩放行为和适应动态。
  method:
  - EvoX使用双层进化：在固定搜索策略下生成候选解的解进化循环，以及根据进展更新搜索策略的元进化循环。
  - 搜索策略指定父候选的选择、变异算子（局部细化、结构变异、自由形式变异）和灵感集。
  - 当进展停滞时，元进化循环根据先前策略、其性能以及当前种群状态生成新的搜索策略。
  - EvoX从随机采样搜索策略开始，并在线进化该策略。
  experiments:
  - 在近200个优化任务上进行了评估，包括数学、系统优化和算法工程基准。
  - 与人工设计的基线和AI发现系统进行比较：AlphaEvolve、OpenEvolve、GEPA、ShinkaEvolve。
  - 所有方法均使用固定的100次迭代预算。
  - EvoX在96%的数学和系统优化基准上优于现有方法。
  limitations:
  - 然而，大多数现有方法依赖于固定的搜索策略，这些策略带有预定义的参数（例如探索-利用比率），并在整个执行过程中保持不变。
  - 虽然在某些场景下有效，但这些方法往往无法适应不同任务，甚至在同一任务中随着搜索空间随时间变化也难以适应。
  - 然而，关键的搜索策略参数仍依赖手动配置。
  - 在实践中，固定的搜索策略往往无法跨问题或优化不同阶段进行泛化。
