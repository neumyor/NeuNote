abstract: 'Recent work such as AlphaEvolve has shown that combining LLM-driven optimization
  with evolutionary search can effectively improve programs, prompts, and algorithms
  across domains. In this paradigm, previously evaluated solutions are reused to guide
  the model toward new candidate solutions. Crucially, the effectiveness of this evolution
  process depends on the search strategy: how prior solutions are selected and varied
  to generate new candidates. However, most existing methods rely on fixed search
  strategies with predefined knobs (e.g., explore–exploit ratios) that remain static
  throughout execution. While effective in some settings, these approaches often fail
  to adapt across tasks, or even within the same task as the search space changes
  over time. We introduce EvoX, an adaptive evolution method that optimizes its own
  evolution process. EvoX jointly evolves candidate solutions and the search strategies
  used to generate them, continuously updating how prior solutions are selected and
  varied based on progress. This enables the system to dynamically shift between different
  search strategies during the optimization process. Across nearly 200 real-world
  optimization tasks, EvoX outperforms existing AI-driven evolutionary methods including
  AlphaEvolve, OpenEvolve, GEPA, and ShinkaEvolve on the majority of tasks.'
one_sentence: EvoX is an adaptive evolution method that jointly evolves candidate
  solutions and the search strategies used to generate them, optimizing its own evolution
  process.
problem: However, most existing methods rely on fixed search strategies with predefined
  knobs (e.g., explore–exploit ratios) that remain static throughout execution.
contributions:
- We formalize LLM-driven optimization as a two-level process that separates solution
  evolution from search strategy evolution.
- We introduce EvoX, a method that dynamically evolves search strategies based on
  improvements in the optimization objective.
- We demonstrate consistent improvements over prior methods across nearly 200 problems,
  and characterize the cost, scaling behavior, and adaptation dynamics of the search
  strategy evolution.
method:
- 'EvoX uses a two-level evolution: solution-evolution loop for generating candidates
  under a fixed search strategy, and meta-evolution loop for updating the search strategy
  based on progress.'
- The search strategy specifies selection of parent candidates, variation operators
  (local refinement, structural variation, free-form variation), and inspiration set.
- When progress stagnates, the meta-evolution loop generates a new search strategy
  conditioned on prior strategies, their performance, and current population state.
- EvoX starts from a random-sampling search strategy and evolves it online.
experiments:
- Evaluated on nearly 200 optimization tasks including mathematics, systems optimization,
  and algorithm engineering benchmarks.
- 'Compared against human-designed baselines and AI discovery systems: AlphaEvolve,
  OpenEvolve, GEPA, ShinkaEvolve.'
- Fixed budget of 100 iterations for all methods.
- EvoX outperformed existing methods on 96% of math and system optimization benchmarks.
limitations:
- However, most existing methods rely on fixed search strategies with predefined knobs
  (e.g., explore–exploit ratios) that remain static throughout execution.
- While effective in some settings, these approaches often fail to adapt across tasks,
  or even within the same task as the search space changes over time.
- However, key search strategy knobs remain manually configured.
- In practice, a fixed search strategy often fails to generalize across problems or
  across different stages of optimization.
