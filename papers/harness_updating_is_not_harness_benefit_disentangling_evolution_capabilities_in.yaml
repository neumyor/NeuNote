translations:
  abstract: LLM代理越来越多地被部署在围绕可编辑的外部杠杆构建的系统上,包括提示,技能,记忆和工具,它们塑造任务执行而不改变模型参数. 利用自我进化通过更新执行证据中的这些工具来适应这些代理人。
    然而,还不清楚一个模型在任务解决方面的基础能力是否预测它利用自我进化的能力:哪些模型产生有用的利用更新,哪些模型实际从中获益? 我们分析两种利用自我演进能力:(一)
    利用更新的能力,即从执行证据中产生有用的持续利用更新的能力;(二) 利用效益,即在任务解决过程中从更新的利用中受益的能力。 我们的分析发现了两个结果。 首先,利用更新在基础能力上是平的:来自不同能力层次的模型产生利用更新,导致令人惊讶的类似收益;即使是Quen3.5-9B的更新也会产生与克劳德·奥普斯4.6相似的收益。
    第二,利用效益在基础能力方面是非莫名的:薄弱的模型从更新的利用中得益甚微,中级模型从中得益最多,而强的模型从中得益较少。 我们追踪到弱级的低收益到两种失败模式:弱级的模型可能无法激活相关的吊带文物,或激活它们,但未能忠实地遵循它们.
    这些调查结果表明,在执行任务的代理人而不是演化者身上投入能力预算,并在代理人培训之后针对利用和长期指导。 我们的源代码在这里是公开的。
  one_sentence: 我们分析并分解两种自演能力——热度更新和热度效益——的调查发现,在模型能力层次上,热度提升是平坦的,而热度提升则不是莫名其妙的,中级模型受益最大。
  problem: 然而,这种人工设计在部署时间环境中是简洁的:任务分布转移,边缘案例出现,只有在系统与实际任务互动后才会发现有用的程序.
  contributions:
  - 分离两种利用自演能力:利用更新能力和利用效益.
  - 显示在基础能力上,调用率是平的:跨级模型产生具有类似收益的更新.
  - 显示牵引效益是非摩诺主义的:中层模型对大多数,弱层好处很少,强层不及中层.
  - 在弱模型中确定两种失败模式:利用激活失败和利用坚持失败.
  - 提供设计指导:分配能力预算,用于任务解决代理人,在培训中烘烤利用,加强随后的长视距教学。
  method:
  - 将自演协议正式化,作为任务解决与更新之间的迭代循环.
  - 界定两种演化能力:利用更新(能够产生有用的更新)和利用效益(能够从更新中受益)。
  - 测量这些能力的方法是,在多个基准和模型中,对物剂和进化器进行配对。
  - 分析基础能力和进化能力之间的关系.
  experiments:
  - 评估三个具有代表性的代理基准:SWE-bench 验证(软件工程)和MCP-Atlas(工具使用),第三个基准在片断中提及但未充分说明。
  - 使用7个LLMS,涵盖跨能力层次的开源家庭和闭源家庭.
  - 以对等模型作为动力和进化器,以衡量利用更新和利用效益。
  - 对故障模式进行个案研究,包括利用激活和坚持失败。
  limitations:
  - 分析仅限于所选的牵引组件(瞬间,技能,记忆),不包括工具,执行政策或其他组件.
  - 研究使用特定的演化协议;结果可能不会被概括到其他自演化方法.
  - 仅采用三个代理基准,可能无法涵盖所有代理任务。
