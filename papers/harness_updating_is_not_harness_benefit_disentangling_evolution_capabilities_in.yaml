abstract: 'LLM agents are increasingly deployed as systems built around editable external
  harnesses, including prompts, skills, memories and tools, that shape task execution
  without changing model parameters. Harness self-evolution adapts such agents by
  updating these harnesses from execution evidence. Yet it remains unclear whether
  a model’s base capability in task-solving predicts its capabilities in harness self-evolution:
  which models produce useful harness updates, and which actually benefit from them?
  We analyze two harness self-evolution capabilities: (i) harness-updating, the capability
  to produce useful persistent harness updates from execution evidence; (ii) harness-benefit,
  the capability to benefit from updated harnesses during task solving. Our analysis
  reveals two findings. First, harness-updating is flat in base capability: models
  from different capability tiers produce harness updates that lead to surprisingly
  similar gains; even Qwen3.5-9B’s updates yield gains comparable to those of Claude
  Opus 4.6. Second, harness-benefit is non-monotonic in base capability: weak-tier
  models benefit little from updated harnesses, mid-tier models benefit most, and
  strong-tier models benefit less than mid-tier. We trace low gains at the weak tier
  to two failure modes: weak-tier models may fail to activate relevant harness artifacts,
  or activate them but fail to follow them faithfully. These findings suggest investing
  capability budget in the task-solving agent rather than the evolver, and targeting
  harness invocation and long-horizon instruction following in agent training. Our
  source code is publicly available at here.'
one_sentence: We analyze and disentangle two harness self-evolution capabilities—harness-updating
  and harness-benefit—finding that harness-updating is flat across model capability
  tiers while harness-benefit is non-monotonic, with mid-tier models benefiting most.
problem: 'However, such manual design is brittle in deployment-time environments:
  task distributions shift, edge cases appear, and useful procedures are discovered
  only after the system interacts with real tasks.'
contributions:
- 'Disentangle two harness self-evolution capabilities: harness-updating and harness-benefit.'
- 'Show that harness-updating is flat in base capability: models across tiers produce
  updates with similar gains.'
- 'Show that harness-benefit is non-monotonic: mid-tier models benefit most, weak-tier
  benefit little, strong-tier less than mid-tier.'
- 'Identify two failure modes in weak models: harness activation failure and harness
  adherence failure.'
- 'Provide design guidance: allocate capability budget to task-solving agent, bake
  harness invocation into training, strengthen long-horizon instruction following.'
method:
- Formalize harness self-evolution protocol as an iterative loop between task-solving
  and harness updating.
- 'Define two evolution capabilities: harness-updating (ability to produce useful
  updates) and harness-benefit (ability to benefit from updates).'
- Measure these capabilities by pairing agents and evolvers across multiple benchmarks
  and models.
- Analyze relationship between base capability and evolution capabilities.
experiments:
- 'Evaluate on three representative agentic benchmarks: SWE-bench Verified (software
  engineering) and MCP-Atlas (tool use), with a third benchmark mentioned but not
  fully specified in the snippet.'
- Use seven LLMs spanning open-source and closed-source families across capability
  tiers.
- Pair models as agents and evolvers to measure harness-updating and harness-benefit.
- Conduct case studies on failure modes including harness activation and adherence
  failure.
limitations:
- Analysis is limited to selected harness components (prompts, skills, memories) and
  does not include tools, execution policies, or other components.
- Study uses a specific evolution protocol; findings may not generalize to other self-evolution
  methods.
- Only three agentic benchmarks are used, which may not cover all agentic tasks.
