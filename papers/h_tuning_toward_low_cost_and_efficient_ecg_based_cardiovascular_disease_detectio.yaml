translations:
  abstract: 微调大规模预训练模型为利用心电图进行心血管疾病检测中缓解标签稀缺问题提供了有效的解决方案。然而，随着预训练模型规模的扩大，在部署于临床应用的低级设备上，微调和推理的计算成本变得难以承受。此外，在计算资源预算有限的情况下保持模型性能仍然是一个重大挑战。然而，目前仍缺乏能够在同一框架内解决这些问题的综合性研究。为此，我们提出了一种整体方法（H-Tuning），用于在目标数据集上对预训练模型进行低成本、高效的微调。然后，通过知识蒸馏技术进一步显著降低经H-Tuning微调后的模型的推理成本。在四个心电图数据集上的实验表明，H-Tuning在微调期间将GPU内存消耗降低了6.34倍，同时实现了与标准微调相当的心血管疾病检测性能。结合知识蒸馏技术，模型推理延迟和内存消耗分别降低了4.52倍和19.83倍。因此，所提出的联合框架允许以高计算效率和稳健性能利用预训练模型，探索了一条低成本、高效的心血管疾病检测路径。代码可在
    https://github.com/KAZABANA/H-Tuning 获取。
  one_sentence: H-Tuning 集成了混合阶优化、低秩适应和知识蒸馏，实现了对预训练心电图模型的低成本、高效微调，用于心血管疾病检测。
  problem: 然而，随着预训练模型规模的扩大，在部署于临床应用的低级设备上，微调和推理的计算成本变得难以承受。
  contributions:
  - 首先，提出了一种混合阶优化方法，通过粗到细的估计机制精确估计梯度信息。
  - 其次，开发了一个整体框架（H-Tuning），将混合阶优化与低秩适应以及一种新颖的逐层模型更新方案相结合，提升了计算效率和鲁棒性。
  - 第三，提出了一套全面的流程，用于在保持诊断性能的同时降低预训练模型的微调和推理成本，为利用心电图进行低成本、高效的心血管疾病检测探索了新路径。
  method:
  - 混合阶优化结合了零阶SPSA估计和在一小部分子集上的一阶精化，以低内存估计梯度。
  - 低秩适应通过冻结预训练权重并注入可训练的低秩矩阵来减少可训练参数。
  - 逐层更新方案以不同方案（混合阶与一阶）更新浅层和深层，以平衡效率与性能。
  - 知识蒸馏将微调教师模型的知识转移到小型学生模型，减少了推理延迟、内存和参数。
  experiments:
  - 在四个心电图数据集上评估多标签心血管疾病检测。
  - 与标准微调、LoRA和MeZO基线进行对比。
  - H-Tuning在微调期间将GPU内存消耗降低6.34倍，同时达到可比的性能。
  - 知识蒸馏将推理延迟降低4.52倍，GPU内存降低19.83倍，参数减少194.23倍。
  limitations:
  - 然而，随着预训练模型规模的扩大，在部署于临床应用的低级设备上，微调和推理的计算成本变得难以承受。
  - 此外，在计算资源预算有限的情况下保持模型性能仍然是一个重大挑战。
  - 然而，目前仍缺乏能够在同一框架内解决这些问题的综合性研究。
  - 然而，收集足够的标注数据和计算资源以从头训练和实施深度学习模型仍然非常昂贵和耗时，尤其是对于资源有限社区中的开发者而言。
