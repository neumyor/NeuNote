abstract: Fine-tuning large-scale pre-trained models provides an effective solution
  to alleviate the label scarcity problem in cardiovascular diseases (CVDs) detection
  using electrocardiogram (ECG). However, as the pre-trained models scale up, the
  computational costs for fine-tuning and inference become unaffordable on low-level
  devices deployed for clinical applications. Additionally, maintaining the model
  performance under low budgets in computational resources remains a significant challenge.
  However, a comprehensive study that can address them in a joint framework is still
  lacking. Here, we propose a holistic method (H-Tuning) for low-cost and efficient
  fine-tuning of pre-trained models on downstream datasets. Then, the inference costs
  of the models fine-tuned by H-Tuning are further reduced significantly using a knowledge
  distillation technique. Experiments on four ECG datasets demonstrate that H-Tuning
  reduces the GPU memory consumption during fine-tuning by 6.34 times while achieving
  comparable CVDs detection performance to standard fine-tuning. With the knowledge
  distillation technique, the model inference latency and the memory consumption are
  reduced by 4.52 times and 19.83 times. As such, the proposed joint framework allows
  for the utilization of pre-trained models with high computation efficiency and robust
  performance, exploring a path toward low-cost and efficient CVDs detection. Code
  is available at https://github.com/KAZABANA/H-Tuning
one_sentence: H-Tuning integrates mix-order optimization, low-rank adaptation, and
  knowledge distillation to enable low-cost and efficient fine-tuning of pre-trained
  ECG models for cardiovascular disease detection.
problem: However, as the pre-trained models scale up, the computational costs for
  fine-tuning and inference become unaffordable on low-level devices deployed for
  clinical applications.
contributions:
- First, a mix-order optimization method is proposed to accurately estimate the gradient
  information using a coarse-to-fine estimation mechanism.
- Second, a holistic framework (H-Tuning) is developed to integrate the mix-order
  optimization with low-rank adaptation and a novel layer-dependent model update scheme,
  enhancing both computational efficiency and robustness.
- Third, a comprehensive workflow is proposed for reducing the fine-tuning and inference
  costs of pre-trained models while maintaining diagnostic performance, exploring
  a new path toward low-cost and efficient CVDs detection using ECG.
method:
- Mix-order optimization combines zeroth-order SPSA estimation with first-order refinement
  on a tiny subset to estimate gradients with low memory.
- Low-rank adaptation (LoRA) reduces trainable parameters by freezing pretrained weights
  and injecting trainable low-rank matrices.
- Layer-dependent update scheme updates shallow and deep layers with different schemes
  (mix-order vs first-order) to balance efficiency and performance.
- Knowledge distillation transfers knowledge from the fine-tuned teacher model to
  a tiny student model, reducing inference latency, memory, and parameters.
experiments:
- Evaluated on four ECG datasets for multi-label CVD detection.
- Compared against standard fine-tuning, LoRA, and MeZO baselines.
- H-Tuning reduces GPU memory consumption by 6.34 times during fine-tuning while achieving
  comparable performance.
- Knowledge distillation reduces inference latency by 4.52 times, GPU memory by 19.83
  times, and parameters by 194.23 times.
limitations:
- However, as the pre-trained models scale up, the computational costs for fine-tuning
  and inference become unaffordable on low-level devices de- ployed for clinical applications.
- Additionally, maintaining the model performance under low budgets in computational
  resources remains a sig- nificant challenge.
- However, a comprehensive study that can address them in a joint framework is still
  lacking.
- However, gathering sufficient labeled data and computational resources required
  to train and implement deep learning models from scratch is still very expensive
  and time-consuming, especially for developers from resource- limited communities.
