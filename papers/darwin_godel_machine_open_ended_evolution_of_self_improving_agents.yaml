translations:
  abstract: 当今大部分AI系统都受到人类设计,固定的建筑的制约,无法自主地不断改进自身. 另一方面,科学方法是一种累积的、开放式的制度,每一种创新都以以前的文物为基础,使未来的发现成为可能。
    人们越来越希望目前的人工推进AI的过程本身能够自动化. 如果安全进行,这种自动化将加快AI的开发,并使我们能够更快地获得其好处。 这种前景提出了AI系统如何在解决相关问题的同时不断改善自身的问题.
    Meta-learning可以自动发现小说算法,但受一阶改进和人类设计合适搜索空间的限制. Gödel机器(Schmidhuber,2007年)提出了一个理论替代方案:一种自我改进的AI,以可证明有益的方式反复修改自己.
    不幸的是,证明大多数变化是净好处在实践中是不可能的。 我们引入了达尔文·格德尔机器(DGM),这是一种新颖的自我改进系统,它反复修改了自己的代码(从而也提高了它修改自己的代码库的能力),并且用编码基准经验性地验证了每个变化.
    在达尔文演化和开放性研究的启发下,DGM生长了一个生成编码剂的档案. 它从这个档案中抽取了物剂,这些物剂可以自行修改,以创造自己新的,有趣的版本. 这种无限制的探索形成了一棵由多样,高质量的物剂组成的不断增长的树,并允许通过搜索空间平行探索许多不同的路径.
    经验中,DGM自动提高了编码能力(例如更好的代码编辑工具,长文本窗口管理,同行评审机制),将SWE-bench的性能从20.0%提升至50.0%,Polyglot的性能从14.2%提升至30.7%。
    此外,DGM的绩效大大超过基线,没有自我改进或无限制的勘探。 所有实验都采用安全预防措施(如沙箱、人的监督)。 总体来说,DGM代表着自我改善AI的重要一步,能够聚集自己的踏脚石沿着一条走向无尽创新的道路前进.
    所有代码都在https://github.com/jennyzzt/dgm上开源.
  one_sentence: 我们引入了达尔文·格德尔机器(Darwin Gödel Machine),这是一个自我改进的系统,它反复修改自己的代码,经验性地用编码基准验证变化,在SWE-bench和Polyglot上实现显著的性能收益.
  problem: 这种前景提出了AI系统如何在解决相关问题的同时不断改善自身的问题.
  contributions:
  - 引入达尔文·格德尔机(DGM),这是理论格德尔机的一种实际实施,它使用经验验证而不是正式证明.
  - 通过各种代理人的档案,展示开放式的自我改进,从而能够发现超越眼前性能收益的新能力。
  - 实现SWE-bench的自动改进,从20.0%提高到50.0%,Polyglot的自动改进率从14.2%提高到30.7%。
  method:
  - 我们引入了达尔文·格德尔机器(DGM),这是一种新颖的自我改进系统,它反复修改自己的代码,并用编码基准经验验证每个变化.
  - 在达尔文演化和开放性研究的启发下,DGM生长了一个生成编码剂的档案.
  - 它从这个档案中抽取了物剂,这些物剂可以自行修改,以创造自己新的,有趣的版本.
  - 这种无限制的探索形成了一棵由多样,高质量的物剂组成的不断增长的树,并允许通过搜索空间平行探索许多不同的路径.
  - 从经验上讲,DGM自动提高了编码能力,将SWE-bench的性能从20.0%提高到50.0%,将Polyglot的性能从14.2%提高到30.7%。
  experiments:
  - 我们引入了达尔文·格德尔机器(DGM),这是一种新颖的自我改进系统,它反复修改自己的代码,并用编码基准经验验证每个变化.
  - 此外,DGM的绩效大大超过基线,没有自我改进或无限制的勘探。
  - 所有实验都采用安全预防措施(如沙箱、人的监督)。
  - 我们不要求正式证明,而是在经验上根据基准验证自我修改,使该系统能够根据观察到的结果加以改进和探索。
  - DGM在自我修改和评价阶段之间交替出现。
  limitations:
  - 然而,今天的大部分AI系统仍然受到固定的,人造的架构的约束,这些架构在预先定义的边界内学习,没有能力自主重写自己的源代码来自我改进.
  - 然而,实际上,如果没有对该系统的限制性假设,就不可能正式证明修改AI系统是否有益。
  - 然而,我们没有表明,在本文中,由于培训调频在计算上是密集的,将带来大量的额外复杂性,而我们作为今后的工作离开了这种复杂性。
  - 2 相关工作不限名额。 推动无约束创新的一大挑战是设计可持续生成新颖和可学习文物的开放式人工智能系统(Stanley等人,2017年)。
