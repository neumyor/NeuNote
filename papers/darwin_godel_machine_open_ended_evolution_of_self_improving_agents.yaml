abstract: 'Most of today''s AI systems are constrained by human-designed, fixed architectures
  and cannot autonomously and continuously improve themselves. The scientific method,
  on the other hand, is a cumulative and open-ended system, where each innovation
  builds upon previous artifacts, enabling future discoveries. There is growing hope
  that the current manual process of advancing AI could itself be automated. If done
  safely, such automation would accelerate AI development and allow us to reap its
  benefits much sooner. This prospect raises the question of how AI systems can endlessly
  improve themselves while getting better at solving relevant problems. Meta-learning
  can automate the discovery of novel algorithms, but is limited by first-order improvements
  and the human design of a suitable search space. The Gödel machine (Schmidhuber,
  2007) proposed a theoretical alternative: a self-improving AI that repeatedly modifies
  itself in a provably beneficial manner. Unfortunately, proving that most changes
  are net beneficial is impossible in practice. We introduce the Darwin Gödel Machine
  (DGM), a novel self-improving system that iteratively modifies its own code (thereby
  also improving its ability to modify its own codebase) and empirically validates
  each change using coding benchmarks. Inspired by Darwinian evolution and open-endedness
  research, the DGM grows an archive of generated coding agents. It samples agents
  from this archive, which self-modify to create new, interesting versions of themselves.
  This open-ended exploration forms a growing tree of diverse, high-quality agents
  and allows the parallel exploration of many different paths through the search space.
  Empirically, the DGM automatically improves its coding capabilities (e.g., better
  code editing tools, long-context window management, peer-review mechanisms), increasing
  performance on SWE-bench from 20.0% to 50.0%, and on Polyglot from 14.2% to 30.7%.
  Furthermore, the DGM significantly outperforms baselines without self-improvement
  or open-ended exploration. All experiments were done with safety precautions (e.g.,
  sandboxing, human oversight). Overall, the DGM represents a significant step toward
  self-improving AI, capable of gathering its own stepping stones along a path that
  unfolds into endless innovation. All code is open-sourced at https://github.com/jennyzzt/dgm.'
one_sentence: We introduce the Darwin Gödel Machine, a self-improving system that
  iteratively modifies its own code and empirically validates changes using coding
  benchmarks, achieving significant performance gains on SWE-bench and Polyglot.
problem: This prospect raises the question of how AI systems can endlessly improve
  themselves while getting better at solving relevant problems.
contributions:
- Introduces the Darwin Gödel Machine (DGM), a practical implementation of the theoretical
  Gödel Machine that uses empirical validation instead of formal proofs.
- Demonstrates open-ended self-improvement through an archive of diverse agents, enabling
  the discovery of novel capabilities beyond immediate performance gains.
- Achieves automatic improvement on SWE-bench from 20.0% to 50.0% and on Polyglot
  from 14.2% to 30.7%.
method:
- We introduce the Darwin Gödel Machine (DGM), a novel self-improving system that
  iteratively modifies its own code and empirically validates each change using coding
  benchmarks.
- Inspired by Darwinian evolution and open-endedness research, the DGM grows an archive
  of generated coding agents.
- It samples agents from this archive, which self-modify to create new, interesting
  versions of themselves.
- This open-ended exploration forms a growing tree of diverse, high-quality agents
  and allows the parallel exploration of many different paths through the search space.
- Empirically, the DGM automatically improves its coding capabilities, increasing
  performance on SWE-bench from 20.0% to 50.0%, and on Polyglot from 14.2% to 30.7%.
experiments:
- We introduce the Darwin Gödel Machine (DGM), a novel self-improving system that
  iteratively modifies its own code and empirically validates each change using coding
  benchmarks.
- Furthermore, the DGM significantly outperforms baselines without self-improvement
  or open-ended exploration.
- All experiments were done with safety precautions (e.g., sandboxing, human oversight).
- Instead of requiring formal proofs, we empirically validate self-modifications against
  a benchmark, allowing the system to improve and explore based on observed results.
- The DGM alternates between self-modification and evaluation phases.
limitations:
- However, most of today's AI systems remain bound by fixed, human-designed architectures
  that learn within predefined boundaries, without the capacity to autonomously rewrite
  their own source code to self-improve.
- However, in practice and without restrictive assumptions about the system, it is
  impossible to formally prove whether a modification to an AI system will be beneficial.
- However, we do not show that in this paper, as training FMs is computationally intensive
  and would introduce substantial additional complexity, which we leave as future
  work.
- 2 RELATEDWORK Open-Endedness.A grand challenge for driving unbounded innovation
  is designing open-ended AI systems that continuously generate novel and learnable
  artifacts (Stanley et al., 2017).
