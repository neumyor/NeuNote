abstract: Electrocardiograms (ECGs) play a vital role in monitoring cardiac health
  and diagnosing heart diseases. However, traditional deep learning approaches for
  ECG analysis rely heavily on large-scale manual annotations, which are both time-consuming
  and resource-intensive to obtain. To overcome this limitation, self-supervised learning
  (SSL) has emerged as a promising alternative, enabling the extraction of robust
  ECG representations that can be efficiently transferred to various downstream tasks.
  While previous studies have explored SSL for ECG pretraining and multi-modal ECG-language
  alignment, they often fail to capture the multi-scale nature of ECG signals. As
  a result, these methods struggle to learn generalized representations due to their
  inability to model the hierarchical structure of ECG data. To address this gap,
  we introduce MELP a novel Multi-scale ECG-Language Pretraining (MELP) model that
  fully leverages hierarchical supervision from ECG-text pairs. MELP first pretrains
  a cardiology-specific language model to enhance its understanding of clinical text.
  It then applies three levels of cross-modal supervision—at the token, beat, and
  rhythm levels—to align ECG signals with textual reports, capturing structured information
  across different time scales. We evaluate MELP on three public ECG datasets across
  multiple tasks, including zero-shot ECG classification, linear probing, and transfer
  learning. Experimental results demonstrate that MELP outperforms existing SSL methods,
  underscoring its effectiveness and adaptability across diverse clinical applications.
one_sentence: We introduce MELP, a multi-scale ECG-language pretraining model that
  aligns ECG signals with clinical text at token, beat, and rhythm levels.
problem: Existing ECG pretraining and multi-modal ECG-language alignment methods often
  fail to capture the multi-scale nature of ECG signals, limiting their ability to
  learn generalized representations.
contributions:
- A novel Multi-scale ECG-Language Pretraining model (MELP) that hierarchically integrates
  clinical text knowledge for improved ECG representation learning.
- 'A structured pretraining framework with explicit cross-modal supervision at three
  clinically meaningful levels: token, beat, and rhythm.'
- Comprehensive evaluation on three public ECG datasets, achieving state-of-the-art
  performance in zero-shot classification, linear probing, and cross-domain transfer
  learning.
method:
- Pretrains a cardiology-specific language model using masked language modeling on
  a curated corpus from PubMed, Wikipedia, and MIMIC-IV-ECG.
- Token-level supervision via an ECG captioning task where a transformer decoder generates
  paired ECG reports conditioned on ECG token embeddings.
- Beat-level supervision via contrastive learning between heartbeat embeddings and
  corresponding sentence embeddings from text reports.
- Rhythm-level supervision via a global contrastive loss to align full ECG recording
  representations with global text representations.
experiments:
- 'Evaluated on three public ECG datasets: zero-shot classification, linear probing,
  and cross-institutional transfer learning.'
- Outperforms existing self-supervised and multi-modal models across all evaluated
  tasks.
- Demonstrates effectiveness of multi-scale supervision with ablation studies.
limitations:
- However, traditional deep learning ap- proaches for ECG analysis rely heavily on
  large- scale manual annotations, which are both time- consuming and resource-intensive
  to obtain.
- To overcome this limitation, self-supervised learn- ing (SSL) has emerged as a promising
  alternative, enabling the extraction of robust ECG represen- tations that can be
  efficiently transferred to var- ious downstream tasks.
- While previous studies have explored SSL for ECG pretraining and multi- modal ECG-language
  alignment, they often fail to capture the multi-scale nature of ECG signals.
- To address this limitation, a more detailed approach, incorporating token-, beat-,
  and rhythm-level representa- tions, is essential for capturing comprehensive ECG
  features critical for precise diagnostics.
