translations:
  abstract: 心电图（ECG）在监测心脏健康和诊断心脏疾病中起着至关重要的作用。然而，传统用于心电图分析的深度学习方法严重依赖大规模人工标注，获取这些标注既耗时又耗费资源。为克服这一局限，自监督学习（SSL）成为一种有前景的替代方案，能够提取稳健的心电图表征，并高效迁移到各类下游任务。尽管已有研究探索了SSL用于心电图预训练以及多模态心电-语言对齐，但它们往往未能捕捉心电信号的多尺度特性。因此，这些方法由于无法建模心电数据的层次结构，难以学习泛化的表征。为填补这一空白，我们提出了MELP——一种新颖的多尺度心电-语言预训练（MELP）模型，充分利用心电-文本对的分层监督。MELP首先预训练一个心脏病学专用语言模型，以增强其对临床文本的理解。然后，它在三个层次（标记、心跳和节律层次）应用跨模态监督，将心电信号与文本报告对齐，从而捕获不同时间尺度下的结构化信息。我们在三个公开心电数据集上，对MELP进行了包括零样本心电分类、线性探测和迁移学习在内的多项任务评估。实验结果表明，MELP优于现有SSL方法，证实了其在多样临床应用中的有效性和适应性。
  one_sentence: 我们提出了MELP，一种多尺度心电-语言预训练模型，它在标记、心跳和节律层次将心电信号与临床文本对齐。
  problem: 现有的心电预训练和多模态心电-语言对齐方法往往未能捕捉心电信号的多尺度特性，限制了它们学习泛化表征的能力。
  contributions:
  - 一种新颖的多尺度心电-语言预训练模型（MELP），通过层级式整合临床文本知识来改进心电表征学习。
  - 一个结构化的预训练框架，在三个临床有意义的层次（标记、心跳和节律）上引入了显式的跨模态监督。
  - 在三个公开心电数据集上进行了全面评估，在零样本分类、线性探测和跨领域迁移学习方面取得了最先进性能。
  method:
  - 使用来自PubMed、Wikipedia和MIMIC-IV-ECG的语料库，通过掩码语言建模预训练一个心脏病学专用语言模型。
  - 通过心电描述任务实现标记级监督，其中Transformer解码器以心电标记嵌入为条件生成配对的心电报告。
  - 通过对比学习实现心跳级监督，对比心跳嵌入与文本报告中对应句子嵌入。
  - 通过全局对比损失实现节律级监督，将完整心电记录表征与全局文本表征对齐。
  experiments:
  - 在三个公开心电数据集上评估：零样本分类、线性探测和跨机构迁移学习。
  - 在所有评估任务上优于现有的自监督和多模态模型。
  - 通过消融实验验证了多尺度监督的有效性。
  limitations:
  - 然而，传统用于心电图分析的深度学习方法严重依赖大规模人工标注，获取这些标注既耗时又耗费资源。
  - 为克服这一局限，自监督学习（SSL）成为一种有前景的替代方案，能够提取稳健的心电图表征，并高效迁移到各类下游任务。
  - 尽管已有研究探索了SSL用于心电图预训练以及多模态心电-语言对齐，但它们往往未能捕捉心电信号的多尺度特性。
  - 为解决这一局限，需要更细粒度的方法，整合标记、心跳和节律层级的表征，这对于捕获对精确诊断至关重要的全面心电特征至关重要。
