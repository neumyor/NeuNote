abstract: 'Recent studies have shown the ability of large lan- guage models to perform
  a variety of tasks, includ- ing time series forecasting. The flexible nature of
  these models allows them to be used for many ap- plications. In this paper, we present
  a novel study of large language models used for the challenging task of time series
  anomaly detection. This prob- lem entails two aspects novel for LLMs: the need for
  the model to identify part of the input sequence (or multiple parts) as anomalous;
  and the need for it to work with time series data rather than the tradi- tional
  text input. We introduce S IGLLM, a frame- work for time series anomaly detection
  using large language models. Our framework i'
one_sentence: 'Recent studies have shown the ability of large lan- guage models to
  perform a variety of tasks, includ- ing time series forecasting. The flexible nature
  of these models allows them to be used for many ap- plications. In this paper, we
  present a novel study of large language models used for the challenging task of
  time series anomaly detection. This prob- lem entails two aspects novel for LLMs:
  the need for the model to identify part of the input sequence (or multiple parts)
  as anomalous; and the need for it to work with time series data rather than the
  tradi- tional text input. We introduce S IGLLM, a frame- work for time series anomaly
  detection using large language models. Our framework i'
problem: Identifying unusual patterns can be a cumbersome and difficult task, especially
  when massive amounts of signal must be analyzed.
contributions:
- In this paper, we present a novel study of large language models used for the challenging
  task of time series anomaly detection.
- We introduce S IGLLM, a frame- work for time series anomaly detection using large
  language models.
- First, we present a prompt-based detection method that directly asks a language
  model to indicate which elements of the input are anomalies.
- In this paper, we present a thorough study of LLMs used for the challenging task
  of anomaly detection from time series data, asking the question Can LLMs become
  anomaly detectors for time series data?
- In this paper, we present S IGLLM, a framework for using LLMs to detect anomalies
  in time series data, with current interaction support for models hosted by OpenAI
  1 and Hug- gingFace 2.
