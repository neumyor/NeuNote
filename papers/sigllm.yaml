translations:
  abstract: 最近的研究显示,大型语言模型有能力完成各种任务,包括时间序列预测. 这些模型的灵活性质允许它们被用于许多应用. 在本文中,我们介绍了对用于时间序列异常探测挑战性任务的大型语言模型的新研究.
    这个问题涉及到LLMS的两个新方面:模型需要将输入序列的一部分(或多个部分)确定为异常部分;以及它需要与时间序列数据而不是传统的文本输入工作. 我们引入SIGLLM,是使用大型语言模型进行时间序列异常探测的框架.
    我们的框架包括一个时间序列到文本转换模块,以及端到端的管道,促使语言模型进行时间序列异常检测. 我们调查了测试大型语言模型执行检测任务能力的两种范式. 首先,我们提出了一种即时的检测方法,它直接要求语言模型表明输入的哪些要素是异常的.
    第二,我们利用大型语言模型的预测能力来指导异常探测过程。 我们评价了我们涉及各种来源的11个数据集和10个管道的框架。 我们显示,在F1分数的所有11个数据集中,预测方法的性能大大超过提示方法。
    此外,虽然大型语言模型能够发现异常现象,但最先进的深层学习模型在性能上仍然优异,比大型语言模型达到30%的成绩.
  one_sentence: 我们提出SIGLLM,是使用大型语言模型进行时间序列异常探测的零镜头框架,并表明基于预测的管道能直接推动,但仍落后于最先进的深度学习模型.
  problem: 确定异常模式可能是一项繁琐而困难的任务,特别是在必须分析大量信号时。
  contributions:
  - 为 LLMS 提出一个新的应用程序 — 在零镜头设定中的时间序列异常检测 — 并将任务正规化 。
  - 向SIGLLM框架介绍一个时间序列到文本转换模块和两个新的管道:PROMPTER(直接提示)和DETESTOR(基于预测).
  - 对使用GPT-3.5涡轮和MISTRAL-7B的11个数据集进行综合评价,显示LLMs的平均F1得分达到0.525分,预测方法比提示提高135%.
  - 发布开源代码和数据集.
  method:
  - 时间序列对文本的转换:缩放(转向非负数),量化(四舍五入为整数),滚动窗口,以及象征性化.
  - 两个异常探测管道:(1)PROMPTER –直接询问LLM哪些元素异常;(2)DETESTOR – 使用LLM的预测残留来识别异常.
  - 两条输油管均以零射法运行,没有增加训练或微调.
  experiments:
  - 评估了11个不同来源的数据集,有10条管道。
  - 将两个LLM(GPT-3.5-turbo,MISTRAL-7B)与10个基线(包括经典、深入学习、变压器和商业方法)相比较。
  - 预测管道(DETESTOR)在所有11个数据集的F1分数中显著超过直接提示(PROMPTER).
  - LLMS在简单的移动平均基线和优于基于变速器的模型上有所改进,但最先进的深层学习模型在平均F1分数上却有30%的改进.
  limitations:
  - 法学硕士与经典/深层次的学习方法之间存在性能差距。
  - 缩小到较小的范围(例如[0,1])可能造成信息在量化中的损失。
  - GPT的表示器倾向于将数字分割成块,与单个数字不直接对应.
  - 当上下文较大时,异常检测变得更加模糊.
