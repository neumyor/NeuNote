abstract: 'Recent studies have shown the ability of large language models to perform
  a variety of tasks, including time series forecasting. The flexible nature of these
  models allows them to be used for many applications. In this paper, we present a
  novel study of large language models used for the challenging task of time series
  anomaly detection. This problem entails two aspects novel for LLMs: the need for
  the model to identify part of the input sequence (or multiple parts) as anomalous;
  and the need for it to work with time series data rather than the traditional text
  input. We introduce SIGLLM, a framework for time series anomaly detection using
  large language models. Our framework includes a time-series-to-text conversion module,
  as well as end-to-end pipelines that prompt language models to perform time series
  anomaly detection. We investigate two paradigms for testing the abilities of large
  language models to perform the detection task. First, we present a prompt-based
  detection method that directly asks a language model to indicate which elements
  of the input are anomalies. Second, we leverage the forecasting capability of a
  large language model to guide the anomaly detection process. We evaluated our framework
  on 11 datasets spanning various sources and 10 pipelines. We show that the forecasting
  method significantly outperformed the prompting method in all 11 datasets with respect
  to the F1 score. Moreover, while large language models are capable of finding anomalies,
  state-of-the-art deep learning models are still superior in performance, achieving
  results 30% better than large language models.'
one_sentence: We propose SIGLLM, a zero-shot framework for time series anomaly detection
  using large language models, and demonstrate that a forecasting-based pipeline outperforms
  direct prompting but still lags behind state-of-the-art deep learning models.
problem: Identifying unusual patterns can be a cumbersome and difficult task, especially
  when massive amounts of signal must be analyzed.
contributions:
- Propose a new application for LLMs – time series anomaly detection in a zero-shot
  setting – and formalize the task.
- 'Present the SIGLLM framework with a time-series-to-text conversion module and two
  novel pipelines: PROMPTER (direct prompting) and DETECTOR (forecasting-based).'
- Provide comprehensive evaluation on 11 datasets using GPT-3.5-turbo and MISTRAL-7B,
  showing that LLMs achieve an average F1 score of 0.525 and the forecasting method
  improves 135% over prompting.
- Release open-source code and datasets.
method:
- 'Time-series-to-text conversion: scaling (shift to non-negative), quantization (rounding
  to integer), rolling windows, and tokenization.'
- 'Two anomaly detection pipelines: (1) PROMPTER – directly ask the LLM which elements
  are anomalous; (2) DETECTOR – use the LLM''s forecast residual to identify anomalies.'
- Both pipelines operate in zero-shot without additional training or fine-tuning.
experiments:
- Evaluated on 11 datasets from diverse sources with 10 pipelines.
- Compared two LLMs (GPT-3.5-turbo, MISTRAL-7B) against 10 baselines including classic,
  deep learning, transformer, and commercial methods.
- Forecasting pipeline (DETECTOR) significantly outperformed direct prompting (PROMPTER)
  in F1 score on all 11 datasets.
- LLMs improve on a simple moving average baseline and outperform transformer-based
  models, but state-of-the-art deep learning models are 30% better in average F1 score.
limitations:
- There is a performance gap between LLMs and classic/deep learning approaches.
- Scaling to a smaller range (e.g., [0,1]) may cause loss of information in quantization.
- GPT's tokenizer tends to segment numbers into chunks that do not correspond directly
  to individual digits.
- Anomaly detection becomes more ambiguous when the context is larger.
