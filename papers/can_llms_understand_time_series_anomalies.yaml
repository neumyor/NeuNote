abstract: 'Large Language Models (LLMs) have gained popularity in time series forecasting,
  but their potential for anomaly detection remains largely unexplored. Our study
  investigates whether LLMs can understand and detect anomalies in time series data,
  focusing on zero-shot and few-shot scenarios. Inspired by conjectures about LLMs’
  behavior from time series forecasting research, we formulate key hypotheses about
  LLMs’ capabilities in time series anomaly detection. We design and conduct principled
  experiments to test each of these hypotheses. Our investigation reveals several
  surprising findings about LLMs for time series: (1) LLMs understand time series
  better as images rather than as text, (2) LLMs do not demonstrate enhanced performance
  when prompted to engage in explicit reasoning about time series analysis. (3) Contrary
  to common beliefs, LLMs’ understanding of time series does not stem from their repetition
  biases or arithmetic abilities. (4) LLMs’ behaviors and performance in time series
  analysis vary significantly across different models. This study provides the first
  comprehensive analysis of contemporary LLM capabilities in time series anomaly detection.
  Our results suggest that while LLMs can understand trivial time series anomalies,
  we have no evidence that they can understand more subtle real-world anomalies. Many
  common conjectures based on their reasoning capabilities do not hold. All synthetic
  dataset generators, final prompts, and evaluation scripts have been made available
  in https://github.com/rose-stl-lab/anomllm.'
one_sentence: This paper investigates whether LLMs can understand time series anomalies
  in zero-shot and few-shot settings, revealing that while LLMs can detect trivial
  anomalies, they show no evidence of understanding more subtle real-world anomalies
  and many common conjectures about their reasoning are not supported.
problem: However, the effectiveness of LLMs in time series analysis remains a subject
  of debate.
contributions:
- First comprehensive investigation of LLMs’ understanding of time series data through
  the lens of anomaly detection.
- Empirical evidence challenging existing conjectures about LLMs' time series understanding.
method:
- Focus on state-of-the-art LLMs and multimodal LLMs (M-LLMs) across different anomaly
  types under controlled conditions.
- Evaluation strategy incorporates multimodal inputs (textual and visual representations
  of time series), various prompting techniques, and structured output formats.
- Results quantitatively assessed using affinity F1 score.
experiments:
- Designed and conducted principled experiments to test key hypotheses about LLMs'
  capabilities in time series anomaly detection.
- Experiments cover zero-shot and few-shot scenarios with synthetic datasets of different
  anomaly types (out-of-range, trend, frequency, point).
- Generated synthetic datasets and evaluation scripts available at https://github.com/rose-stl-lab/anomllm.
limitations:
- LLMs can detect simple anomalies but fail to understand more subtle real-world anomalies.
- LLMs' abilities to understand and reason about numerical time series are considerably
  limited.
- Calls for caution in applying LLMs to time series and for further controlled studies.
