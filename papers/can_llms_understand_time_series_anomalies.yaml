translations:
  abstract: 大语言模型(LLMs)在时间序列预测中获得了人们的欢迎,但其异常探测潜力基本上仍未被探索. 我们的研究调查LLMS是否能够理解和检测时间序列数据中的异常现象,侧重于零镜头和几镜头的情景.
    受时间序列预测研究对LLMs行为的推测的启发,我们对LLMs在时间序列异常检测中的能力提出了关键假设. 我们设计并进行原则性实验来测试这些假设中的每一个.
    我们的调查揭示了有关时间序列的法学硕士的一些令人惊讶的结论:(1) 法学硕士更了解时间序列作为图像而不是文本,(2) 法学硕士在被激励对时间序列分析进行明确推理时没有表现出更高的性能.
    (3) 与共同的信念相反,LLMs对时间序列的理解并不源于其重复偏差或算术能力. (4) LLMS在时间序列分析中的行为和性能在不同模型中差异很大. 本研究对时间序列异常探测中的当代LLM能力进行了首次全面分析.
    我们的结果显示,虽然LLMS能够理解细微的时间序列异常,但我们没有证据表明他们能够理解更微妙的现实世界异常. 许多基于其推理能力的常见猜想并不存在.
  one_sentence: 本文调查了LLMS是否能够在零镜头和少镜头的设置中理解时间序列异常,揭示了虽然LLMS能够检测到微不足道的异常,但是它们并没有显示出理解更微妙的现实世界异常的证据,许多对其推理的共同猜想也没有被支持.
  problem: 然而,有限责任方案在时间序列分析中的有效性仍然是一个辩论议题。
  contributions:
  - 第一次全面调查LLMS通过反常探测镜头对时间序列数据的理解.
  - 经验证据挑战关于LLMs时间序列理解的现有猜想.
  method:
  - 注重在控制条件下跨越不同异常类型的最新LLMs和多式联运LLMs.
  - 评价战略包括多种方式的投入(时间序列的文字和视觉表现)、各种提示技术和结构化的产出格式。
  - 利用亲和F1分数对结果进行定量评估。
  experiments:
  - 设计和进行了原则性实验,以测试关于LLMs在时间序列异常探测能力的关键假设.
  - 实验用不同异常类型(外程,趋势,频率,点)的合成数据集来涵盖零射和几射场景.
  - 在https://github.com/rose-stl-lab/anomllm上可以找到生成的合成数据集和评价脚本.
  limitations:
  - LLMS可以探测到简单的异常,但无法理解更微妙的现实世界异常.
  - 法学硕士了解和解释数字时间序列的能力相当有限。
  - 呼吁在对时间序列应用法学硕士和进一步进行有控制的研究时谨慎行事。
