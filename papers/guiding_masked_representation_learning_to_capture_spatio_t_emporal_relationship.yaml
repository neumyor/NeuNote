translations:
  abstract: 心电图（ECG）广泛应用于监测心脏电信号的诊断工具。近期机器学习研究聚焦于利用心电图信号筛查多种疾病。然而，由于带标签的心电图数据有限，将其应用于疾病筛查颇具挑战。通过自监督学习（SSL）获得通用表征是克服标注数据稀缺的公认方法；然而，若不考虑心电图信号固有的时空关系而简单应用SSL，可能产生次优结果。本文提出ST-MEM（时空掩码心电图建模），通过重建掩码的12导联心电数据学习时空特征。ST-MEM在多种心律失常分类实验设置中优于其他SSL基线方法。此外，我们证明ST-MEM可适配多种导联组合。通过定量和定性分析，我们揭示了心电图数据中的时空关系。代码开源：https://github.com/bakqui/ST-MEM。
  one_sentence: 我们提出ST-MEM，一种自监督生成框架，通过时空分块和带导联共享解码的掩码自编码器捕获12导联心电信号的时空关系。
  problem: 疾病筛查任务中带标签的心电图数据有限，阻碍了监督学习；朴素的自监督学习忽略了心电图的时空结构。
  contributions:
  - 提出ST-MEM，一种简单但有效的面向心电图的生成式自监督学习框架。
  - ST-MEM通过捕获心电图中的时空关系学习通用表征，并通过定量和定性分析加以证明。
  - ST-MEM在心律失常分类中展现出与对比式和生成式SSL基线相当或更优的性能，在微调和线性评估中均表现优异，且能适配多种导联设置。
  method:
  - 时空分块：将每个导联信号划分为不重叠的块（时间分割），并将不同导联的块视为独立标记。
  - 掩码自编码器（MAE）：随机掩码部分块，编码器仅接收未掩码块以学习表征。
  - 导联共享解码器：解码器独立处理每个导联，防止通过其他导联的未掩码块进行平凡重建。
  - 导联指示模块：添加可学习的导联嵌入和[SEP]分隔嵌入，帮助模型区分不同导联。
  - 训练目标：原始与重建掩码块之间的均方误差（L2损失）。
  experiments:
  - 在多类心律失常分类任务中使用微调和线性评估协议进行评估。
  - 与对比式（SimCLR、CLOCS等）和生成式（MAE）SSL基线在基准数据集上进行比较。
  - 在12导联数据预训练后，对有限标注数据具有鲁棒性，并能有效适配减少导联设置（肢体导联、单导联）。
  - 消融研究证实了时空分块、导联解码器和导联嵌入的重要性。
  limitations:
  - 然而，由于带标签的心电图数据有限，将其应用于疾病筛查颇具挑战。
  - 通过自监督学习（SSL）获得通用表征是克服标注数据稀缺的公认方法；然而，若不考虑心电图信号固有的时空关系而简单应用SSL，可能产生次优结果。
  - 然而，由于心脏疾病类型多样且能提供标签的经验丰富的心血管专家有限，针对每种应用（即检测各类心脏疾病）学习心电图表征面临挑战。
  - 这些数据通常由多种增强方法（如裁剪、翻转和平移）定义；然而，尽管是简单增强，心电图信号语义信息可能发生剧烈变化（Lan et al., 2023）。
