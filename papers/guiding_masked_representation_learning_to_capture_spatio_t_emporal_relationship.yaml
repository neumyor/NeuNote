abstract: Electrocardiograms (ECG) are widely employed as a diagnostic tool for monitoring
  electrical signals originating from a heart. Recent machine learning research efforts
  have focused on the application of screening various diseases using ECG signals.
  However, adapting to the application of screening disease is challenging in that
  labeled ECG data are limited. Achieving general representation through self-supervised
  learning (SSL) is a well-known approach to overcome the scarcity of labeled data;
  however, a naive application of SSL to ECG data, without considering the spatial-temporal
  relationships inherent in ECG signals, may yield suboptimal results. In this paper,
  we introduce ST-MEM (Spatio-Temporal Masked Electrocardiogram Modeling), designed
  to learn spatio-temporal features by reconstructing masked 12-lead ECG data. ST-MEM
  outperforms other SSL baseline methods in various experimental settings for arrhythmia
  classification tasks. Moreover, we demonstrate that ST-MEM is adaptable to various
  lead combinations. Through quantitative and qualitative analysis, we show a spatio-temporal
  relationship within ECG data. Our code is available at https://github.com/bakqui/ST-MEM.
one_sentence: We propose ST-MEM, a self-supervised generative framework that uses
  spatio-temporal patchifying and a masked autoencoder with lead-wise shared decoding
  to capture spatio-temporal relationships in 12-lead ECG signals.
problem: Limited labeled ECG data for disease screening tasks hinders supervised learning;
  naive self-supervised learning ignores spatial-temporal structure of ECG.
contributions:
- Proposes ST-MEM, a simple but effective ECG-specific generative self-supervised
  learning framework.
- ST-MEM learns general representations by capturing spatio-temporal relationships
  in ECG, shown via quantitative and qualitative analysis.
- ST-MEM demonstrates comparable or superior performance to contrastive and generative
  SSL baselines on arrhythmia classification, excelling in fine-tuning and linear
  evaluation across various lead settings.
method:
- 'Spatio-temporal patchifying: divides each lead signal into non-overlapping patches
  (temporal splitting) and treats patches from different leads as separate tokens.'
- Masked autoencoder (MAE) with random masking of patches; the encoder only receives
  unmasked patches to learn representations.
- 'Lead-wise shared decoder: decoder processes each lead independently to prevent
  trivial reconstruction from unmasked patches of other leads.'
- 'Lead indicating modules: learnable lead embeddings and [SEP] separation embeddings
  are added to help the model distinguish between leads.'
- 'Training objective: mean squared error (L2) between original and reconstructed
  masked patches.'
experiments:
- Evaluated on multi-class arrhythmia classification using fine-tuning and linear
  evaluation protocols.
- Compared against contrastive (SimCLR, CLOCS, etc.) and generative (MAE) SSL baselines
  on benchmark datasets.
- Demonstrates robustness to limited labeled data and effective adaptation to reduced
  lead settings (limb leads, single lead) after pre-training on 12-lead data.
- Ablation studies confirm the importance of spatio-temporal patchifying, lead-wise
  decoder, and lead embeddings.
limitations:
- However, adapting to the application of screening disease is challenging in that
  labeled ECG data are limited.
- Achieving general repre- sentation through self-supervised learning (SSL) is a well-known
  approach to overcome the scarcity of labeled data; however, a naive application
  of SSL to ECG data, without considering the spatial-temporal relationships inherent
  in ECG signals, may yield suboptimal results.
- However, since the types of heart disease are diverse and the experienced cardiologists
  who can provide labels are limited, learning the ECG representation for each application
  (i.e., detecting various heart diseases) is challenging.
- These data are usually defined by numerous augmentation methods (e.g., cropping,
  flipping, and shifting); however, despite a simple augmentation, the information
  on the semantic meaning of ECG signals can change drastically (Lan et al., 2023).
