translations:
  abstract: 今天的代理技能是手工制作的,产生一发子弹,或者通过松散的自译自审来演化,其中没有任何一种表现得像技能的深层学习优化器,没有任何一种在反馈下可以可靠地改进它的起点.
    我们主张技能应该作为冷冻剂的外部状态来训练,具有同样的学科,使得重量空间优化可以再生产. 据我们所知,SkillOpt是代理技能的首个系统可控文本空间优化器:一个单独的优化器模型将打分的推出转换成在单一技能文档上绑定的添加/删除/替换编辑,只有在严格改进被搁置的验证分数时才接受编辑.
    文字学习率预算,拒绝编辑缓冲,以及划时代的慢/元更新使技能培训稳定,同时在部署时添加零推算时间模型调用. 在6个基准、7个目标模型和3个执行工具(直接聊天、Codex、Claude
    Code)中,SkillOpt是最佳的,或与所有52个被评价的细胞(模型、基准、带)捆绑在一起,并击败了人类中每个细胞的每个竞争者、一弹一弹的LLM、Trace2Skill、TextGrad、GEPA和EvoSkill技能。
    在GPT-5.5上,它通过直接聊天的+23.5分,Codex代理循环的+24.8分和Claude代码的+19.1分提高平均无技能精度. 转移实验进一步表明,优化的技能文物在跨模型尺度移动时,在Codex和Claude代码执行环境之间,以及在没有进一步优化的情况下,保留到附近的数学基准上的价值.
  one_sentence: SkillOpt通过捆绑编辑、验证标注和学习率预算,为培训代理技能引入了可控文本空间优化方法,在所有52个经过评价的组合上实现跨越基准、模型和利用的最佳结果。
  problem: 代理技能目前是手工制作的,生成一弹一弹,或通过松散控制的自译自审而演化,这些自译自审都不像一个深入学习的优化器,在反馈的起始点上没有任何可靠改进.
  contributions:
  - 将代理技能学习作为外部自然语言状态的优化,并引入了SkillOpt,即具有推出批量的可知性优化器,反射微型枪管,边框编辑器,文字学习速率,时间表,持有接受,拒绝编辑缓冲器,以及时空慢/元更新.
  - 提供对6个基准、7个目标模型和3个执行工具的广泛经验研究,显示在52个评估的细胞中,SkillOpt在52个细胞上是最佳的或最有条件的,并且超过了所有基线(人、一发LM、Trace2Skill、TextGrad、GEPA、EvoSkill)。
  - 通过组件调剂和三种转移形式(跨型,跨机身,跨基准)验证优化设计,证明出口的技艺文物是紧凑的,可重复使用,且可不更新型号重量.
  method:
  - 将技能优化视为文本空间优化,并使用一个单独的边框优化器模型提出的边框添加/删除/替换编辑。
  - 使用轨迹批次作为证据,小批量反射来提议编辑,以及一个被搁置的验证门,只接受严格改进的更新.
  - 采用文字学习率预算,拒绝编辑缓冲,以及划时代的慢/元更新,以保持稳定和长期改进。
  - 输出一个压缩( 300–2,000 令牌) best skill.md 文件而不改变目标模型的权重 。
  experiments:
  - SkillOpt在所有52个(模型、基准、牵引)细胞上都是最佳或最搭配的,跨越6个基准、7个目标模型和3个执行装置,超过了每个细胞的所有基线。
  - 在GPT-5.5上,SkillOpt通过直接聊天+23.5分,Codex牵引+24.8分,Claude Code牵引+19.1分,提升平均无技能精度.
  - 转移实验显示,优化的技能文物在模型尺度、Codex和Claude代码环境之间以及附近的数学基准之间保留价值,而无需进一步优化。
  - 校正边框的文本学习,挂起的标注,拒绝步骤缓冲,以及划时代的慢/元更新每个都有助于性能.
  limitations:
  - '代理技能为这种程序调整[7,8]提供了自然界面: 技能是一种可移植的自然语言文物,可以包装程序,域热力学,工具政策,输出限制,以及故障模式,让被冻结的代理通过外部文本进行适应.'
  - 最近的系统将执行经验转换为可重复使用的文字文物——通过故障分析消磨轨迹教训,改进技能文件夹,建立特定域的技能库,或优化轨道反馈的提示[9-13]——但留下一个更基本的问题:如果技能是适应层面,如何优化?
  - 鉴于目标域,初始技能,以及正在改编的模型,SkillOptrepedly样本轨迹批次,分析成功与失败,并要求前沿优化模型提出结构化的添加/删除/替换编辑.
  - 在有界限的,验证的更新下,每一次修订仍然足够接近后来最优化的调用能够从什么帮助,什么失败,什么应该保存中学习到的最后一个.
