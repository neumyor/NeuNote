translations:
  abstract: '寿命较长的AI剂被越来越多地作为持久的操作系统部署,然而它们仍然像新初始化模型一样被评价. 第一天的基准错过了一个基本的系统问题:部署后,一个代理人多久才能保持可靠?
    即使在模型重量被冻结时,代理的有效状态也会随着压缩相互作用历史,从不断增长的记忆库中取回,更新后修改事实,进行例行维护而不断改变. 因此,可靠性成为全毒剂的寿命财产,而不仅仅是底模的快照财产。
    我们引入了Aging Bench, 代理寿命工程的纵向可靠性基准: 不仅衡量部署的代理机体是否降解, 而且还衡量降解的形成方式以及修复的目标。 Aging
    Bench组织代理人老化为四种机制: 压缩衰老,写时总和减少未来相关细节; 干扰衰老,累积的类似记忆挤出目标事实; 修订衰老,改变或衍生状态不正确更新; 维持衰老,冲洗或复比触发回归等生命周期事件.
    为了诊断这些故障,Aging Bench使用时间依赖图和对齐的反事实探测器,为内存管道的写作,检索和利用阶段提供诊断剖面. 纵观7种情景,14种模型,多种内存政策,以及跑者控制的和自主的物剂,超过400个运行跨越8–200个会话,表明物剂老化不是一维的:行为测试可以保持干净,而事实精度衰减;衍生状态跟踪可以在单一模型中急剧崩溃;而同样的错误答案可以要求不同的修复,取决于诊断剖面特征指向什么。
    这些结果表明,可靠的物剂部署需要寿命评估、机制一级的诊断和针对阶段的修复,而不仅仅是更强大的一日模型。'
  one_sentence: Aging Bench是物剂寿命工程的纵向基准,它通过四个老化机制测量所部署的人工智能物剂如何随时间而降解,并提供有针对性修复的诊断剖面.
  problem: 长寿命的AI代理被评价为像新初始化的模型一样,但由于内存状态的变化,累积的相互作用历史,以及生命周期事件,其可靠性随时间推移而下降;目前的基准不能捕捉这种时间依赖的可靠性.
  contributions:
  - 一种寿命期工程设计方法,即长寿命剂可靠性,将部署的剂作为时间演变系统,其可靠性取决于运行寿命。
  - 物剂老化的四机制分类法:压缩,干扰,修正,以及维持老化,每个方法都有特定机制的度量.
  - Aging Bench,一个纵向基准套件,具有方案生成、时间依赖性结构,以及代理寿命工程的可控制老化压力。
  - 反事实诊断剖面,该剖面指出内存管道在写、检索、利用或生命周期处理方面的故障。
  - 经验发现显示,剂老化是多维的,隐藏在行为测试中,并且跨模型和架构的舞台依赖.
  method:
  - 组织代理人老化为四个机制:压缩,干扰,修正,和维护.
  - 使用时间依赖DAG编码跨会话结构,并计算机制特定衰老曲线.
  - 程序生成器,用于控制、种子复制、会议次数、依赖密度、更新率、链深和干扰密度。
  - Paired反事实探测器用甲骨文取代检索,同时用黄金上下文取代write+retrival,以便在写作、检索和利用阶段生成诊断剖面。
  experiments:
  - 评估了7种情况、14种模式、多种内存政策以及跑步控制和自主代理。
  - 超过400人,
  - 发现行为守法可以保持干净,而事实精度衰减.
  - 衍生状态跟踪可以在单一模型内急剧崩溃.
  - 同样的错误答案可能需要根据诊断剖面的不同进行不同的修复.
  - 例行维护事件可能引发事件后的突然回归.
  limitations:
  - 程序生成器并不是用来模拟真实用户行为的全部分布;它们提供了一个可控的压力表面.
  - 诊断剖面是面向修复的标志,而不是每个建筑的独特因果分解.
