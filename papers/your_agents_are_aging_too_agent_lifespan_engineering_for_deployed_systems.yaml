abstract: 'Long-lived AI agents are increasingly deployed as persistent operational
  systems, yet they are still evaluated like freshly initialized models. Day-one benchmarks
  miss a basic systems question: how long does an agent remain reliable after deployment?
  Even when model weights are frozen, an agent''s effective state keeps changing as
  it compresses interaction history, retrieves from a growing memory store, revises
  facts after updates, and undergoes routine maintenance. Reliability therefore becomes
  a lifespan property of the full agent harness, not only a snapshot property of the
  base model. We introduce AgingBench, a longitudinal reliability benchmark for agent
  lifespan engineering: measuring not only whether deployed agents degrade, but what
  form the degradation takes and where repair should target. AgingBench organizes
  agent aging into four mechanisms: compression aging, where write-time summarization
  drops future-relevant details; interference aging, where accumulated similar memories
  crowd out the target fact; revision aging, where changed or derived state is not
  updated correctly; and maintenance aging, where lifecycle events such as flushing
  or recompaction trigger regressions. To diagnose these failures, AgingBench uses
  temporal dependency graphs and paired counterfactual probes that produce diagnostic
  profiles for the write, retrieval, and utilization stages of the memory pipeline.
  Across 7 scenarios, 14 models, multiple memory policies, and both runner-controlled
  and autonomous agents, over ~400 runs spanning 8–200 sessions show that agent aging
  is not one-dimensional: behavioral tests can remain clean while factual precision
  decays; derived-state tracking can collapse sharply within a single model; and the
  same wrong answer can require different repairs depending on what the diagnostic
  profile points to. These results suggest that reliable agent deployment requires
  lifespan evaluation, mechanism-level diagnosis, and stage-targeted repair, not only
  stronger day-one models.'
one_sentence: AgingBench is a longitudinal benchmark for agent lifespan engineering
  that measures how deployed AI agents degrade over time through four aging mechanisms
  and provides diagnostic profiles for targeted repair.
problem: Long-lived AI agents are evaluated like freshly initialized models, but their
  reliability degrades over time due to changing memory state, accumulated interaction
  history, and lifecycle events; current benchmarks do not capture this time-dependent
  reliability.
contributions:
- A lifespan-engineering formulation of long-lived agent reliability, framing deployed
  agents as time-evolving systems whose reliability depends on operational lifetime.
- 'A four-mechanism taxonomy of agent aging: compression, interference, revision,
  and maintenance aging, each with mechanism-specific metrics.'
- AgingBench, a longitudinal benchmark suite with programmatic generation, temporal
  dependency structure, and controllable aging pressure for agent lifespan engineering.
- Counterfactual diagnostic profiles that pinpoint failures in the memory pipeline
  to write, retrieval, utilization, or lifecycle handling.
- Empirical findings showing that agent aging is multi-dimensional, hidden from behavioral
  tests, and stage-dependent across models and architectures.
method:
- 'Organizes agent aging into four mechanisms: compression, interference, revision,
  and maintenance.'
- Uses a temporal dependency DAG to encode cross-session structure and compute mechanism-specific
  aging curves.
- Programmatic generators for controlled, seed-reproducible sweeps over session count,
  dependency density, update rate, chain depth, and interference density.
- Paired counterfactual probes replace retrieval with an oracle and both write+retrieval
  with gold context to produce diagnostic profiles over write, retrieval, and utilization
  stages.
experiments:
- Evaluated over 7 scenarios, 14 models, multiple memory policies, and both runner-controlled
  and autonomous agents.
- Over ~400 runs spanning 8–200 sessions.
- Found that behavioral compliance can remain clean while factual precision decays.
- Derived-state tracking can collapse sharply within a single model.
- The same wrong answer can require different repairs depending on diagnostic profile.
- Routine maintenance events can trigger abrupt post-event regressions.
limitations:
- Programmatic generators are not meant to model the full distribution of real user
  behavior; they provide a controlled pressure surface.
- Diagnostic profiles serve as repair-oriented indications, not unique causal decompositions
  for every architecture.
