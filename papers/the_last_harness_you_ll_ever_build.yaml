abstract: 'AI agents are increasingly deployed on complex, domain-specific workflows—navigating
  enterprise web applications that require dozens of clicks and form fills, orchestrating
  multi-step research pipelines that span search, extraction, and synthesis, automating
  code review across unfamiliar repositories, and handling customer escalations that
  demand nuanced domain knowledge. Each new task domain requires painstaking, expert-driven
  harness engineering: designing the prompts, tools, orchestration logic, and evaluation
  criteria that make a foundation model effective. We present a two-level framework
  that automates this process. At the first level, the Harness Evolution Loop optimizes
  a worker agent''s harness H for a single task: a Worker Agent W_H executes the task,
  an Evaluator Agent V adversarially diagnoses failures and scores performance, and
  an Evolution Agent E modifies the harness based on the full history of prior attempts.
  At the second level, the Meta-Evolution Loop optimizes the evolution blueprint Λ
  = (W_H, H^(0), V, E) itself across diverse tasks, learning a blueprint Λ^(best)
  that enables rapid harness convergence on any new task—so that adapting an agent
  to a novel domain requires no human harness engineering at all. We formalize the
  correspondence to meta-learning and present both algorithms. The framework shifts
  manual harness engineering into automated harness engineering, and takes one step
  further—automating the design of the automation itself.'
one_sentence: We present a two-level framework that automates the design of agent
  harnesses through a Harness Evolution Loop and a Meta-Evolution Loop, eliminating
  the need for manual harness engineering.
problem: However, these harnesses are themselves products of highly intensive, specialized
  human engineering.
contributions:
- Formalizes harness evolution as a meta-learning problem, establishing a clear correspondence
  between harness optimization and meta-learning.
- 'Proposes a two-level framework: an inner Harness Evolution Loop that optimizes
  a worker agent''s harness via iterative execution, evaluation, and evolution, and
  an outer Meta-Evolution Loop that optimizes the evolution blueprint across diverse
  tasks.'
- Demonstrates that the evolution blueprint itself can be automatically learned from
  multiple tasks, enabling rapid harness adaptation to new domains without human engineering.
method:
- Defines an agent harness as all code, configuration, and execution logic not part
  of the model itself.
- 'Inner Harness Evolution Loop: Worker Agent executes task, Evaluator Agent adversarially
  diagnoses failures and scores performance, Evolution Agent modifies harness based
  on full history.'
- 'Outer Meta-Evolution Loop: runs the inner loop across diverse meta-train tasks,
  aggregates scores, and updates the evolution blueprint (evaluator/evolution agent
  prompts, scoring function, loop hyperparameters).'
- Framework automates both harness optimization for a single task and the design of
  the optimization process itself across tasks.
experiments:
