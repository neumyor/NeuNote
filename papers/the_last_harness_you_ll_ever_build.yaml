translations:
  abstract: AI代理越来越多地部署在复杂、特定域的工作流程上——导航企业网络应用,这些应用需要数十次点击和填充,组织跨搜索、提取和合成的多步骤研究管道,将编码审查自动化到不熟悉的储存库,处理需要细微域知识的客户升级。
    每个新任务领域都需要艰苦、专家驱动的牵引工程:设计使基础模型行之有效的提示、工具、管弦逻辑和评价标准。 我们提出了一个使这一进程自动化的两级框架。 在一级,Harness
    Evolution Loop优化了工人代理的拉带H用于单项任务:一个工人代理W H执行任务,一个评价员代理V对抗性地诊断失败和分数性能,一个Evolution代理E根据之前尝试的全部历史修改拉带.
    在第二个层面,Meta-Evolution Loop优化了进化蓝图 = (W H, H^(0), V, E)本身,跨越了各种任务,学习了蓝图 QQ(最佳),使得能够快速利用任何新任务上的趋同——因此,使一个代理人适应一个新领域,根本不需要人力利用工程。
    我们把函授正式化 用于元学习 并提出两种算法 框架将人工利用工程转向自动化利用工程,并更进一步——自动化本身的设计自动化。
  one_sentence: 我们提出一个双层框架,通过Harness Evolution Loop和Meta-Evolution Loop, 自动实现对特工的利用设计,从而消除了手动利用工程的需要。
  problem: 然而,这些带子本身就是高度密集,专业化的人类工程产品.
  contributions:
  - 正规化利用进化作为一个元学习问题,建立利用优化与元学习之间的明确对应关系.
  - 提出一个双层框架:一个通过迭代执行、评价和演化优化工人代理人利用的内在Harness Evolution循环和一个通过不同任务优化演化蓝图的外在Meta-Evolution循环。
  - 证明进化蓝图本身可以自动从多种任务中学习,使得快速的驾驭适应没有人类工程的新领域.
  method:
  - 定义代理套接字为所有代码、配置和执行逻辑,而不是模型本身的一部分。
  - 内涵 进化循环:工人代理执行任务,评价代理对抗性地诊断失败和分数表现,进化代理根据完整历史修改调用.
  - 外部Meta-Evolution Loop:运行不同元火车任务的内环,汇总分数,并更新进化蓝图(评价员/Evolution代理提示,评分函数,循环超参数).
  - 框架既能为单一任务利用优化,又能设计跨越任务的优化过程。
  experiments:
  - 导言 最近关于 " 缺损工程 " 的研究表明,精心设计的脚手架----执行环境、反馈循环、评价标准和上下文管理----坎德拉----适度扩展了制剂的成就(Lopopolo,
    2026;Rajasekaran, 2026)。
  - Lopopolo (2026) 描述建筑定制的 linters, 寄存器- 局部可观察堆栈(logs, riguments, tracks), Chrome
    DevTools 集成, 以及结构化的文档分级—— 所有手工制作使代码库可以被代理识别.
  - 每个内环实例都通过迭代执行周期(工人),评价周期(评价员)和代码修改周期(Evolution Agent),优化工人对单项任务的利用H.
  - 2 声波 我们首先正式定义了“代理人”的概念,然后描述了系统的各个组成部分——任务定义、任务执行、评价和演化,以及如何在“工具”演化循环中加以安排。
  - 4. 计算:计算一个两级的度量第一绕行/故障(任务是否成功完成),然后通过执行时间作为断节符。
  limitations:
  - 首先,和谐进化(Harness Evolution Loopopotimation)将工人代理人的har-nessH用于一项单一的任务:一名工人代理人WH执行这项任务,一名评估员V对失败和成绩进行对抗性诊断,一名Evo-lution
    AgentE根据先前尝试的全部历史来修改利用。
  - 然而,这些HAR -ness本身是高度密集,专业的人类工程的产品.
  - 评价员 AgentV 对抗性地验证任务结果,诊断失败模式,评分表现.
  - AnEvolution AgentE 分析整个演化历史,并修改了利用方式——导引,工具,管弦逻辑,观察,和模型配置——以解决di-不可知的失败模式.
