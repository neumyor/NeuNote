translations:
  abstract: 时间序列异常检测(TSAD)在许多领域,如金融,交通,医疗等领域都发挥着重要作用. 随着现实的不断仪器化,将有更多时间序列数据可供使用,这也导致对TSAD的需求不断增加.
    虽然已经存在许多技术、技术和创新发展方法,但新的和更好的方法仍然是可取的。 然而,能否取得有效进展,取决于是否有可靠手段来评价新方法,并与现有方法进行比较。
    我们处理与数据集和实验设置及协议有关的现行评价程序中的缺陷。 具体来说,我们提出一个新的时间序列异常探测基准,称为TAB. 首先,TAB包含来自不同领域的29个公共多变量数据集和1
    635个单变量时间序列,以便于对各种数据集进行更全面的评价。 其次,TAB涵盖多种TSAD方法,包括非学习,机器学习,深层学习,基于LLM,以及时间序列预训方法.
    第三,技术咨询委员会有一个统一和自动化的评价程序,能够公平和方便地评价技术服务评估方法。 最后,我们利用技术咨询委员会来评估现有的技术、技术和创新评估方法并报告结果,从而更深入地了解这些方法的绩效。
  one_sentence: 我们建议采用一个统一和可扩展的基准TAB,用于评价不同数据集、方法和评价战略中的时间序列异常检测方法。
  problem: 时间序列异常探测的有效进展取决于是否有可靠手段来评价新方法,并将其与现有方法进行比较,但目前的评价程序在数据集、实验设置和协议方面存在缺陷。
  contributions:
  - 我们提出一个统一和可扩展的技术、技术和创新数据库评价基准,该基准简化了评价,能够与所有公开提供的数据集和代码进行公平比较。
  - 我们调查了最近的TSAD研究,选择了29个多变量数据集和1 635个跨越不同域的单变量时间序列,以统一格式存储。
  - 我们涵盖最先进的TSAD方法,包括非学习、机器学习、深层学习、基于LLM的LLM和时间序列的预先训练方法。
  - 我们使用TAB对29个数据集的40个多变量TSAD方法和1 635个时间序列的46个单变量方法进行评估,涵盖不同的评价战略和衡量标准。
  method:
  - 提出一个统一和可扩展的基准 -- -- TAB,对TSAD方法进行标准化评价。
  - 从不同领域收集29个多变量数据集和1 635个单变量时间序列。
  - 涵盖TSAD方法的五类:非学习,机器学习,深层学习,基于LLM,以及时间序列预训.
  - 整合零射,少射,全射的评价策略,既用于单射和多变任务.
  - 采用基于标签和记分的衡量标准进行全面评估。
  - 为社区持续贡献提供在线领导板。
  experiments:
  - 在29个多变量数据集上评价了40个多变量TSAD方法,在1,635个单变量时间序列上评价了46个单变量TSAD方法.
  - 关键观察:(1)非学习和机器学习方法在UTSAD上表现最好;(2)深层学习和机器学习在MTSAD上表现优异;(3)全球点异常最容易,混合异常最难;(4)深层学习和基础方法适合点异常,非学习/机器学习服子序列异常;(5)基于密度的方法确定趋势异常,基于远程方法的形状异常;(6)基础方法由于性能相对较差,需要进一步开发.
  limitations:
  - 然而,能否取得有效进展,取决于能否利用可靠的手段来评价新方法,并将其与现有方法进行比较。
  - 例如,金融公司旨在及时识别异常交易,以防止金融欺诈,制造公司急于预测设备即将发生故障,以便在故障前被替换.
  - 第二,最近的研究很少采用一致的实验心理环境和评价协议,因此未能为现实世界的应用提供雷力能的结果。
  - 然而,即使是随机方法也很有可能在较大的异常窗口中至少预测一个点,其效果是它们可以很容易地达到复杂方法的性能,或者甚至超过它们[47].
