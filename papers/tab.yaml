abstract: Time series anomaly detection (TSAD) plays an important role in many domains
  such as finance, transportation, and healthcare. With the ongoing instrumentation
  of reality, more time series data will be available, leading also to growing demands
  for TSAD. While many TSAD methods already exist, new and better methods are still
  desirable. However, effective progress hinges on the availability of reliable means
  of evaluating new methods and comparing them with existing methods. We address deficiencies
  in current evaluation procedures related to datasets and experimental settings and
  protocols. Specifically, we propose a new time series anomaly detection benchmark,
  called TAB. First, TAB encompasses 29 public multivariate datasets and 1,635 univariate
  time series from different domains to facilitate more comprehensive evaluations
  on diverse datasets. Second, TAB covers a variety of TSAD methods, including Non-learning,
  Machine learning, Deep learning, LLM-based, and Time-series pre-trained methods.
  Third, TAB features a unified and automated evaluation pipeline that enables fair
  and easy evaluation of TSAD methods. Finally, we employ TAB to evaluate existing
  TSAD methods and report on the outcomes, thereby offering a deeper insight into
  the performance of these methods.
one_sentence: We propose TAB, a unified and extensible benchmark for evaluating time
  series anomaly detection methods across diverse datasets, methods, and evaluation
  strategies.
problem: Effective progress in time series anomaly detection hinges on the availability
  of reliable means of evaluating new methods and comparing them with existing methods,
  but current evaluation procedures suffer from deficiencies in datasets, experimental
  settings, and protocols.
contributions:
- We present TAB, a unified and extensible TSAD evaluation benchmark that streamlines
  evaluation and enables fair comparison, with all datasets and code publicly available.
- We survey recent TSAD studies and select 29 multivariate datasets and 1,635 univariate
  time series spanning various domains, stored in a unified format.
- We cover state-of-the-art TSAD methods including non-learning, machine learning,
  deep learning, LLM-based, and time-series pre-trained methods.
- We use TAB to assess 40 multivariate TSAD methods on 29 datasets and 46 univariate
  methods on 1,635 time series, covering diverse evaluation strategies and metrics.
method:
- Proposes TAB, a unified and extensible benchmark with a standardized evaluation
  pipeline for TSAD methods.
- Collects 29 multivariate datasets and 1,635 univariate time series from diverse
  domains.
- 'Covers five categories of TSAD methods: non-learning, machine learning, deep learning,
  LLM-based, and time-series pre-trained.'
- Integrates zero-shot, few-shot, and full-shot evaluation strategies for both univariate
  and multivariate tasks.
- Employs label-based and score-based metrics for comprehensive assessment.
- Provides an online leaderboard for continuous community contributions.
experiments:
- Evaluated 40 multivariate TSAD methods on 29 multivariate datasets and 46 univariate
  TSAD methods on 1,635 univariate time series.
- 'Key observations: (1) Non-learning and machine learning methods perform best on
  UTSAD; (2) Deep learning and machine learning excel on MTSAD; (3) Global point anomalies
  are easiest, mixed anomalies hardest; (4) Deep learning and foundation methods suit
  point anomalies, non-learning/machine learning suit subsequence anomalies; (5) Density-based
  methods identify trend anomalies, distance-based methods shapelet anomalies; (6)
  Foundation methods need further development as their performance is relatively poor.'
limitations:
- However, effective progress hinges on the availabil- ity of reliable means of evaluating
  new methods and comparing them with existing methods.
- For example, financial firms aim to identify unusual transactions in time to prevent
  financial fraud, and manufacturing companies are eager to predict the impending
  malfunction of devices so that they can be replaced before they fail.
- Second, few of the most recent studies adopt consistent experi- mental settings
  and evaluation protocols, thus failing to offer reli- able results to real-world
  applications .
- However, even random methods have a good chance to predict at least one point in
  larger anomaly windows, the effect being that they can easily reach the performance
  of complex methods or even outperform them [47].
