experiments:
- We address deficiencies in current evaluation procedures related to datasets and
  experimental settings and protocols.
- Specifically, we propose a new time series anomaly detection benchmark, called TAB.
- First, TAB encompasses 29 public multivariate datasets and 1,635 univariate time
  series from different domains to facilitate more comprehensive evaluations on diverse
  datasets.
- Third, TAB features a unified and automated evaluation pipeline that enables fair
  and easy evaluation of TSAD methods.
