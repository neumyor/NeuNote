  ## Core Idea


  Time series anomaly detection (TSAD) plays an important role in many domains such
  as finance, transportation, and healthcare. With the ongoing instrumentation of
  reality, more time series data will be available, leading also to growing demands
  for TSAD. While many TSAD methods already exist, new and better methods are still
  desirable. However, effective progress hinges on the availabil- ity of reliable
  means of evaluating new methods and comparing them with existing methods. We address
  deficiencies in current evaluation procedures related to datasets and experimental
  settings and protocols. Specifically, we propose a new time series anomaly detection
  benchmark, called TAB. First, TAB encomp


  ## Method Notes


  - Specifically, we propose a new time series anomaly detection benchmark, called
  TAB.

  - TAB: Unified Benchmarking of Time Series Anomaly Detection Methods.

  - To address the three challenges covered above, we propose a Time series Anomaly
  detection Benchmark (TAB).

  - (5) Diversified evaluation metrics: TAB covers Label-based and Score-based metrics
  to ensure a comprehensive assessment of model performance.

  - In summary, we make the following main contributions: • We present TAB, a unified
  and extensible TSAD evaluation benchmark.

  - github.io/OpenTS/Benchmarks/overview/ that covers time se- ries pre-trained and
  LLM-based methods.


  ## Evidence To Verify


  - Exact contributions, datasets, metrics, and baselines.

  - Quantitative results and claims from figures or tables.


  ## Limitations


  - However, effective progress hinges on the availabil- ity of reliable means of
  evaluating new methods and comparing them with existing methods.

  - For example, financial firms aim to identify unusual transactions in time to prevent
  financial fraud, and manufacturing companies are eager to predict the impending
  malfunction of devices so that they can be replaced before they fail.

  - Second, few of the most recent studies adopt consistent experi- mental settings
  and evaluation protocols, thus failing to offer reli- able results to real-world
  applications .

  - However, even random methods have a good chance to predict at least one point
  in larger anomaly windows, the effect being that they can easily reach the performance
  of complex methods or even outperform them [47].


