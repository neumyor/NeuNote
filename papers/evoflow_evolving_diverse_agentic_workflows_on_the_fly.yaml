translations:
  abstract: 在过去两年中,大型基于语言模型(LLM)的多代理系统从劳动密集型的人工设计演变为部分自动化(如即时工程,通信地形学),并最终发展为完全自动化的设计.
    然而,现有的代理自动化管道往往缺乏LLM异质性,并注重单目标性能优化,限制了它们结合较弱的模型以更定制和成本效益更高的解决方案的潜力. 为了应对这一挑战,我们提出EvoFlow,一个以消化演化算法为基础的框架,以自动搜索具有不同和复杂适应的代理工作流程的人群,而不是单一的,单一的,复杂的工作流程.
    从技术上讲,EvoFlow执行(1)基于标记的检索,从代理人群中提取母工作流程,通过(2)交叉和(3)突变来演化新的工作流程,并使用(4)基于硝化的选择来保持人口的多样性和质量.
    对七个基准的广泛评价表明,EvoFlow是:(一) 多样化的、演变成一系列工作流程,从简单的I/O任务到复杂的多回合互动;(二) 高性能、业绩优于以前的手工和自动化工作流程,比29.86%高1.23%;(三)
    经济性强,使用较弱的开源模型,超过其推论成本的12.4%。
  one_sentence: EvoFlow是一个以硝化演化算法为基础的框架,它会自动地演化出具有多样和复杂适应的代理工作流程的多样化人群,以多目标地优化成本和性能.
  problem: 现有的代理自动化管道往往缺乏LLM异质性,并注重单目标性能优化,限制了它们结合较弱的模型以更定制和成本效益更高的解决方案的潜力.
  contributions:
  - 范式转换:公式化代理工作流程自动化作为成本性能多目标优化问题,突出LLM异质性和复杂性多样性.
  - 实用解决方案:提议EvoFlow,一个以消化演化算法为基础的框架,它自主地演化出一个具有多样性和复杂性-多样性的代理工作流程的人群,而人类干预很少。
  - 经验评价:证明EvoFlow是多种多样的(工作流程从简单的I/O到复杂的多变),高性能(超出基线1.23++29.86%),以及经济性(通过较弱的开源模型进行12.4%的推断成本审查)。
  method:
  - 框架代理工作流程自动化作为一个多目标优化问题,平衡成本和性能.
  - 定义带有引用节点(LLM,即时,温度)和操作员节点(复合工作流程)的层次搜索空间.
  - 通过选择和合并操作员节点,初始化工作流程群.
  - 通过基于标签的检索母工作流程,交叉生成子孙,突变(LLM,即时,运算器突变),以及基于硝基的选择来保持多样性和质量,演化工作流程.
  - 在推论期间,自主地从人群中检索出与域名相关的,经过复杂调整的工作流程.
  experiments:
  - 就多样性、性能和成本的七项基准(MMLU、MATH等)进行了评估。
  - 在不同的环境下,EvoFlow使用较弱的开源模型(LLaMa-3.1-70b,QWen-2.5-72b)以12.4%的推论成本超过o1-preview.
  - 在同质环境下,业绩比最新工作流程高出1.23%至29.86%。
  - EvoFlow的培训费用为AFlow的三分之一(0.45美元对1.23美元),推论费用为五分之一(0.51美元对2.62美元),而MATH的AF费用则比5.91%高。
  limitations:
  - 然而,现有的代理自动机-电离管往往缺乏LLM异质性,并侧重于单目标性能的Optimiza-电离,限制了它们结合较弱的模型以更定制和成本效益更高的解决方案的潜力.
  - 为了应对这一挑战,我们提出EvoFlow, 一个以消化演化算法为基础的框架, 来自动搜索一个具有不同和复杂适应性动因-电极工作流程的人群, 而不是一个单一的,复杂的工作流程。
  - 然而,现实世界的用户查询困难很大,例如MMLU基准(Hendrycks等人,2021年a)将任务从初级到研究生级别。
  - 因此,我们主张优化各种工作流程,使简单的工作流程适合直接的任务,并为更复杂的挑战保留复杂的工作流程。
