abstract: 'The past two years have witnessed the evolution of large language model
  (LLM)-based multi-agent systems from labor-intensive manual design to partial automation
  (e.g., prompt engineering, communication topology) and eventually to fully automated
  design. However, existing agentic automation pipelines often lack LLM heterogeneity
  and focus on single-objective performance optimization, limiting their potential
  to combine weaker models for more customized and cost-effective solutions. To address
  this challenge, we propose EvoFlow, a niching evolutionary algorithm-based framework
  to automatically search a population of heterogeneous and complexity-adaptive agentic
  workflows, rather than a single homogeneous, complex workflow. Technically, EvoFlow
  performs (1) tag-based retrieval to extract parent workflows from an agentic population,
  evolves new workflows through (2) crossover and (3) mutation, and employs (4) niching-based
  selection to maintain population diversity and quality. Extensive evaluations across
  seven benchmarks demonstrate that EvoFlow is: (I) diverse, evolving a population
  of workflows ranging from simple I/O tasks to complex multi-turn interactions; (II)
  high-performing, outperforming previous handcrafted and automated workflows by 1.23%
  ∼ 29.86%; (III) economical, surpassing powerful o1-preview at 12.4% of its inference
  cost using weaker open-source models. The code will be available at https://github.com/bingreeky/EvoFlow.'
one_sentence: EvoFlow is a niching evolutionary algorithm-based framework that automatically
  evolves a diverse population of heterogeneous and complexity-adaptive agentic workflows
  for multi-objective optimization of cost and performance.
problem: Existing agentic automation pipelines often lack LLM heterogeneity and focus
  on single-objective performance optimization, limiting their potential to combine
  weaker models for more customized and cost-effective solutions.
contributions:
- 'Paradigm transformation: Formulates agentic workflow automation as a cost-performance
  multi-objective optimization problem, highlighting LLM heterogeneity and complexity
  diversity.'
- 'Practical solution: Proposes EvoFlow, a niching evolutionary algorithm-based framework
  that autonomously evolves a population of heterogeneous and complexity-diverse agentic
  workflows with minimal human intervention.'
- 'Empirical evaluation: Demonstrates that EvoFlow is diverse (workflows from simple
  I/O to complex multi-turn), high-performing (outperforms baselines by 1.23%–29.86%),
  and economical (surpasses o1-preview at 12.4% of its inference cost using weaker
  open-source models).'
method:
- Frames agentic workflow automation as a multi-objective optimization problem balancing
  cost and performance.
- Defines a hierarchical search space with invoking nodes (LLM, prompt, temperature)
  and operator nodes (composite workflows).
- Initializes a population of workflows by selecting and combining operator nodes.
- Evolves workflows via tag-based retrieval of parent workflows, crossover to generate
  offspring, mutation (LLM, prompt, operator mutation), and niching-based selection
  to maintain diversity and quality.
- During inference, autonomously retrieves domain-relevant and complexity-adapted
  workflows from the population.
experiments:
- Evaluated on seven benchmarks (MMLU, MATH, etc.) for diversity, performance, and
  cost.
- In heterogeneous settings, EvoFlow surpasses o1-preview at 12.4% of its inference
  cost using weaker open-source models (LLaMa-3.1-70b, QWen-2.5-72b).
- In homogeneous settings, outperforms state-of-the-art workflows by 1.23% to 29.86%
  in performance.
- Training cost of EvoFlow is one-third of AFlow ($0.45 vs $1.23) and inference cost
  is one-fifth ($0.51 vs $2.62), while outperforming AFlow by 5.91% on MATH.
limitations:
- However, existing agentic automa- tion pipelines often lack LLM heterogeneity and
  focus on single-objective performance optimiza- tion, limiting their potential to
  combine weaker models for more customized and cost-effective solutions.
- To address this challenge, we propose EvoFlow, a niching evolutionary algorithm-based
  framework to automatically search a population of heterogeneous and complexity-adaptive
  agen- tic workflows, rather than a single homogeneous, complex workflow.
- However, real-world user queries vary significantly in difficulty, as exemplified
  by the MMLU benchmark (Hendrycks et al., 2021a), which spans tasks from elementary
  to graduate- level.
- Thus, we advocate for optimizing a diverse set of workflows, tailoring simple workflows
  to straightforward tasks and reserving complex ones for more intricate challenges.
