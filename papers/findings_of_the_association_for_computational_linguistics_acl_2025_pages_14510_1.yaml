problem: Unlike image-based medical report generation tasks (e.g., radiology reports),
  ECG report gener- ation faces unique challenges due to the concise, keyword-centric
  content of ECG reports, which contrasts with the more extensive anatomical de- scriptions
  in radiology.
contributions:
- Proposes the MEIT framework, the first approach for ECG report generation using
  LLMs and multimodal instructions
- Introduces a lightweight attention-based fusion module to integrate ECG signals
  into LLMs without adding new parameters
- Establishes a comprehensive benchmark for evaluating ECG report generation across
  four tasks using two large-scale datasets
method:
- To automate ECG report generation and ensure its versatility, we propose theMultimodal
  ECG Instruction Tuning ( MEIT) framework, the first attempt to tackle ECG report
  generation with LLMs and multimodal instructions.
- 1 Introduction Electrocardiogram (ECG) is the primary tool for heart disease diagnosis.
- Recently, AI models have been developed to streamline ECG data analysis for the
  classification task (Hu et al., 2023; Liu et al., 2023a, 2024), yet the automatic
  generation of reports from ECG recordings remains relatively underexplored.
- Furthermore, there is still a lack of comprehensive benchmarks for evaluating the
  performance of ECG report generation.
- In this work, we introduce MEIT, a Multimodal ECG Instruction Tuning framework that
  extends the capability of large language models (LLMs) for the task of ECG report
  generation.
- 'We also introduce a comprehensive benchmark to evaluate ECG report generation across
  two large- scale datasets (with 20K and 800K ECG-report pairs), covering four tasks:
  (1) report generation quality, (2) zero-shot transfer across datasets, (3) robustness
  under signal perturbations, and (4) align- ment with expert evaluation.'
experiments:
- To facilitate future research, we establish a bench- mark to evaluate MEIT with
  various LLMs backbones across two large-scale ECG datasets.
- Our approach uniquely aligns the representa- tions of the ECG signal and the report,
  and we conduct extensive experiments to bench- mark MEIT with nine open-source LLMs
  us- ing more than 800,000 ECG reports.
- Furthermore, there is still a lack of comprehensive benchmarks for evaluating the
  performance of ECG report generation.
- Concretely, we construct a multimodal instruction dataset from publicly available
  ECG recordings and propose an efficient attention-based fusion method that incor-
  porates ECG signals into the latent space of LLMs without adding new parameters.
- 'We also introduce a comprehensive benchmark to evaluate ECG report generation across
  two large- scale datasets (with 20K and 800K ECG-report pairs), covering four tasks:
  (1) report generation quality, (2) zero-shot transfer across datasets, (3) robustness
  under signal perturbations, and (4) align- ment with expert evaluation.'
limitations:
- Unlike image-based medical report generation tasks (e.g., radiology reports), ECG
  report gener- ation faces unique challenges due to the concise, keyword-centric
  content of ECG reports, which contrasts with the more extensive anatomical de- scriptions
  in radiology.
- However, these meth- ods are designed for medical images and struggle with ECG signals
  due to their distinct temporal and waveform characteristics.
- However, these methods focus on natural images and are not directly applicable to
  ECG signals.
- 7 Limitations Our MEIT framework first attempts to address au- tomatic ECG report
  generation through ECG in- struction tuning, establishing the first comprehen- sive
  benchmark for this process with mainstream LLMs.
