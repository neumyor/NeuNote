translations:
  abstract: 心电图是监测心脏状况的主要非侵入性诊断工具,对协助临床医生至关重要。 最近的研究集中于利用ECG数据对心脏状况进行分类,但忽略了ECG报告生成,而ECG报告生成耗时,需要临床专业知识.
    为了实现ECG报告生成自动化并确保其多功能性,我们提议采用多式联运ECG指令图宁(MEIT)框架,这是首次尝试用LLMs和多式联运指令处理ECG报告生成问题。
    为了便利今后的研究,我们建立了一个基准,用两个大型ECG数据集的各种LLMs主干网评价MEIT。 我们的方法将ECG信号的表述和报告作了独特的协调,我们进行了广泛的试验,以使用80多万份ECG报告的9个开源有限责任公司作为MEIT的基准。
    MEIT的结果显示了教学调整的LLMs的优异性能,显示出他们对质量报告生成的熟练程度,零射能力,对信号扰动的适应能力,以及与人类专家评价的配合. 这些研究结果强调了MEIT的功效及其在现实世界临床应用上的潜力.
    我们的代码发布在https://github.com/AIoT-MLSys-Lab/MEIT上.
  one_sentence: 为了实现ECG报告生成自动化并确保其多功能性,我们提出了多式联运ECG指令图宁(MEIT)框架,这是首次尝试用LLMs和多式联运指令处理ECG报告生成问题。
  problem: 与基于图像的医学报告生成任务(如放射学报告)不同,ECG报告生成由于ECG报告的简洁,关键词中心内容而面临独特的挑战,这与放射学中更广泛的解剖描述形成对比.
  contributions:
  - 提出MEIT框架,即使用LLMs和多式联运指令生成ECG报告的第一个方法
  - 引入基于轻量级关注的聚变模块,将ECG信号整合到LLMS中,而不添加新的参数.
  - 建立一个综合基准,用于评价利用两个大型数据集在四个任务中生成ECG报告的情况
  method:
  - 通过将ECG录音与GPT-4生成的提示对齐,构建一个多式联运指令数据集.
  - 使用轻量级时间演化编码器提取ECG嵌入.
  - 通过自留心层的调试,将ECG嵌入LLM隐藏状态,而不添加新的参数.
  - 利用LORA对LLM主干线进行高效微调,同时将其冻结.
  experiments:
  - 对两个大型数据集进行了评价:MIMIC-IV-ECG(800K对)和PTB-XL(20K对).
  - 基准包括四项任务:报告生成质量、零镜头传输、信号扰动性强、与专家评价保持一致。
  - 以十种开源LLMs测试.
  - MEIT在所有任务中都超过了基线,显示出零射线转移和强力干扰。
  limitations:
  - 与基于图像的医学报告生成任务(如放射学报告)不同,ECG报告 georger-xation由于ECG报告内容简洁,关键词中心而面临独特的挑战,这与放射学中更广泛的解剖解说形成对比.
  - 然而,这些冰毒-od是针对医学图像和与ECG信号的抗争而设计的,因为它们具有独特的时间和波形特征.
  - 然而,这些方法侧重于自然图像,并不直接适用于ECG信号.
  - 7 限制 我们的MEIT框架首先试图通过EG在结构中调制处理u-tomatic的ECG报告生成问题,并用主流LLMs为这一进程确定第一个Comprehen-sive基准。
