abstract: Electrocardiogram (ECG) is the primary non-invasive diagnostic tool for
  monitoring cardiac conditions and is crucial in assisting clinicians. Recent studies
  have concentrated on classifying cardiac conditions using ECG data but have overlooked
  ECG report generation, which is time-consuming and requires clinical expertise.
  To automate ECG report generation and ensure its versatility, we propose the Multimodal
  ECG Instruction Tuning (MEIT) framework, the first attempt to tackle ECG report
  generation with LLMs and multimodal instructions. To facilitate future research,
  we establish a benchmark to evaluate MEIT with various LLMs backbones across two
  large-scale ECG datasets. Our approach uniquely aligns the representations of the
  ECG signal and the report, and we conduct extensive experiments to benchmark MEIT
  with nine open-source LLMs using more than 800,000 ECG reports. MEIT's results underscore
  the superior performance of instruction-tuned LLMs, showcasing their proficiency
  in quality report generation, zero-shot capabilities, resilience to signal perturbation,
  and alignment with human expert evaluation. These findings emphasize the efficacy
  of MEIT and its potential for real-world clinical application.
one_sentence: To automate ECG report generation and ensure its versatility, we propose
  the Multimodal ECG Instruction Tuning ( MEIT ) framework, the first attempt to tackle
  ECG report generation with LLMs and multimodal instructions.
problem: Unlike image-based medical report generation tasks (e.g., radiology reports),
  ECG report generation faces unique challenges due to the concise, keyword-centric
  content of ECG reports, which contrasts with the more extensive anatomical descriptions
  in radiology.
contributions:
- Proposes the MEIT framework, the first approach for ECG report generation using
  LLMs and multimodal instructions
- Introduces a lightweight attention-based fusion module to integrate ECG signals
  into LLMs without adding new parameters
- Establishes a comprehensive benchmark for evaluating ECG report generation across
  four tasks using two large-scale datasets
method:
- Constructs a multimodal instruction dataset by pairing ECG recordings with GPT-4
  generated prompts.
- Uses a lightweight temporal convolutional encoder to extract ECG embeddings.
- Aligns ECG embeddings with LLM hidden states via concatenation in self-attention
  layers without adding new parameters.
- Employs LoRA for efficient fine-tuning of LLM backbone while freezing it.
experiments:
- 'Evaluated on two large-scale datasets: MIMIC-IV-ECG (800K pairs) and PTB-XL (20K
  pairs).'
- 'Benchmark covers four tasks: report generation quality, zero-shot transfer, robustness
  to signal perturbations, alignment with expert evaluation.'
- Tested with ten open-source LLMs.
- MEIT outperforms baselines in all tasks, demonstrates zero-shot transfer and robustness
  to perturbations.
limitations:
- Unlike image-based medical report generation tasks (e.g., radiology reports), ECG
  report gener- ation faces unique challenges due to the concise, keyword-centric
  content of ECG reports, which contrasts with the more extensive anatomical de- scriptions
  in radiology.
- However, these meth- ods are designed for medical images and struggle with ECG signals
  due to their distinct temporal and waveform characteristics.
- However, these methods focus on natural images and are not directly applicable to
  ECG signals.
- 7 Limitations Our MEIT framework first attempts to address au- tomatic ECG report
  generation through ECG in- struction tuning, establishing the first comprehen- sive
  benchmark for this process with mainstream LLMs.
