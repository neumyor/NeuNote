translations:
  abstract: 大型语言模型(LLM)代理依赖于记忆带来写作,组织,检索,并使用过去的经验. 一种对一项任务起作用的牵引器往往在另一项任务上失败,因为像对话,内含规划,或专家推理等不同任务都需要不同的存储和检索行为.
    为了解决这一局限性,我们引入了MSTAR,这种方法通过反射代码演化自动发现任务优化的内存程序. 具体来说,MSTAR作为可执行的Python程序代表一个内存吊带,它定义了Schema,Logic,以及指令组件,这些组件是共同优化的.
    我们评价MSTAR的四项任务,包括对话、规划和专门推理。 我们的结果表明,MSTAR改进了所有评价任务的现有静态内存的性能。 此外,不断发展的内存程序为每个被评价领域显示了结构上不同的处理机制。
    这些研究结果表明,每一项任务都得益于自身记忆的利用,记忆程序搜索提供了发现它的具体方法.
  one_sentence: MSTAR通过可执行的Python内存程序的反射代码演化,自动发现LLM代理的任务优化内存控制器.
  problem: 不同的任务需要不同的LLM代理的内存控制,但现有的静态控制在任务间转移不良.
  contributions:
  - 制定任务优化的内存拉带发现作为内存程序搜索,其中可执行的Python程序共同指定了Schema,Logic,以及指令.
  - 提议MSTAR,一种通过反射代码演化来优化目标任务反馈的内存的演化方法.
  - 表明优化任务记忆的利用在结构和程序上与对话、规划和专家推理任务不同。
  method:
  - 作为可执行的 Python 程序来代表内存控制器,其中包含三个组件:Schema(数据格式),Logic(后端操作),和Directive(即时常数).
  - 使用反射码演化:样本验证反馈,通过反射剂生成定向补丁,并应用自动修复进行质量检查.
  - 采用基于人口的搜索方案,平衡勘探和开发。
  experiments:
  - 评价四项任务:对话(LoCoMo),包含AI(ALFWorld),保健(Health Bench)和法律推理(PR Bench)。
  - 与跨越三个内存范式(无记忆,RAG,Cheetsheet)的9个基线相比.
  - MSTAR取得了最佳的总体分数,并有力完成了所有任务;进化后的程序在结构上与每个域不同.
  limitations:
  - 一种对一项任务起作用的牵引器往往在另一项任务上失败,因为像对话,内含规划,或专家推理等不同任务都需要不同的存储和检索行为.
  - 为了解决这一局限性,我们引入了MSTAR,这种方法通过反射代码演化自动发现任务优化的内存程序.
  - MSTAR对内存的搜索利用两种机制:一种是调试内存程序故障并产生针对性改进的反射剂,另一种是以人口为基础的程序搜索策略,既要平衡探索和开发,又要强制执行对程序质量的限制.
  - 如果任何检查失败,内存程序及其相应的错误消息会被重新提交编码代理进行修复.
