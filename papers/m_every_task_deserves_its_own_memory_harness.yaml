abstract: Large Language Model (LLM) agents rely on a memory harness to write, organize,
  retrieve, and use past experience. A harness that works for one task often fails
  on another, because different tasks like conversations, embodied planning, or expert
  reasoning require different storage and retrieval behavior. To address this limitation,
  we introduce MSTAR, a method that automatically discovers task-optimized memory
  programs through reflective code evolution. Specifically, MSTAR represents a memory
  harness as an executable Python program that defines the Schema, Logic, and Instruction
  components, which are optimized jointly. We evaluate MSTAR on four tasks covering
  conversation, embodied planning, and specialized reasoning. Our results demonstrate
  that MSTAR improves performance over existing static memory harnesses across all
  evaluated tasks. Furthermore, the evolved memory programs exhibit structurally distinct
  processing mechanisms for each evaluated domain. These findings suggest that every
  task benefits from its own memory harness, and that memory-program search provides
  a concrete way to discover it.
one_sentence: MSTAR automatically discovers task-optimized memory harnesses for LLM
  agents through reflective code evolution of executable Python memory programs.
problem: Different tasks require different memory harnesses for LLM agents, but existing
  static harnesses transfer poorly across tasks.
contributions:
- Formulate task-optimized memory harness discovery as memory-program search, where
  an executable Python program jointly specifies Schema, Logic, and Instruction.
- Propose MSTAR, an evolutionary method that optimizes memory harnesses from target-task
  feedback through reflective code evolution.
- Demonstrate that task-optimized memory harnesses are structurally and procedurally
  distinct across conversation, embodied planning, and expert reasoning tasks.
method:
- 'Represent memory harness as an executable Python program with three components:
  Schema (data formats), Logic (backend operations), and Instruction (prompt constants).'
- 'Use reflective code evolution: sample validation feedback, generate targeted patches
  via a reflector agent, and apply quality checks with auto-repair.'
- Employ population-based program search balancing exploration and exploitation.
experiments:
- 'Evaluate on four tasks: conversation (LoCoMo), embodied AI (ALFWorld), healthcare
  (HealthBench), and legal reasoning (PRBench).'
- Compare against nine baselines across three memory paradigms (No Memory, RAG, Cheatsheet).
- MSTAR achieves best overall score and performs robustly on all tasks; evolved programs
  are structurally distinct per domain.
limitations:
- A harness that works for one task often fails on another, because different tasks
  like conversations, embodied planning, or expert reasoning require different storage
  and retrieval behavior.
- To address this limitation, we introduce MSTAR, a method that automatically discovers
  task-optimized memory programs through reflective code evolution.
- 'MSTAR searches over the memory harness itself with two mechanisms: a reflector
  agent that debugs memory program failures and generates targeted improvements, and
  a population-based program search strategy that balances exploration and exploitation
  while enforcing constraints on program quality.'
- If any check fails, the memory program and its corresponding error messages are
  resubmitted to the coding agent for repair.
