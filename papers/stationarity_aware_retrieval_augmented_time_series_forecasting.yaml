translations:
  abstract: 时间序列预测依赖于历史规律,但现实世界系列往往表现出非站点性,制度变化对完全参数化的预测器构成挑战. 受Retrival-Augmented
    Generation(RAG)的启发,最近的工作通过检索相关历史段段并在推论时将其作为外部证据来增强预测器. 然而,由于现实世界时间序列的内在非定型性,一个高度相似的过去段并不一定意味着一个相似的未来,使得相似的仅是检索的不便和容易重复.
    我们建议采用站点性-智能检索-增强时间序列预测(SARAF),这一框架可适应性地平衡检索中的相关性和多样性。 SARAF首先通过时间相似性与时间相适应的增强形成一个候选人才库,然后采用多样性意识选择战略来涵盖不同的历史制度,多样化强度自动由数据集级的站点性调制.
    此外,SARAF还利用站点感知聚合,将回收的期货装入引信。 对8个现实世界数据集的广泛实验表明,SARAF实现了竞争性预测性能,提高了在强基线上的平均准确性和稳健性,在具有挑战性的非固定环境下特别明显的好处.
    代码:https://github.com/ShiqiaoZhou/SARAF.
  one_sentence: SARAF是一个有站点意识的检索增强时间序列预测框架,可适应性地平衡检索中的关联性和多样性,以提高非站点性下的证据质量.
  problem: 然而,由于现实世界时间序列的内在非定型性,一个高度相似的过去段并不必然意味着一个类似的未来,使得相似性仅是检索的脆性,容易出现冗余.
  contributions:
  - 经验证明,基于相似性的检索的可靠性高度依赖数据集,不同位置之间差异很大。
  - 提出SARAF,即一个可视性-认识检索-增强预测框架,将时间相适应检索增强和可视性控制的多样性检索与适应性聚变相结合。
  - 对8个数据集进行广泛的实验,显示具有竞争力的预测性能和不同位置水平的数据集之间的有力行为。
  method:
  - SARAF使用时间同步的检索增强,有利于来自历史同步期(如同一天的小时或星期日)的考生,以减少时间不匹配的邻居.
  - 它采用具有多样性意识的选择战略,以涵盖不同的历史制度,多样化强度自动由数据集级的站点性(通过澳大利亚国防军测试估计)调整。
  - 它使用站点感知聚合法来进行引信回收期货;在低站点感知数据组上,它能比较平稳地分配权重,在高站点感知数据组上,它将权重集中在排名最高的期货上。
  - 最后的预测是通过轻量级聚变得到的:用天真的骨干预测来平均进行检索增强的预测.
  experiments:
  - 评估了涵盖不同位置水平的8个实际世界数据集(例如,固定通道为97.2%的电力,12.5%的交换)。
  - 与包括完全参数化和检索增强的预测器(如RAFT、TRACE、TS-RAG、PIR)在内的强基线相比。
  - 显示SARAF实现了竞争性预测性能,提高了平均准确度和稳健度,在具有挑战性的非固定环境下特别明显的好处.
  limitations:
  - 然而,由于现实世界时间序列的内在非定型性,一个高度相似的过去段并不必然意味着一个类似的未来,使得相似性仅是检索的脆性,容易出现冗余.
  - 然而,大多数现有的检索增强的预测器都粗略地认为,“类似过去意味着类似的未来”,因此,根据输入历史,每个形式的只相似的顶K检索。
  - 然而,这种减弱有两个关键限制:(一) 它不能解决根本原因—— 输入检索与未来相关性之间的不匹配—— (二) 它可以过度压制部分有用的邻居,有效地将模型转换为纯粹的参数预测器,并减少检索对长尾或制度特定模式的好处。
  - 深层学习通过LSTM[10]等反复出现的mod-els和DeepAR[28]等概率框架减轻了这些局限性.
