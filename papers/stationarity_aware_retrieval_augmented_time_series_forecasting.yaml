  ## Core Idea


  Time series forecasting relies on historical patterns, but real-world series often
  exhibit non-stationarity and regime shifts that chal- lenge fully parametric forecasters.
  Inspired by Retrieval-Augmented Generation (RAG), recent work augments forecasters
  by retrieving relevant historical segments and using them as external evidence at
  inference time. However, due to the intrinsic non-stationarity of real-world time
  series, a highly similar past segment does not nec- essarily imply a similar future,
  rendering similarity-only retrieval brittle and prone to redundancy. We proposeStationarity-Aware
  Retrieval-Augmented Time SeriesForecasting (SARAF), a frame- work that adaptively
  balances relev


  ## Method Notes


  - Inspired by Retrieval-Augmented Generation (RAG), recent work augments forecasters
  by retrieving relevant historical segments and using them as external evidence at
  inference time.

  - However, due to the intrinsic non-stationarity of real-world time series, a highly
  similar past segment does not nec- essarily imply a similar future, rendering similarity-only
  retrieval brittle and prone to redundancy.

  - We proposeStationarity-Aware Retrieval-Augmented Time SeriesForecasting (SARAF),
  a frame- work that adaptively balances relevance and diversity in retrieval.

  - CCS Concepts •Information systems → Information retrieval;•Applied computing→Forecasting.

  - Keywords Time Series Forecasting; Retrieval-Augmented Forecasting; Non- Stationary
  Time Series ∗The contribution was carried out while this co-author was employed
  by Siemens AG.

  - Over the past decades, forecast- ing methods have evolved from classical statistical
  models such as ARIMA [ 2] to modern deep learning approaches that better capture
  nonlinearity and multivariate dependencies.


  ## Evidence To Verify


  - Exact contributions, datasets, metrics, and baselines.

  - Quantitative results and claims from figures or tables.


  ## Limitations


  - However, due to the intrinsic non-stationarity of real-world time series, a highly
  similar past segment does not nec- essarily imply a similar future, rendering similarity-only
  retrieval brittle and prone to redundancy.

  - However, most existing retrieval-augmented forecasters implic- itly assume that“similar
  pasts imply similar futures”, and thus per- form similarity-only top-𝐾 retrieval
  based on the input history.

  - However, such attenuation has two key limitations: (i) it does not resolve the
  root cause—the mismatch between input-based retrieval and future relevance—and (ii)
  it can overly suppress partially useful neighbors, effectively re- verting the model
  to a purely parametric forecaster and diminishing retrieval’s benefits on long-tail
  or regime-specific patterns.

  - Deep learning mitigated these limitations with recurrent mod- els such as LSTMs
  [10] and probabilistic frameworks like DeepAR [28].


