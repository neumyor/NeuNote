- To this end, we proposeSARAF, astationarity-awareretrieval- augmentedforecasting
  framework that improves evidence quality under distribution shifts and heterogeneous
  regimes.
- First, we introduce atime-aligned retrieval enhancementthat explicitly favors candidates
  from historically aligned periods (e.g., the same hour-of-day or day-of-week).
- 'Our main contributions are: • We empirically demonstrate that the reliability of
  similarity- based retrieval is strongly dataset-dependent: future simi- larity between
  retrieved results and the ground truth varies substantially across stationarity
  levels.'
method:
- Inspired by Retrieval-Augmented Generation (RAG), recent work augments forecasters
  by retrieving relevant historical segments and using them as external evidence at
  inference time.
- However, due to the intrinsic non-stationarity of real-world time series, a highly
  similar past segment does not nec- essarily imply a similar future, rendering similarity-only
  retrieval brittle and prone to redundancy.
- We proposeStationarity-Aware Retrieval-Augmented Time SeriesForecasting (SARAF),
  a frame- work that adaptively balances relevance and diversity in retrieval.
- CCS Concepts •Information systems → Information retrieval;•Applied computing→Forecasting.
- Keywords Time Series Forecasting; Retrieval-Augmented Forecasting; Non- Stationary
  Time Series ∗The contribution was carried out while this co-author was employed
  by Siemens AG.
- Over the past decades, forecast- ing methods have evolved from classical statistical
  models such as ARIMA [ 2] to modern deep learning approaches that better capture
  nonlinearity and multivariate dependencies.
experiments:
- SARAF first forms a candidate pool via temporal similarity with time-aligned enhancement,
  then applies a diversity-aware selection strategy to cover heterogeneous historical
  regimes, with the diversi- fication strength automatically modulated by dataset-level
  station- arity.
- Extensive experiments on eight real-world datasets show that SARAF achieves competitive
  forecasting perfor- mance and improves average accuracy and robustness over strong
  baselines, with particularly clear benefits under challenging non- stationary settings.
- 'This is particularly benefi- cial for long-tail behaviors: loss-minimization tends
  to prioritize frequent regimes, so rare yet consequential motifs are often under-
  emphasized by fully parametric forecasters, whereas retrieval gives the model an
  additional chance to fetch a few closely related his- torical segments as explicit
  references.'
- To probe this assumption, we conduct a simple diagnostic experiment under the 720-input
  and 96-horizon setting, as shown in Fig.
- Specifically, we choose two widely used time series forecasting benchmarks, Electricity
  and Exchange, as representative cases for this diagnosis.
limitations:
- However, due to the intrinsic non-stationarity of real-world time series, a highly
  similar past segment does not nec- essarily imply a similar future, rendering similarity-only
  retrieval brittle and prone to redundancy.
- However, most existing retrieval-augmented forecasters implic- itly assume that“similar
  pasts imply similar futures”, and thus per- form similarity-only top-𝐾 retrieval
  based on the input history.
- 'However, such attenuation has two key limitations: (i) it does not resolve the
  root cause—the mismatch between input-based retrieval and future relevance—and (ii)
  it can overly suppress partially useful neighbors, effectively re- verting the model
  to a purely parametric forecaster and diminishing retrieval’s benefits on long-tail
  or regime-specific patterns.'
- Deep learning mitigated these limitations with recurrent mod- els such as LSTMs
  [10] and probabilistic frameworks like DeepAR [28].
