abstract: Time series forecasting relies on historical patterns, but real-world series
  often exhibit non-stationarity and regime shifts that challenge fully parametric
  forecasters. Inspired by Retrieval-Augmented Generation (RAG), recent work augments
  forecasters by retrieving relevant historical segments and using them as external
  evidence at inference time. However, due to the intrinsic non-stationarity of real-world
  time series, a highly similar past segment does not necessarily imply a similar
  future, rendering similarity-only retrieval brittle and prone to redundancy. We
  propose Stationarity-Aware Retrieval-Augmented Time Series Forecasting (SARAF),
  a framework that adaptively balances relevance and diversity in retrieval. SARAF
  first forms a candidate pool via temporal similarity with time-aligned enhancement,
  then applies a diversity-aware selection strategy to cover heterogeneous historical
  regimes, with the diversification strength automatically modulated by dataset-level
  stationarity. Moreover, SARAF uses stationarity-aware aggregation to fuse the retrieved
  futures. Extensive experiments on eight real-world datasets show that SARAF achieves
  competitive forecasting performance and improves average accuracy and robustness
  over strong baselines, with particularly clear benefits under challenging non-stationary
  settings.
one_sentence: SARAF is a stationarity-aware retrieval-augmented time series forecasting
  framework that adaptively balances relevance and diversity in retrieval to improve
  evidence quality under non-stationarity.
problem: However, due to the intrinsic non-stationarity of real-world time series,
  a highly similar past segment does not nec- essarily imply a similar future, rendering
  similarity-only retrieval brittle and prone to redundancy.
contributions:
- Empirically demonstrates that the reliability of similarity-based retrieval is strongly
  dataset-dependent, varying substantially across stationarity levels.
- Proposes SARAF, a stationarity-aware retrieval-augmented forecasting framework combining
  time-aligned retrieval enhancement and stationarity-controlled diversity-based retrieval
  with adaptive fusion.
- Conducts extensive experiments on eight datasets showing competitive forecasting
  performance and robust behavior across datasets with different stationarity levels.
method:
- SARAF uses time-aligned retrieval enhancement that favors candidates from historically
  aligned periods (e.g., same hour-of-day or day-of-week) to reduce temporally mismatched
  neighbors.
- It applies a diversity-aware selection strategy to cover heterogeneous historical
  regimes, with diversification strength automatically modulated by dataset-level
  stationarity (estimated via ADF test).
- It uses stationarity-aware aggregation to fuse retrieved futures; on low-stationarity
  datasets it distributes weights more smoothly, on high-stationarity ones it concentrates
  weight on top-ranked futures.
- 'The final prediction is obtained by lightweight fusion: averaging the retrieval-augmented
  forecast with the naive backbone prediction.'
experiments:
- Evaluated on eight real-world datasets covering different stationarity levels (e.g.,
  Electricity with 97.2% stationary channels, Exchange with 12.5%).
- Compared against strong baselines including fully parametric and retrieval-augmented
  forecasters (e.g., RAFT, TRACE, TS-RAG, PIR).
- Shows that SARAF achieves competitive forecasting performance and improved average
  accuracy and robustness, with particularly clear benefits under challenging non-stationary
  settings.
limitations:
- However, due to the intrinsic non-stationarity of real-world time series, a highly
  similar past segment does not nec- essarily imply a similar future, rendering similarity-only
  retrieval brittle and prone to redundancy.
- However, most existing retrieval-augmented forecasters implic- itly assume that“similar
  pasts imply similar futures”, and thus per- form similarity-only top-𝐾 retrieval
  based on the input history.
- 'However, such attenuation has two key limitations: (i) it does not resolve the
  root cause—the mismatch between input-based retrieval and future relevance—and (ii)
  it can overly suppress partially useful neighbors, effectively re- verting the model
  to a purely parametric forecaster and diminishing retrieval’s benefits on long-tail
  or regime-specific patterns.'
- Deep learning mitigated these limitations with recurrent mod- els such as LSTMs
  [10] and probabilistic frameworks like DeepAR [28].
