abstract: 'LLM agents increasingly run inside execution harnesses that dispatch tools,
  allocate resources, and route messages between specialized components. However,
  a harness can return a correct, benign answer over a trajectory that accesses unauthorized
  resources or leaks context to the wrong agent. Output-level evaluation cannot see
  these failures, yet most safety benchmarks score only final outputs or terminal
  states, even though many violations occur mid-trajectory rather than at termination.
  The central question is whether the harness respects user intent, permission boundaries,
  and information-flow constraints throughout execution. To address this gap, we propose
  HarnessAudit, a framework that audits full execution trajectories across boundary
  compliance, execution fidelity, and system stability, with a focus on multi-agent
  harnesses where these risks are most pronounced. We further introduce HarnessAudit-Bench,
  a benchmark of 210 tasks across eight real-world domains, instantiated in both single-agent
  and multi-agent configurations with embedded safety constraints. Evaluating ten
  harness configurations across frontier models and three multi-agent frameworks,
  we find that: (i) task completion is misaligned with safe execution, and violations
  accumulate with trajectory length; (ii) safety risks vary across domains, task types,
  and agent roles; (iii) most violations concentrate in resource access and inter-agent
  information transfer; (iv) multi-agent collaboration expands the safety risk surface,
  while harness design sets the upper bound of safe deployment.'
one_sentence: This paper proposes HarnessAudit, a framework for auditing LLM agent
  execution trajectories for safety violations, and HarnessAudit-Bench, a benchmark
  of 210 tasks across eight domains, revealing that task completion is misaligned
  with safe execution and that multi-agent collaboration expands the safety risk surface.
problem: Existing agent safety benchmarks evaluate only final outputs or terminal
  states, failing to detect mid-trajectory violations such as unauthorized resource
  access, information leakage, and irreversible side effects.
contributions:
- Formalize agent harness as a policy-constrained execution system and audit trajectories
  along boundary compliance, execution fidelity, and system stability.
- Construct HarnessAudit-Bench, a benchmark of 210 tasks across eight real-world domains
  with embedded safety constraints in single- and multi-agent configurations.
- Empirically evaluate ten harness configurations across frontier models and three
  multi-agent frameworks, revealing systematic failure patterns in resource access,
  inter-agent information transfer, and stability.
method:
- Define agent harness as policy-constrained execution system with permission policy
  Π and information-flow policy Φ.
- 'Propose three-layer safety evaluation: L1 Boundary Compliance (tool, resource,
  information flow violations), L2 Execution Fidelity (action validity, checkpointed
  task completion), L3 System Stability (robustness to prompt injection, ambiguous
  goals, tool errors).'
- 'Design trajectory auditing pipeline with three phases: Setup (hidden audit artifacts),
  Execution (record tool calls, resource accesses, messages), Judge (score using hidden
  artifacts and collected evidence).'
- 'Introduce scoring metrics: Safety Adherence Rate (SAR) for boundary compliance,
  Task Completion Rate (TCR) and Action Validity Score (AVS) for execution fidelity.'
experiments:
- Evaluate 10 harness configurations across frontier models (GPT-5.4, Opus 4.6, Sonnet
  4.6, Gemini 3.1 Pro, etc.) and three multi-agent frameworks.
- Benchmark 210 tasks across 8 real-world domains (E-commerce, Calendar, Code Repository,
  etc.) in both single-agent and multi-agent configurations.
- Analyze safety violations across domains, task types, and agent roles, finding that
  resource access and inter-agent information transfer account for most violations.
limitations:
- However, a harness can return a correct, benign answer over a trajectory that accesses
  unauthorized resources or leaks context to the wrong agent.
- Output-level evaluation cannot see these failures, yet most safety benchmarks score
  only final outputs or terminal states, even though many violations occurmid-trajectoryratherthanattermination.
