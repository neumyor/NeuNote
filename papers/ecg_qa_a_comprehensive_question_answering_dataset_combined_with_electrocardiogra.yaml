  ## Core Idea


  Question answering (QA) in the field of healthcare has received much attention due
  to significant advancements in natural language processing. However, existing healthcare
  QA datasets primarily focus on medical images, clinical notes, or struc- tured electronic
  health record tables. This leaves the vast potential of combining electrocardiogram
  (ECG) data with these systems largely untapped. To address this gap, we present
  ECG-QA, the first QA dataset specifically designed for ECG analysis. The dataset
  comprises a total of 70 question templates that cover a wide range of clinically
  relevant ECG topics, each validated by an ECG expert to ensure their clinical utility.
  As a result, our dataset


  ## Method Notes


  - As a fundamental diagnostic tool in cardiology, ECG provides critical insights
  into the electrical activity of the heart and plays an important role in detecting
  various cardiac conditions [ 3, 22, 33].

  - 37th Conference on Neural Information Processing Systems (NeurIPS 2023) Track
  on Datasets and Benchmarks.

  - • We provide a benchmark for QA models, including recent large language models
  (LLMs), on the ECG-QA dataset, promoting further research and encouraging the development
  of novel methods to leverage ECG signals for question answering tasks.

  - Instead, we manually calculated the heart axis degrees by employing an external
  tool, NeuroKit2 [16] 3.

  - Although Comparison-Irrelevant questions may not seem realistic in a clinical
  setting, we included these questions since they can help to reinforce a machine’s
  comprehension ability and be utilized for model evaluation when comparing two different
  ECGs.

  - We ensured that the questions in the test split were not included in the training
  set to evaluate the generalizability of the QA models on different lexical variations.


