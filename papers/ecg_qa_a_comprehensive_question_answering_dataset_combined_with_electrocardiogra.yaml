translations:
  abstract: 由于自然语言处理的显著进步,保健领域的问答(QA)受到很大关注. 然而,现有的保健质量评估数据集主要侧重于医疗图像、临床说明或结构化的电子健康记录表。
    这就留下了将心电图数据与这些系统结合的巨大潜力。 为了弥补这一差距,我们提出了ECG-QA,这是第一个专门为ECG分析设计的QA数据集. 数据集共有70个问题模板,涵盖与临床有关的各种ECG专题,每个专题都由ECG专家验证,以确保其临床用途。
    因此,我们的数据集包括各种ECG解释问题,包括需要比较分析两个不同的ECG的问题. 此外,我们进行了许多试验,以便为今后的研究方向提供宝贵的见解。 我们认为,ECG-QA将成为开发能够协助临床医生进行ECG解释的智能QA系统的宝贵资源.
  one_sentence: 我们提出ECG-QA,这是专门为心电图分析设计的首个答题数据集,由70个问题模板组成,涵盖与临床相关的各种ECG专题,包括两个ECG之间的比较分析.
  problem: 现有的保健质量评估数据集没有将心电图数据与回答问题结合起来,使ECG数据的巨大潜力得不到利用。
  contributions:
  - 提出了ECG-QA, 以ECG解释和分析为重点的多种问题集,将QA引入ECG分析领域.
  - 包括需要比较分析两个ECG的问题,解决单个ECG分析以外的现实世界临床需求.
  - 为ECG-QA数据集上的QA模型,包括大语言模型(LLM)提供基准.
  method:
  - 构建了PTB-XL数据集的数据集,过滤为16,054个ECG,由人类心脏学家通过非空报告验证.
  - 定义了6种属性类型:SCP代码,噪声,心轴,梗塞阶段,Extra systole,数字特性.
  - 创建了按问题类型排列的70个问题模板:单(验证,选择,查询),比较-连续(验证,查询),比较-关联(验证,查询).
  - 通过基于属性值的ECG采样生成QA对,并应用模板参数来表达词汇多样性.
  - 所有模板均由护理和急诊部一名经委员会认证的医疗专家验证。
  experiments:
  - 然而,现有的保健质量评估数据集主要侧重于医疗图像、临床笔记或struc-tured电子健康记录表。
  - 为了弥补这一差距,我们提出了ECG-QA,这是第一个专门为ECG分析设计的QA数据集.
  - 数据集共有70个问题模板,涵盖与临床有关的各种ECG专题,每个专题都由ECG专家验证,以确保其临床用途。
  - 因此,我们的数据集包括各种ECG解释问题,包括需要比较分析两个不同的ECG的问题.
  - 此外,我们进行了许多试验,以便为今后的研究方向提供宝贵的见解。
  limitations:
  - 然而,现有的保健质量评估数据集主要侧重于医疗图像、临床笔记或struc-tured电子健康记录表。
  - 2 在保健领域广泛探索了医疗质量保证数据集,以满足医疗数据的具体需要和挑战。
  - 然而,大多数现有的医学QA数据集主要基于临床文本,医学影像,或结构化的EHR表.
  - '[18] 提出了一组剩余网络,其中关注模块用于使用ECG对心脏疾病进行分类,这在PhysioNet/Computing in Cardiology Challenge
    2021[21]中获得了第一名.'
