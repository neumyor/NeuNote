abstract: Question answering (QA) in the field of healthcare has received much attention
  due to significant advancements in natural language processing. However, existing
  healthcare QA datasets primarily focus on medical images, clinical notes, or structured
  electronic health record tables. This leaves the vast potential of combining electrocardiogram
  (ECG) data with these systems largely untapped. To address this gap, we present
  ECG-QA, the first QA dataset specifically designed for ECG analysis. The dataset
  comprises a total of 70 question templates that cover a wide range of clinically
  relevant ECG topics, each validated by an ECG expert to ensure their clinical utility.
  As a result, our dataset includes diverse ECG interpretation questions, including
  those that require a comparative analysis of two different ECGs. In addition, we
  have conducted numerous experiments to provide valuable insights for future research
  directions. We believe that ECG-QA will serve as a valuable resource for the development
  of intelligent QA systems capable of assisting clinicians in ECG interpretations.
one_sentence: We present ECG-QA, the first question answering dataset specifically
  designed for electrocardiogram analysis, comprising 70 question templates covering
  diverse clinically relevant ECG topics and including comparative analysis between
  two ECGs.
problem: Existing healthcare QA datasets do not combine electrocardiogram (ECG) data
  with question answering, leaving the vast potential of ECG data untapped.
contributions:
- Proposes ECG-QA, a diverse collection of questions focused on ECG interpretation
  and analysis, introducing QA into the realm of ECG analysis.
- Includes questions requiring comparative analysis of two ECGs, addressing real-world
  clinical needs beyond single-ECG analysis.
- Provides a benchmark for QA models, including large language models (LLMs), on the
  ECG-QA dataset.
method:
- Constructed ECG-QA dataset by filtering 16,054 samples from PTB-XL (validated by
  human, non-empty reports), splitting by patient ID (8:2 train-test, then 9:1 train-validation).
- Designed 70 question templates across 6 attribute types (SCP code, Noise, Heart
  axis, Stage of infarction, Extra systole, Numeric feature) and multiple question
  types (Single-Verify/Choose/Query, Comparison-Consecutive-Verify/Query, Comparison-Irrelevant-Verify/Query).
- Used regular expression parsing to extract lead positions for form-related symptoms
  and NeuroKit2 to compute heart axis; questions validated by a board-certified medical
  expert.
experiments:
- Conducted extensive experiments to evaluate QA models, including LLMs, on the ECG-QA
  dataset, providing insights for future research.
limitations:
- However, existing healthcare QA datasets primarily focus on medical images, clinical
  notes, or struc- tured electronic health record tables.
- 2 Related works Medical QA datasets QA systems have been extensively explored in
  the healthcare domain, catering to the specific needs and challenges of medical
  data.
- However, most existing medical QA datasets are primarily based on clinical texts,
  medical images, or structured EHR tables.
- '[18] proposed an ensemble of residual networks with attention modules to classify
  cardiac diseases using ECGs, which won first place in the PhysioNet/Computing in
  Cardiology Challenge 2021 [21].'
