contributions:
- Proposes ECG-QA, the first QA dataset for ECG analysis with diverse question types
  covering 64 ECG symptoms, noise, heart axis, etc.
- Includes comparison questions between two ECGs, addressing real-world clinical needs
  beyond single-ECG analysis.
- Provides benchmark evaluations of multiple QA models, including large language models,
  on the ECG-QA dataset.
