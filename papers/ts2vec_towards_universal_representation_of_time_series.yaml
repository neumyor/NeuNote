abstract: This paper presents TS2Vec, a universal framework for learning representations
  of time series in an arbitrary semantic level. Unlike existing methods, TS2Vec performs
  contrastive learning in a hierarchical way over augmented context views, which enables
  a robust contextual representation for each timestamp. Furthermore, to obtain the
  representation of an arbitrary sub-sequence in the time series, we can apply a simple
  aggregation over the representations of corresponding timestamps. We conduct extensive
  experiments on time series classification tasks to evaluate the quality of time
  series representations. As a result, TS2Vec achieves significant improvement over
  existing SOTAs of unsupervised time series representation on 125 UCR datasets and
  29 UEA datasets. The learned timestamp-level representations also achieve superior
  results in time series forecasting and anomaly detection tasks. A linear regression
  trained on top of the learned representations outperforms previous SOTAs of time
  series forecasting. Furthermore, we present a simple way to apply the learned representations
  for unsupervised anomaly detection, which establishes SOTA results in the literature.
  The source code is publicly available at https://github.com/yuezhihan/ts2vec.
one_sentence: TS2Vec is a universal framework for learning representations of time
  series at arbitrary semantic levels using hierarchical contrastive learning over
  augmented context views.
problem: Learning universal representations for time series is a fundamental but challenging
  problem.
contributions:
- Proposes TS2Vec, a unified framework for learning contextual representations of
  arbitrary sub-series at various semantic levels, applicable to classification, forecasting,
  and anomaly detection.
- Introduces hierarchical contrasting in instance-wise and temporal dimensions to
  capture multi-scale contextual information, and contextual consistency for positive
  pair selection suitable for time series.
- Achieves state-of-the-art results on 125 UCR and 29 UEA classification datasets,
  and on forecasting and anomaly detection benchmarks.
method:
- Uses an encoder with input projection layer, timestamp masking module, and dilated
  CNN with ten residual blocks.
- 'Performs contrastive learning with hierarchical contrasting: temporal contrastive
  loss (same timestamp in two augmented views as positives, different timestamps as
  negatives) and instance-wise contrastive loss (same timestamp across instances as
  positives, different instances as negatives).'
- Applies max pooling over learned representations at multiple scales to aggregate
  sub-series representations.
- Uses contextual consistency for positive pair selection, employing timestamp masking
  and random cropping to generate context views without transformation-invariance
  bias.
experiments:
- Evaluated on 125 UCR and 29 UEA classification datasets, achieving 2.4% and 3.0%
  average accuracy improvement over prior unsupervised methods.
- Tested on time series forecasting with linear regression on learned representations,
  outperforming previous forecasting SOTAs.
- Applied to unsupervised anomaly detection, establishing new SOTA results.
- Conducted ablation studies to verify effectiveness of hierarchical contrasting and
  contextual consistency.
limitations:
- However, there are still notable limitations in existing methods.
- However, neither of them featurizes time series at different scales to capture scale-invariant
  information, which is es- sential to the success of time series tasks.
- However, the distribu- tions and semantics of time series may change over time,
  and a cropped sub-sequence is likely to have a distinct dis- tribution against the
  original time series.
- However, the above strategies are based on strong as- sumptions of data distribution
  and may be not appropriate for time series data.
