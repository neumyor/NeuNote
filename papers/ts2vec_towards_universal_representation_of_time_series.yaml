translations:
  abstract: 本文提出TS2Vec，一个用于在任意语义层次学习时间序列表示的通用框架。与现有方法不同，TS2Vec通过增强上下文视图以分层方式进行对比学习，从而为每个时间戳生成鲁棒的上下文表示。此外，为了获取时间序列中任意子序列的表示，我们可以对相应时间戳的表示进行简单聚合。我们通过大量时间序列分类任务实验评估时间序列表示的质量。结果，TS2Vec在125个UCR数据集和29个UEA数据集上显著超越现有的无监督时间序列表示SOTA。所学到的时间戳级别表示在时间序列预测和异常检测任务中也取得了优越结果。基于所学表示训练的线性回归模型优于先前的时间序列预测SOTA。此外，我们提出了一种简单的方法将所学表示应用于无监督异常检测，在文献中建立了SOTA结果。源代码公开于
    https://github.com/yuezhihan/ts2vec。
  one_sentence: TS2Vec是一个通过增强上下文视图进行分层对比学习，以在任意语义层次学习时间序列表示的通用框架。
  problem: 学习时间序列的通用表示是一个基础但具有挑战性的问题。
  contributions:
  - 提出TS2Vec，一个统一的框架，用于学习各种语义层次上任意子序列的上下文表示，可应用于分类、预测和异常检测。
  - 引入实例维度和时间维度的分层对比以捕获多尺度上下文信息，以及适用于时间序列的正样本对选择的上下文一致性。
  - 在125个UCR和29个UEA分类数据集上，以及预测和异常检测基准上取得了最先进的结果。
  method:
  - 使用包含输入投影层、时间戳掩码模块和具有十个残差块的扩张CNN的编码器。
  - 进行分层对比学习：时间对比损失（两个增强视图中相同时间戳为正样本，不同时间戳为负样本）和实例对比损失（跨实例的相同时间戳为正样本，不同实例为负样本）。
  - 对所学表示应用多尺度最大池化以聚合子序列表示。
  - 使用上下文一致性进行正样本对选择，通过时间戳掩码和随机裁剪生成上下文视图，避免变换不变性偏差。
  experiments:
  - 在125个UCR和29个UEA分类数据集上评估，相比先前无监督方法平均准确率提升2.4%和3.0%。
  - 在时间序列预测中测试，对所学表示使用线性回归，优于先前预测SOTA。
  - 应用于无监督异常检测，建立了新的SOTA结果。
  - 进行了消融研究以验证分层对比和上下文一致性的有效性。
  limitations:
  - 然而，现有方法仍存在显著的局限性。
  - 然而，它们都没有在不同尺度上对时间序列进行特征提取以捕获尺度不变信息，而这对于时间序列任务的成功至关重要。
  - 然而，时间序列的分布和语义可能随时间变化，裁剪后的子序列很可能与原始时间序列具有不同的分布。
  - 然而，上述策略基于对数据分布的强假设，可能不适用于时间序列数据。
