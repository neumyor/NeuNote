abstract: Cardiovascular diseases (CVDs) remain the leading cause of mortality worldwide,
  highlighting the critical need for efficient and accurate diagnostic tools. Electrocardiograms
  (ECGs) are indispensable in diagnosing various heart conditions; however, their
  manual interpretation is time-consuming and error-prone. In this paper, we propose
  xLSTM-ECG, a novel approach that leverages an extended Long Short-Term Memory (xLSTM)
  network for multi-label classification of ECG signals, using the PTB-XL dataset.
  To the best of our knowledge, this work represents the first design and application
  of xLSTM modules specifically adapted for multi-label ECG classification. Our method
  employs a Short-Time Fourier Transform (STFT) to convert time-series ECG waveforms
  into the frequency domain, thereby enhancing feature extraction. The xLSTM architecture
  is specifically tailored to address the complexities of 12-lead ECG recordings by
  capturing both local and global signal features. Comprehensive experiments on the
  PTB-XL dataset reveal that our model achieves strong multi-label classification
  performance, while additional tests on the Georgia 12-Lead dataset underscore its
  robustness and efficiency. This approach significantly improves ECG classification
  accuracy, thereby advancing clinical diagnostics and patient care. The code will
  be publicly available upon acceptance.
one_sentence: We propose xLSTM-ECG, the first application of extended LSTM (xLSTM)
  networks for multi-label classification of 12-lead ECG signals, achieving state-of-the-art
  performance on PTB-XL.
problem: Electrocardiograms (ECGs) are indispensable in diagnosing various heart conditions;
  however, their manual interpretation is time-consuming and error-prone.
contributions:
- We present a custom-designed xLSTM-based network for multi-label classification
  of 12-lead ECG signals, the first application of xLSTM in this context.
- We employ Short-Time Fourier Transform to convert ECG signals into the frequency
  domain, capturing both temporal and spectral characteristics.
- We thoroughly evaluate our approach on the PTB-XL dataset, demonstrating state-of-the-art
  performance, and further assess its robustness on the Georgia 12-Lead dataset.
method:
- Convert 12-lead ECG signals into time-frequency domain using Short-Time Fourier
  Transform (STFT).
- Apply two layer fusion xLSTM blocks, each consisting of sLSTM and mLSTM modules,
  to capture temporal dependencies and inter-lead interactions.
- Utilize an adaptive fusion mechanism combining average hidden states and attention-based
  aggregation across leads.
- Employ average pooling and independent linear layers for multi-label classification
  into five superclasses.
- Use data augmentation (e.g., random masking) and a weighted loss function to mitigate
  noise and class imbalance.
experiments:
- Evaluated on the PTB-XL dataset for multi-label classification, achieving strong
  performance.
- Additional evaluation on the Georgia 12-Lead dataset demonstrates robustness.
- Achieves state-of-the-art performance compared to standard LSTM and other baselines.
limitations:
- Electrocardiograms (ECGs) are indispensable in diagnosing various heart conditions;
  however, their manual interpretation is time-consuming and error-prone.
- However, manual interpretation of ECG signals can be time-consuming and prone to
  error due to subtle waveform variations.
- However, its potential in multi-lead ECG analysis remains largely unexplored.
- Both modules address standard LSTM limitations by incorporating exponential gating
  and enhanced memory designs, enabling the learning and retention of information
  over longer time spans.
