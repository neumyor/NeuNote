translations:
  abstract: 心血管疾病仍然是全世界死亡的主要原因,突出表明迫切需要高效和准确的诊断工具。 心电图(ECGs)在诊断各种心脏状况时是不可或缺的;然而,其人工解析很耗时,容易出错.
    在本文中,我们提出xLSTM-ECG,这是一种新颖的方法,利用一个扩展的长短期内存(xLSTM)网络对ECG信号进行多标签分类,使用PTB-XL数据集. 就我们所知,这项工作是专门为多标签ECG分类而改编的xLSTM模块的首次设计和应用.
    我们的方法使用一个短时间Fourier Transform(STFT)将时序ECG波形转换成频率域,从而增强特性提取. xLSTM架构是专门设计的,通过捕捉本地和全球信号特性来解决12条线索ECG录音的复杂性.
    对PTB-XL数据集的全面试验显示,我们的模型实现了强有力的多标签分类性能,而对格鲁吉亚12号主数据集的其他测试则强调了它的强性和效率。 这种方法大大提高了ECG分类精度,从而推进了临床诊断和病人护理.
    守则一经接受,即可公开提供。
  one_sentence: 我们提出xLSTM-ECG,这是扩展的LSTM(xLSTM)网络首次应用,用于12铅ECG信号的多标签分类,实现PTB-XL的先进性能.
  problem: 心电图(ECGs)在诊断各种心脏状况时是不可或缺的;然而,其人工解析很耗时,容易出错.
  contributions:
  - 我们提出一个基于自定义的xLSTM网络,用于12条铅ECG信号的多标签分类,这是xLSTM在此背景下的第一个应用.
  - 我们使用短时间的傅里叶变换将ECG信号转换成频率域,捕捉时间和光谱特性.
  - 我们全面评估我们在PTB-XL数据集方面的做法,展示最新业绩,并进一步评估其在格鲁吉亚12号主数据集上的稳健性。
  method:
  - 利用短时傅里叶变换(STFT)将12铅ECG信号转换成时频域.
  - 应用两个层聚变xLSTM块,每个块由sLSTM和mLSTM模块组成,以捕捉时间依赖性和铅间相互作用.
  - 利用适应性聚变机制,将平均隐蔽状态和基于注意力的跨线索汇总结合起来。
  - 使用平均集合和独立的线性层进行多标签分类,分为五个超类.
  - 使用数据增强(如随机遮盖)和加权损失函数来缓解噪音和类失衡.
  experiments:
  - 对PTB-XL数据集进行多标签分类评价,实现强性能.
  - 对格鲁吉亚12条线索数据集的进一步评价表明,数据很可靠。
  - 实现与标准LSTM和其他基线相比的先进性能。
  limitations:
  - 心电图(ECGs)在诊断各种心脏状况时是不可或缺的;然而,其人工解析很耗时,容易出错.
  - 然而,对ECG信号的人工解释可能很耗时,由于细微的波形变异而容易出错.
  - 然而,其在多头ECG分析方面的潜力基本上仍未得到探讨。
  - 这两个模块都通过纳入指数式的刻度和增强的内存设计来解决标准的LSTM限制,从而能够在较长的时间内学习和保留信息.
