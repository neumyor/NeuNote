abstract: We introduce MOMENT, a family of open-source foundation models for general-purpose
  time series analysis. Pre-training large models on time series data is challenging
  due to (1) the absence of a large and cohesive public time series repository, and
  (2) diverse time series characteristics which make multi-dataset training onerous.
  Additionally, (3) experimental benchmarks to evaluate these models, especially in
  scenarios with limited resources, time, and supervision, are still in their nascent
  stages. To address these challenges, we compile a large and diverse collection of
  public time series, called the Time series Pile, and systematically tackle time
  series-specific challenges to unlock large-scale multi-dataset pre-training. Finally,
  we build on recent work to design a benchmark to evaluate time series foundation
  models on diverse tasks and datasets in limited supervision settings. Experiments
  on this benchmark demonstrate the effectiveness of our pre-trained models with minimal
  data and task-specific fine-tuning. Finally, we present several interesting empirical
  observations about large pre-trained time series models. Pre-trained models (AutonLab/MOMENT-1-large)
  and Time Series Pile (AutonLab/Timeseries-PILE) are available on https://huggingface.co/AutonLab.
one_sentence: We introduce MOMENT, a family of open-source foundation models for general-purpose
  time series analysis.
problem: Lack of large cohesive public time series repository, diverse time series
  characteristics making multi-dataset training onerous, and nascent experimental
  benchmarks for evaluating models in limited supervision settings.
contributions:
- Compilation of the Time Series Pile, a large collection of public time series data
  from diverse domains.
- Multi-dataset pre-training framework for time series foundation models using masked
  time series prediction.
- Holistic benchmark for evaluating time series foundation models across five tasks
  in limited supervision settings.
- Release of open-source pre-trained time series models (MOMENT) and datasets.
method:
- Collected Time Series Pile from multiple public repositories with careful train-test
  splitting to avoid contamination.
- Designed transformer encoder architecture processing time series as disjoint patches
  with masked time series prediction pre-training.
- Applied reversible instance normalization for handling distribution shifts.
- Pre-trained models of varying sizes and evaluated on benchmark covering forecasting,
  classification, anomaly detection, and imputation.
experiments:
- Evaluated MOMENT on 5 tasks (short/long-horizon forecasting, classification, anomaly
  detection, imputation) using multiple datasets and metrics in limited supervision
  settings.
- Compared against state-of-the-art deep learning and statistical baselines.
- Studied impact of model size scaling, initialization (random vs language model weights),
  and cross-modal transfer.
limitations:
- To address these chal- lenges, we compile a large and diverse collec- tion of public
  time series, called the Time series Pile, and systematically tackle time series-specific
  challenges to unlock large-scale multi-dataset pre- training.
- unique challenges that modeling time series data poses, time series analysis continues
  to receive substantial interest from academia and industry alike.
- However, modeling such data typically requires substantial domain expertise, time,
  and task-specific design.
- However, contrastive learning relies on data augmentation, which is both subjec-
  tive and data-dependent.
