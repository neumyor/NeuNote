translations:
  abstract: 我们介绍MOMENT，一个用于通用时间序列分析的开源基础模型家族。预训练大规模时间序列模型面临挑战：(1)缺乏大规模统一的公开时间序列库，(2)多变的时间序列特征使得多数据集训练困难，(3)评估这些模型的实验基准，特别是在资源、时间和监督有限的情况下，仍处于起步阶段。为应对这些挑战，我们编制了一个大规模多样的公开时间序列集合，称为Time
    Series Pile，并系统地解决时间序列特定的挑战，以实现大规模多数据集预训练。最后，我们基于近期工作设计了一个基准，用于在有限监督设置下评估时间序列基础模型在各种任务和数据集上的表现。实验表明，我们的预训练模型在极少数据和特定任务微调下的有效性。最后，我们呈现了关于大规模预训练时间序列模型的若干有趣经验观察。预训练模型（AutonLab/MOMENT-1-large）和Time
    Series Pile（AutonLab/Timeseries-PILE）可在https://huggingface.co/AutonLab获取。
  one_sentence: 我们介绍MOMENT，一个用于通用时间序列分析的开源基础模型家族。
  problem: 缺乏大规模统一的公开时间序列库，多变的时间序列特征使得多数据集训练困难，以及评估模型在有限监督设置下的实验基准仍处于起步阶段。
  contributions:
  - 编制了Time Series Pile，一个来自不同领域的大规模公开时间序列数据集合。
  - 用于时间序列基础模型的多数据集预训练框架，使用掩码时间序列预测。
  - 用于在有限监督设置下评估时间序列基础模型在五个任务上的整体基准。
  - 发布开源预训练时间序列模型（MOMENT）和数据集。
  method:
  - 从多个公开数据仓库收集Time Series Pile，并仔细划分训练测试集以避免污染。
  - 设计了Transformer编码器架构，将时间序列处理为不连续的块，并使用掩码时间序列预测进行预训练。
  - 应用可逆实例归一化以处理分布偏移。
  - 预训练了不同大小的模型，并在覆盖预测、分类、异常检测和插补的基准上进行评估。
  experiments:
  - 在5个任务（短/长时域预测、分类、异常检测、插补）上使用多个数据集和指标评估MOMENT，在有限监督设置下。
  - 与最先进的深度学习和统计基线进行比较。
  - 研究了模型大小缩放、初始化（随机与语言模型权重）和跨模态迁移的影响。
  limitations:
  - 为应对这些挑战，我们编制了一个大规模多样的公开时间序列集合，称为Time Series Pile，并系统地解决时间序列特定的挑战，以实现大规模多数据集预训练。
  - 时间序列数据建模带来的独特挑战使得时间序列分析持续受到学术界和工业界的广泛关注。
  - 然而，对此类数据进行建模通常需要大量的领域专业知识、时间和特定任务的设计。
  - 然而，对比学习依赖于数据增强，而这既是主观的又依赖于数据。
