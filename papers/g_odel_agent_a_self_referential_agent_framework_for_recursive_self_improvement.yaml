abstract: The rapid advancement of large language models (LLMs) has significantly
  enhanced the capabilities of agents across various tasks. However, existing agentic
  systems, whether based on fixed pipeline algorithms or pre-defined meta-learning
  frameworks, cannot search the whole agent design space due to the restriction of
  human-designed components, and thus might miss the more optimal agent design. In
  this paper, we introduce Gödel Agent, a self-evolving framework inspired by the
  Gödel machine, enabling agents to recursively improve themselves without relying
  on predefined routines or fixed optimization algorithms. Gödel Agent leverages LLMs
  to dynamically modify its own logic and behavior, guided solely by high-level objectives
  through prompting. Experimental results on multiple domains demonstrate that implementation
  of Gödel Agent can achieve continuous self-improvement, surpassing manually crafted
  agents in performance, efficiency, and generalizability.
one_sentence: Gödel Agent is a self-referential LLM agent framework that recursively
  improves itself by dynamically modifying its own code, eliminating human priors
  in agent design.
problem: Existing LLM agent systems rely on human-designed components that limit the
  search space of optimal agent designs, preventing full exploration of the agent
  design space.
contributions:
- Proposes the first fully self-referential agent framework, G¨odel Agent, implemented
  via monkey patching.
- Demonstrates superiority over previous agent frameworks in performance, flexibility,
  cost, and potential.
- Provides analysis of the optimization process, including self-referential abilities
  and optimized agentic systems.
- Offers a promising direction for flexible and capable agents through recursive self-improvement.
method:
- Inspired by the G¨odel machine, enabling agents to recursively improve without predefined
  routines.
- Uses self-referential property to analyze and modify own code, including the code
  for analysis and modification.
- Implements self-awareness and self-modification via runtime memory manipulation
  (monkey patching).
- Main function implemented as a recursive function, allowing continuous self-optimization.
- Initial agent defined by policy π0 and self-referential learning algorithm I0 =
  (f0, o0), with decision-making and action functions.
experiments:
- Evaluated on multiple domains including coding, science, math, and reasoning.
- Compared against hand-designed agents (e.g., Reflexion, ReAct) and meta-learning
  optimized agents.
- Results show G¨odel Agent achieves continuous self-improvement and surpasses baselines
  in performance, efficiency, and generalizability.
limitations:
- However, there are inevitably some human priors involved in these agent designs
  that cannot be improved during the inference time.
- In contrast, self-referential agent (G ¨odel Agent) can recursively improve itself
  without any limitation.
- For ex- ample, certain frameworks store an agent’s success- ful or failed strategies
  in memory based on environ- mental feedback (Liu et al., 2023; Hu et al., 2023;
  Qian et al., 2024), while others automatically op- timize agent prompts (Khattab
  et al., 2023; Zhang et al., 2024a; Khattab et al., 2023).
- However, these meta-algorithms are also designed manually and remain unchanged once
  deployed, limiting the agents’ ability.
