translations:
  abstract: 大语言模型(LLMS)的迅速发展,大大增强了各种任务代理的能力. 然而,现有的代理系统,无论是基于固定的管道算法还是预先定义的元学习框架,由于人类设计的组件的限制,无法搜索整个代理设计空间,因此可能错过更优化的代理设计.
    在本文中,我们介绍了G"odel Agent"(G"odel Agent"),这是G"odel"机启发的自演框架,它使代理在不依赖预先定义的例行程序或固定优化算法的情况下,能够不断自我改进.
    G"odel Agent" 利用LLMs 来动态修改自身的逻辑和行为,完全以高层次目标为指导,通过催促. 多个领域的实验结果表明,实施G'odel Agent可以实现连续的自我改进,在性能、效率和通用性方面超过手工制作的代理。
  one_sentence: 戈德尔 Agent是一个自我优惠的LLM代理框架,通过动态修改自己的代码,在代理设计中消除人类前身,从而不断自我改善.
  problem: 现有的LLM代理系统依赖于人类设计的组件,这些组件限制了最佳代理设计的搜索空间,阻碍了对代理设计空间的全面探索.
  contributions:
  - 提出第一个完全自我优惠的代理框架,即通过猴子补丁实施的G"odel Agent".
  - 表明在业绩、灵活性、成本和潜力方面优于以前的代理框架。
  - 提供优化过程的分析,包括自我优惠能力和优化的代理系统.
  - 通过递归自我改进,为灵活和有能力的代理人提供有希望的方向。
  method:
  - 受G"odel"机的启发,使剂在没有预先定义的例行程序的情况下进行递归改进.
  - 使用自我优惠属性来分析和修改自己的代码,包括用于分析和修改的代码.
  - 通过运行时内存操纵(monkey补丁)实现自我意识和自我修改.
  - 主要功能作为递归函数执行,允许持续自我优化.
  - 政策π0和自我优惠学习算法I0=(f0,o0)定义的初始代理,具有决策和行动功能.
  experiments:
  - 评估多个领域,包括编码、科学、数学和推理。
  - 与手工设计的代理(如Reflexion,ReAct)和元学习优化代理相比.
  - 结果显示,G“odel Agent”在业绩、效率和通用性方面不断自我改进,超过了基线。
  limitations:
  - 然而,在这些物剂设计中不可避免地有一些人类前科,在推论期间无法改进.
  - 相比之下,自我优惠代理人(G " odel Agent " )可以毫无限制地不断自我改进。
  - 就前足而言,某些框架根据环境-心理反馈储存了一种代理人的成功或失败的记忆策略(Liu等人,2023年;Hu等人,2023年;Qian等人,2024年),而另一些框架则自动使用刺激剂提示(Khattab等人,2023年;Zhang等人,2024年a年;Khattab等人,2023年)。
  - 然而,这些元算法也是手工设计的,部署后保持不变,限制了代理人的能力。
