abstract: Electrocardiography (ECG) is a key non-invasive diagnostic tool for cardiovascular
  diseases which is increasingly supported by algorithms based on machine learning.
  Major obstacles for the development of automatic ECG interpretation algorithms are
  both the lack of public datasets and well-defined benchmarking procedures to allow
  comparisons of different algorithms. To address these issues, we put forward PTB-XL,
  the to-date largest freely accessible clinical 12-lead ECG-waveform dataset comprising
  21837 records from 18885 patients of 10 seconds length. The ECG-waveform data was
  annotated by up to two cardiologists as a multi-label dataset, where diagnostic
  labels were further aggregated into super and subclasses. the dataset covers a broad
  range of diagnostic classes including, in particular, a large fraction of healthy
  records. the combination with additional metadata on demographics, additional diagnostic
  statements, diagnosis likelihoods, manually annotated signal properties as well
  as suggested folds for splitting training and test sets turns the dataset into a
  rich resource for the development and the evaluation of automatic ECG interpretation
  algorithms.
one_sentence: We present PTB-XL, the to-date largest freely accessible clinical 12-lead
  ECG-waveform dataset comprising 21,837 records from 18,885 patients, to address
  the lack of public datasets and standardized benchmarking for automatic ECG interpretation.
problem: Major obstacles for the development of automatic ECG interpretation algorithms
  are both the lack of public datasets and well-defined benchmarking procedures to
  allow comparisons of different algorithms.
contributions:
- Provides the to-date largest freely accessible clinical 12-lead ECG-waveform dataset
  (21,837 records from 18,885 patients).
- Offers multi-label annotations by up to two cardiologists with hierarchical organization
  into 5 superclasses and 24 subclasses.
- 'Includes rich metadata: demographics, diagnostic likelihoods, signal quality annotations,
  and suggested cross-validation folds.'
- Addresses the lack of public ECG datasets and standardized benchmarking procedures
  for machine learning algorithms.
method:
- Converted raw ECG data from proprietary format to standard WFDB format at 16-bit
  precision and 500 Hz (and 100 Hz) sampling frequencies.
- Annotated records using SCP-ECG statements with likelihood information, validated
  by up to two cardiologists; diagnostic labels hierarchically organized into 5 superclasses
  and 24 subclasses.
- Provided stratified cross-validation folds (strat_fold) to facilitate standardized
  evaluation of machine learning algorithms.
- Released rich metadata including demographics, signal quality annotations, and ECG
  statements.
