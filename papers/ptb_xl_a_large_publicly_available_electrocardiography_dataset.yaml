limitations:
- Most notably, this includes the PTB Diagnostic ECG Database 6, which was collected
  during the course of the same long-term project at the PTB, which, however, shares
  no records with the PTB-XL dataset.
- The only exceptions in terms of freely accessible datasets with larger samples sizes
  are the AF classification dataset 14 and the Chinese ICBEB Challenge 2018 dataset15,
  which contain, however, either just single-lead ECGs or cover only a very limited
  set of ECG statements.
