    主要障碍
  problem: 开发自动ECG解析算法的主要障碍是,既缺乏公共数据集,也缺乏明确界定的基准程序,以便可以比较不同算法的s.
  contributions:
  - 提供目前最大的可自由获取的临床12铅ECG波形数据集(来自18,885名病人的21,837份记录)。
  - 提供多标签说明,由最多两名具有等级组织的心脏病学家组成5个超级类和24个子类.
  - 包括丰富的元数据:人口统计,诊断概率,信号质量说明,以及建议的交叉验证折叠.
  - 解决机器学习算法缺乏公共ECG数据集和标准化基准程序的问题.
  method:
  - 以16位精度和500赫兹(和100赫兹)采样频率将原始ECG数据从专有格式转换为标准的WFDB格式.
  - 使用 SCP-ECG 语句附加概率信息的说明性记录,由最多2名心脏病学家验证;诊断标签分级排列为5个超类和24个子类.
  - 提供分级交叉验证折叠(strat fold),以便于对机器学习算法进行标准化评价.
  - 发布了丰富的元数据,包括人口统计、信号质量说明和ECG报表。
  experiments:
