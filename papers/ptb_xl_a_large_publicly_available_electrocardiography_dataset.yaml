translations:
  abstract: 电心学(ECG)是心血管疾病的关键非侵入性诊断工具,越来越多地得到基于机器学习的算法的支持. 开发自动ECG解析算法的主要障碍是,既缺乏公共数据集,也缺乏明确界定的基准程序,以便比较不同的算法.
    为了解决这些问题,我们提出了PTB-XL,这是迄今为止最大的可自由获取的临床12铅ECG波阵数据集,由18885名10秒长的病人的21837个记录组成。 ECG波形数据被多达两位心脏病学家作为多标签数据集注解,诊断标签被进一步归为超级和子类.
    数据集涵盖广泛的诊断类别,其中特别包括很大一部分健康记录。 结合关于人口统计、额外诊断说明、诊断可能性、手动附加说明的信号特性以及分解培训和测试集的建议折叠,使数据集成为开发和评价自动ECG解释算法的丰富资源。
  one_sentence: 1 科学数据 QQ(2020年) 7:154 | https://doi.org/10.1038/s41597-020-0495-6
