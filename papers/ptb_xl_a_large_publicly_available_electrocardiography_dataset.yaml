  - 开发自动ECG解析算法的主要障碍是,既缺乏公共数据集,也缺乏明确界定的基准程序,以便可以比较不同算法的s.
  - 为了解决这些问题,我们提出了PTB-XL,这是迄今为止最大的可自由获取的临床12铅ECG波阵数据集,由18885名10秒长的病人的21837个记录组成。
  - ECG波形数据被多达两位心脏病学家作为多标签数据集注解,诊断标签被进一步归为超级和子类.
  - 该数据集涵盖广泛的诊断类别,其中特别包括很大一部分健康记录。
  limitations:
  - 最值得注意的是,这包括PTB诊断ECG数据库6,该数据库是在PTB同一长期项目期间收集的,但该数据库没有与PTB-XL数据集共享记录.
  - 在具有较大样本尺寸的可自由访问数据集方面,唯一的例外是AF分类数据集14和中国ICBEB Challenge 2018数据集15,但其中要么只包含单铅ECG,要么只包含一套非常有限的ECG声明.
