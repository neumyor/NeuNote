abstract: 'Multivariate time series forecasting (MTSF) aims to learn temporal dynamics
  among variables to forecast future time series. Existing statistical and deep learning-based
  methods suffer from limited learnable parameters and small-scale training data.
  Recently, large language models (LLMs) combining time series with textual prompts
  have achieved promising performance in MTSF. However, we discovered that current
  LLM-based solutions fall short in learning disentangled embeddings. We introduce
  TimeCMA, an intuitive yet effective framework for MTSF via cross-modality alignment.
  Specifically, we present a dual-modality encoding with two branches: the time series
  encoding branch extracts disentangled yet weak time series embeddings, and the LLM-empowered
  encoding branch wraps the same time series with text as prompts to obtain entangled
  yet robust prompt embeddings. As a result, such a cross-modality alignment retrieves
  both disentangled and robust time series embeddings, ''the best of two worlds'',
  from the prompt embeddings based on time series and prompt modality similarities.
  As another key design, to reduce the computational costs from time series with their
  length textual prompts, we design an effective prompt to encourage the most essential
  temporal information to be encapsulated in the last token: only the last token is
  passed to downstream prediction. We further store the last token embeddings to accelerate
  inference speed. Extensive experiments on eight real datasets demonstrate that TimeCMA
  outperforms state-of-the-arts.'
one_sentence: TimeCMA is an LLM-empowered framework for multivariate time series forecasting
  that achieves state-of-the-art performance by using cross-modality alignment to
  retrieve disentangled and robust time series embeddings from prompt embeddings.
problem: However, we discovered that current LLM-based solutions fall short in learning
  disentangled embeddings.
contributions:
- We identify data entanglement issues in the embeddings of dual-modality LLMs for
  time series forecasting and proposed a TimeCMA framework to learn disentangled embeddings
  from LLM with text-time series data.
- The cross-modality alignment module retrieves disentangled and robust time series
  embeddings from the LLM-empowered prompt embeddings via channel-wise similarity
  to enhance forecasting.
- We tailor the last token of each prompt to reduce the computational costs. We then
  store these last token embeddings to avoid repetitive processings with the frozen
  LLM for efficient forecasting.
- Extensive experiments on eight datasets demonstrate that TimeCMA outperforms state-of-the-arts.
method:
- Dual-modality encoding with a time series encoding branch (inverted embedding and
  Transformer encoder) and an LLM-empowered prompt encoding branch (frozen LLM and
  prompt encoder).
- Cross-modality alignment that retrieves robust time series components from prompt
  embeddings using channel-wise similarity and aggregates them with disentangled time
  series embeddings.
- Prompt design that encapsulates essential temporal information in the last token,
  so only the last token is used for downstream forecasting.
- Offline storage of last token embeddings to avoid repetitive processing with the
  frozen LLM, reducing computational cost and accelerating inference.
experiments:
- 'Extensive experiments on eight real-world datasets: ETTm1, ETTm2, ETTh1, ETTh2,
  and others.'
- Compared with seven baseline models across five categories (statistical, CNN, Transformer,
  time series-based LLM, prompt-based LLM).
- TimeCMA consistently outperforms state-of-the-art methods in forecasting accuracy.
- Ablation studies confirm the effectiveness of cross-modality alignment and last
  token storage, and efficiency analyses show reduced computational cost.
limitations:
- However, we discovered that current LLM-based solutions fall short in learning disentangled
