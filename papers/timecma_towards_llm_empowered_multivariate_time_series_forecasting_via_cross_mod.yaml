translations:
  abstract: 多元时间序列预测（MTSF）旨在学习变量之间的时间动态以预测未来的时间序列。现有的统计和基于深度学习的方法由于可学习参数有限和训练数据规模较小而表现不佳。最近，将时间序列与文本提示相结合的大语言模型（LLM）在MTSF中取得了有前景的性能。然而，我们发现当前基于LLM的解决方案在学习解耦嵌入方面存在不足。我们提出TimeCMA，一个通过跨模态对齐进行MTSF的直观且有效的框架。具体地，我们提出一种双模态编码，包含两个分支：时间序列编码分支提取解耦但较弱的时间序列嵌入，而LLM赋能的编码分支将相同的时间序列与文本作为提示包裹，以获得耦合但鲁棒的提示嵌入。结果，这种跨模态对齐基于时间序列和提示模态的相似性，从提示嵌入中检索出既解耦又鲁棒的时间序列嵌入，即“两个世界的最佳”。作为另一个关键设计，为了减少由时间序列及其长度文本提示带来的计算成本，我们设计了一种有效的提示，鼓励最核心的时间信息被封装在最后一个token中：仅最后一个token被传递给下游预测。我们还存储最后一个token嵌入以加速推理速度。在八个真实数据集上的大量实验表明，TimeCMA优于现有最先进方法。
  one_sentence: TimeCMA是一个LLM赋能的多元时间序列预测框架，通过跨模态对齐从提示嵌入中检索解耦且鲁棒的时间序列嵌入，实现了最先进的性能。
  problem: 然而，我们发现当前基于LLM的解决方案在学习解耦嵌入方面存在不足。
  contributions:
  - 我们识别出用于时间序列预测的双模态LLM嵌入中的数据纠缠问题，并提出了TimeCMA框架，用于从带有文本-时间序列数据的LLM中学习解耦嵌入。
  - 跨模态对齐模块通过通道级相似性从LLM赋能的提示嵌入中检索解耦且鲁棒的时间序列嵌入，以增强预测性能。
  - 我们针对每个提示的最后一个token进行定制以减少计算成本。然后存储这些最后一个token嵌入，以避免重复处理冻结的LLM，从而实现高效预测。
  - 在八个数据集上的大量实验表明，TimeCMA优于现有最先进方法。
  method:
  - 双模态编码，包含时间序列编码分支（倒置嵌入和Transformer编码器）和LLM赋能的提示编码分支（冻结的LLM和提示编码器）。
  - 跨模态对齐，通过通道级相似性从提示嵌入中检索鲁棒的时间序列分量，并将其与解耦的时间序列嵌入聚合。
  - 提示设计，将关键时间信息封装在最后一个token中，因此仅使用最后一个token进行下游预测。
  - 离线存储最后一个token嵌入，避免重复处理冻结的LLM，从而降低计算成本并加速推理。
  experiments:
  - 在八个真实世界数据集上进行了大量实验：ETTm1、ETTm2、ETTh1、ETTh2等。
  - 与七个基线模型（涵盖统计、CNN、Transformer、基于时间序列的LLM、基于提示的LLM五类）进行比较。
  - TimeMCA在预测准确性上持续优于最先进方法。
  - 消融研究证实了跨模态对齐和最后一个token存储的有效性，效率分析显示计算成本降低。
  limitations:
  - 然而，我们发现当前基于LLM的解决方案在学习解耦嵌入方面存在不足。
  - 然而，有限的可学习参数和小规模的训练数据阻碍了这些方法实现更好的性能和更强的鲁棒性（Jin et al.）。
  - 然而，这个用随机权重初始化的嵌入层由于时间序列和语言数据之间的领域差距，通常导致弱嵌入。
  - 尽管基于提示的LLM取得了显著性能，但它们面临数据纠缠问题的挑战（Chang et al.）。
