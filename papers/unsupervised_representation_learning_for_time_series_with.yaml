abstract: Time series are often complex and rich in information but sparsely labeled
  and therefore challenging to model. In this paper, we propose a self-supervised
  framework for learning generalizable representations for non-stationary time series.
  Our approach, called Temporal Neighborhood Coding (TNC), takes advantage of the
  local smoothness of a signal’s generative process to define neighborhoods in time
  with stationary properties. Using a debiased contrastive objective, our framework
  learns time series representations by ensuring that in the encoding space, the distribution
  of signals from within a neighborhood is distinguishable from the distribution of
  non-neighboring signals. Our motivation stems from the medical field, where the
  ability to model the dynamic nature of time series data is especially valuable for
  identifying, tracking, and predicting the underlying patients’ latent states in
  settings where labeling data is practically impossible. We compare our method to
  recently developed unsupervised representation learning approaches and demonstrate
  superior performance on clustering and classification tasks for multiple datasets.
one_sentence: Temporal Neighborhood Coding (TNC) learns generalizable representations
  for non-stationary time series by defining stationary neighborhoods and using a
  debiased contrastive objective.
problem: Real-world time series are high-dimensional, complex, non-stationary, and
  often sparsely labeled, making supervised learning challenging.
contributions:
- We present a novel neighborhood-based unsupervised learning framework for non-stationary
  multivariate time series data.
- We introduce the concept of a temporal neighborhood with stationary properties,
  where boundaries are automatically determined using signal properties and statistical
  testing.
- We incorporate Positive-Unlabeled Learning with sample weight adjustment to address
  sampling bias in the contrastive loss.
method:
- Define temporal neighborhood around each window using a Gaussian distribution centered
  at the window, with range determined by the Augmented Dickey-Fuller test for stationarity.
- Train an encoder to map windows to representations and a discriminator to predict
  neighborhood membership.
- Use a debiased contrastive objective that treats non-neighboring samples as unlabeled
  with weight adjustment based on Positive-Unlabeled learning.
- The overall loss encourages representations to be similar within neighborhoods and
  distinguishable from outside samples.
experiments:
- Compare TNC to existing unsupervised representation learning methods on multiple
  time series datasets for classification and clustering.
- Evaluate on physiological signals and human activity recognition data, showing transferable
  representations.
- Ablation study on the impact of the weight parameter w and neighborhood range η
  on downstream tasks.
limitations:
- The neighborhood range η is a critical hyperparameter; the ADF test provides automatic
  estimation but may not always capture optimal boundaries.
- The weight parameter w in the PU-based debiasing introduces an additional hyperparameter
  that requires tuning.
