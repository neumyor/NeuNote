translations:
  abstract: 时间序列通常复杂且信息丰富，但标签稀疏，因此建模具有挑战性。在本文中，我们提出了一种自监督框架，用于学习非平稳时间序列的通用表示。我们的方法称为时间邻域编码（Temporal
    Neighborhood Coding, TNC），利用信号生成过程的局部平滑性来定义具有平稳属性的时间邻域。通过使用去偏对比目标，我们的框架学习时间序列表示，确保在编码空间中，邻域内信号的分布与邻域外信号的分布是可区分的。我们的动机源于医学领域，在该领域中，对时间序列数据动态性质进行建模的能力对于在标记数据几乎不可能的情况下识别、跟踪和预测患者潜在状态尤为重要。我们将我们的方法与最近开发的无监督表示学习方法进行比较，并在多个数据集上的聚类和分类任务中展示了优越的性能。
  one_sentence: 时间邻域编码（TNC）通过定义平稳邻域并使用去偏对比目标，学习非平稳时间序列的通用表示。
  problem: 真实世界的时间序列具有高维、复杂、非平稳且通常标签稀疏的特点，使得监督学习具有挑战性。
  contributions:
  - 我们提出了一种新颖的基于邻域的无监督学习框架，用于非平稳多元时间序列数据。
  - 我们引入了具有平稳属性的时间邻域概念，其中边界通过使用信号属性和统计检验自动确定。
  - 我们结合了带有样本权重调整的正-无标签学习（Positive-Unlabeled Learning），以解决对比损失中的采样偏差。
  method:
  - 使用以窗口为中心的高斯分布定义每个窗口周围的时间邻域，其范围通过增广迪基-福勒检验（Augmented Dickey-Fuller test）确定平稳性。
  - 训练一个编码器将窗口映射到表示，并训练一个判别器来预测邻域成员关系。
  - 使用去偏对比目标，将非邻域样本视为未标记样本，并基于正-无标签学习进行权重调整。
  - 总体损失鼓励表示在邻域内相似，并与外部样本可区分。
  experiments:
  - 在多个时间序列数据集上，将TNC与现有的无监督表示学习方法在分类和聚类任务上进行对比。
  - 在生理信号和人类活动识别数据上进行评估，展示了可迁移的表示。
  - 对权重参数w和邻域范围η在下游任务上的影响进行消融研究。
  limitations:
  - 邻域范围η是一个关键的超参数；ADF检验提供了自动估计，但可能并不总能捕捉到最优边界。
  - 基于PU去偏中的权重参数w引入了一个需要调节的额外超参数。
