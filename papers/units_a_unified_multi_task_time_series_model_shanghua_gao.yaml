translations:
  abstract: 尽管预训练Transformer和基于文本的LLM（大语言模型）在时间序列任务上表现出强劲性能，但最优架构在不同任务间差异很大，大多数模型仅聚焦于特定领域（如时间序列预测）。将预测性和生成性时间序列任务统一到单一模型中仍然具有挑战性。我们提出了UNITS，一个统一的多任务时间序列模型，利用任务令牌化将预测性和生成性任务整合到单一框架中。UNITS采用改进的Transformer块捕获通用时间序列表示，从而能够从具有多样化动态模式、采样率和时间尺度的异构多领域预训练数据集中迁移到具有不同任务规范和领域范围的下游数据集。在涵盖人体活动传感器、医疗、工程和金融等38个数据集上的测试表明，UNITS在12个预测模型、20个分类模型、18个异常检测模型和16个插补模型（包括经过改编的基于文本的LLM）中均取得了优越性能。此外，UNITS在应用于新领域和新任务时展现出强大的少样本和提示（prompt）能力。在单任务设置中，UNITS优于具有竞争力的任务专用时间序列模型。代码和数据集可在
    https://github.com/mims-harvard/UniTS 获取。
  one_sentence: UNITS是一个统一的多任务时间序列模型，利用任务令牌化和改进的Transformer在多个领域联合处理预测、分类、异常检测和插补任务。
  problem: 开发能够在单一框架下统一预测性和生成性任务的多任务时间序列模型仍然是一个开放的挑战。
  contributions:
  - 引入了任务令牌化，将任务规范编码为统一的令牌表示，无需架构修改即可实现通用任务规范。
  - 提出了一种统一的时间序列架构，包括跨时间和变量维度的自注意力、动态线性算子以及处理异构数据的模块。
  - 证明了一个单一共享权重模型可以处理跨四种任务类型的38个数据集，在许多任务专用和基于LLM的基线方法中表现更优。
  method:
  - 任务令牌化：将任务规范（如预测时间范围、类别数量）编码为统一的令牌表示。
  - 统一架构：使用改进的Transformer，分别在时间和变量维度上应用自注意力，使用动态MLP建模时间关系，以及使用门控机制减少异构特征间的干扰。
  - 通过掩码重建在多个领域上进行预训练，实现生成性和预测性任务的联合优化。
  - 三种令牌类型：样本令牌（来自输入）、提示令牌（任务上下文）和任务令牌（GEN用于生成，CLS用于预测）。
  experiments:
  - 在来自人体活动传感器、医疗、工程和金融领域的38个数据集上进行了评估。
  - 与12个预测方法、20个分类方法、18个异常检测方法和16个插补方法进行了比较，包括基于Transformer、基于LLM、基于RNN和传统方法。
  - 在单任务设置中，UNITS在所有四种任务类型上均优于任务专用模型。
  - 在多任务设置中，单一共享权重模型实现了最高平均性能，并在38个任务中的27个上表现最佳。
  - 支持基于提示的学习：在冻结权重的情况下，对预测数据集进行提示微调获得的MAE（0.376）略优于完全微调（0.381）。
  - 少样本迁移在插补任务上MSE提升了12.4%，在异常检测任务上F1提升了2.3%，均优于最强基线。
  limitations:
  - 开发能够在单一框架下统一预测性和生成性任务的多任务时间序列模型仍然是一个开放的挑战。
  - 为了应对这些挑战，我们引入了UNITS，一个统一的多任务时间序列模型，能够处理广泛的时间序列任务。
  - 然而，这些方法仍然需要针对每个任务的任务专用模块和调优。
