abstract: Although pre-trained transformers and reprogrammed text-based LLMs have
  shown strong performance on time series tasks, the best-performing architectures
  vary widely across tasks, with most models narrowly focused on specific areas, such
  as time series forecasting. Unifying predictive and generative time series tasks
  within a single model remains challenging. We introduce UNITS, a unified multi-task
  time series model that utilizes task tokenization to integrate predictive and generative
  tasks into a single framework. UNITS employs a modified transformer block to capture
  universal time series representations, enabling transferability from a heterogeneous,
  multi-domain pre-training dataset—characterized by diverse dynamic patterns, sampling
  rates, and temporal scales—to a wide range of downstream datasets with varied task
  specifications and data domains. Tested on 38 datasets across human activity sensors,
  healthcare, engineering, and finance, UNITS achieves superior performance compared
  to 12 forecasting models, 20 classification models, 18 anomaly detection models,
  and 16 imputation models, including adapted text-based LLMs. UNITS also demonstrates
  strong few-shot and prompt capabilities when applied to new domains and tasks. In
  single-task settings, UNITS outperforms competitive task-specialized time series
  models. Code and datasets are available at https://github.com/mims-harvard/UniTS.
one_sentence: UNITS is a unified multi-task time series model that uses task tokenization
  and a modified transformer to jointly handle forecasting, classification, anomaly
  detection, and imputation across diverse domains.
problem: Developing multi-task time series models that unify predictive and generative
  tasks under a single framework remains an open challenge.
contributions:
- Introduces task tokenization to encode task specifications into a unified token
  representation, enabling universal task specification without architectural modifications.
- Proposes a unified time series architecture with self-attention across time and
  variable dimensions, a dynamic linear operator, and modules to handle heterogeneous
  data.
- Demonstrates that a single shared-weight model can handle 38 datasets across four
  task types, outperforming many task-specific and LLM-based baselines.
method:
- 'Task tokenization: encodes task specifications (e.g., forecasting horizon, number
  of classes) into a unified token representation.'
- 'Unified architecture: uses a modified transformer with self-attention separately
  on time and variable dimensions, a dynamic MLP to model temporal relationships,
  and gating mechanisms to reduce interference across heterogeneous features.'
- Pre-training via masked reconstruction on multiple domains, enabling joint optimization
  for both generative and predictive tasks.
- 'Three token types: sample tokens (from input), prompt tokens (task context), and
  task tokens (GEN for generative, CLS for predictive).'
experiments:
- Evaluated on 38 datasets from human activity sensors, healthcare, engineering, and
  finance.
- Compared against 12 forecasting, 20 classification, 18 anomaly detection, and 16
  imputation methods, including transformer-based, LLM-based, RNN-based, and traditional
  approaches.
- In single-task setting, UNITS outperforms task-specialized models across all four
  task types.
- In multi-task setting, a single shared-weight model achieves highest average performance
  and excels on 27 out of 38 tasks.
- 'Supports prompt-based learning: with frozen weights, prompt tuning on forecasting
  datasets achieves slightly better MAE (0.376 vs 0.381) than full fine-tuning.'
- Few-shot transfer shows 12.4% MSE improvement on imputation and 2.3% F1 improvement
  on anomaly detection over strongest baselines.
limitations:
- Developing multi-task time series models that unify predictive and generative tasks
  under a single framework remains an open challenge.
- To address these challenges, we introduce UNITS, a unified multi-task time se- ries
  model capable of handling a broad spec- trum of time series tasks.
- However, these approaches still require task-specific modules and tuning for each
  task.
