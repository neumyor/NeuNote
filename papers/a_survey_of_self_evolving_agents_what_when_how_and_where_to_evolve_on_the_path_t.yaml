problem: Large Language Models (LLMs) remain fundamentally static, unable to adapt
  their internal parameters to novel tasks, evolving knowledge domains, or dynamic
  interaction contexts, which becomes a critical bottleneck in open-ended, interactive
  environments.
contributions:
- 'We establish a unified theoretical framework for characterizing self-evolutionary
  processes in agent systems, anchored around three fundamental dimensions: what evolves,
  how it evolves, and when it evolves, providing clear design guidance for future
  self-evolving agentic systems.'
- We further investigate the evaluation benchmark or environment tailored for self-evolving
  agents, highlighting emerging metrics and challenges related to adaptability, robustness,
  and real-world complexity.
- We showcase several key real-world applications across various domains, including
  autonomous software engineering, personalized education, healthcare, and intelligent
  virtual assistance, illustrating the practical potential of self-evolving agents.
- We identify critical open challenges and promising future research directions, emphasizing
  aspects like safety, personalization, multi-agent co-evolution, and scalability.
