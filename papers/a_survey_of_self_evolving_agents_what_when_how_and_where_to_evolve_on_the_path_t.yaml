translations:
  abstract: 大型语言模型(LLMs)在各种任务中表现出了显著的能力,但基本上保持不变,无法使其内部参数适应新任务、不断发展的知识领域或动态互动环境。 由于LLMS越来越多地部署在无限制、互动的环境中,这种静态性质已成为一个关键的瓶颈,需要能够适应性地理性、采取行动和实时演变的代理人。
    这种范式的转变——从扩大静态模型到发展自我演变的代理人——引起了人们日益关注能够从数据、互动和经验中不断学习和适应的结构和方法。 这次调查对自我演化的代理人进行了第一次系统而全面的审查,围绕三个基本方面——什么是演化的,什么时候演化的,怎样演化的——组织现场.
    我们审查跨代理构件(如模型,内存,工具,架构)的演化机制,将适应方法按阶段分类(如测试内期,测试间期),并分析指导演化适应的算法和建筑设计(如刻度奖励,文字反馈,单代理和多代理系统).
    此外,我们分析了针对自我演化剂的评估指标和基准,强调了编码、教育和卫生保健等领域的应用,并确定了安全、可扩展性和共同演化动态方面的重大挑战和研究方向。 通过提供一个理解和设计自我演化剂的结构化框架,本调查为在研究和现实世界部署中推进更适应性强,能力强,能力强,多用途的代理系统确立了路线图,并最终揭示了人工超级智能(ASI)的实现,即特工在众多任务中自主地演化并超越人级智能行事.
  one_sentence: 本次调查对自我演化的主体进行了第一次系统而全面的审查,围绕三个基本层面组织实地工作:什么是演化,什么时候演化,怎样演化.
  problem: 大语言模型(LLMs)仍然从根本上保持静态,无法使其内部参数适应新任务,不断发展的知识领域,或动态的交互环境,这成为开放,互动环境中的关键瓶颈.
  contributions:
  - 我们建立统一的理论框架,在物剂系统中突出自我进化过程的特点,围绕三个基本方面:什么进化,怎样进化,什么时候进化,为未来的自进化物剂系统提供明确的设计指导.
  - 我们进一步调查了适合自我发展因素的评价基准或环境,突出强调了新出现的与适应性、稳健性和现实世界复杂性有关的衡量标准和挑战。
  - 我们展示了一些跨越不同领域的关键现实世界应用,包括自主软件工程、个性化教育、医疗保健和智能虚拟援助,说明了自我发展代理人的实际潜力。
  - 我们确定了重大的公开挑战和有希望的未来研究方向,强调安全、个性化、多剂共演和可扩展性等方面。
