abstract: Anomaly detection (AD) is essential in areas such as fraud detection, network
  monitoring, and scientific research. However, the diversity of data modalities and
  the increasing number of specialized AD libraries pose challenges for non-expert
  users who lack in-depth library-specific knowledge and advanced programming skills.
  To tackle this, we present AD-A GENT , an LLM-driven multi-agent framework that
  turns natural-language instructions into fully executable AD pipelines. AD-A GENT
  coordinates specialized agents for intent parsing, data preparation, library and
  model selection, documentation mining, and iterative code generation and debugging.
  Using a shared short-term workspace and a long-term cache, the agents integrate
  popular AD libraries like PyOD, PyGOD, and TSLib into a unified workflow. Experiments
  demonstrate that AD-A GENT produces reliable scripts and recommends competitive
  models across libraries. The system is open-sourced to support further research
  and practical applications in AD.
one_sentence: AD-Agent is an LLM-driven multi-agent framework that turns natural-language
  instructions into fully executable anomaly detection pipelines.
problem: However, the diversity of data modalities and the increasing number of specialized
  AD libraries pose challenges for non-expert users who lack in-depth library-specific
  knowledge and advanced programming skills.
contributions:
- 'Unified multi-modal-library automation: first multi-agent framework that integrates
  multiple domain-specific AD libraries (PyOD, PyGOD, TSLib), enabling end-to-end,
  cross-modality pipeline construction from natural language.'
- 'Modular, extensible, and long-lifecycle design: loosely coupled agents for reasoning,
  retrieval, and generation that allow new libraries and tasks to be incorporated
  with minimal changes.'
- 'Accessible to non-experts: converts natural language instructions into executable
  scripts and supports diverse data types, enabling users without programming skills
  or specialized knowledge to start easily.'
- 'Open-source release: system released at https://github.com/USC-FORTIS/AD-AGENT
  as a practical, extensible platform for LLM-driven AD research and real-world applications.'
method:
- 'Decomposes AD workflow into specialized LLM-powered agents: Processor, Selector,
  Info Miner, Code Generator, Reviewer, Evaluator, and Optimizer.'
- Uses shared short-term memory for context and long-term memory as cache for model
  information to reduce web queries.
- Integrates multiple AD libraries (PyOD, PyGOD, TSLib) to support cross-modality
  anomaly detection from natural language instructions.
experiments:
- Evaluated pipeline generation success rate, latency, and cost across PyOD, PyGOD,
  TSLib using GPT-4o.
- Assessed model selection quality by comparing LLM-recommended models against best
  and average baselines on multiple datasets for PyOD and PyGOD.
- Analyzed failure modes and the effectiveness of the code generator-reviewer correction
  loop.
limitations:
- Recurring failure modes from unaddressed data constraints (e.g., GAAN requires binary
  targets).
- Errors from library inconsistencies or deprecated functions (e.g., DOMINAT import
  failure, Pyraformer input-size mismatches).
- Reliance on LLM API calls incurs cost and latency, especially for web searches in
  Info Miner.
