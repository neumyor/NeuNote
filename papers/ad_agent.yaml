translations:
  abstract: 异常检测在欺诈检测、网络监测和科学研究等领域至关重要。 然而,数据模式的多样性和专业化的反倾销图书馆数量的增加对缺乏深入的图书馆知识和高级编程技能的非专家用户提出了挑战。
    为了解决这一问题,我们提出了AD-A GENT,这是一个LLM驱动的多代理框架,将自然语言指令转化为完全可执行的AD管道。 AD-A GENT协调专门的代理,用于意向分析,数据准备,库和模型选择,文件挖掘,以及迭代代码生成和调试.
    使用共享的短期工作空间和长期缓存,代理将PyOD,PyGOD,TSLib等流行的AD库整合到一个统一的工作流程中. 实验证明AD-A GENT制作可靠的脚本,推荐跨库的竞争性模型.
    该系统是开源的,以支持AD的进一步研究和实际应用.
  one_sentence: AD-Agent是一个LLM驱动的多剂框架,将自然语言指令转化为完全可执行的异常检测管道.
  problem: 然而,数据模式的多样性和专业化的反倾销图书馆数量的增加对缺乏深入的图书馆知识和高级编程技能的非专家用户提出了挑战。
  contributions:
  - 统一的多模式图书馆自动化:第一个整合多个域特有AD库(PyOD,PyGOD,TSLib)的多代理框架,使端到端,跨模式管道从自然语言构建成为可能.
  - 模块化,可扩展,和长寿命周期设计:用于推理,检索,和生成的松散组合的代理,允许新库和任务以最小的改变结合.
  - 非专家可访问:将自然语言指令转换为可执行脚本,并支持多种数据类型,使没有编程技能或专业知识的用户能够轻松启动.
  - 开源发布:在https://github.com/USC-FORTIS/AD-AGENT上发布的系统是LLM驱动的AD研究和现实世界应用的实用,可扩展的平台.
  method:
  - 将AD工作流程分解为专门的LLM动力代理:处理器,选择器,Info Miner,代码生成器,审查器,评价器,以及优化器.
  - 使用共享的短期内存用于上下文和长期内存作为模型信息的缓存以减少网络查询.
  - 整合多个AD库(PyOD,PyGOD,TSLib),支持从自然语言指令中进行跨模式异常检测.
  experiments:
  - 利用GPT-4o评估了PyOD、PyGOD、TSLib的管道生成成功率、耐久性和成本。
  - 通过将LLM推荐模型与PyOD和PyGOD多个数据集上的最佳和平均基线进行比较,评估模型选择质量.
  - 分析故障模式和代码生成器-审查器修正环的有效性.
  limitations:
  - 来自未解决数据制约的经常性故障模式(如GAAN需要二进制目标).
  - 因库不一致或功能贬值而出错(如DOMINAT导入失败,Pyraformer输入大小不匹配).
  - 依赖LLM API的电话需要花费和时间,特别是Info Miner的网络搜索。
