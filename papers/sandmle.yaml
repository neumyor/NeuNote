abstract: 'As large language model agents advance beyond software engineering (SWE)
  tasks toward machine learning engineering (MLE), verifying agent behavior becomes
  orders of magnitude more expensive: while SWE tasks can be verified via fast-executing
  unit tests, MLE verification requires running full ML pipelines—data preprocessing,
  model training, and metric evaluation—on large datasets at each rollout step, rendering
  trajectory-wise on-policy reinforcement learning (RL) prohibitively slow. Existing
  approaches retreat to supervised fine-tuning (SFT) or offline proxy rewards, sacrificing
  the exploration and generalization benefits of on-policy RL. We observe that sandbox
  data size is the primary source of this bottleneck. Based on this insight, we introduce
  SandMLE, a multi-agent framework that generates diverse, verifiable synthetic MLE
  environments from a small number of seed tasks, preserving the structural and technical
  complexity of real-world problems while constraining datasets to micro-scale (each
  task is paired with only 50–200 training samples). Through extensive experiments,
  we show that SandMLE reduces execution time by over 13×, enabling large-scale, on-policy
  trajectory-wise RL for the first time in the MLE domain. On MLE-bench-lite, SandMLE
  yields significant gains over SFT baselines across Qwen3-8B, 14B, and 30B-A3B, with
  relative medal rate improvements ranging from 20.3% to 66.9%. Furthermore, the trained
  policy generalizes across unseen agentic scaffolds, achieving up to 32.4% better
  HumanRank score on MLE-Dojo.'
one_sentence: SandMLE is a multi-agent framework that generates diverse, verifiable
  synthetic MLE environments with micro-scale datasets to reduce execution latency
  by over 13×, enabling trajectory-wise on-policy reinforcement learning for machine
  learning engineering agents.
problem: On-policy reinforcement learning for machine learning engineering (MLE) agents
  is prohibitively slow because each rollout step requires running full ML pipelines
  on large datasets, with execution times averaging nearly 200 seconds, making large-scale
  training infeasible.
contributions:
- 'Scalable Synthetic MLE Sandbox Generation: A novel multi-agent framework that procedurally
  extracts structural DNA from seed tasks to generate diverse, high-quality, and verifiable
  synthetic MLE tasks with micro-scale datasets.'
- 'Trajectory-wise RL for MLE: Leveraging synthetic environments, we propose and successfully
  apply trajectory-wise RL with milestone-based reward to the MLE domain, enabling
  LLMs to learn complex, long-horizon trial-and-error strategies.'
- 'Framework-Agnostic Generalization: Models trained via our approach achieve significant
  performance gains (20.3%–66.9% relative improvement in Any Medal rate over SFT on
  MLE-bench-lite) and generalize robustly across unseen agentic scaffolds.'
method:
- 'Multi-agent framework with four specialized roles: Data Strategist (abstracts structural
  DNA from seed tasks), MLE Developer (procedurally generates data and embeds hidden
  rules), MLOps Engineer (constructs deterministic evaluation sandboxes), and Technical
  Writer (synthesizes final task specifications).'
- Generates micro-scale datasets (50–200 samples) that preserve structural complexity
  while reducing average execution time to under 15 seconds.
- Trajectory-wise reinforcement learning using GRPO with a dense, milestone-based
  reward to mitigate reward sparsity in long-horizon agentic tasks.
experiments:
- SandMLE reduces execution time by over 13× compared to standard MLE tasks, enabling
  large-scale on-policy RL.
- On MLE-bench-lite, SandMLE yields significant gains over SFT baselines across Qwen3-8B,
  14B, and 30B-A3B models, with relative medal rate improvements of 20.3% to 66.9%.
- The trained policy generalizes across unseen agentic scaffolds, achieving up to
  32.4% better HumanRank score on MLE-Dojo.
limitations:
- The approach relies on synthetic environments that may not capture all real-world
  MLE complexities.
- Evaluation is limited to MLE-bench-lite and MLE-Dojo; performance on other benchmarks
  or real-world tasks is not assessed.
- The multi-agent generation pipeline itself may introduce overhead and dependence
  on underlying LLM capabilities.
