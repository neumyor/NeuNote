translations:
  abstract: 随着大型语言模型代理商超越软件工程(SWE)任务向机器学习工程(MLE)推进,验证代理商行为变得数量级更为昂贵:虽然SWE任务可以通过快速执行的单元测试进行核查,但MLE验证要求在每个推出步骤的大型数据集上运行完整的ML管道——数据预处理,模型培训和度量评价,使轨迹在政策强化学习(RL)上过于缓慢.
    现有办法退缩,以监督微调(SFT)或离线代理奖励,牺牲政策上RL的探索和概括效益. 我们观察到,沙盒数据大小是这个瓶颈的主要来源. 基于这种洞察力,我们引入了SandMLE(SandMLE),这是一个多剂框架,它从少量种子任务中生成多样,可核查的合成MLE环境,保留现实世界问题的结构和技术复杂性,同时将数据集限制在微观尺度(每个任务只配50~200个培训样本).
    通过广泛的实验,我们显示SandMLE将执行时间缩短了13××以上,使得MLE域首次能够大规模,政策性轨迹的RL. 在MLE-bench-lite上,SandMLE在Qune3-8B,14B,30B-A3B的SFT基线上获得显著收益,相对的奖牌率提高幅度从20.3%到66.9%不等.
    此外,训练有素的政策概括了看不见的代理脚手架,在MLE-Dojo上取得了高达32.4%的改善。
  one_sentence: SandMLE是一个多剂框架,它产生多样,可核查的合成MLE环境,带有微尺度数据集,可以减少13×以上的执行延迟,使得机器学习工程代理能够进行轨迹上的政策强化学习.
  problem: 机器学习工程(MLE)代理的政策性强化学习令人望而却步,因为每个推出步骤都需要在大型数据集上运行完整的ML管道,执行时间平均近200秒,使得大规模训练不可行.
  contributions:
  - 可伸缩合成 MLE Sandbox Generation:一种新颖的多剂框架,在程序上从种子任务中提取结构DNA,以微尺度数据集生成多样,高质量,可核查的合成
    MLE任务.
  - 利用合成环境,我们提出并成功将基于里程碑的轨迹RL应用于 MLE 域,使 LLMs 能够学习复杂的,长视距的试验和反射策略.
  - 通过我们的方法培训的模型取得了显著的绩效收益(20.3%-66.9%),比MLE-bench-lite上的SFT的任意奖章率有相对的提高),并在看不见的代理脚手架上大力推广。
  method:
  - 具有四个专门角色的多剂框架:数据战略师(从种子任务中提取结构DNA),MLE开发者(程序生成数据并嵌入隐藏规则),MLOPS工程师(构造确定性评价沙盒),技术作家(合成最终任务规范).
  - 生成微观尺度的数据集(50–200样本),这些数据集既保持结构复杂性,又将平均执行时间缩短到15秒以下.
  - 利用具有密集,里程碑式奖励的GRPO进行轨迹式强化学习,以减轻长视代理任务中的奖励性垃圾。
  experiments:
  - 与标准的MLE任务相比,SandMLE将执行时间缩短了13x以上,使得能够大规模地执行政策RL.
  - 在MLE-bench-lite上,SandMLE在跨Qwen3-8B,14B,和30B-A3B型号的SFT基线上取得显著收益,相对的奖牌率提高20.3%至66.9%.
  - 训练有素的政策概括了 看不见的代理脚手架, 在MLE-Dojo上达到32.4%的好成绩。
  limitations:
  - 这种方法依赖于合成环境,这些环境可能无法捕捉所有现实世界的 MLE 复杂性.
  - 评价仅限于劳动与就业部的 " 基准 " 和 " 劳动与就业部的 " Dojo " ;没有评估其他基准或现实世界任务的业绩。
  - 多剂生成管道本身可能引入高通量和依赖基本的LLM能力。
