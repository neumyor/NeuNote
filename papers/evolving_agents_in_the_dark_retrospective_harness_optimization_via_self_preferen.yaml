translations:
  abstract: AI代理依靠技能,工具和工作流程的利用来解决复杂的问题. 不断改进这种手段对于适应新的任务至关重要。 然而,现有的优化方法通常需要地面真伪验证组,但在实际部署环境中难以获得这种贴标签的数据。
    为了解决这个问题,我们引入了回顾性Harness Optimation(RHO),这是一种自我监督的方法,它只利用过去的轨迹来优化剂的牵引. 具体来说,RHO从过去的轨迹中选择了多种多样的具有挑战性的任务核心集,并平行地重新解决.
    代理用自我验证和自我一致性来分析这些推出,然后生成候选的驾驭更新,并通过自己的双向自我偏好来选择最有效的一个. 我们从软件工程、技术工作和知识工作三个不同领域来评价RHO。
    值得注意的是,单一优化回合提高了SWE-Bench Pro的通过率,从59%提高到78%,没有任何外部评级。 此外,我们的分析表明,RHO实际上针对的是先前的失败模式。
    因此,优化的拉带会改变特工的行为模式,并在长视会中保持更高的精度.
  one_sentence: 我们提出回顾性优势优化(RHO),这是一种自我监督的方法,它优化了AI代理对技能,工具和工作流程的利用,仅使用过去的轨迹,而不需要地面真实验证集.
