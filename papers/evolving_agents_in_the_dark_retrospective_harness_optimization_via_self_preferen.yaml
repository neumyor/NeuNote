abstract: AI agents rely on a harness of skills, tools, and workflows to solve complex
  problems. Continually improving this harness is essential for adapting to new tasks.
  However, existing optimization methods typically require ground-truth validation
  sets, yet such labeled data is difficult to acquire in practical deployment settings.
  To address this problem, we introduce Retrospective Harness Optimization (RHO),
  a self-supervised method that optimizes the agent harness using only past trajectories.
  Specifically, RHO selects a diverse coreset of challenging tasks from past trajectories
  and re-solves them in parallel. The agent analyzes these rollouts using self-validation
  and self-consistency, then generates candidate harness updates and selects the most
  effective one by its own pairwise self-preference. We evaluate RHO across three
  diverse domains, spanning software engineering, technical work, and knowledge work.
  Notably, a single optimization round improves the pass rate on SWE-Bench Pro from
  59% to 78% without any external grading. Furthermore, our analysis demonstrates
  that RHO effectively targets prior failure modes. As a result, the optimized harness
  alters the agent's behavior patterns and sustains higher accuracy during long-horizon
  sessions.
one_sentence: We propose Retrospective Harness Optimization (RHO), a self-supervised
  method that optimizes an AI agent's harness of skills, tools, and workflows using
  only past trajectories, without requiring ground-truth validation sets.
problem: Existing agent harness optimization methods require ground-truth validation
  sets, which are difficult to acquire in practical deployment settings.
contributions:
- Proposes retrospective harness optimization, which improves the full harness (including
  memory, context, skills, and tools) exclusively from unlabeled trajectories.
- Evaluates RHO across three domains and shows that retrospective analysis outperforms
  experience accumulation and validation-feedback-driven evolution under a comparable
  budget.
- Provides quantitative analysis showing that effective improvement signals lead to
  targeted harness changes and optimized agent behavior.
method:
- 'RHO consists of three stages: coreset selection, group rollout, and best-of-N harness
  proposal.'
- Coreset selection uses a Determinantal Point Process (DPP) to select a diverse and
  challenging subset of past tasks.
- Group rollout generates multiple parallel rollouts per task and extracts self-validation
  (within-trajectory correctness) and self-consistency (cross-trajectory agreement)
  signals.
- Harness proposal samples N candidate harnesses and selects the one most preferred
  over the baseline via pairwise self-preference.
experiments:
- 'Evaluated on three domains: software engineering (SWE-Bench Pro), technical work,
  and knowledge work.'
- A single optimization round improved pass rate on SWE-Bench Pro from 59% to 78%
  without external grading.
limitations:
- However, ex- isting optimization methods typically require ground-truth validation
  sets, yet such labeled data is difficult to acquire in practical deploy- ment settings.
- Furthermore, our analysis demonstrates that RHO effec- tively targets prior failure
  modes.
- However, these methods rely on scor- ing against a validation set to guide the improve-
  ments.
- We observe that RHO designs specific skills and tools targeting typical failure
  modes encountered in past tasks.
