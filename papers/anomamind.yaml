translations:
  abstract: 时间序列异常检测在许多现实世界应用中至关重要,有效的解决方案必须使异常区域本地化,并支持在复杂环境下的可靠决策. 然而,大多数现有方法都将异常检测作为纯粹带有固定特征输入的歧视性预测任务,而不是由证据驱动的诊断过程。
    因此,当异常表现出强烈的环境依赖性或多种模式时,它们往往会挣扎。 我们提出,这些局限性源于缺乏适应性特征准备,推理意识检测,以及推论过程中的迭代完善. 为了应对这些挑战,我们提议AnomaMind,这是一个代理时间序列异常检测框架,将异常检测重新编订为连续决策过程。
    AnomaMind通过一个结构化的工作流程运作,该工作流程以粗细至细的方式逐步将异常间隔本地化,通过多转动工具的相互作用增强检测功能,用于适应性特征的准备,并通过自我反射来完善异常决定.
    工作流程得到一组可重复使用的工具引擎的支持,从而能够进行对上下文的诊断分析. AnomaMind的关键设计是明确设计的混合推论机制,用于工具增强异常探测.
    在这个机制中,通用模型负责自主工具交互和自我反射的完善,而核心异常检测决定则是通过在可核查的工作流程级反馈下进行强化学习来学习的,使得任务特定优化能够在灵活的推理框架内进行.
    不同场合的广泛实验表明,AnomaMind持续改善异常探测性能. 该代码可在https://github.com/小玉-陶/AnomaMind-TS查询.
  one_sentence: 我们提出AnomaMind,是一种代理时间序列异常检测框架,将异常检测重新设定为连续决策过程.
  problem: 我们提出,这些局限性源于缺乏适应性特征准备,推理意识检测,以及推论过程中的迭代完善.
  contributions:
  - 我们把技术服务促进发展的任务重新定为一个连续的决策问题,从歧视性的提法转向由证据驱动的诊断过程。
  - 我们提议AnomaMind是一个代理时间序列异常检测框架,通过结构化的粗对细工作流程,工具强化的适应性特征准备,以及将通用推理与特定任务异常决策学习相结合的混合推论机制来实现这种重构.
  - 我们在不同的时间序列异常检测设置中进行了广泛的实验,表明AnomaMind始终不断改进检测性能,验证TSAD的代理化,工具化推理的有效性.
  method:
  - 重构异常探测,作为相继的决策过程.
  - 异常间隔的粗对细局部化.
  - 适应性特征准备的多回合工具互动。
  - 自我反省完善异常决定.
  - 混合推论机制:通用模型处理工具交互和自我反射;通过工作流程级反馈的强化学习学到的核心检测决定.
  experiments:
  - 评估了四个数据集:YAHOO、TODS、IOPS、WSD(表1中的统计数据)。
  - 与基线相比,不断提高检测性能.
  - 验证代理,工具强化的TSAD推理的有效性.
  limitations:
  - 我们提出,这些局限性源于缺乏适应性特征的准备,推理意识的检测,以及推论中它被消除的完善.
  - 为了应对这些挑战,我们提议AnomaMind,这是一个代理时间序列异常检测框架,将异常检测重新编订为连续决策过程。
  - 我们辩称,这些限制源于通常如何进行异常检测与在实践中如何进行异常检测之间的根本错配[11]。
  - 然而,这种迭代和适应性的过程很难在传统的模型中心配方中捕捉到,这种配方将异常检测视为从输入到异常分数的静态映射,并在推断过程中为动态推理或决定修正提供有限的支持[27,36].
