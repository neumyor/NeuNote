abstract: Time series anomaly detection is critical in many real-world applications,
  where effective solutions must localize anomalous regions and support reliable decision-making
  under complex settings. However, most existing methods frame anomaly detection as
  a purely discriminative prediction task with fixed feature inputs, rather than an
  evidence-driven diagnostic process. As a result, they often struggle when anomalies
  exhibit strong context dependence or diverse patterns. We argue that these limitations
  stem from the lack of adaptive feature preparation, reasoning-aware detection, and
  iterative refinement during inference. To address these challenges, we propose AnomaMind,
  an agentic time series anomaly detection framework that reformulates anomaly detection
  as a sequential decision-making process. AnomaMind operates through a structured
  workflow that progressively localizes anomalous intervals in a coarse-to-fine manner,
  augments detection through multi-turn tool interactions for adaptive feature preparation,
  and refines anomaly decisions via self-reflection. The workflow is supported by
  a set of reusable tool engines, enabling context-aware diagnostic analysis. A key
  design of AnomaMind is an explicitly designed hybrid inference mechanism for tool-augmented
  anomaly detection. In this mechanism, general-purpose models are responsible for
  autonomous tool interaction and self-reflective refinement, while core anomaly detection
  decisions are learned through reinforcement learning under verifiable workflow-level
  feedback, enabling task-specific optimization within a flexible reasoning framework.
  Extensive experiments across diverse settings demonstrate that AnomaMind consistently
  improves anomaly detection performance. The code is available at https://github.com/Xiaoyu-Tao/AnomaMind-TS.
one_sentence: We propose AnomaMind, an agentic time series anomaly detection framework
  that reformulates anomaly detection as a sequential decision-making process.
problem: We argue that these limitations stem from the lack of adaptive feature preparation,
  reasoning-aware detection, and iterative refinement during inference.
contributions:
- We reformulate the task of TSAD as a sequential decision-making problem, moving
  beyond discriminative formulations toward an evidence-driven diagnostic process.
- We propose AnomaMind, an agentic time series anomaly detection framework that realizes
  this reformulation through a structured coarse-to-fine workflow, tool-augmented
  adaptive feature preparation, and a hybrid inference mechanism that combines general-purpose
  reasoning with task-specific anomaly decision learning.
- We conduct extensive experiments across diverse time series anomaly detection settings,
  demonstrating that AnomaMind consistently improves detection performance and validating
  the effectiveness of agentic, tool-augmented reasoning for TSAD.
method:
- Reformulates anomaly detection as a sequential decision-making process.
- Coarse-to-fine localization of anomalous intervals.
- Multi-turn tool interactions for adaptive feature preparation.
- Self-reflection to refine anomaly decisions.
- 'Hybrid inference mechanism: general-purpose models handle tool interaction and
  self-reflection; core detection decisions learned via reinforcement learning with
  workflow-level feedback.'
experiments:
- 'Evaluated on four datasets: YAHOO, TODS, IOPS, WSD (statistics in Table 1).'
- Consistently improves detection performance compared to baselines.
- Validates effectiveness of agentic, tool-augmented reasoning for TSAD.
limitations:
- We argue that these limitations stem from the lack of adaptive feature preparation,
  reasoning-aware detection, and it- erative refinement during inference.
- To address these challenges, we propose AnomaMind, an agentic time series anomaly
  detection framework that reformulates anomaly detection as a sequential decision-making
  process.
- We argue that these limitations stem from a fundamental mis- match between how anomaly
  detection is commonly formulated and how it is carried out in practice [11].
- However, such iterative and adaptive processes are difficult to capture within conventional
  model-centric formulations, which treat anomaly detection as a static mapping from
  inputs to anomaly scores and provide limited support for dynamic reasoning or decision
  revision during infer- ence [27, 36].
