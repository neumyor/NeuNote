  cations, where effective solutions must localize anomalous regions and support reliable
  decision-making under complex settings. How- ever, most existing methods frame anomaly
  detection as a purely discriminative prediction task with fixed feature inputs,
  rather than an evidence-driven diagnostic process. As a result, they often strug-
