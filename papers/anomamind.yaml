problem: We argue that these limitations stem from the lack of adaptive feature preparation,
  reasoning-aware detection, and it- erative refinement during inference.
contributions:
- To address these challenges, we propose AnomaMind, an agentic time series anomaly
  detection framework that reformulates anomaly detection as a sequential decision-making
  process.
- To address these challenges, we propose AnomaMind, an agentic time series anomaly
  detection framework that explicitly formu- lates anomaly detection as a sequential
  decision-making process.
- 'Our main contributions are summarized as follows: • We reformulate the task of
  TSAD as a sequential decision- making problem, moving beyond discriminative formula-
  tions toward an evidence-driven diagnostic process.'
- • We proposeAnomaMind, an agentic time series anomaly detection framework that realizes
  this reformulation through a structured coarse-to-fine workflow, tool-augmented
  adap- tive feature preparation, and a hybrid inference mechanism that combines general-purpose
  reasoning with task-specific anomaly decision learning.
- 4 The Proposed AnomaMind Building on the sequential decision-making formulation
  and evidence- driven reasoning introduced earlier, we present AnomaMind, an agentic
  framework for time series anomaly detection.
method:
- To address these challenges, we propose AnomaMind, an agentic time series anomaly
  detection framework that reformulates anomaly detection as a sequential decision-making
  process.
- AnomaMind operates through a struc- tured workflow that progressively localizes
  anomalous intervals in a coarse-to-fine manner, augments detection through multi-turn
  tool interactions for adaptive feature preparation, and refines anomaly decisions
  via self-reflection.
- The workflow is supported by a set of reusable tool engines, enabling context-aware
  diagnostic analysis.
- A key design of AnomaMind is an explicitly designed hybrid inference mechanism for
  tool-augmented anomaly detection.
- In this mech- anism, general-purpose models are responsible for autonomous tool
  interaction and self-reflective refinement, while core anomaly detection decisions
  are learned through reinforcement learning under verifiable workflow-level feedback,
  enabling task-specific optimization within a flexible reasoning framework.
