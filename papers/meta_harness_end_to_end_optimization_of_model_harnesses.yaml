abstract: 'The performance of large language model (LLM) systems depends not only
  on model weights, but also on their harness: the code that determines what information
  to store, retrieve, and present to the model. Yet harnesses are still designed largely
  by hand, and existing text optimizers are poorly matched to this setting because
  they compress feedback too aggressively: they are memoryless, condition only on
  scalar scores, or restrict feedback to short templates or summaries. We introduce
  Meta-Harness, an outer-loop system that searches over harness code for LLM applications.
  It uses an agentic proposer that accesses the source code, scores, and execution
  traces of all prior candidates through a filesystem. On online text classification,
  Meta-Harness improves over a state-of-the-art context management system by 7.7 points
  while using 4× fewer context tokens. On retrieval-augmented math reasoning, a single
  discovered harness improves accuracy on 200 IMO-level problems by 4.7 points on
  average across five held-out models. On agentic coding, discovered harnesses surpass
  the best hand-engineered baselines on TerminalBench-2. Together, these results show
  that richer access to prior experience can enable automated harness engineering.'
one_sentence: Meta-Harness is an outer-loop system that searches over harness code
  for LLM applications using an agentic proposer with filesystem access to full history.
problem: Existing text optimizers are poorly matched to harness engineering because
  they compress feedback too aggressively, losing information needed to trace downstream
  failures to earlier harness decisions.
contributions:
- Introduces Meta-Harness, an outer-loop system for searching over harness code using
  an agentic proposer with filesystem access.
- On online text classification, improves over ACE by 7.7 points using 4× fewer context
  tokens.
- On retrieval-augmented math reasoning, a single discovered harness improves accuracy
  on 200 IMO-level problems by 4.7 points on average across five held-out models.
- 'On agentic coding, discovered harnesses surpass the best hand-engineered baselines
  on TerminalBench-2, ranking #1 among Haiku 4.5 agents.'
method:
- Meta-Harness uses an outer loop that repeatedly proposes, evaluates, and logs new
  harnesses.
- The proposer is a coding agent with filesystem access to all prior candidates' source
  code, scores, and execution traces.
- The proposer selectively inspects prior artifacts via tools like grep and cat, rather
  than ingesting all in a single prompt.
- Harness optimization occurs in code space, allowing small changes to retrieval,
  memory, or prompt-construction logic.
- The outer loop maintains a population and Pareto frontier but imposes no parent-selection
  rule.
experiments:
- 'Online text classification: compared against ACE, OpenEvolve, TTT-Discover; achieved
  7.7 point improvement with 4× fewer context tokens.'
- 'Retrieval-augmented math reasoning: 200 IMO-level problems; evaluated on five held-out
  models; 4.7 point average accuracy improvement.'
- 'Agentic coding: TerminalBench-2; compared against Terminus-KIRA, Mini-SWE-Agent,
  Claude Code; surpassed all reported Haiku 4.5 harnesses.'
limitations:
- 'However, these methods are poorly matched to harness engineering because they typically
  operate with short-horizon or heavily compressed feedback: some condition only on
  the current candidate [31; 51; 53], others rely primarily on scalar scores [35;
  12], and others restrict feedback to short templates or LLM-generated summaries
  [1; 26].'
- Compressed feedback often removes the information needed to trace downstream failures
  to earlier harness decisions.
- We address this limitation withMeta-Harness, an agentic harness for optimizing harnesses
  via end-to-end search (Figure 2).
- 'Rather than updating model weights, the system assigns credit at the harness level:
  it uses experience from past rollouts to deliberately reason about which steps and
  components are responsible for failures, then rewrites the external code that governs
  future behavior.'
