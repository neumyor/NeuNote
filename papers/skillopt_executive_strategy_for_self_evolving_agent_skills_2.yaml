translations:
  abstract: 今天的代理技能是手工制作的,产生一发子弹,或者通过松散的自译自审来演化,其中没有任何一种表现得像技能的深层学习优化器,没有任何一种在反馈下可以可靠地改进它的起点.
    我们主张技能应该作为冷冻剂的外部状态来训练,具有同样的学科,使得重量空间优化可以再生产. 据我们所知,SkillOpt是代理技能的首个系统可控文本空间优化器:一个单独的优化器模型将打分的推出转换成在单一技能文档上绑定的添加/删除/替换编辑,只有在严格改进被搁置的验证分数时才接受编辑.
    文字学习率预算,拒绝编辑缓冲,以及划时代的慢/元更新使技能培训稳定,同时在部署时添加零推算时间模型调用. 在6个基准、7个目标模型和3个执行工具(直接聊天、Codex、Claude
    Code)中,SkillOpt是最佳的,或与所有52个被评价的细胞(模型、基准、带)捆绑在一起,并击败了人类中每个细胞的每个竞争者、一弹一弹的LLM、Trace2Skill、TextGrad、GEPA和EvoSkill技能。
    在GPT–5.5上,它通过直接聊天的+23.5分,Codex代理循环的+24.8分,以及Claude代码的+19.1分,提升平均无技能精度. 转移实验进一步表明,优化的技能文物在跨模型尺度移动时,在Codex和Claude代码执行环境之间,以及在没有进一步优化的情况下,保留到附近的数学基准上的价值.
  one_sentence: SkillOpt是用于代理技能的可控文本空间优化器,它使用绑定编辑,验证吉丁,以及训练式的控制,反复改善被冻结的代理在目标域上的性能.
  problem: 今天的代理技能是手工制作的,产生一发子弹,或者通过松散的自译自审来演化,其中没有任何一种表现得像技能的深层学习优化器,没有任何一种在反馈下可以可靠地改进它的起点.
  contributions:
  - 将代理技能学习作为外部自然语态的优化,并引入了SkillOpt,即具有推出批次的可知性优化器,反射小管,添加/删除/替换编辑,文本学习率,时间表,持有-退出接受,拒绝-编辑缓冲器,以及时空慢/元更新.
  - 提供了对6个基准、7个目标模型和3个执行工具的广泛经验研究,显示SkillOpt在52个细胞中的52个细胞上最好或最好,而且表现优于无技能、人的技能、一枪LM-技能、即时优化(TextGrad、GEPA)和每个模型下的技能演进(Trace2Skill、EvoSkill)基线。
  - 通过组件调剂和三种转移形式(跨型,跨机身,跨基准)验证优化设计,显示出口的技艺文物是紧凑的,可重复使用,无需模型重量更新即可部署.
  method:
  - 技能优化,作为外部自然语言状态的培训,并附有边框添加/删除/替换编辑。
  - 从目标模型推出批次提供证据;通过优化模型进行小批量反射建议编辑.
  - 文字学习率预算,拒绝编辑缓冲,为稳定进行划时代的慢/元更新.
  - Hold-out 验证门只接受改进性能的编辑.
  - 没有额外的推断时间模型呼叫部署。
  experiments:
  - 对六个基准(SearchQA,电子表格奔驰,OfficeQA,DocVQA,LiveMathematician Bench,ALFWorld)进行了评价,涉及7个目标模型和3个执行工具(直接聊天,Codex,Claude
    Code).
  - SkillOpt是最佳或捆绑在所有52个细胞(模型,基准,绳索)上,表现优异的基线包括人,一发LLM,Trace2Skill,TextGrad,GEPA,EvoSkill.
  - 在GPT-5.5上,平均精度增益+23.5分(直接聊天),+24.8分(Codex),+19.1分(Claude Code)胜过无技能.
  - 转学实验显示跨模型,跨机身,跨基准转让学习技能.
  limitations:
  - '代理技能为这种程序调整[7,8]提供了自然界面: 技能是一种可移植的自然语言文物,可以包装程序,域热力学,工具政策,输出限制,以及故障模式,让被冻结的代理通过外部文本进行适应.'
  - 最近的系统将执行经验转换为可重复使用的文字文物——通过故障分析消磨轨迹教训,改进技能文件夹,建立特定域的技能库,或优化轨道反馈的提示[9-13]——但留下一个更基本的问题:如果技能是适应层面,如何优化?
  - 鉴于目标域,初始技能,以及正在改编的模型,SkillOptrepedly样本轨迹批次,分析成功与失败,并要求前沿优化模型提出结构化的添加/删除/替换编辑.
  - 在有界限的,验证的更新下,每一次修订仍然足够接近后来最优化的调用能够从什么帮助,什么失败,什么应该保存中学习到的最后一个.
