abstract: 'Agent skills today are hand-crafted, generated one-shot, or evolved through
  loosely controlled self-revision—none of which behaves like a deep-learning optimizer
  for the skill, and none of which reliably improves over its starting point under
  feedback. We argue the skill should instead be trained as the external state of
  a frozen agent, with the same discipline that makes weight-space optimization reproducible.
  SkillOpt is, to our knowledge, the first systematic controllable text-space optimizer
  for agent skills: a separate optimizer model turns scored rollouts into bounded
  add/delete/replace edits on a single skill document, and an edit is accepted only
  when it strictly improves a held-out validation score. A textual learning-rate budget,
  rejected-edit buffer, and epoch-wise slow/meta update make skill training stable
  while adding zero inference-time model calls at deployment. Across six benchmarks,
  seven target models, and three execution harnesses (direct chat, Codex, Claude Code),
  SkillOpt is best or tied on all 52 evaluated (model, benchmark, harness) cells and
  beats every per-cell competitor among human, one-shot LLM, Trace2Skill, TextGrad,
  GEPA, and EvoSkill skills. On GPT–5.5 it lifts the average no-skill accuracy by
  +23.5 points in direct chat, by +24.8 inside the Codex agentic loop, and by +19.1
  inside Claude Code. Transfer experiments further show that optimized skill artifacts
  retain value when moved across model scales, between Codex and Claude Code execution
  environments, and to a nearby math benchmark without further optimization.'
one_sentence: SkillOpt is a controllable text-space optimizer for agent skills that
  uses bounded edits, validation gating, and training-style controls to repeatedly
  improve a frozen agent's performance on a target domain.
problem: Agent skills today are hand-crafted, generated one-shot, or evolved through
  loosely controlled self-revision—none of which behaves like a deep-learning optimizer
  for the skill, and none of which reliably improves over its starting point under
  feedback.
contributions:
- Formulates agent-skill learning as optimization over an external natural-language
  state and introduces SkillOpt, a harness-agnostic optimizer with rollout batches,
  reflection minibatches, add/delete/replace edits, textual learning rates, schedules,
  held-out acceptance, rejected-edit buffers, and epoch-wise slow/meta update.
- Provides a broad empirical study across six benchmarks, seven target models, and
  three execution harnesses, showing that SkillOpt is best or tied-best on 52 of 52
  cells and outperforms no-skill, human-skill, one-shot LLM-skill, prompt-optimization
  (TextGrad, GEPA), and skill-evolution (Trace2Skill, EvoSkill) baselines under every
  model.
- Validates the optimization design through component ablations and three forms of
  transfer (cross-model, cross-harness, cross-benchmark), showing that the exported
  skill artifact is compact, reusable, and deployable without model-weight updates.
method:
- Skill optimization as training over an external natural-language state with bounded
  add/delete/replace edits.
- Rollout batches from target model provide evidence; minibatch reflection by optimizer
  model proposes edits.
- Textual learning-rate budget, rejected-edit buffer, and epoch-wise slow/meta update
  for stability.
- Held-out validation gate accepts only edits that improve performance.
- No extra inference-time model calls at deployment.
experiments:
- Evaluated on six benchmarks (SearchQA, SpreadsheetBench, OfficeQA, DocVQA, LiveMathematicianBench,
  ALFWorld) across seven target models and three execution harnesses (direct chat,
  Codex, Claude Code).
- SkillOpt is best or tied on all 52 (model, benchmark, harness) cells, outperforming
  baselines including human, one-shot LLM, Trace2Skill, TextGrad, GEPA, EvoSkill.
- On GPT-5.5, average accuracy gains of +23.5 points (direct chat), +24.8 (Codex),
  +19.1 (Claude Code) over no skill.
- Transfer experiments show cross-model, cross-harness, and cross-benchmark transfer
  of learned skills.
limitations:
- 'Agent skills provide a natural interface for this procedural adaptation [7, 8]:
  a skill is a portable natural-language artifact that packages procedures, domain
  heuristics, tool policies, output constraints, and failure modes, letting a frozen
  agent adapt through external text.'
- 'Recent systems convert execution experience into reusable textual artifacts—distilling
  trajectory lessons, refining skill folders via failure analysis, building domain-specific
  skill libraries, or optimizing prompts from trajectory feedback [9–13]—but leave
  open a more basic question: if skills are the adaptation layer, how should they
  be optimized?'
- Given a target domain, an initial skill, and the model being adapted,SkillOptrepeatedly
  samples trajectory batches, analyzes successes and failures, and asks a frontier
  optimizer model to propose structured add/delete/replace edits.
- With bounded, validation-gated updates, each revision remains close enough to the
  last one that later optimizer calls can learn from what helped, what failed, and
  what should be preserved.
