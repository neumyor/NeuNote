abstract: Agent harnesses increasingly determine the performance of language-model
  systems by deciding how models call tools, receive feedback, verify intermediate
  states, store memory, and revise solutions. Yet current test-time scaling analyses
  often parameterize this process by raw expenditure—tokens, tool calls, operations,
  wall time, or cost—which does not distinguish useful feedback from redundant or
  unstable interaction. We introduce Effective Feedback Compute (EFC), a trace-level
  scaling coordinate that credits feedback only when it is informative, valid, non-redundant,
  and retained for subsequent decisions, and we normalize it by task demand when comparing
  tasks with different feedback requirements. Across synthetic controllable tasks,
  executable code tasks, real benchmark traces, held-out splits, and a prospective
  validation batch, EFC-based coordinates consistently predict failure rates better
  than raw-compute baselines and a strong multivariate SAS baseline. In controlled
  scaling, raw tokens and tool calls explain limited variation (R2 = 0.33 and 0.42),
  SAS reaches 0.88, while Oracle-EFC and Estimated-EFC reach 0.94 and Oracle-EFC/Dtask
  reaches 0.99. Matched-budget interventions show that improving feedback quality
  raises success from 0.27 to 0.90 while raw cost and tool calls are fixed. On mixed
  real traces, NRS-EFC/Dtask reaches R2 = 0.92 while raw compute has near-zero or
  negative fit, and it remains the best predictor in a prospective holdout (R2 = 0.85).
  These results suggest that harness scaling is governed less by how much computation
  is spent than by how efficiently raw budget is converted into durable, task-sufficient
  feedback.
one_sentence: We introduce Effective Feedback Compute (EFC), a trace-level scaling
  coordinate that credits feedback only when it is informative, valid, non-redundant,
  and retained, and show that it predicts agent harness failure rates better than
  raw-compute baselines across synthetic and real tasks.
problem: Agent harnesses lack a clear scaling coordinate that predicts performance,
  as raw expenditure measures do not distinguish useful feedback from redundant or
  unstable interaction.
contributions:
- Formalize Effective Feedback Compute (EFC) as a trace-level measure of useful closed-loop
  feedback, including Estimated-EFC and NRS-EFC variants.
- Show that EFC and task-demand-normalized EFC outperform raw-compute baselines and
  SAS as scaling coordinates across diverse evaluations.
- Decompose harness scaling into harness efficiency and task demand, demonstrating
  that successful harnesses convert raw budget into effective feedback and measure
  against the right task scale.
method:
- Define Effective Feedback Compute (EFC) per event as κ * I * V * R * M, where I,
  V, R, M are bounded factors for informativeness, validity, non-redundant relevance,
  and memory update.
- Develop Oracle-EFC for synthetic tasks using latent progress signals, and Estimated-EFC
  using a trace-observable feature vector and exponential model.
- Introduce NRS-EFC (non-redundant stable EFC) for execution traces with repeated
  and unstable observations.
- Normalize EFC by task demand D_task to enable cross-task comparison.
experiments:
- Evaluated EFC-based coordinates across synthetic controllable tasks, executable
  code tasks, real benchmark traces, held-out splits, and a prospective validation
  batch.
- Compared against raw-compute baselines (tokens, tool calls, wall time, operations,
  cost) and a multivariate SAS baseline.
- In controlled scaling, Oracle-EFC/Dtask achieved R2=0.99 and MAE=0.02, outperforming
  raw tokens (R2=0.33) and SAS (R2=0.88).
- Matched-budget interventions showed improving feedback quality raised success from
  0.27 to 0.90 while raw cost and tool calls were fixed.
- On mixed real traces, NRS-EFC/Dtask reached R2=0.92, and in prospective holdout
  R2=0.85.
limitations:
- Across synthetic controllable tasks, executable code tasks, real benchmark traces,
  held-out splits, and a prospective validation batch, EFC-based coordinates consistently
  pre- dict failure rates better than raw-compute baselines and a strong multivariate
  SAS baseline.
- However, unlike pretraining, where model size, data, and compute provide well-studied
  scaling coordinates, agent harnesses lack a clear scalar that predicts when additional
  test-time computation will improve performance.
- We report both instance-level success and aggregated failure rate over task families,
  harnesses, models, and budget levels.
- H3 Stateful Memory.The harness maintains compact memory over verified facts, failed
  attempts, and task constraints, reducing repeated errors across steps.
