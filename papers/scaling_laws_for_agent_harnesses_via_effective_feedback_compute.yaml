translations:
  abstract: 通过决定模型调用工具,接收反馈,验证中间状态,存储内存,以及修改解决方案,Agent jabes越来越多地决定语言模型系统的性能. 然而,目前的测试时间缩放分析往往通过原始支出——汇兑、工具呼叫、操作、墙壁时间或成本——来参数化这一进程,这并没有区分有用的反馈和多余或不稳定的相互作用。
    我们采用有效的反馈计算法(EFC),一种微量级的缩放协调,只有当信用反馈信息丰富、有效、不重复,并留作以后的决定时,才使用,我们在将不同反馈要求的任务进行比较时,通过任务要求使其正常化。
    在整个合成可控任务中,可执行代码任务,真实基准痕迹,悬断分解,以及预期的验证批量,基于EFC的坐标一致预测故障率优于原始计算基线和强多变量SAS基线. 在可控缩放中,原始符和工具调用解释有限变异(R2=0.33和0.42),SAS达到0.88,而甲骨文-EFC和估计-EFC达到0.94,甲骨文-EFC/Dask达到0.99.
    相匹配的预算干预措施表明,改善反馈质量将成功率从0.27提高到0.90,而原始成本和工具呼叫则固定不变。 在混合真实的痕迹上,NRS-EFC/Dask达到R2=0.92,而原始计算则接近零或负合位,它仍然是未来搁置中最好的预测器(R2=0.85).
    这些结果表明,利用量的扩大较少取决于计算花费多少,而较少取决于如何有效地将原始预算转化为持久、任务充足的反馈。
  one_sentence: 我们引入了有效的反馈计算(EFC),这是一个微量级的缩放协调器,只有当信用反馈信息丰富、有效、不重复和保留时,才会得到这种反馈,并表明它预示着毒剂利用失败率优于人工合成和真实任务的原始计算基线。
  problem: 代理杠杆缺乏一个可以预测性能的清晰的缩放坐标,因为原始支出计量没有区分有用的反馈和多余或不稳定的互动.
  contributions:
  - 将有效反馈计算(EFC)正规化,作为实用闭路反馈的微量计量,包括估算-EFC和NRS-EFC变体.
  - 显示EFC和任务要求-正常的EFC在原始计算基线和SAS作为各种评价的缩放坐标方面都超过了业绩。
  - 将利用范围分解为利用效率和任务需求,表明成功利用将原始预算转化为有效的反馈,并根据适当的任务规模衡量。
  method:
  - 定义每个事件的有效反馈计算值(EFC)为UF *I *V *R *M,其中I,V,R,M是信息性,有效性,非冗余相关性以及内存更新的限量因素.
  - 利用潜在进度信号开发用于合成任务的甲骨文-EFC,并使用可跟踪特征矢量和指数模型开发估计-EFC.
  - 采用NRS-EFC(非冗余稳定的EFC),用于反复和不稳定的观测结果的处决痕迹.
  - 通过任务将 EFC 规范化 要求 D  task 以允许跨任务比较 。
  experiments:
  - 评价了基于EFC的坐标,涵盖合成可控任务,可执行代码任务,真实的基准痕迹,被搁置的分割,以及预期的验证批次.
  - 与原始计算基线(托盘,工具调用,墙时间,操作,成本)和多变量SAS基线相比.
  - 在可控缩放中,Oracle-EFC/Dask实现了R2=0.99和MAE=0.02,优于原始令牌(R2=0.33)和SAS(R2=0.88).
  - 相匹配的预算干预措施显示,反馈质量的提高将成功率从0.27提高到0.90,而原始成本和工具呼叫则固定不变。
  - 在混合真实的痕迹上,NRS-EFC/Dask达到R2=0.92,在预期的阻力中达到R2=0.85.
  limitations:
  - 在整个合成可控制任务中,可执行代码任务,真实的基准痕迹,悬断分解,以及预期的验证批次中,基于EFC的坐标一致地比原始计算基线和强大的多变量SAS基线更好的命令前故障率.
  - 然而,与预训不同的是,模型大小,数据,和计算提供了经过充分研究的缩放坐标,代理机的牵引力缺乏清晰的scalar,无法预测何时额外的测试时间计算会提高性能.
  - 我们报告在任务家庭、工具、模型和预算水平上的成功事例和总的失败率。
  - H3 状态记忆. 控制器保持了紧凑的内存,覆盖了已核实的事实、失败的尝试和任务限制,减少了跨步骤的重复错误。
