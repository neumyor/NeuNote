abstract: Observability in cloud infrastructure is critical for service providers,
  driving the widespread adoption of anomaly detection systems for monitoring metrics.
  However, existing systems often struggle to simultaneously achieve explainability,
  reproducibility, and autonomy, which are three indispensable properties for production
  use. We introduce ARGOS, an agentic system for detecting time-series anomalies in
  cloud infrastructure by leveraging large language models (LLMs). ARGOS proposes
  to use explainable and reproducible anomaly rules as intermediate representation
  and employs LLMs to autonomously generate such rules. The system will efficiently
  train error-free and accuracy-guaranteed anomaly rules through multiple collaborative
  agents and deploy the trained rules for low-cost online anomaly detection. Through
  evaluation results, we demonstrate that ARGOS outperforms state-of-the-art methods,
  increasing F1 scores by up to 9.5% and 28.3% on public anomaly detection datasets
  and an internal dataset collected from Microsoft, respectively.
one_sentence: We introduce ARGOS, an agentic system that uses large language models
  to autonomously generate explainable and reproducible anomaly detection rules for
  time-series data in cloud infrastructure.
problem: Existing anomaly detection systems often struggle to simultaneously achieve
  explainability, reproducibility, and autonomy, which are three indispensable properties
  for production use.
contributions:
- We show that current state-of-the-art time-series anomaly detection systems fall
  short in simultaneously achieving explainability, reproducibility, and autonomy.
- We observe that LLMs could be employed to autonomously generate explainable and
  reproducible rules for anomaly detection.
- We propose ARGOS, a time-series anomaly detection system that autonomously trains
  and deploys anomaly detection rules through an LLM-based agentic pipeline.
- We evaluate ARGOS on public and internal datasets, demonstrating its effectiveness
  and efficiency compared with state-of-the-art methods.
method:
- ARGOS uses explainable and reproducible anomaly rules as an intermediate representation
  and employs LLMs to autonomously generate such rules.
- ARGOS employs an agent-based pipeline with feedback loops to iteratively correct
  anomaly detection rules and improve accuracy.
- ARGOS aggregates predictions of its anomaly detection rules with predictions of
  existing anomaly detection systems to guarantee better accuracy.
- ARGOS simultaneously proposes a set of n rule candidates in each iteration and selects
  the best k rules for further refinement.
experiments:
- Evaluated on two public datasets (KPI and Yahoo) and an internal dataset collected
  from Microsoft.
- Outperforms state-of-the-art methods with F1 score improvements up to 9.5% on KPI,
  4.8% on Yahoo, and 28.3% on the internal dataset.
- Speeds up inference by 3.0×, 34.3×, and 1.5× on KPI, Yahoo, and the internal dataset
  respectively.
limitations:
- LLMs can produce code or rules that have syntax errors or are inaccurate due to
  misunderstanding of data patterns.
- It is hard to guarantee that the anomaly rules autonomously generated by LLMs have
  better accuracy than existing production anomaly detection systems that have been
  well-tuned over years.
- Due to inherent randomness in LLM behavior, producing accurate anomaly detection
  rules with a limited number of trials remains challenging.
