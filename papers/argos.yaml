translations:
  abstract: 云基础设施的可观测性对服务提供者至关重要,这促使人们广泛采用异常检测系统来监测衡量标准。 然而,现有系统往往难以同时实现可解释性、可再生产性和自主性,而这些都是生产使用不可或缺的三个特性。
    我们引入了ARGOS,这是一个通过利用大型语言模型(LLMs)探测云基础设施中时间序列异常的代理系统. ARGOS建议使用可解释和可复制的异常规则作为中间代表,并使用LLMs自主生成这种规则。
    该系统将通过多个协作代理,高效地培训无错误和准确保障的异常规则,并部署经过培训的低成本在线异常检测规则。 通过评价结果,我们证明ARGOS的成绩优于最先进的方法,在公共异常检测数据集和从微软收集的内部数据集上,F1的分数分别增加了9.5%和28.3%。
  one_sentence: 我们引入了ARGOS,是一种代理系统,它使用大型语言模型,为云基础设施中的时间序列数据自主生成可解释和可复制的异常检测规则.
  problem: 现有的异常探测系统往往要同时实现可解释性,可再生产性和自主性,这是生产使用的三种不可或缺的特性.
  contributions:
  - 我们表明,目前最先进的时间序列异常探测系统在同时实现可解释性、可复制性和自主性方面还不足。
  - 我们注意到,可以使用有限责任公司自动生成可解释和可复制的异常检测规则。
  - 我们提出ARGOS,一种时间序列异常探测系统,它通过LLM的代理管道,自主地训练和部署异常探测规则.
  - 我们评价公共和内部数据集的大气监测信息系统,显示其效力和效率与最新方法相比。
  method:
  - ARGOS使用可解释和可复制的异常规则作为中间代表,并使用LLMs自主生成这种规则.
  - ARGOS使用一个具有反馈循环的基于代理的管道来迭代地纠正异常检测规则并提高准确性.
  - ARGOS将对其异常探测规则的预测与对现有异常探测系统的预测结合起来,以保证更好的准确性.
  - ARGOS同时在每个迭代中提出一组n规则候选人,并选择最好的k规则进行进一步完善.
  experiments:
  - 对两个公共数据集(KPI和Yahoo)以及从微软收集的内部数据集进行了评价.
  - F1在KPI上提升到9.5%,在雅虎上提升到4.8%,在内部数据集上提升到28.3%.
  - 在KPI,雅虎和内部数据集上分别加快了3.0×,34.3×和1.5×的推论.
  limitations:
  - LLMS可以产生有语法错误或由于对数据模式的误解而不准确的代码或规则.
  - 很难保证LLMs自主生成的异常规则的准确性比多年来经过良好调整的现有生产异常探测系统要好.
  - 由于LLM行为的内在随机性,产生准确的异常检测规则,且试验次数有限,仍然具有挑战性.
