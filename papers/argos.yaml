one_sentence: Observability in cloud infrastructure is critical for service providers,
  driving the widespread adoption of anomaly de- tection systems for monitoring metrics.
  However, existing systems often struggle to simultaneously achieve explain- ability,
  reproducibility, and autonomy, which are three indis- pensable properties for production
  use. We introduce AR- GOS, an agentic system for detecting time-series anomalies
  in cloud infrastructure by leveraging large language mod- els (LLMs). ARGOS proposes
