abstract: Time series anomaly detection (TSAD) plays a crucial role in vari- ous industrial
  applications. Traditional deep learning TSAD models require extensive training data
  and operate as black boxes, lack- ing interpretability for detected anomalies. To
  address these chal- lenges, we propose LLMAD1, a novel TSAD method that employs
  Large Language Models (LLMs) to deliver accurate and interpretable TSAD results.
  LLMAD applies in-context anomaly detection by re- trieving both positive and negative
  similar time series segments, significantly enhancing LLMs’ effectiveness. Furthermore,LLMAD
  employs the Anomaly Detection Chain-of-Thought approach to mimic expert logic for
  its decision-making process.
