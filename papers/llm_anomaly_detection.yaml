abstract: Time series anomaly detection (TSAD) plays a crucial role in various industrial
  applications. Traditional deep learning TSAD models require extensive training data
  and operate as black boxes, lacking interpretability for detected anomalies. To
  address these challenges, we propose LLMAD1, a novel TSAD method that employs Large
  Language Models (LLMs) to deliver accurate and interpretable TSAD results. LLMAD
  applies in-context anomaly detection by retrieving both positive and negative similar
  time series segments, significantly enhancing LLMs' effectiveness. Furthermore,LLMAD
  employs the Anomaly Detection Chain-of-Thought approach to mimic expert logic for
  its decision-making process. This further enhances its performance and enables LLMAD
  to provide explanations for their detections through versatile perspectives. Experiments
  conducted on both offline datasets and through online deployment on a large-scale
  cloud system at CompanyX indicate that our LLMAD achieves detection performance
  comparable to state-of-the-art deep learning methods. Additionally, LLMAD offers
  human-readable interpretability for detections at a reasonable cost, significantly
  reducing engineers' effort.
one_sentence: We propose LLMAD, a novel TSAD method that employs Large Language Models
  with in-context learning and chain-of-thought prompting to deliver accurate and
  interpretable time series anomaly detection.
problem: Traditional deep learning TSAD models require extensive training data and
  operate as black boxes, lacking interpretability for detected anomalies.
contributions:
- Introduces LLMAD, an LLM-based framework that accurately conducts TSAD while automatically
  generating comprehensive interpretations.
- Injects data context, domain knowledge, and human expertise via time-series ICL
  and AnoCoT to enhance TSAD performance and interpretation quality.
- Conducts extensive experiments on three public datasets; quantitative and human
  evaluations show LLMAD delivers accurate TSAD and useful interpretable results at
  acceptable cost.
- Deploys LLMAD into a large-scale cloud system at CompanyX, achieving remarkable
  TSAD performance and significantly reducing engineer effort.
method:
- Retrieves similar normal and abnormal time series segments from a database using
  FastDTW for in-context learning.
- Uses AnoCoT (Anomaly Detection Chain-of-Thought) to inject domain knowledge (judgment
  rules, anomaly types, alarm levels) into prompts.
- Constructs prompts with preprocessed time series, retrieved examples, and AnoCoT
  to generate anomaly points, types, alarm levels, and textual explanations.
experiments:
- 'Evaluated on three public TSAD datasets: WSD, KPI, Yahoo.'
- Deployed on a large-scale cloud system at CompanyX for online evaluation.
- Compared against state-of-the-art deep learning methods; achieves comparable accuracy.
- Human evaluation by domain experts confirms interpretability and usefulness of anomaly
  reports.
limitations:
- However, achieving this level of performance requires vast amounts of training data
  to effectively model and understand anomaly patterns.
- However, generating these interpretive reports typically requires extensive manual
  analysis for each case, involving consultation of histori- cal data and handbooks.
- Despite these opportunities, applying LLMs directly to TSAD poses several challenges.
- To harness the power of LLMs while addressing these challenges, we introduce LLMAD,
  an LLM-based anomaly detection frame- work specifically tailored for TSAD, offering
  high accuracy and interpretability.
