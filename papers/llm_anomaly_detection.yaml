translations:
  abstract: 时间序列异常探测(TSAD)在各种工业应用中发挥着关键作用. 传统的深层学习TSAD模型需要广泛的培训数据,并作为黑匣子运行,对检测出的异常缺乏可解释性.
    为了应对这些挑战,我们提出LLMAD1,这是一种新的TSAD方法,它使用大语言模型(LLMs)提供准确和可解释的TSAD结果. LLMAD通过检索正向和负向相似的时间序列段来应用内文本异常检测,大大提高LLMS的效能.
    此外,LLMAD还采用反常检测链方法,模仿专家的逻辑来进行决策。 这进一步加强了它的性能,使LLMAD能够通过多种视角来解释它们的发现. 在离线数据集和通过在线部署在X公司大型云系统进行的实验表明,我们的LLMAD的检测性能与最先进的深层学习方法相当。
    此外,LLMAD还以合理的成本为检测提供人可读可解释性,大大降低了工程师的努力.
  one_sentence: 我们提出LLMAD,这是一种新颖的TSAD方法,它使用大语言模型,具有内在的学习和思维链,促使提供准确和可解释的时间序列异常检测。
  problem: 传统的深层学习TSAD模型需要广泛的培训数据,并作为黑匣子运行,对检测出的异常缺乏可解释性.
  contributions:
  - 引入LLMAD,这是一个基于LLM的框架,它能准确进行TSAD,同时自动生成全面的解释.
  - 通过时间序列ICL和AnoCoT注入数据背景,域知识,以及人的专门知识,以提高TSAD的性能和判读质量.
  - 对三个公共数据集进行广泛的实验;定量和人的评价显示,LLMAD以可接受的成本提供准确的TSAD和有用的可解释结果。
  - 将LLMAD部署到X公司的大型云系中,取得了显著的TSAD性能,并大大减少了工程师的工作.
  method:
  - 利用 FastDTW 从数据库中获取类似的正常和异常的时间序列段用于内文本学习.
  - 使用 AnoCoT(Anomaly Detection Chain-of-Thought)将域知识(判断规则,异常类型,提醒级别)注入提示.
  - 构造带有预处理时间序列,检索实例的提示,和 AnoCOT 生成异常点,类型,提醒级别和文本解释.
  experiments:
  - 对三个公共TSAD数据集进行了评价:WSD,KPI,Yahoo.
  - 在X公司部署大型云系统进行在线评价。
  - 与最先进的深层学习方法相比;达到可比的准确性.
  - 域专家的人类评价证实了异常报告的解释性和实用性。
  limitations:
  - 然而,达到这一水平的性能需要大量的训练数据来有效模拟和理解异常规律.
  - 然而,编写这些解释性报告通常需要对每个案例进行广泛的人工分析,包括查阅直径数据和手册。
  - 尽管有这些机会,将LLMs直接应用到TSAD带来了若干挑战.
  - 为了在应对这些挑战的同时利用LLMs的力量,我们引入了LLMAD,这是一个基于LLM的异常检测框架,专门针对TSAD的工作,提供了高精度和可解释性.
