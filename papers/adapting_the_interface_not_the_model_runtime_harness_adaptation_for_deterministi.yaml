abstract: LLM agents are shaped not only by their language models, but also by the
  runtime harness that mediates observation, tool use, action execution, feedback
  interpretation, and trajectory control. While existing agent adaptation methods
  mainly update model parameters, many failures in deterministic, rule-governed domains
  stem from mismatches at the model–environment interface. We propose LIFE-HARNESS,
  a lifecycle-aware runtime harness that improves frozen LLM agents without changing
  model weights or evaluation environments. LIFE-HARNESS evolves from training trajectories
  by converting recurring interaction failures into reusable interventions across
  environment contracts, procedural skills, action realization, and trajectory regulation,
  and remains fixed for evaluation on unseen tasks. On seven deterministic environments
  from τ-bench, τ 2-bench, and AgentBench, LIFE-HARNESS improves 116 out of 126 model–environment
  settings across 18 model backbones, with an average relative improvement of 88.5%.
  Harnesses evolved only from Qwen3-4B-Instruct trajectories transfer to 17 other
  models, showing that LIFE-HARNESS captures reusable environment-side structure rather
  than model-specific behavior. These results position runtime interface adaptation
  as a complementary alternative to model-centric agent training. Code is available
  at GitHub.
one_sentence: We propose LIFE-HARNESS, a lifecycle-aware runtime harness that improves
  frozen LLM agents without changing model weights or evaluation environments.
problem: 'Such failures often stem not from a lack of latent reasoning ability, but
  from mismatches at the model–environment boundary: poorly structured observations,
  mis- understood tool contracts, non-executable actions, feedback that fails to trigger
  recovery, or degenerate trajectory dynamics.'
contributions:
- Formulate harness-based runtime interface adaptation for deterministic LLM agents,
  framing agent improvement as evolving the reusable interface between a frozen model
  and a rule-governed environment.
- Introduce LIFE-HARNESS, a lifecycle-aware framework that converts recurring trajectory
  failures into targeted interventions across environment contracts, procedural skills,
  action realization, and trajectory regulation.
- Demonstrate broad cross-model gains across seven environments and 18 backbones,
  achieving an average relative improvement of 88% without updating model weights
  or modifying evaluation protocols.
method:
- 'Four lifecycle layers: Environment Contract, Procedural Skill, Action Realization,
  Trajectory Regulation.'
- Evolved from training trajectories by diagnosing recurring failures and converting
  into reusable runtime interventions.
- Frozen model weights, only adapts the runtime interface.
experiments:
- Evaluated on seven deterministic environments from τ-bench, τ 2-bench, and AgentBench.
- Tested across 18 instruction-tuned, reasoning, and agent-specialized backbones.
- Achieves 88.5% average relative improvement on 116 out of 126 model-environment
  settings.
- Harnesses evolved from Qwen3-4B-Instruct transfer to 17 other models without retraining.
limitations:
- While existing agent adap- tation methods mainly update model param- eters, many
  failures in deterministic, rule- governed domains stem from mismatches at the model–environment
  interface.
- LIFE-HARNESSevolves from training trajectories by converting recur- ring interaction
  failures into reusable inter- ventions across environment contracts, pro- cedural
  skills, action realization, and trajec- tory regulation, and remains fixed for evalu-
  ation on unseen tasks.
- 'Such failures often stem not from a lack of latent reasoning ability, but from
  mismatches at the model–environment boundary: poorly structured observations, misun-
  derstood tool contracts, non-executable actions, feedback that fails to trigger
  recovery, or degen- erate trajectory dynamics.'
- In this setting, recurring failures can be localized to specific stages of the interaction
  lifecy- cle, allowing failure-specific interface interventions to be evolved from
  training trajectories and then fixed during evaluation on unseen tasks.
