translations:
  abstract: LLM代理不仅由他们的语言模型所塑造,而且还由运行时的拉带所塑造,这种拉带可以调解观察,工具使用,动作执行,反馈解释,以及轨迹控制. 虽然现有的代理人适应方法主要是更新模型参数,但许多确定性、规则管理领域的失败都源于模型-环境界面的不匹配。
    我们提出Life-HARNESS,一种生命周期感应运行时的牵引装置,可以改善冷冻的LLM剂,而不会改变模型重量或评价环境. LIFE-HARNESS通过将反复发生的相互作用失败转化为跨环境合同、程序技能、行动实现和轨迹调控的可重复使用的干预措施,从培训轨迹演变而来,并且仍然固定在对看不见的任务进行评价。
    在7个确定性环境上,从“双层”和“双层”以及“Bench”特工,Life-HARNESS在126个模型环境设置中,有116个在18个模型骨干中得到了改善,平均相对改善88.5%。
    Harneses仅从Quen3-4B-指令轨迹转移到其他17个模型,表明LIFE-HARNESS捕捉到可重复使用的环境侧面结构,而不是模型特定的行为. 这些结果定位为运行时界面调整,作为以模型为中心的代理培训的补充替代.
    GitHub提供代码。
  one_sentence: 我们提出Life-HARNESS,一种生命周期感应运行时的牵引装置,可以改善冷冻的LLM剂,而不会改变模型重量或评价环境.
  problem: 这种失败往往不是因为缺乏潜在的推理能力,而是因为模型-环境界限上的不匹配:结构不良的观测、理解错误的工具合同、无法执行的行动、无法触发复苏的反馈,或者轨道动态退化。
  contributions:
  - 制定基于操纵的运行时间接口适应确定性LLM剂,将改进剂作为冷冻模型与规则管理环境之间可重复使用的接口。
  - 采用生命周期认识框架,将反复出现的轨迹失败转化为跨环境合同、程序技能、行动实现和轨迹调控的有针对性的干预措施。
  - 展示7个环境和18个骨干网的广泛跨模式收益,实现平均相对改善88%,不更新模型权重或修改评价协议.
  method:
  - 四个生命周期层:环境合同、程序技能、行动实现、轨迹管理。
  - 通过诊断反复发生的故障和转换为可重复使用的运行时间干预,从培训轨迹中演变而来。
  - 冷冻模型权重,只适应运行时界面.
  experiments:
  - 评估了7个确定性环境,分别来自“二层”和“二层”和“Bench”特工。
  - 通过18个教学调整、推理和特工专业骨干测试。
  - 在126个模型环境设置中,116个模型环境的平均相对改善率为88.5%。
  - 哈内塞斯从Quen3-4B-指令性转移发展为17个其他模式,没有再培训.
  limitations:
  - 虽然现有的代理 adap- tation 方法主要是更新模型 param- eters ,但是许多决定性的,规则化的治理域的失败来自于模型– 环境界面上的不匹配.
  - LIFE-HARNESS从训练轨迹中演化出来,通过将复发环相互作用失败转化为跨环境合同的可重复使用的通风口、亲心技能、动作实现和trajec-tory调控,并且仍然固定在对隐形任务进行估价。
  - 这些失败往往不是因为缺乏潜在的推理能力,而是因为模型环境边界上的不匹配:结构不良的观测、错误的脱落工具合同、无法执行的行动、无法触发恢复的反馈、或脱落的轨道动态。
  - 在这种环境下,反复出现的故障可以局部化到互动生命-cle的特定阶段,使得针对故障的接口干预能够从训练轨迹中演化出来,然后在评价隐形任务时固定.
