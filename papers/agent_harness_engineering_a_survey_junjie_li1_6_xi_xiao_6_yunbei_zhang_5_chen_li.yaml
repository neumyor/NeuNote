abstract: 'The rapid deployment of large language model (LLM) agents in production
  has revealed a recurring pattern: task execution reliability depends less on the
  underlying model than on the infrastructure layer that wraps it, the agent execution
  harness. This survey provides a practice-grounded, systematic treatment of agent
  harness engineering, organized around three claims. First, the agent harness is
  an independent system layer whose engineering quality drives a large share of real-world
  reliability, a position we develop through a three-phase engineering evolution from
  prompt to context to harness engineering, a cross-layer synthesis covering the cost–quality–speed
  trilemma, the capability–control tradeoff, and the harness coupling problem, and
  an open-problem agenda grounded in both research gaps and production pain points.
  Second, we propose ETCLOVG, a seven-layer taxonomy (Execution environment, Tool
  interface, Context management, Lifecycle/Orchestration, Observability, Verification,
  Governance) that extends prior six-component frameworks by treating observability
  and governance as independent architectural concerns. Third, we map 170+ open-source
  projects onto this taxonomy to expose ecosystem patterns, coverage gaps, and emerging
  design principles, alongside engineering principles distilled from production deployments
  at OpenAI, Anthropic, and LangChain that address the gap between practitioner knowledge
  and research vocabulary.'
one_sentence: This survey systematically treats agent harness engineering as an independent
  system layer, proposing the ETCLOVG taxonomy and mapping over 148 open-source projects.
problem: The rapid deployment of LLM agents has revealed that task execution reliability
  depends less on the underlying model than on the infrastructure layer (the agent
  execution harness), yet this layer lacks systematic study.
contributions:
- 'Conceptual: The harness, not the model alone, is the binding constraint on real-world
  agent reliability, supported by harness-only gains of up to 10x on benchmarks.'
- 'Classificatory: The seven-layer ETCLOVG taxonomy treats Observability and Governance
  as first-class layers, extending prior six-component frameworks.'
- 'Empirical: Mapping 148+ open-source projects onto ETCLOVG reveals ecosystem patterns,
  coverage gaps, and emerging design principles.'
method:
- Systematic survey and synthesis of agent harness engineering literature.
- Proposal of the ETCLOVG seven-layer taxonomy (Execution environment, Tool interface,
  Context management, Lifecycle/Orchestration, Observability, Verification, Governance).
- Mapping of 170+ open-source projects onto the taxonomy to expose ecosystem patterns
  and coverage gaps.
experiments:
- 31 8 Verification and Evaluation (V) 32 8.1 Harness Evaluation as a Task-to-Feedback
  Lifecycle .
- Bölük (2026a) modified only the edit-tool format and surrounding tool harness, with
  no model modification, and reported gains of up to 10×on coding benchmarks across
  15 models.
- Each of these harness-only gains exceeds the typical 2 to 4 percentage point improvements
  reported as meaningful model advances on the same benchmarks.
- 'We refer to this pattern as the binding-constraint thesis (Bölük, 2026b): for long-horizon
  tasks evaluated across comparable frontier models, benchmark variance may be driven
  as much by the execution harness as by the model itself.'
- Evaluation infrastructure matured with SWE-bench, AgentBench, WebArena, and GAIA
  (Jimenez et al., 2024; Liu et al., 2023a; Zhou et al., 2024; Mialon et al., 2023),
  while protocol standardization began with Anthropic’s MCP and Google’s A2A (Anthropic,
  2024c; Surapaneni et al., 2025).
limitations:
- Corpus limited to open-source projects; commercial platforms are excluded.
- Selection criteria may introduce coverage gaps in the mapping.
- Qualitative analysis; quantitative comparisons across harness components are limited.
