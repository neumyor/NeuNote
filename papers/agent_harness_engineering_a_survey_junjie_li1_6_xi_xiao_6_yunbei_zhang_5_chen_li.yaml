translations:
  abstract: 生产中迅速部署大型语言模型(LLM)剂,暴露出一种反复出现的模式:任务执行可靠性所依赖的不是基础模型,而是包扎它的基础设施层,即代理执行工具.
    这项调查提供了一种基于实践的系统处理剂牵引工程的方法,围绕三项索赔案组织。 首先,代理牵引器是一个独立的系统层,其工程质量驱动着大部分真实世界的可靠性,我们通过从快速到上下文的三阶段工程演化来发展这种地位,跨层合成涵盖成本-质量-速度三重力马,能力-控制权衡,以及操纵耦合问题,以及基于研究差距和生产痛点的开放式问题议程。
    第二,我们提议采用七层分类法(执行环境、工具界面、背景管理、生命周期/管弦乐、可观察性、核查、治理),通过将可观察性和治理作为独立的建筑问题来扩展前六部分框架。
    第三,我们把170+开源项目映射到这个分类学上,以揭示生态系统模式、覆盖差距和新兴设计原则,以及从OpenAI、Anthropic和LangChain的生产部署中提取的工程原则,解决实践者知识和研究词汇之间的差距。
  one_sentence: 这项调查系统地将代理人牵引工程视为独立的系统层,提出了ETCLOVG分类法,并绘制了148个开源项目。
  problem: 快速部署LLM代理显示,任务执行可靠性所依赖的不是基础模型,而是基础设施层(代理执行杠杆),然而这一层缺乏系统的研究.
  contributions:
  - 概念:对现实世界代理人可靠性的约束性制约是,仅靠在基准上达到10x的利用收益。
  - 分类法:七层ETCLOVG分类法将可观察性和治理性视为一流层,延伸前六部分框架.
  - 经验论:将148+开源项目映射到ETCLOVG上,揭示生态系统模式,覆盖差距,以及新兴设计原则.
  method:
  - 系统勘测和综合剂利用工程文献.
  - ETCLOVG七层分类学(执行环境、工具界面、背景管理、生命周期/管弦、可观察性、核查、治理)的建议。
  - 将170+开源项目映射到分类中,以揭示生态系统模式和覆盖面差距。
  experiments:
  - 31 8 核查和评价(五) 32 8.1 Harness评价作为任务对后继周期。
  - Bölük(2026a)只修改了编辑工具格式和周围工具的套装,没有模型修改,并报告在15个模型中增加了最多10×on编码基准.
  - 这些仅限使用的收益都超过了典型的2至4个百分点的改进,这些改进是在同一基准上取得有意义的模型进展。
  - 我们把这种模式称为约束-约束论(Bölük, 2026b):对于跨可比前沿模型评价的长视野任务,基准差异可能与模型本身一样由执行手段驱动。
  - 与SWE-bench,Agent Bench,WebArena,以及GAIA(Jimenez等人,2024年;Liu等人,2023年a;Zhou等人,2024年;Mialon等人,2023年)一起,评价基础设施已经成熟,而协议标准化则从Anthropic的MCP和Google的A2A(Anthropic,2024c;Surapaneni等人,2025年)开始.
  limitations:
  - 公司仅限于开源项目;商业平台除外.
  - 选择标准可能会在测绘中引入覆盖面差距。
  - 定性分析;对各种带状组件的定量比较有限。
