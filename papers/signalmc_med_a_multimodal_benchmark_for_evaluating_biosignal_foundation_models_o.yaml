abstract: Recent biosignal foundation models (FMs) have demonstrated promising performance
  across diverse clinical prediction tasks, yet systematic evaluation on long-duration
  multimodal data remains limited. We introduce SignalMC-MED, a benchmark for evaluating
  biosignal FMs on synchronized single-lead electrocardiogram (ECG) and photoplethysmogram
  (PPG) data. Derived from the MC-MED dataset, SignalMC-MED comprises 22,256 visits
  with 10-minute overlapping ECG and PPG signals, and includes 20 clinically relevant
  tasks spanning prediction of demographics, emergency department disposition, laboratory
  value regression, and detection of prior ICD-10 diagnoses. Using this benchmark,
  we perform a systematic evaluation of representative time-series and biosignal FMs
  across ECG-only, PPG-only, and ECG + PPG settings. We find that domain-specific
  biosignal FMs consistently outperform general time-series models, and that multimodal
  ECG + PPG fusion yields robust improvements over unimodal inputs. Moreover, using
  the full 10-minute signal consistently outperforms shorter segments, and larger
  model variants do not reliably outperform smaller ones. Hand-crafted ECG domain
  features provide a strong baseline and offer complementary value when combined with
  learned FM representations. Together, these results establish SignalMC-MED as a
  standardized benchmark and provide practical guidance for evaluating and deploying
  biosignal FMs.
one_sentence: We introduce SignalMC-MED, a benchmark for evaluating biosignal FMs
  on synchronized single-lead electrocardiogram (ECG) and photoplethysmogram (PPG)
  data.
problem: However, systematic evaluation on realistic, multimodal bedside data remains
  limited.
contributions:
- We introduce a large-scale multimodal benchmark for rigorous evaluation of biosignal
  FMs on synchronized ECG and PPG signals collected in routine emergency care.
- We conduct a systematic head-to-head evaluation of general time-series FMs, unimodal
  ECG- and PPG-specific biosignal FMs, a multimodal biosignal FM, and hand-crafted
  domain features across ECG-only, PPG-only, and ECG + PPG settings.
- We provide comprehensive empirical evidence clarifying how modality specialization,
  multimodal fusion, signal duration, model scale, and physiologically grounded domain
  features influence the performance of biosignal FMs.
method:
- Divided 10-minute signals into non-overlapping 10-second segments, extracting features
  per segment and aggregating via mean pooling for visit-level representation.
- Used frozen foundation models as feature extractors within a unified linear-probing
  framework.
- Multimodal fusion via late feature-level averaging of independently extracted ECG
  and PPG visit-level representations.
- '20 downstream tasks: age regression, sex classification, ED disposition classification,
  8 lab value regressions, 9 ICD-10 diagnoses.'
- Chronological train/val/test splits without patient overlap.
- Ridge regression for regression tasks, regularized logistic regression for classification;
  regularization hyperparameter selected on validation set.
experiments:
- 'Evaluated 8 approaches: MOMENT, Chronos-Bolt, PaPaGei, D-BETA, ECGFounder, xECG,
  CSFM, and hand-crafted domain features.'
- Tested in ECG-only, PPG-only, and ECG+PPG settings.
- Downstream models trained on 10%, 25%, 50%, 100% of training visits with five repeated
  resamplings.
- Reported Pearson correlation for regression tasks and AUROC for classification tasks.
- Compared performance across model variants, signal durations (10 seconds to 10 minutes),
  and model scales.
- Hand-crafted ECG domain features provided strong baseline and complementary value
  with learned representations.
limitations:
- Benchmark limited to 10-minute signal duration; future work should extend to continuous
  monitoring scenarios with hours or days of data per patient.
