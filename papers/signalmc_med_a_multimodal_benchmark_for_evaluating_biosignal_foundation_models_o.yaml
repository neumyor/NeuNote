translations:
  abstract: 最近的生物信号基础模型(FMs)表明,在各种临床预测任务中表现良好,但对长期多式联运数据的系统评价仍然有限。 我们采用了信号MC-MED,这是在同步单铅心电图(ECG)和光聚子图(PPG)数据上评价生物信号调频的基准。
    SignalMC-MED来自MC-MED数据集,包括22 256次访问和10分钟的ECG和PPG信号重叠,并包括20项临床相关任务,涉及人口预测、应急部门处置、实验室值回归和检测以前的ICD-10诊断。
    利用这一基准,我们系统地评价了具有代表性的时间序列和生物信号的调频,这些调频跨越了只使用ECG、只使用PPG和ECG+PPG的设置。 我们发现,特定域的生物信号调频一直比一般时间序列模型要好,而且多式联运ECG+PPG聚变比单式输入大有改进。
    此外,使用完整的10分钟的信号,总比较短的段长,较大的模型变体不能可靠地比较小的段长。 手动制作的ECG域名特征提供了一个强有力的基线,在与所学的调频表示相结合时提供互补价值.
    这些成果共同将信号MC-MED确定为标准基准,并为评价和部署生物信号调频提供实际指导。
  one_sentence: 我们采用了信号MC-MED,这是在同步单铅心电图(ECG)和光聚子图(PPG)数据上评价生物信号调频的基准。
  problem: 然而,对现实的、多式联运床边数据的系统评价仍然有限。
  contributions:
  - 我们采用一个大规模多式联运基准,严格评价常规紧急护理中收集的同步ECG和PPG信号的生物信号调频。
  - 我们系统地对一般时序调频、单式ECG和PPG专用生物信号调频、多式生物信号调频以及只使用ECG、只使用PPG和ECG+PPG设置的手工制作域特征进行头对头评价。
  - 我们提供了全面的实证证据,澄清了模式专业化、多式联运聚变、信号持续时间、模型规模和基于生理的域特征如何影响生物信号调频的性能。
  method:
  - 将10分钟的信号分为非重叠的10秒部分,从每个部分抽取特性,并通过平均集合方式汇总用于访问一级的代表。
  - 在一个统一的线性测试框架内使用冷冻基模型作为特征提取器.
  - 通过后期特性级实现多式聚变,平均可独立提取ECG和PPG访问级代表。
  - 20个下游任务:年龄回归,性别分类,ED处置分类,8个实验室值回归,9个ICD-10诊断.
  - 编年列车/val/测试分叉,没有病人重叠.
  - 回归任务的岭回归,分类的物流回归规范化;在验证集中选择的规范化超参数.
  experiments:
  - 评价了8种方法:Moment、Chronos-Bolt、PaPaGei、D-BETA、ECGOunder、xECG、CSFM和手工制作的域名。
  - 在只使用ECG,只使用PPG,以及ECG+PPG设置中测试.
  - 下游模式培训了10%、25%、50%、100%的培训访问,并进行了5次重复的复刻。
  - 报告回归任务的皮尔逊关联和分类任务的AUROC.
  - 比较模型变体的性能,信号持续时间(10秒至10分钟),模型尺度.
  - 手工制作的ECG域特征提供了坚实的基线和与学到的表述互补的价值。
  limitations:
  - 基准以10分钟的信号时间为限;今后的工作应扩大到每个病人持续监测时数或天数的数据。
