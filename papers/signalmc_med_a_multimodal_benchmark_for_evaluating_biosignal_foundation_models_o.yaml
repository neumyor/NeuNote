  ## Core Idea


  Recent biosignal foundation models (FMs) have demon- strated promising performance
  across diverse clinical pre- diction tasks, yet systematic evaluation on long-duration
  multimodal data remains limited. We introduce SignalMC- MED, a benchmark for evaluating
  biosignal FMs on syn- chronized single-lead electrocardiogram (ECG) and photo- plethysmogram
  (PPG) data. Derived from the MC-MED dataset, SignalMC-MED comprises 22,256 visits
  with 10- minute overlapping ECG and PPG signals, and includes 20 clinically relevant
  tasks spanning prediction of demo- graphics, emergency department disposition, laboratory
  value regression, and detection of prior ICD-10 diagnoses. Using this benchmark,
