  ## Limitations


  - However, systematic evaluation on realistic, multimodal bedside data remains limited.

  - However, the poor performance of PaPaGei even in the PPG-only setting shows that
  modality- specific pretraining alone does not guarantee strong perfor- mance.

  - These findings suggest that effective multimodal integration remains a non-trivial
  design challenge.

  - Future work should ex- tend the evaluation to continuous monitoring scenarios
  with hours or days of data per patient to better assess long-term temporal modeling.


