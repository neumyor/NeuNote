  ## Method Notes


  - SignalMC-MED: A Multimodal Benchmark for Evaluating Biosignal Foundation Models
  on Single-Lead ECG and PPG Fredrik K.

  - We introduce SignalMC- MED, a benchmark for evaluating biosignal FMs on syn- chronized
  single-lead electrocardiogram (ECG) and photo- plethysmogram (PPG) data.

  - Using this benchmark, we perform a systematic evalua- tion of representative time-series
  and biosignal FMs across ECG-only, PPG-only, and ECG + PPG settings.

  - We find that domain-specific biosignal FMs consistently outperform general time-series
  models, and that multimodal ECG + PPG fusion yields robust improvements over unimodal
  in- puts.

  - Moreover, using the full 10-minute signal consistently outperforms shorter segments,
  and larger model variants do not reliably outperform smaller ones.

  - Together, these results establish SignalMC-MED as a standardized benchmark and
  provide practical guidance for evaluating and deploying biosignal FMs.


