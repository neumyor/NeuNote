translations:
  abstract: 时间序列数据广泛存在于现实世界的网络物理系统中. 虽然分析和解释它们有助于重大价值,例如灾害预测和财务风险控制,但目前的工作流程主要依靠人类数据科学家,这需要大量的劳动力成本,缺乏自动化。
    为了解决这个问题,我们引入了TimeART,这是一种框架,它可以发挥强大的外箱工具的分析能力和大语言模型(LLMs)的推理能力,作为时间系列问答(TSQA)的完全代理数据科学家.
    为了教授基于LLM的时代系列理性模型(TSRMs)战略工具的使用,我们还收集了名为TimeTool Bench的100k专家轨迹体. 为提高TSRM的通俗化能力,我们随后设计了一个四阶段培训战略,通过学习自己的早期经验和自我反思来增强TSRM.
    实验上,我们在TimeTool Bench上训练了一台8B TSRM,并装备了TimeART框架,在多项TSQA任务上实现了一致的先进性能,这开创了一种面向代理时间序列推理的新型方法.
  one_sentence: 我们引入了TimeART,这个框架将分析工具与LLM推理结合,为时序问答创建代理数据科学家.
  problem: 虽然分析和解释它们有助于重大价值,例如灾害预测和财务风险控制,但目前的工作流程主要依靠人类数据科学家,这需要大量的劳动力成本,缺乏自动化。
  contributions:
  - 我们介绍TimeART, 一个代理时间系列 理性框架支持工具的使用。 它融合了21种强力的外置分析工具,使得TSRM在推理时能够自主,有力,高效地引用它们.
    通过对拟议的TimeTool Bench的培训,可以进一步加强TSRM,该工具包括100k高品质的工具使用轨迹。
  - 我们制定了一项新的培训战略,以减轻传统模式中的两难处境。 它将动力强化学习的基本原则分解成几个部分,使TSRM能够更好地认识外部环境和行动空间,从而保持通化能力.
  - 在实验中,我们通过我们提议的训练策略,在TimeTool Bench上训练一个8B TSRM,然后装备它与TimeART框架. 它在多种TSQA基准上表现出最先进的性能.
  method:
  - TimeART整合了21个用于时间序列分析的框外分析工具,包括统计方法和轻量级时间序列基础模型.
  - TimeTool Bench是一套用GPT-4o收集并通过严格方案验证的100k ReAct式工具使用轨迹.
  - 设计了一项四阶段培训战略,取代传统的SFT+RL,使TSRM能够学习早期探索经验和自我反射.
  - 培训战略加强了工具引用的普及和力度。
  experiments:
  - 利用拟议的培训战略,在TimeTool Bench上培训了一个8B TSRM。
  - 在多项技术质量评估基准方面实现了一致的最新业绩。
  - 数据集涵盖的领域包括:金融,卫生,网络,自然,天气,交通,能源等.
