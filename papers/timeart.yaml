contributions:
- To tackle this, we introduce TimeART, a framework fusing the analytical ca- pability
  of strong out-of-the-box tools and the reasoning capability of Large Language Models
  (LLMs), which serves as a fully agentic data scientist for Time Series Question
  Answering (TSQA).
- To overcome the above-mentioned problems, we propose TimeART, a Time series Agentic
  Reasoning framework with Tool-augmentation.
- Furthermore, in order to strengthen the tool invocation capability of TSRMs, we
  proposeTime- ToolBench, a comprehensive corpus for agentic time series reasoning,
  containing100kReAct-style (Yao et al., 2022) tool-use trajectories from multiple
  real-world domains, col- lected with GPT-4o and valiated through a strict scheme.
- 'Our contributions are summarized as: • We introduceTimeART, an Agentic Time Series
  Rea- soning framework supporting tool-use.'
- For simplification,we denote our method as TimeART in the following parts.
