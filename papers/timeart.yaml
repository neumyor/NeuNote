abstract: Time series data widely exist in real-world cyber-physical systems. Though
  analyzing and interpreting them contributes to significant values, e.g, disaster
  prediction and financial risk control, current workflows mainly rely on human data
  scientists, which requires significant labor costs and lacks automation. To tackle
  this, we introduce TimeART, a framework fusing the analytical capability of strong
  out-of-the-box tools and the reasoning capability of Large Language Models (LLMs),
  which serves as a fully agentic data scientist for Time Series Question Answering
  (TSQA). To teach the LLM-based Time Series Reasoning Models (TSRMs) strategic tool-use,
  we also collect a 100k expert trajectory corpus called TimeToolBench. To enhance
  TSRMs' generalization capability, we then devise a four-stage training strategy,
  which boosts TSRMs through learning from their own early experiences and self-reflections.
  Experimentally, we train an 8B TSRM on TimeToolBench and equip it with the TimeART
  framework, and it achieves consistent state-of-the-art performance on multiple TSQA
  tasks, which pioneers a novel approach towards agentic time series reasoning.
one_sentence: We introduce TimeART, a framework that fuses analytical tools with LLM
  reasoning to create an agentic data scientist for time series question answering.
problem: Though analyzing and interpreting them contributes to significant values,
  e.g, disaster prediction and financial risk control, current workflows mainly rely
  on human data scientists, which requires significant labor costs and lacks automation.
contributions:
- We introduce TimeART, an Agentic Time Series Reasoning framework supporting tool-use.
  It integrates 21 strong out-of-the-box analytical tools, allowing TSRMs to autonomously,
  robustly, and efficiently invoke them during reasoning. TSRMs can be further strengthened
  through training on the proposed TimeToolBench, a corpus containing 100k high-quality
  tool-use trajectories.
- We devise a novel training strategy to mitigate the dilemmas in conventional paradigms.
  It decomposes the underlying principles of agentic reinforcement learning into several
  parts, enabling the TSRMs to better perceive the external environment and the action
  space, thus preserving the generalization capability.
- Experimentally, we train an 8B TSRM on TimeToolBench through our proposed training
  strategy, and then equip it with the TimeART framework. It is demonstrated state-of-the-art
  performance on multiple TSQA benchmarks.
method:
- TimeART integrates 21 out-of-the-box analytical tools for time series analysis,
  including statistical methods and lightweight time series foundation models.
- TimeToolBench is a corpus of 100k ReAct-style tool-use trajectories collected with
  GPT-4o and validated through a strict scheme.
- A four-stage training strategy is devised that replaces conventional SFT+RL, allowing
  TSRMs to learn from early exploration experience and self-reflection.
- The training strategy enhances generalization and robustness in tool invocation.
experiments:
- Trained an 8B TSRM on TimeToolBench using the proposed training strategy.
- Achieved consistent state-of-the-art performance on multiple TSQA benchmarks.
- 'Datasets cover domains: finance, health, web, nature, weather, traffic, energy,
  and others.'
limitations:
- However, there still remain some limitations in TSRMs, making them struggle to replace
  data scientists.
- 'However, this paradigm faces some challenges in time series reasoning–see Figure
  2: 1) low generalization.The balance of behaviour cloning is hard to control, often
  causing TSRMs to simply imitate the tool-use trajectories of experts.'
- However, it is limited by the design of reward functions and quality of rollouts,
  especially when the reward is sparse.
- However, they still fall short in understand- ing the boundaries of tools’ capabilities,
  which may cause suboptimal and conservative invocations.
