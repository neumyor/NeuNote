abstract: Mathematical equations have been unreasonably effective in describing complex
  natural phenomena across various scientific disciplines. However, discovering such
  insightful equations from data presents significant challenges due to the necessity
  of navigating extremely large combinatorial hypothesis spaces. Current methods of
  equation discovery, commonly known as symbolic regression techniques, largely focus
  on extracting equations from data alone, often neglecting the domain-specific prior
  knowledge that scientists typically depend on. They also employ limited representations
  such as expression trees, constraining the search space and expressiveness of equations.
  To bridge this gap, we introduce LLM-SR, a novel approach that leverages the extensive
  scientific knowledge and robust code generation capabilities of Large Language Models
  (LLMs) to discover scientific equations from data. Specifically, LLM-SR treats equations
  as programs with mathematical operators and combines LLMs' scientific priors with
  evolutionary search over equation programs. The LLM iteratively proposes new equation
  skeleton hypotheses, drawing from its domain knowledge, which are then optimized
  against data to estimate parameters. We evaluate LLM-SR on four benchmark problems
  across diverse scientific domains (e.g., physics, biology), which we carefully designed
  to simulate the discovery process and prevent LLM recitation. Our results demonstrate
  that LLM-SR discovers physically accurate equations that significantly outperform
  state-of-the-art symbolic regression baselines, particularly in out-of-domain test
  settings. We also show that LLM-SR's incorporation of scientific priors enables
  more efficient equation space exploration than the baselines.
one_sentence: LLM-SR leverages large language models' scientific knowledge and code
  generation capabilities to discover scientific equations from data by treating equations
  as programs and combining LLMs' priors with evolutionary search.
problem: Discovering insightful equations from data is challenging due to the necessity
  of navigating extremely large combinatorial hypothesis spaces, and current symbolic
  regression methods often neglect domain-specific prior knowledge and use limited
  representations.
contributions:
- Introduced LLM-SR, a novel framework that leverages domain-specific prior knowledge
  and code generation capabilities of LLMs combined with off-the-shelf optimizers
  and evolutionary search for data-driven scientific equation discovery.
- Created four benchmark problems spanning physics, biology, and materials science,
  designed to simulate real-world discovery and prevent LLM recitation risks.
- Showed that LLM-SR outperforms state-of-the-art symbolic regression methods by navigating
  the equation search space more efficiently and discovering more accurate equations
  with better out-of-domain generalization.
- Demonstrated through a comprehensive ablation study that natural language problem
  descriptions, program representation, data-driven feedback, and iterative hypothesis
  refinement are essential components for LLM-SR's success.
method:
- LLM-SR treats equations as Python programs with placeholder parameters.
- It uses an LLM to iteratively propose equation skeleton hypotheses based on scientific
  priors and in-context examples.
- Hypotheses are optimized using off-the-shelf optimizers (numpy+BFGS or torch+Adam)
  to fit the data.
- An experience management buffer maintains diverse high-scoring hypotheses to guide
  future iterations.
experiments:
- Evaluated on four custom benchmark problems across physics, biology, and materials
  science.
- Used GPT-3.5-turbo and Mixtral-8x7B as backbone LLMs.
- Compared against state-of-the-art symbolic regression baselines.
- Demonstrated better out-of-domain generalization and more efficient equation space
  exploration.
- Conducted ablation studies to confirm importance of key components.
limitations:
- However, discovering such insightful equations from data presents significant challenges
  due to the necessity of navigating extremely large combinatorial hypothesis spaces.
- However, while evaluating the fit of a proposed equation is relatively straightforward,
  the inverse process of obtaining these mathematical equations from data is a challenging
  problem, known to be NP-hard (Virgolin & Pissis, 2022).
- However, these methods often struggle with the complexity of the vast optimization
  space and do not incorporate prior scientific knowledge, which leads to suboptimal
  solutions and inefficient exploration of the equation search space.
- Similarly, the design of current general LLM-based optimization frameworks (Meyerson
  et al., 2023; Romera-Paredes et al., 2024; Yang et al., 2023a) also have several
  key limitations in terms of domain knowledge integration and diverse exploration
  which are critical for equation discovery.
