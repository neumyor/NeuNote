translations:
  abstract: 数学方程式在描述跨多个科学学科的复杂自然现象方面展现了出乎意料的有效性。然而，从数据中发现此类具有洞见的方程面临着重大挑战，因为需要遍历极其庞大的组合假设空间。当前的方程发现方法，通常称为符号回归技术，主要专注于仅从数据中提取方程，往往忽略了科学家通常依赖的领域特定先验知识。它们还采用诸如表达式树之类的有限表示，限制了搜索空间和方程的表达能力。为弥补这一差距，我们引入LLM-SR，这是一种新颖的方法，利用大型语言模型（LLMs）广泛的科学知识和强大的代码生成能力，从数据中发现科学方程。具体来说，LLM-SR将方程视为带有数学运算符的程序，并将LLM的科学先验与方程程序上的进化搜索相结合。LLM利用其领域知识迭代地提出新的方程骨架假设，然后根据数据对其进行优化以估计参数。我们在四个跨不同科学领域（例如物理、生物）的基准问题上评估了LLM-SR，这些问题是精心设计的，以模拟发现过程并防止LLM机械背诵。我们的结果表明，LLM-SR发现了物理上准确的方程，显著优于最先进的符号回归基线，特别是在域外测试设置中。我们还表明，LLM-SR融入科学先验使其比基线方法更高效地探索方程空间。
  one_sentence: LLM-SR利用大型语言模型的科学知识和代码生成能力，通过将方程视为程序并结合LLM的先验知识与进化搜索，从数据中发现科学方程。
  problem: 从数据中发现具有洞见的方程充满挑战，因为需要遍历极其庞大的组合假设空间，而当前的符号回归方法往往忽略领域特定的先验知识，并使用有限的表示。
  contributions:
  - 引入了LLM-SR，一种新颖的框架，利用LLMs的领域特定先验知识和代码生成能力，结合现成的优化器和进化搜索，用于数据驱动的科学方程发现。
  - 创建了四个跨物理、生物和材料科学的基准问题，旨在模拟真实世界发现并防止LLM机械背诵风险。
  - 展示了LLM-SR通过更高效地导航方程搜索空间，发现更准确的方程并具有更好的域外泛化能力，从而优于最先进的符号回归方法。
  - 通过全面的消融研究表明，自然语言问题描述、程序表示、数据驱动反馈和迭代假设细化是LLM-SR成功的关键组成部分。
  method:
  - LLM-SR将方程视为具有占位符参数的Python程序。
  - 它使用LLM基于科学先验和上下文示例迭代地提出方程骨架假设。
  - 假设使用现成优化器（numpy+BFGS或torch+Adam）进行优化以拟合数据。
  - 经验管理缓冲区维护多样化的高分假设，以指导未来的迭代。
  experiments:
  - 在跨物理、生物和材料科学的四个定制基准问题上进行了评估。
  - 使用GPT-3.5-turbo和Mixtral-8x7B作为骨干LLM。
  - 与最先进的符号回归基线进行了比较。
  - 展示了更好的域外泛化和更高效的方程空间探索。
  - 进行了消融研究以确认关键组件的重要性。
  limitations:
  - 然而，从数据中发现此类具有洞见的方程面临着重大挑战，因为需要遍历极其庞大的组合假设空间。
  - 然而，尽管评估所提出方程的拟合度相对直接，但从数据中获取这些数学方程的逆过程是一个具有挑战性的问题，已知是NP难的 (Virgolin & Pissis,
    2022)。
  - 然而，这些方法通常难以应对广阔优化空间的复杂性，并且没有融入先验科学知识，从而导致次优解和方程搜索空间的低效探索。
  - 类似地，当前通用的基于LLM的优化框架（Meyerson et al., 2023; Romera-Paredes et al., 2024; Yang et
    al., 2023a）的设计在领域知识整合和多样化探索方面也存在几个关键局限性，而这些对于方程发现至关重要。
