abstract: Time series reasoning tasks often start with a natural language question
  and require targeted analysis of a time series. Evidence may span the full series
  or appear in a few short intervals, so the model must decide what to inspect. Most
  existing approaches encode the entire time series into a fixed representation before
  inference, regardless of relevance. We introduce ARTIST, which formulates time-series
  reasoning as a sequential decision problem. ARTIST interleaves reasoning with adaptive
  temporal segment selection. It adopts a controller-reasoner architecture and uses
  reinforcement learning to train the controller role to select informative segments
  and the reasoner role to generate segment-conditioned reasoning traces and final
  answers. During inference, the model actively acquires task-relevant information
  instead of relying on a static summary of the full sequence. We use a novel hierarchical
  policy optimization approach for post-training that allows the model to excel in
  both segment selection and question-answering behavior. We evaluate ARTIST on six
  time-series reasoning benchmarks and compare it with large language models, vision-language
  models, and prior time-series reasoning systems. ARTIST improves average accuracy
  by 6.46 absolute percentage points over the strongest baseline. The largest gains
  appear on rare event localization and multi-segment reasoning tasks. Supervised
  fine-tuning improves performance, and reinforcement learning provides additional
  gains by optimizing question-adaptive segment selection, showing that selective
  data use drives effective time-series reasoning.
one_sentence: ARTIST formulates time-series reasoning as a sequential decision problem
  where the model adaptively selects temporal segments during inference, improving
  average accuracy by 6.46 percentage points over baselines.
problem: Existing time series reasoning approaches encode the entire time series into
  a fixed representation before inference, regardless of the query's relevance, failing
  to adaptively select informative segments.
contributions:
- Adaptive segment selection for time series reasoning, where the model iteratively
  chooses temporal segments to inspect and updates its reasoning based on retrieved
  segments without pre-defined segment labels.
- A hierarchical, collaborative self-play RL post-training method that separates segment
  selection from answer generation and trains each role with learning signals aligned
  to its role.
- On six benchmarks, ARTIST outperforms seven strong baselines, improving average
  accuracy by 6.46 absolute percentage points while using a smaller fraction of the
  input time series.
method:
- 'ARTIST uses a controller-reasoner architecture: a high-level controller selects
  the next temporal segment and decides when to stop; a low-level reasoner produces
  intermediate reasoning steps and the final answer conditioned on selected segments.'
- 'Training proceeds in two stages: supervised fine-tuning on curated traces that
  interleave segment selection with reasoning, followed by collaborative self-play
  reinforcement learning with reliability-based reward for controller and correctness
  reward for reasoner.'
- During inference, the model actively acquires task-relevant information by interleaving
  reasoning with temporal segment selection.
experiments:
- Evaluated on six benchmarks covering clinical, financial, environmental, and general
  domain time series reasoning.
- Compared with large language models, vision-language models, and prior time-series
  reasoning systems (seven baselines total).
- ARTIST achieves average accuracy improvement of 6.46 percentage points over the
  strongest comparator, with gains up to 12.5 points on localized or multi-segment
  reasoning tasks.
- Uses only 30-70% of the input time series per query.
limitations:
- Increas- ingly, however, real-world use cases begin with a natural- language question
  rather than a predefined label or predic- tion horizon.
- However, an analo- gous mechanism for time-series reasoning remains under- explored,
  despite the strong need for adaptive localization in long time series.
- Two challenges make question-adaptive segment selection difficult in time series
  reasoning.
- ARTIST’s controller-reasoner decomposition and reliability-based re- ward target
  these challenges directly.
