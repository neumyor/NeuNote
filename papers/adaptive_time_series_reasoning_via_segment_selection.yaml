translations:
  abstract: 时间序列推理任务往往从自然语言问题开始,需要对时间序列进行有针对性的分析. 证据可能跨越整个系列或短时间出现,所以模型必须决定检查什么. 多数现有方法将整个时间序列编码成一个固定的表述,然后再推论,无论相关性如何.
    我们引入了ARTIST,它将时间序列推理作为一个顺序决定问题. ARTIST 与适应性时间段选择互换推理. 它采用了控制器-理性架构,并利用强化学习来培训控制器角色来选择信息段和理性角色来生成部分有条件的推理痕迹和最终答案.
    在推论期间,该模型积极获取与任务相关的信息,而不是依赖于完整序列的静态汇总. 我们使用一种新的分级政策优化方法来进行后培训,使模式在分段选择和问答行为上都表现优异。
    我们根据六个时间序列推理基准来评价ARTIST,并与大型语言模型,视觉语言模型,以及之前的时间序列推理系统进行比较. ARTIST比最强基线提高6.46绝对百分点的平均精度.
    最大的收益出现在罕见事件本地化和多片段推理任务上. 监督的微调提高了性能,强化学习通过优化问题适应片段选择提供了额外的收益,表明选择性数据使用驱动有效的时间序列推理.
  one_sentence: ARTIST将时间序列推理发展成一个顺序决定问题,模型在推论中因地制宜地选择时间段,比基线提高6.46个百分点。
  problem: 现有的时间序列推理方法将整个时间序列编码成一个固定的表示,在推论之前,无论查询的相关性如何,都未能适应性地选择信息段.
  contributions:
  - 适应性段选择用于时间序列推理,其中模型迭代选择时间段检查并更新其基于检索的段的推理,没有预先定义的段标签.
  - 一种分级,协作的自演RL后训练方法,将分区选择与答案生成区分开来,并用与其角色一致的学习信号来训练每个角色.
  - 在6个基准上,ARTIST的表现超过了7个强基线,提高了平均精度6.46绝对百分点,同时使用了输入时间序列的一小部分.
  method:
  - ARTIST使用控制器-推理器架构:高级控制器选择下一个时段,并决定何时停止;低级理性器产生中间推理步骤,最后的解答以选定的时段为条件.
  - 训练分两个阶段进行:监督微调被整理的痕迹,这些痕迹将分段选择与推理相衔接,然后合作进行自我游戏强化学习,对控制者进行可靠性奖励,对理性进行正确奖励。
  - 在推论期间,该模型通过离异推理与时间段选择相衔接,积极获取与任务相关的信息.
  experiments:
  - 评估了涉及临床、财务、环境和一般领域时间序列推理的六项基准。
  - 与大型语言模型,视觉语言模型,以及之前的时间序列推理系统(共7个基线)相比.
  - ARTIST比最强的参照国平均精度提高6.46个百分点,本地化或多部门推理任务收益高达12.5个百分点.
  - 每个查询只使用30-70%的输入时间序列.
  limitations:
  - 然而,增加- ingle, 现实世界使用的案例开始于一个自然语言问题,而不是一个预定义的标签或预兆-tion视野.
  - 然而,尽管在较长的时间序列中迫切需要适应性本地化,但对时间序列推理的肛门-古斯机制的探索仍然不足。
  - 两个挑战使得时间序列推理中的问题适应部分选择变得困难.
  - ARTIST的控制器-理性分解器和基于可靠性的重病房直接针对这些挑战.
