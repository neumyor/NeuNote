abstract: Electrocardiography (ECG) is a very common, non-invasive diagnostic procedure
  and its interpretation is increasingly supported by algorithms. The progress in
  the field of automatic ECG analysis has up to now been hampered by a lack of appropriate
  datasets for training as well as a lack of well-defined evaluation procedures to
  ensure comparability of different algorithms. To alleviate these issues, we put
  forward first benchmarking results for the recently published, freely accessible
  clinical 12-lead ECG dataset PTB-XL, covering a variety of tasks from different
  ECG statement prediction tasks to age and sex prediction. Among the investigated
  deep-learning-based time-series classification algorithms, we find that convolutional
  neural networks, in particular resnet- and inception-based architectures, show the
  strongest performance across all tasks. We find consistent results on the ICBEB2018
  challenge ECG dataset and discuss prospects of transfer learning using classifiers
  pretrained on PTB-XL. These benchmarking results are complemented by deeper insights
  into the classification algorithm in terms of hidden stratification, model uncertainty
  and an exploratory interpretability analysis, which provide connecting points for
  future research on the dataset. Our results emphasize the prospects of deep-learning-based
  algorithms in the field of ECG analysis, not only in terms of quantitative accuracy
  but also in terms of clinically equally important further quality metrics such as
  uncertainty quantification and interpretability. With this resource, we aim to establish
  the PTB-XL dataset as a resource for structured benchmarking of ECG analysis algorithms
  and encourage other researchers in the field to join these efforts.
one_sentence: This paper presents the first benchmarking results for the PTB-XL ECG
  dataset across multiple tasks, showing that convolutional neural networks, particularly
  resnet- and inception-based architectures, achieve the best performance, while also
  providing insights into hidden stratification, model uncertainty, and interpretability.
problem: The progress in the field of automatic ECG analysis has up to now been hampered
  by a lack of appropriate datasets for training as well as a lack of well-defined
  evaluation procedures to ensure comparability of different algorithms.
contributions:
- Proposes different benchmarking tasks on the PTB-XL dataset ranging from ECG statement
  prediction to age and sex prediction.
- Implements and adapts state-of-the-art deep learning time series classification
  algorithms, including a new resnet adaptation (xresnet1d101) that performs best
  across tasks.
- Provides first reliable assessment of transfer learning in the ECG context, demonstrating
  promising prospects of transfer learning from PTB-XL to other datasets in the small
  dataset regime.
- Provides evidence for hidden stratification, evaluates diagnosis likelihood information
  versus model uncertainty, and presents an outlook to interpretability methods.
method:
- Uses PTB-XL dataset (21837 12-lead ECG records, 18885 patients) and ICBEB2018 dataset
  (6877 records) for transfer learning.
- 'Implements multiple deep learning architectures: FCN, Deep4Net, resnet-based (including
  new xresnet1d101), inception-based (InceptionTime), and RNNs (LSTM, GRU).'
- Trains models on 8 folds, validates and tests on separate folds; uses train-test
  splits provided by PTB-XL.
- Employs concat-pooling, batch normalization, dropout (0.25/0.5), kernel size 5 for
  resnets, and Adam optimizer.
experiments:
- 'Benchmarking on PTB-XL: diagnostic ECG statement prediction at three label granularities
  (multilabel classification).'
- 'Benchmarking on PTB-XL: rhythm prediction (multilabel classification).'
- 'Benchmarking on PTB-XL: form prediction (multilabel classification).'
- 'Benchmarking on PTB-XL: sex prediction (binary classification).'
- 'Benchmarking on PTB-XL: age prediction (regression).'
- 'Transfer learning experiment: pretrain on PTB-XL and finetune on ICBEB2018 to assess
  transfer learning benefits.'
- Analysis of hidden stratification (model errors correlate with rare comorbidities).
- Evaluation of model uncertainty using diagnosis likelihood information.
- Exploratory interpretability analysis using saliency maps.
limitations:
- The study is primarily based on a single large dataset (PTB-XL) and one transfer
  learning dataset (ICBEB2018), limiting generalizability.
- Interpretability analysis is exploratory and not clinically validated.
- Model uncertainty comparison with diagnosis likelihood is preliminary.
