translations:
  abstract: 心电图(ECG)是一种非常常见且非侵入性的诊断程序，其解读正日益得到算法的支持。迄今为止，自动心电图分析领域的进展受到缺乏合适的训练数据集以及缺乏明确定义的评估程序来确保不同算法可比性的阻碍。为解决这些问题，我们针对最近发布且可免费获取的临床12导联心电图数据集PTB-XL提出了首批基准测试结果，涵盖了从不同心电图陈述预测任务到年龄和性别预测的各种任务。在所研究的基于深度学习的时间序列分类算法中，我们发现卷积神经网络，特别是基于ResNet和Inception的架构，在所有任务中表现最为强劲。我们在ICBEB2018挑战赛心电图数据集上得出一致的结果，并讨论了使用在PTB-XL上预训练的分类器进行迁移学习的前景。这些基准测试结果辅以对分类算法在隐藏分层、模型不确定性和探索性可解释性分析方面的更深入见解，为未来在该数据集上的研究提供了连接点。我们的结果强调了基于深度学习的算法在心电图分析领域的前景，不仅在定量准确性方面，而且在临床同等重要的其他质量指标（如不确定性量化和可解释性）方面。通过这一资源，我们旨在将PTB-XL数据集建立为心电图分析算法结构化基准测试的资源，并鼓励该领域的其他研究人员加入这些努力。
  one_sentence: 本文针对PTB-XL心电图数据集在多个任务上提出了首批基准测试结果，表明卷积神经网络（尤其是基于ResNet和Inception的架构）取得了最佳性能，同时提供了关于隐藏分层、模型不确定性和可解释性的见解。
  problem: 自动心电图分析领域的进展迄今受到缺乏合适的训练数据集以及缺乏明确定义的评估程序以确保不同算法可比性的阻碍。
  contributions:
  - 在PTB-XL数据集上提出了从心电图陈述预测到年龄和性别预测的不同基准测试任务。
  - 实现并适配了最先进的深度学习时间序列分类算法，包括一种新的ResNet自适应变体（xresnet1d101），它在各任务中表现最佳。
  - 首次提供了心电图领域迁移学习的可靠评估，展示了在小数据集场景下从PTB-XL迁移学习到其他数据集的前景。
  - 提供了隐藏分层的证据，评估了诊断似然信息与模型不确定性的关系，并给出了可解释性方法的展望。
  method:
  - 使用PTB-XL数据集（21837条12导联心电图记录，18885名患者）和ICBEB2018数据集（6877条记录）进行迁移学习。
  - 实现了多种深度学习架构：FCN、Deep4Net、基于ResNet（包括新的xresnet1d101）、基于Inception（InceptionTime）以及RNN（LSTM、GRU）。
  - 在8折上训练模型，在独立的折上进行验证和测试；使用PTB-XL提供的训练-测试划分。
  - 采用concat-pooling、batch normalization、dropout（0.25/0.5）、ResNet的kernel size 5以及Adam优化器。
  experiments:
  - 在PTB-XL上进行基准测试：三种标签粒度下的诊断性心电图陈述预测（多标签分类）。
  - 在PTB-XL上进行基准测试：节律预测（多标签分类）。
  - 在PTB-XL上进行基准测试：形态预测（多标签分类）。
  - 在PTB-XL上进行基准测试：性别预测（二分类）。
  - 在PTB-XL上进行基准测试：年龄预测（回归）。
  - 迁移学习实验：在PTB-XL上预训练并在ICBEB2018上微调，以评估迁移学习的效果。
  - 隐藏分层分析（模型错误与罕见合并症相关）。
  - 使用诊断似然信息评估模型不确定性。
  - 使用显著性图进行探索性可解释性分析。
  limitations:
  - 该研究主要基于单个大型数据集（PTB-XL）和一个迁移学习数据集（ICBEB2018），限制了泛化性。
  - 可解释性分析是探索性的，未经临床验证。
  - 模型不确定性与诊断似然的比较是初步的。
